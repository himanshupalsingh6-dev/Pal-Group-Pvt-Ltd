<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Partner Help Center</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:28px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.partnerBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* FORM */

.helpCard{
background:#fff;
padding:30px;
border-radius:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.helpGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

input,textarea,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
width:100%;
box-sizing:border-box;
}

textarea{
height:140px;
resize:none;
}

/* BUTTON */

.btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

/* TICKETS */

.ticketCard{
background:#fff;
padding:25px;
border-radius:22px;
margin-bottom:20px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.ticketTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.ticketMessage{
background:#f7f7f7;
padding:15px;
border-radius:12px;
}

/* STATUS */

.open{
color:#d97706;
font-weight:bold;
}

.resolved{
color:#16a34a;
font-weight:bold;
}

.closed{
color:#dc2626;
font-weight:bold;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Partner
</div>

<a href="./index.html">
<button>
📊 Dashboard
</button>
</a>

<a href="./orders.html">
<button>
📦 Orders
</button>
</a>

<a href="./wallet.html">
<button>
💰 Wallet
</button>
</a>

<a href="./withdraw.html">
<button>
💳 Withdraw
</button>
</a>

<a href="./profile.html">
<button>
👤 Profile
</button>
</a>

<a href="./help.html">
<button class="activeBtn">
🛠 Help
</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
🛠 Partner Help Center
</h1>

<div class="partnerBox">
👨‍🏭 Partner
</div>

</div>

<!-- CREATE TICKET -->

<div class="helpCard">

<h2>
Create Support Ticket
</h2>

<div class="helpGrid">

<input
type="text"
id="subject"
placeholder="Subject"
>

<select id="priority">

<option value="Low">
Low Priority
</option>

<option value="Medium">
Medium Priority
</option>

<option value="High">
High Priority
</option>

</select>

</div>

<br>

<textarea
id="message"
placeholder="Write your issue..."
></textarea>

<br><br>

<button
class="btn green"
onclick="createTicket()"
>
Submit Ticket
</button>

</div>

<!-- TICKETS -->

<div id="ticketsContainer">

</div>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

collection,
addDoc,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/*

⚠ DEMO PARTNER

REAL LOGIN KE BAAD:

auth.currentUser.uid

USE KARNA

*/

const partnerId =
"demoPartner";

const subject =
document.getElementById("subject");

const priority =
document.getElementById("priority");

const message =
document.getElementById("message");

const ticketsContainer =
document.getElementById("ticketsContainer");

/* CREATE TICKET */

window.createTicket =
async function(){

if(
!subject.value ||
!message.value
){
alert("Fill all fields");
return;
}

await addDoc(
collection(db,"supportTickets"),
{

partnerId:partnerId,

subject:subject.value,

priority:priority.value,

message:message.value,

status:"open",

createdAt:Date.now()

}

);

alert("Ticket Created ✅");

subject.value = "";
message.value = "";

}

/* LOAD TICKETS */

onSnapshot(
collection(db,"supportTickets"),
(snapshot)=>{

let html = "";

snapshot.forEach((docSnap)=>{

const t = docSnap.data();

if(t.partnerId !== partnerId){
return;
}

let date =
new Date(
t.createdAt || Date.now()
).toLocaleString();

html += `

<div class="ticketCard">

<div class="ticketTop">

<div>

<h2>
${t.subject || "-"}
</h2>

<p>
${date}
</p>

</div>

<div class="${t.status}">
${t.status}
</div>

</div>

<p>
Priority:
<b>${t.priority}</b>
</p>

<div class="ticketMessage">

${t.message || "-"}

</div>

</div>

`;

});

ticketsContainer.innerHTML = html;

});

</script>

</body>
</html>
