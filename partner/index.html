<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Partner Panel PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#f6f7f9;margin:0}
.header{background:#FFD400;padding:14px;text-align:center;font-weight:bold}

.card{background:#fff;padding:12px;margin:10px;border-radius:10px}
button{padding:6px;margin:3px;background:#FFD400;border:none}
.details{display:none;margin-top:10px}

.accept{background:green;color:#fff}
.reject{background:red;color:#fff}
</style>
</head>

<body>

<div class="header">👨‍🔧 Partner Panel PRO</div>

<div id="dashboard"></div>

<canvas id="chart" style="margin:10px"></canvas>

<div id="content"></div>

<script type="module">

import { db } from "../js/firebase.js";
import {
collection,onSnapshot,doc,updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let partnerName = localStorage.getItem("name");
let orders=[];

/* LOAD */
onSnapshot(collection(db,"orders"), snap=>{
orders=[];
snap.forEach(d=>orders.push({...d.data(),id:d.id}));

loadDashboard();
loadOrders();
drawChart();
});

/* DASHBOARD */
function loadDashboard(){

let total=0, pending=0, completed=0;

orders.forEach(o=>{
if(o.partner===partnerName){
total++;

if(o.status==="Pickup") pending++;
if(o.status==="Delivered") completed++;
}
});

dashboard.innerHTML=`
<div class="card">📦 Orders: ${total}</div>
<div class="card">🟡 Pending: ${pending}</div>
<div class="card">✅ Completed: ${completed}</div>
`;
}

/* GRAPH */
function drawChart(){

let dataMap={
Pickup:0,
Washing:0,
Ironing:0,
Ready:0,
Out:0,
Delivered:0
};

orders.forEach(o=>{
if(o.partner===partnerName){
dataMap[o.status] = (dataMap[o.status]||0)+1;
}
});

new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{
labels:Object.keys(dataMap),
datasets:[{data:Object.values(dataMap)}]
}
});
}

/* ORDERS */
function loadOrders(){

let html="";

orders.forEach((o,i)=>{

if(o.partner!==partnerName) return;

let items="";
o.items?.forEach(it=>{
items+=`${it.name} x ${it.qty}<br>`;
});

html+=`
<div class="card">

<b>👤 ${o.name}</b><br>
📞 ${o.phone||""}<br>

📍 From: ${o.address}<br>
📍 To: Customer Home<br>

💰 ₹${o.total}<br>

🚚 Rider: ${o.rider || "Not Assigned"}<br>

Status: <b>${o.status}</b><br>

<button class="accept" onclick="acceptOrder('${o.id}')">Accept</button>
<button class="reject" onclick="rejectOrder('${o.id}')">Reject</button>

<select onchange="updateStatus('${o.id}',this.value)">
<option>Pickup</option>
<option>Washing</option>
<option>Ironing</option>
<option>Ready</option>
<option>Out</option>
<option>Delivered</option>
</select>

<button onclick="toggle(${i})">Details</button>

<div id="d${i}" class="details">
<hr>
<b>Items:</b><br>
${items}
</div>

</div>
`;
});

content.innerHTML=html;
}

/* FUNCTIONS */
window.toggle=(i)=>{
let el=document.getElementById("d"+i);
el.style.display = el.style.display==="block"?"none":"block";
}

window.updateStatus=async(id,status)=>{
await updateDoc(doc(db,"orders",id),{status});
}

/* ACCEPT */
window.acceptOrder=async(id)=>{
await updateDoc(doc(db,"orders",id),{accepted:true});
alert("Order Accepted ✅");
}

/* REJECT */
window.rejectOrder=async(id)=>{
await updateDoc(doc(db,"orders",id),{status:"Rejected"});
alert("Order Rejected ❌");
}

</script>

</body>
</html>
