<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Partner Dashboard</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:28px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.partnerBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
}

.card h1{
margin:0;
font-size:42px;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* STATUS */

.pending{
color:#d97706;
font-weight:bold;
}

.processing{
color:#2563eb;
font-weight:bold;
}

.completed{
color:#16a34a;
font-weight:bold;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Partner
</div>

<a href="./index.html">
<button class="activeBtn">
📊 Dashboard
</button>
</a>

<a href="./orders.html">
<button>
📦 Orders
</button>
</a>

<a href="./wallet.html">
<button>
💰 Wallet
</button>
</a>

<a href="./withdraw.html">
<button>
💳 Withdraw
</button>
</a>

<a href="./profile.html">
<button>
👤 Profile
</button>
</a>

<a href="./help.html">
<button>
🛠 Help
</button>
</a>
  
<button onclick="logout()">
🚪 Logout
</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
👨‍🏭 Partner Dashboard
</h1>

<div class="partnerBox">
👤 Partner
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">

<h2>Total Orders</h2>

<h1 id="totalOrders">
0
</h1>

</div>

<div class="card">

<h2>Pending Orders</h2>

<h1 id="pendingOrders">
0
</h1>

</div>

<div class="card">

<h2>Completed Orders</h2>

<h1 id="completedOrders">
0
</h1>

</div>

<div class="card">

<h2>Total Earnings</h2>

<h1 id="totalEarnings">
₹0
</h1>

</div>

</div>

<!-- LIVE ORDERS -->

<div class="tableCard">

<h2>
📦 Live Orders
</h2>

<table>

<thead>

<tr>

<th>Customer</th>
<th>Phone</th>
<th>Total</th>
<th>Status</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

</div>
  
<script src="./auth-check.js"></script>
  
<script type="module">

import { db }
from "./firebase.js";

<script type="module">

import { db }
from "./firebase.js";

import {

collection,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalOrders =
document.getElementById("totalOrders");

const pendingOrders =
document.getElementById("pendingOrders");

const completedOrders =
document.getElementById("completedOrders");

const totalEarnings =
document.getElementById("totalEarnings");

const ordersTable =
document.getElementById("ordersTable");

onSnapshot(
collection(db,"orders"),
(snapshot)=>{

let total = 0;
let pending = 0;
let completed = 0;
let earnings = 0;

let html = "";

snapshot.forEach((docSnap)=>{

const o = docSnap.data();

total++;

earnings += Number(o.partnerAmount || 0);

if(o.status === "Pending"){
pending++;
}

if(o.status === "Completed"){
completed++;
}

html += `

<tr>

<td>${o.name || "-"}</td>

<td>${o.phone || "-"}</td>

<td>₹${o.total || 0}</td>

<td class="${(o.status || '').toLowerCase()}">

${o.status || "-"}

</td>

</tr>

`;

});

totalOrders.innerHTML = total;

pendingOrders.innerHTML = pending;

completedOrders.innerHTML = completed;

totalEarnings.innerHTML =
"₹" + earnings;

ordersTable.innerHTML = html;

});

</script>
<script>

function logout(){

localStorage.removeItem("partnerId");

localStorage.removeItem("partnerName");

window.location.href =
"./login.html";

}

</script>
  
</body>
</html>
