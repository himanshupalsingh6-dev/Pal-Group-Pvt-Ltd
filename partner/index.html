<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="side"></div>

<div class="main">

<div class="header">
Dashboard
<select><option>Online</option><option>Offline</option></select>
</div>

<div id="stats"></div>

</div>

<script type="module">

import { sidebar } from "./js/common.js";
import { db } from "../js/firebase.js";
import { collection,onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

side.innerHTML = sidebar();

let partner = localStorage.getItem("name");

onSnapshot(collection(db,"orders"), snap=>{

let total=0,complete=0;

snap.forEach(d=>{
let o=d.data();

if(o.partner===partner){
total++;
if(o.status==="Delivered") complete++;
}
});

stats.innerHTML=`
<div class="card">Total: ${total}</div>
<div class="card">Completed: ${complete}</div>
`;

});

</script>

</body>
</html>
