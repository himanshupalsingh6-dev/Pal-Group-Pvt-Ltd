<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Partner Panel</title>

<style>
body{font-family:Segoe UI;background:#f6f7f9;margin:0}
.header{background:#FFD400;padding:14px;text-align:center;font-weight:bold}

.card{background:#fff;padding:12px;margin:10px;border-radius:10px}
button{padding:6px;margin:3px;background:#FFD400;border:none}
select{padding:6px;margin-top:5px}
.details{display:none;margin-top:10px}

.highlight{border-left:5px solid orange}
</style>
</head>

<body>

<div class="header">👨‍🔧 Partner Panel</div>

<div id="dashboard"></div>

<div class="card">
<select onchange="filterStatus(this.value)">
<option value="all">All Orders</option>
<option value="Pickup">Pickup</option>
<option value="Washing">Washing</option>
<option value="Ironing">Ironing</option>
<option value="Ready">Ready</option>
<option value="Delivered">Delivered</option>
</select>
</div>

<div id="content"></div>

<script type="module">

import { db } from "../js/firebase.js";
import {
collection,onSnapshot,doc,updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let partnerName = localStorage.getItem("name");
let orders=[];
let currentFilter="all";

/* LOAD */
onSnapshot(collection(db,"orders"), snap=>{
orders=[];
snap.forEach(d=>orders.push({...d.data(),id:d.id}));

loadDashboard();
loadOrders();
});

/* DASHBOARD */
function loadDashboard(){

let total=0, completed=0, earnings=0, today=0;
let todayDate = new Date().toLocaleDateString();

orders.forEach(o=>{
if(o.partner===partnerName){

total++;

if(o.status==="Delivered"){
completed++;
earnings+=o.total||0;
}

if(new Date(o.time).toLocaleDateString()===todayDate){
today++;
}
}
});

dashboard.innerHTML=`
<div class="card">📦 Total Orders: ${total}</div>
<div class="card">✅ Completed: ${completed}</div>
<div class="card">💰 Earnings: ₹${earnings}</div>
<div class="card">📅 Today Orders: ${today}</div>
`;
}

/* FILTER */
window.filterStatus=function(val){
currentFilter=val;
loadOrders();
}

/* ORDERS */
function loadOrders(){

let html="";

orders.forEach((o,i)=>{

if(o.partner!==partnerName) return;

if(currentFilter!=="all" && o.status!==currentFilter) return;

let items="";
o.items?.forEach(it=>{
items+=`${it.name} x ${it.qty}<br>`;
});

/* highlight active */
let activeClass = (o.status!=="Delivered") ? "highlight" : "";

html+=`
<div class="card ${activeClass}">

<b>${o.name}</b><br>
📞 ${o.phone||""}<br>
📍 ${o.address||""}<br>
💰 ₹${o.total}<br>

Status: <b>${o.status}</b><br>

<select onchange="updateStatus('${o.id}',this.value)">
<option>Pickup</option>
<option>Washing</option>
<option>Ironing</option>
<option>Ready</option>
<option>Out</option>
<option>Delivered</option>
</select>

<button onclick="toggle(${i})">Details</button>

<div id="d${i}" class="details">${items}</div>

</div>
`;
});

content.innerHTML=html;
}

/* FUNCTIONS */
window.toggle=(i)=>{
let el=document.getElementById("d"+i);
el.style.display = el.style.display==="block"?"none":"block";
}

window.updateStatus=async(id,status)=>{
await updateDoc(doc(db,"orders",id),{status});
alert("Updated ✅");
}

</script>

</body>
</html>
