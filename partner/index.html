<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Partner Panel</title>
<style>
body{font-family:Segoe UI;background:#f6f7f9}
.card{background:#fff;padding:12px;margin:10px;border-radius:10px}
button{padding:6px;background:#FFD400;border:none}
</style>
</head>

<body>

<h2>👨‍🔧 Partner Panel</h2>
<div id="content"></div>

<script type="module">

import { db } from "../admin/firebase.js";
import {
collection,onSnapshot,doc,updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* ⚠️ HARD CODE PARTNER NAME (TEMP) */
let partnerName = "Ramesh Laundry";

onSnapshot(collection(db,"orders"), snap=>{

let html="";

snap.forEach(docSnap=>{
let o = docSnap.data();

if(o.partner === partnerName){

html+=`
<div class="card">

<b>${o.name}</b><br>
₹${o.total}<br>
Status: ${o.status}<br>

<button onclick="update('${docSnap.id}','Washing')">Washing</button>
<button onclick="update('${docSnap.id}','Ironing')">Ironing</button>

</div>
`;
}
});

document.getElementById("content").innerHTML=html;

});

window.update = async(id,status)=>{
await updateDoc(doc(db,"orders",id),{
status:status
});
};

</script>

</body>
</html>
