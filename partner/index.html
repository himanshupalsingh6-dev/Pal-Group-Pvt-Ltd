<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="side"></div>

<div class="main">

<div id="top"></div>

<div id="stats"></div>

</div>

<script type="module">

import { sidebar, topbar } from "./js/common.js";
import { db } from "../js/firebase.js";
import { collection,onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

side.innerHTML=sidebar();
top.innerHTML=topbar();

let name=localStorage.getItem("name");

onSnapshot(collection(db,"orders"), snap=>{

let total=0,done=0;

snap.forEach(d=>{
let o=d.data();

if(o.partner===name){
total++;
if(o.status==="done") done++;
}
});

stats.innerHTML=`
<div class="card">Total Orders: ${total}</div>
<div class="card">Completed: ${done}</div>
`;

});

</script>

</body>
</html>
