<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="side"></div>

<div class="main">

<div id="top"></div>

<h2>Orders</h2>

<h3>🆕 New</h3>
<div id="new"></div>

<h3>⚙️ Preparing</h3>
<div id="prep"></div>

<h3>🚚 Out</h3>
<div id="out"></div>

</div>

<script type="module">

import { sidebar, topbar, wa } from "./js/common.js";
import { db } from "../js/firebase.js";
import { collection,onSnapshot,doc,updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

side.innerHTML=sidebar();
top.innerHTML=topbar();

let name=localStorage.getItem("name");

onSnapshot(collection(db,"orders"), snap=>{

let n="",p="",o="";

snap.forEach(d=>{
let data=d.data();

if(data.partner!==name) return;

let card=`
<div class="card">
<b>${data.name}</b><br>
📞 ${data.phone}<br>
₹${data.total}<br>

<button onclick="start('${d.id}')">Start</button>
<button onclick="out('${d.id}')">Out</button>
<button onclick="done('${d.id}')">Done</button>
<button onclick="wa('${data.phone}')">WhatsApp</button>
</div>
`;

if(data.status==="new") n+=card;
if(data.status==="preparing") p+=card;
if(data.status==="out") o+=card;

});

new.innerHTML=n;
prep.innerHTML=p;
out.innerHTML=o;

});

window.start=id=>updateDoc(doc(db,"orders",id),{status:"preparing"});
window.out=id=>updateDoc(doc(db,"orders",id),{status:"out"});
window.done=id=>updateDoc(doc(db,"orders",id),{status:"done"});

</script>

</body>
</html>
