<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Partner Orders
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#F5F5F5;
padding-bottom:110px;
}

/* TOP */

.topBar{
background:#fff;
padding:18px;
position:sticky;
top:0;
z-index:999;
}

.topFlex{
display:flex;
justify-content:space-between;
align-items:center;
}

.shopInfo h2{
font-size:28px;
font-weight:900;
}

.shopInfo p{
font-size:14px;
color:#666;
margin-top:4px;
}

.topIcons{
display:flex;
gap:18px;
font-size:24px;
}

/* FILTER */

.tabs{
display:flex;
gap:12px;
overflow:auto;
padding:18px;
}

.tabs::-webkit-scrollbar{
display:none;
}

.tab{
min-width:max-content;
padding:15px 22px;
border-radius:24px;
background:#fff;
font-weight:800;
font-size:14px;
cursor:pointer;
}

.activeTab{
background:#000;
color:#fff;
}

/* SEARCH */

.searchBox{
padding:0 16px 18px;
}

.searchBox input{
width:100%;
height:56px;
border:none;
outline:none;
background:#fff;
border-radius:18px;
padding:0 18px;
font-size:15px;
font-weight:700;
}

/* STATS */

.statsGrid{
padding:0 16px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
margin-bottom:18px;
}

.statCard{
background:#fff;
padding:18px;
border-radius:24px;
}

.statCard h4{
font-size:14px;
color:#666;
}

.statCard h1{
font-size:32px;
margin-top:10px;
font-weight:900;
}

/* ORDERS */

.orders{
padding:0 16px;
display:flex;
flex-direction:column;
gap:18px;
}

.orderCard{
background:#fff;
border-radius:30px;
padding:20px;
}

.orderTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.orderTop h2{
font-size:24px;
font-weight:900;
}

.status{
padding:8px 14px;
border-radius:14px;
font-size:13px;
font-weight:900;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

.ready{
background:#DBEAFE;
color:#1D4ED8;
}

.delivery{
background:#FCE7F3;
color:#BE185D;
}

.done{
background:#DCFCE7;
color:#166534;
}

/* BOX */

.infoBox{
background:#F9FAFB;
padding:16px;
border-radius:18px;
margin-bottom:14px;
}

.infoBox h3{
font-size:16px;
margin-bottom:10px;
}

.infoBox p{
font-size:14px;
margin-top:6px;
color:#444;
}

/* ITEMS */

.itemRow{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
font-size:14px;
font-weight:700;
}

/* TIMER */

.timer{
margin-top:14px;
padding:14px;
border-radius:18px;
background:#000;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
}

.timer h4{
font-size:14px;
}

.timer span{
font-size:18px;
font-weight:900;
}

/* BUTTONS */

.btnGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:18px;
}

.btnGrid button{
height:56px;
border:none;
border-radius:18px;
font-size:15px;
font-weight:900;
cursor:pointer;
}

.acceptBtn{
background:#22C55E;
color:#fff;
}

.rejectBtn{
background:#EF4444;
color:#fff;
}

.callBtn{
background:#000;
color:#fff;
}

.readyBtn{
background:#2563EB;
color:#fff;
}

/* BOTTOM */

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
padding:14px 10px;
display:grid;
grid-template-columns:repeat(5,1fr);
border-top-left-radius:28px;
border-top-right-radius:28px;
z-index:999;
}

.nav{
text-align:center;
font-size:12px;
font-weight:700;
color:#fff;
text-decoration:none;
}

.nav i{
display:block;
font-size:22px;
margin-bottom:6px;
}

.activeNav{
background:#2B2B2B;
padding:10px;
border-radius:18px;
}

/* MOBILE */

@media(max-width:500px){

.orderTop h2{
font-size:20px;
}

.statCard h1{
font-size:26px;
}

}

</style>
</head>

<body>

<!-- TOP -->

<div class="topBar">

<div class="topFlex">

<div class="shopInfo">

<h2>
QuickPress Orders
</h2>

<p>
Kasganj Locality
</p>

</div>

<div class="topIcons">

<i class="fa-regular fa-bell"></i>

<i class="fa-solid fa-bars"></i>

</div>

</div>

</div>

<!-- FILTER -->

<div class="tabs">

<div class="tab activeTab"
onclick="filterOrders('All',this)">

All

</div>

<div class="tab"
onclick="filterOrders('Pending',this)">

Preparing

</div>

<div class="tab"
onclick="filterOrders('Ready',this)">

Ready

</div>

<div class="tab"
onclick="filterOrders('Out For Delivery',this)">

Delivery

</div>

<div class="tab"
onclick="filterOrders('Delivered',this)">

Delivered

</div>

</div>

<!-- SEARCH -->

<div class="searchBox">

<input
type="text"
placeholder="Search customer..."
id="searchInput"
/>

</div>

<!-- STATS -->

<div class="statsGrid">

<div class="statCard">

<h4>
Total Orders
</h4>

<h1 id="totalOrders">
0
</h1>

</div>

<div class="statCard">

<h4>
Revenue
</h4>

<h1 id="revenue">
₹0
</h1>

</div>

</div>

<!-- ORDERS -->

<div class="orders"
id="ordersBox">

</div>

<!-- NAV -->

<div class="bottomNav">

<a href="orders.html"
class="nav activeNav">

<i class="fa-solid fa-arrow-right-arrow-left"></i>

Orders

</a>

<a href="index.html"
class="nav">

<i class="fa-solid fa-chart-simple"></i>

Hub

</a>

<a href="growth.html"
class="nav">

<i class="fa-regular fa-image"></i>

Growth

</a>

<a href="menu.html"
class="nav">

<i class="fa-solid fa-shirt"></i>

Menu

</a>

<a href="finance.html"
class="nav">

<i class="fa-solid fa-indian-rupee-sign"></i>

Finance

</a>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs,
doc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* GLOBAL */

let allOrders = [];
let currentFilter = "All";

/* ELEMENT */

const ordersBox =
document.getElementById(
"ordersBox"
);

const searchInput =
document.getElementById(
"searchInput"
);

/* LOAD */

async function loadOrders(){

const snap =
await getDocs(
collection(db,"orders")
);

allOrders = [];

snap.forEach((docSnap)=>{

allOrders.push({

id:docSnap.id,

...docSnap.data()

});

});

renderOrders();

}

loadOrders();

/* RENDER */

function renderOrders(){

let html = "";

let totalOrders = 0;
let revenue = 0;

const search =
searchInput.value
.toLowerCase();

allOrders.forEach((order)=>{

if(

currentFilter !== "All"

&&

order.status !== currentFilter

){

return;

}

if(

!(order.name || "")
.toLowerCase()
.includes(search)

){

return;

}

totalOrders++;

revenue +=
Number(order.total || 0);

let statusClass = "pending";

if(order.status === "Ready"){
statusClass = "ready";
}

if(order.status === "Out For Delivery"){
statusClass = "delivery";
}

if(order.status === "Delivered"){
statusClass = "done";
}

html += `

<div class="orderCard">

<div class="orderTop">

<h2>
#${order.id.slice(0,6)}
</h2>

<div class="status ${statusClass}">

${order.status || 'Pending'}

</div>

</div>

<div class="infoBox">

<h3>
Customer Details
</h3>

<p>
👤 ${order.name || ''}
</p>

<p>
📞 ${order.mobile || ''}
</p>

<p>
📍 ${order.address || ''}
</p>

</div>

<div class="infoBox">

<h3>
Items
</h3>

${
(order.items || [])
.map(item=>`

<div class="itemRow">

<div>

${item.icon || '👔'}
${item.name}

</div>

<div>

${item.qty} × ₹${item.price}

</div>

</div>

`).join("")
}

</div>

<div class="infoBox">

<h3>
Payment
</h3>

<p>
💳 ${order.payment || 'COD'}
</p>

<p>
💰 ₹${order.total || 0}
</p>

<p>
🕒 ${order.time || 'Today'}
</p>

</div>

<div class="timer">

<h4>
Order Timer
</h4>

<span>

${order.timer || '15 Min'}

</span>

</div>

<div class="btnGrid">

<button
class="callBtn">

📞 Call

</button>

<button
class="readyBtn"
onclick="markReady('${order.id}')">

Ready

</button>

<button
class="acceptBtn"
onclick="markDelivery('${order.id}')">

Delivery

</button>

<button
class="rejectBtn"
onclick="markDelivered('${order.id}')">

Done

</button>

</div>

</div>

`;

});

ordersBox.innerHTML = html;

document.getElementById(
"totalOrders"
).innerHTML =
totalOrders;

document.getElementById(
"revenue"
).innerHTML =
`₹${revenue}`;

}

/* FILTER */

window.filterOrders =
function(status,el){

currentFilter = status;

document
.querySelectorAll(".tab")
.forEach(tab=>{

tab.classList.remove(
"activeTab"
);

});

el.classList.add(
"activeTab"
);

renderOrders();

};

/* SEARCH */

searchInput.addEventListener(
"keyup",
renderOrders
);

/* STATUS */

window.markReady =
async(id)=>{

await updateDoc(
doc(db,"orders",id),
{
status:"Ready"
}
);

loadOrders();

};

window.markDelivery =
async(id)=>{

await updateDoc(
doc(db,"orders",id),
{
status:"Out For Delivery"
}
);

loadOrders();

};

window.markDelivered =
async(id)=>{

await updateDoc(
doc(db,"orders",id),
{
status:"Delivered"
}
);

loadOrders();

};

</script>

</body>
</html>
