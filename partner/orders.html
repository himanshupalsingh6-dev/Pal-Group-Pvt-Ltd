<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Partner Orders</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:28px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.partnerBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* STATS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
}

.card h1{
margin:0;
font-size:42px;
}

/* FILTER */

.filterBox{
background:#fff;
padding:20px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.filterGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.blue{
background:#2563eb;
color:#fff;
}

/* STATUS */

.pending{
color:#d97706;
font-weight:bold;
}

.processing{
color:#2563eb;
font-weight:bold;
}

.completed{
color:#16a34a;
font-weight:bold;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Partner
</div>

<a href="./index.html">
<button>
📊 Dashboard
</button>
</a>

<a href="./orders.html">
<button class="activeBtn">
📦 Orders
</button>
</a>

<a href="./wallet.html">
<button>
💰 Wallet
</button>
</a>

<a href="./withdraw.html">
<button>
💳 Withdraw
</button>
</a>

<a href="./profile.html">
<button>
👤 Profile
</button>
</a>

<a href="./help.html">
<button>
🛠 Help
</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
📦 Partner Orders
</h1>

<div class="partnerBox">
👨‍🏭 Partner
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">

<h2>Total Orders</h2>

<h1 id="totalOrders">
0
</h1>

</div>

<div class="card">

<h2>Pending</h2>

<h1 id="pendingOrders">
0
</h1>

</div>

<div class="card">

<h2>Processing</h2>

<h1 id="processingOrders">
0
</h1>

</div>

<div class="card">

<h2>Completed</h2>

<h1 id="completedOrders">
0
</h1>

</div>

</div>

<!-- FILTER -->

<div class="filterBox">

<div class="filterGrid">

<input
type="text"
id="searchInput"
placeholder="Search customer..."
>

<select id="statusFilter">

<option value="all">
All Status
</option>

<option value="Pending">
Pending
</option>

<option value="Processing">
Processing
</option>

<option value="Completed">
Completed
</option>

</select>

</div>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>
📦 Orders List
</h2>

<table>

<thead>

<tr>

<th>Customer</th>
<th>Phone</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

collection,
onSnapshot,
doc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalOrders =
document.getElementById("totalOrders");

const pendingOrders =
document.getElementById("pendingOrders");

const processingOrders =
document.getElementById("processingOrders");

const completedOrders =
document.getElementById("completedOrders");

const ordersTable =
document.getElementById("ordersTable");

const searchInput =
document.getElementById("searchInput");

const statusFilter =
document.getElementById("statusFilter");

let allOrders = [];

onSnapshot(
collection(db,"orders"),
(snapshot)=>{

let pending = 0;
let processing = 0;
let completed = 0;

allOrders = [];

snapshot.forEach((docSnap)=>{

const o = docSnap.data();

allOrders.push({
id:docSnap.id,
...o
});

if(o.status === "Pending"){
pending++;
}

if(o.status === "Processing"){
processing++;
}

if(o.status === "Completed"){
completed++;
}

});

totalOrders.innerHTML =
snapshot.size;

pendingOrders.innerHTML =
pending;

processingOrders.innerHTML =
processing;

completedOrders.innerHTML =
completed;

renderOrders();

});

function renderOrders(){

let keyword =
searchInput.value.toLowerCase();

let status =
statusFilter.value;

let html = "";

let filtered = allOrders.filter((o)=>{

let matchSearch =
(o.name || "")
.toLowerCase()
.includes(keyword);

let matchStatus =
status === "all"
? true
: o.status === status;

return matchSearch && matchStatus;

});

filtered.reverse().forEach((o)=>{

html += `

<tr>

<td>${o.name || "-"}</td>

<td>${o.phone || "-"}</td>

<td>₹${o.total || 0}</td>

<td class="${(o.status || '').toLowerCase()}">

${o.status || "-"}

</td>

<td>

<button
class="btn blue"
onclick="updateStatus(
'${o.id}',
'Processing'
)"
>
Process
</button>

<button
class="btn green"
onclick="updateStatus(
'${o.id}',
'Completed'
)"
>
Complete
</button>

</td>

</tr>

`;

});

ordersTable.innerHTML = html;

}

searchInput.addEventListener(
"input",
renderOrders
);

statusFilter.addEventListener(
"change",
renderOrders
);

window.updateStatus =
async function(id,status){

await updateDoc(
doc(db,"orders",id),
{
status:status
}
);

alert("Order Updated ✅");

}

</script>

</body>
</html>
