<!-- =========================================================
FILE : partner/orders.html
QUICKPRESS PARTNER ORDERS PANEL
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
Partner Orders
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =====================================================
RESET
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

/* =====================================================
BODY
===================================================== */

body{
background:#F5F7FB;
overflow:hidden;
}

/* =====================================================
TOPBAR
===================================================== */

.topbar{
height:82px;
background:#fff;
border-bottom:1px solid #E5E7EB;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 28px;
}

.logo h1{
font-size:34px;
font-weight:900;
}

.logo p{
font-size:13px;
font-weight:600;
color:#6B7280;
margin-top:4px;
}

/* =====================================================
BUTTONS
===================================================== */

.topBtns{
display:flex;
align-items:center;
gap:14px;
}

.topBtn{
height:48px;
padding:0 18px;
border:none;
border-radius:16px;
background:#111827;
color:#fff;
font-size:13px;
font-weight:800;
cursor:pointer;
}

/* =====================================================
MAIN
===================================================== */

.main{
padding:28px;
height:calc(100vh - 82px);
overflow-y:auto;
}

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h2{
font-size:44px;
font-weight:900;
}

/* =====================================================
SEARCH
===================================================== */

.searchInput{
width:320px;
height:54px;
border-radius:18px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

/* =====================================================
TABLE
===================================================== */

.tableWrap{
background:#fff;
border-radius:28px;
border:1px solid #E5E7EB;
overflow:hidden;
}

.tableHead{
height:62px;
display:grid;
grid-template-columns:
140px
1fr
160px
160px
160px
160px;
align-items:center;
padding:0 20px;
font-size:14px;
font-weight:900;
border-bottom:1px solid #E5E7EB;
}

.orderRow{
min-height:84px;
display:grid;
grid-template-columns:
140px
1fr
160px
160px
160px
160px;
align-items:center;
padding:0 20px;
font-size:14px;
border-bottom:1px solid #F3F4F6;
}

/* =====================================================
BADGES
===================================================== */

.badge{
padding:10px 14px;
border-radius:999px;
font-size:12px;
font-weight:900;
width:max-content;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

.processing{
background:#DBEAFE;
color:#1E40AF;
}

.completed{
background:#DCFCE7;
color:#166534;
}

/* =====================================================
ACTION BUTTON
===================================================== */

.actionBtn{
height:42px;
padding:0 16px;
border:none;
border-radius:12px;
background:#111827;
color:#fff;
font-size:12px;
font-weight:800;
cursor:pointer;
}

</style>

</head>

<body>

<!-- =====================================================
TOPBAR
===================================================== -->

<div class="topbar">

<div class="logo">

<h1>
QuickPress
</h1>

<p>
Partner Orders Panel
</p>

</div>

<div class="topBtns">

<button
class="topBtn"
onclick="window.location.href='index.html'">

Dashboard

</button>

<button
class="topBtn"
onclick="logoutPartner()">

Logout

</button>

</div>

</div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<!-- HEADER -->

<div class="pageHeader">

<h2>
Manage Orders
</h2>

<input
type="text"
placeholder="Search order..."
class="searchInput"
id="searchInput"
/>

</div>

<!-- =====================================================
TABLE
===================================================== -->

<div class="tableWrap">

<div class="tableHead">

<div>
Order ID
</div>

<div>
Customer
</div>

<div>
Amount
</div>

<div>
Status
</div>

<div>
Date
</div>

<div>
Action
</div>

</div>

<div id="ordersContainer">

</div>

</div>

</div>

<script type="module"
src="./orders.js">
</script>

</body>
</html>
