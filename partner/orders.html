<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="side"></div>

<div class="main">

<div id="top"></div>

<h2>Orders</h2>

<h3>🆕 New</h3>
<div id="new"></div>

<h3>⚙️ Preparing</h3>
<div id="prep"></div>

<h3>🚚 Out</h3>
<div id="out"></div>

</div>

<script type="module">

import { sidebar, topbar, wa } from "./js/common.js";
import { db } from "../js/firebase.js";

import {
collection,
onSnapshot,
doc,
updateDoc,
increment,
addDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

side.innerHTML = sidebar();
top.innerHTML = topbar();

let name = localStorage.getItem("name");

/* 🔥 WALLET EARNING FUNCTION */
async function addEarning(uid, amount){

if(!uid) return;

await updateDoc(doc(db,"wallets",uid),{
balance: increment(amount)
});

await addDoc(collection(db,"transactions"),{
uid,
amount,
type:"credit",
time:Date.now()
});
}

/* 🔥 LOAD ORDERS */
onSnapshot(collection(db,"orders"), snap=>{

let n="",p="",o="";

snap.forEach(d=>{
let data = d.data();

if(data.partner !== name) return;

let card = `
<div class="card">

<b>${data.name}</b><br>
📞 ${data.phone}<br>
📍 ${data.address || ""}<br>
💰 ₹${data.total}<br>

🚚 Rider: ${data.rider || "Not Assigned"}<br>

Status: <b>${data.status}</b><br>

<button onclick="start('${d.id}')">⚙️ Start</button>
<button onclick="out('${d.id}')">🚚 Out</button>

<button onclick='done("${d.id}", ${JSON.stringify(data)})'>
✅ Done
</button>

<button onclick="wa('${data.phone}')">📲 WhatsApp</button>

</div>
`;

if(data.status==="new") n+=card;
if(data.status==="preparing") p+=card;
if(data.status==="out") o+=card;

});

document.getElementById("new").innerHTML = n;
document.getElementById("prep").innerHTML = p;
document.getElementById("out").innerHTML = o;

});

/* 🔥 STATUS UPDATE */
window.start = async function(id){
await updateDoc(doc(db,"orders",id),{status:"preparing"});
}

window.out = async function(id){
await updateDoc(doc(db,"orders",id),{status:"out"});
}

/* 🔥 FINAL DONE + WALLET */
window.done = async function(id, data){

await updateDoc(doc(db,"orders",id),{
status:"done"
});

/* 💰 ADD EARNING */
if(data.partnerUid){
await addEarning(data.partnerUid, data.total);
}

alert("Order Completed + Wallet Updated 💰");

}

</script>

</body>
</html>
