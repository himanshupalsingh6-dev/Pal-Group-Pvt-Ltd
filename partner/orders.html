<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2>📦 Orders</h2>

<h3>🆕 New</h3>
<div id="new"></div>

<h3>⚙️ Preparing</h3>
<div id="prep"></div>

<h3>🚚 Out</h3>
<div id="out"></div>

<script type="module">

import { db } from "../js/firebase.js";

import {
collection,
onSnapshot,
doc,
updateDoc,
increment,
addDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let name = localStorage.getItem("name");

/* 🔥 PAYMENT DISTRIBUTION */
async function distributePayment(data){

let total = data.total || 0;

let partnerAmount = total * 0.8;
let riderAmount = total * 0.1;
let adminAmount = total * 0.1;

/* PARTNER */
if(data.partnerUid){
await updateDoc(doc(db,"wallets",data.partnerUid),{
balance: increment(partnerAmount)
});

await addDoc(collection(db,"transactions"),{
uid:data.partnerUid,
amount:partnerAmount,
role:"partner",
time:Date.now()
});
}

/* RIDER */
if(data.riderUid){
await updateDoc(doc(db,"wallets",data.riderUid),{
balance: increment(riderAmount)
});

await addDoc(collection(db,"transactions"),{
uid:data.riderUid,
amount:riderAmount,
role:"rider",
time:Date.now()
});
}

/* ADMIN */
await updateDoc(doc(db,"wallets","admin"),{
balance: increment(adminAmount)
});

await addDoc(collection(db,"transactions"),{
uid:"admin",
amount:adminAmount,
role:"admin",
time:Date.now()
});
}

/* LOAD ORDERS */
onSnapshot(collection(db,"orders"), snap=>{

let n="",p="",o="";

snap.forEach(d=>{
let data = d.data();

if(data.partner !== name) return;

let card = `
<div style="border:1px solid #ccc;padding:10px;margin:10px">

<b>${data.name}</b><br>
₹${data.total}<br>

<button onclick="start('${d.id}')">Start</button>
<button onclick="out('${d.id}')">Out</button>

<button onclick='done("${d.id}", ${JSON.stringify(data)})'>
Done
</button>

</div>
`;

if(data.status==="new") n+=card;
if(data.status==="preparing") p+=card;
if(data.status==="out") o+=card;

});

new.innerHTML=n;
prep.innerHTML=p;
out.innerHTML=o;

});

/* STATUS */
window.start=id=>updateDoc(doc(db,"orders",id),{status:"preparing"});
window.out=id=>updateDoc(doc(db,"orders",id),{status:"out"});

/* 🔥 DONE + PAYMENT */
window.done = async function(id,data){

await updateDoc(doc(db,"orders",id),{
status:"done"
});

await distributePayment(data);

alert("✅ Payment Distributed 💰");

};

</script>

</body>
</html>
