<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Partner Wallet</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:28px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.partnerBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
}

.card h1{
margin:0;
font-size:42px;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* STATUS */

.credit{
color:#16a34a;
font-weight:bold;
}

.debit{
color:#dc2626;
font-weight:bold;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Partner
</div>

<a href="./index.html">
<button>
📊 Dashboard
</button>
</a>

<a href="./orders.html">
<button>
📦 Orders
</button>
</a>

<a href="./wallet.html">
<button class="activeBtn">
💰 Wallet
</button>
</a>

<a href="./withdraw.html">
<button>
💳 Withdraw
</button>
</a>

<a href="./profile.html">
<button>
👤 Profile
</button>
</a>

<a href="./help.html">
<button>
🛠 Help
</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
💰 Partner Wallet
</h1>

<div class="partnerBox">
👨‍🏭 Partner
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">

<h2>Wallet Balance</h2>

<h1 id="walletBalance">
₹0
</h1>

</div>

<div class="card">

<h2>Total Credits</h2>

<h1 id="totalCredits">
₹0
</h1>

</div>

<div class="card">

<h2>Total Debits</h2>

<h1 id="totalDebits">
₹0
</h1>

</div>

<div class="card">

<h2>Total Transactions</h2>

<h1 id="totalTransactions">
0
</h1>

</div>

</div>

<!-- TRANSACTIONS -->

<div class="tableCard">

<h2>
💳 Wallet Transactions
</h2>

<table>

<thead>

<tr>

<th>Type</th>
<th>Amount</th>
<th>Description</th>
<th>Date</th>

</tr>

</thead>

<tbody id="walletTable">

</tbody>

</table>

</div>

</div>

</div>
  
<script src="./auth-check.js"></script>

<script type="module">

import { db }
from "./firebase.js";

import {

collection,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const walletBalance =
document.getElementById("walletBalance");

const totalCredits =
document.getElementById("totalCredits");

const totalDebits =
document.getElementById("totalDebits");

const totalTransactions =
document.getElementById("totalTransactions");

const walletTable =
document.getElementById("walletTable");

onSnapshot(
collection(db,"walletTransactions"),
(snapshot)=>{

let balance = 0;
let credits = 0;
let debits = 0;

let html = "";

snapshot.forEach((docSnap)=>{

const t = docSnap.data();

if(t.type === "credit"){
credits += Number(t.amount || 0);
balance += Number(t.amount || 0);
}

if(t.type === "debit"){
debits += Number(t.amount || 0);
balance -= Number(t.amount || 0);
}

let date =
new Date(
t.createdAt || Date.now()
).toLocaleString();

html += `

<tr>

<td class="${t.type}">
${t.type}
</td>

<td>
₹${t.amount || 0}
</td>

<td>
${t.description || "-"}
</td>

<td>
${date}
</td>

</tr>

`;

});

walletBalance.innerHTML =
"₹" + balance;

totalCredits.innerHTML =
"₹" + credits;

totalDebits.innerHTML =
"₹" + debits;

totalTransactions.innerHTML =
snapshot.size;

walletTable.innerHTML = html;

});

</script>

</body>
</html>
