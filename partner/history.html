<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="side"></div>

<div class="main">

<div id="top"></div>

<h2>Order History</h2>
<div id="history"></div>

</div>

<script type="module">

import { sidebar, topbar } from "./js/common.js";
import { db } from "../js/firebase.js";
import { collection,onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

side.innerHTML=sidebar();
top.innerHTML=topbar();

let name=localStorage.getItem("name");

onSnapshot(collection(db,"orders"), snap=>{

let html="";

snap.forEach(d=>{
let o=d.data();

if(o.partner===name && (o.status==="done"||o.status==="Rejected")){

html+=`<div class="card">${o.name} - ₹${o.total}</div>`;
}
});

history.innerHTML=html;

});

</script>

</body>
</html>
