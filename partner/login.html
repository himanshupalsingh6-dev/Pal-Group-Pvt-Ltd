<!-- =========================================================
FILE : partner/login.html
QUICKPRESS PARTNER LOGIN
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
Partner Login
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =====================================================
RESET
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

/* =====================================================
BODY
===================================================== */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#F5F7FB;
overflow:hidden;
}

/* =====================================================
CARD
===================================================== */

.loginCard{
width:420px;
background:#fff;
border-radius:32px;
padding:36px;
border:1px solid #E5E7EB;
box-shadow:
0 20px 50px rgba(0,0,0,0.08);
}

/* =====================================================
LOGO
===================================================== */

.logo{
text-align:center;
margin-bottom:30px;
}

.logo h1{
font-size:42px;
font-weight:900;
color:#111827;
margin-bottom:8px;
}

.logo p{
font-size:14px;
font-weight:600;
color:#6B7280;
}

/* =====================================================
INPUTS
===================================================== */

.inputGroup{
margin-bottom:18px;
}

.inputGroup label{
display:block;
font-size:13px;
font-weight:800;
margin-bottom:10px;
}

.inputField{
width:100%;
height:56px;
border-radius:18px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

/* =====================================================
BUTTON
===================================================== */

.loginBtn{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:15px;
font-weight:800;
cursor:pointer;
margin-top:12px;
}

/* =====================================================
ERROR
===================================================== */

.errorText{
margin-top:18px;
font-size:13px;
font-weight:700;
color:#DC2626;
text-align:center;
}

/* =====================================================
FOOTER
===================================================== */

.footer{
margin-top:24px;
text-align:center;
font-size:13px;
font-weight:600;
color:#6B7280;
}

</style>

</head>

<body>

<!-- =====================================================
LOGIN CARD
===================================================== -->

<div class="loginCard">

<!-- LOGO -->

<div class="logo">

<h1>
QuickPress
</h1>

<p>
Partner Panel Login
</p>

</div>

<!-- EMAIL -->

<div class="inputGroup">

<label>
Partner Email
</label>

<input
type="email"
class="inputField"
id="email"
placeholder="Enter partner email"
/>

</div>

<!-- PASSWORD -->

<div class="inputGroup">

<label>
Password
</label>

<input
type="password"
class="inputField"
id="password"
placeholder="Enter password"
/>

</div>

<!-- BUTTON -->

<button
class="loginBtn"
onclick="partnerLogin()">

Login Partner Panel

</button>

<!-- ERROR -->

<div
class="errorText"
id="errorText">

</div>

<!-- FOOTER -->

<div class="footer">

PAL GROUP PRIVATE LIMITED

</div>

</div>

<script type="module"
src="./login.js">
</script>

</body>
</html>
