<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Partner Withdraw</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:28px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.partnerBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
}

.card h1{
margin:0;
font-size:42px;
}

/* FORM */

.formCard{
background:#fff;
padding:25px;
border-radius:22px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.formGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

/* STATUS */

.pending{
color:#d97706;
font-weight:bold;
}

.approved{
color:#16a34a;
font-weight:bold;
}

.rejected{
color:#dc2626;
font-weight:bold;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Partner
</div>

<a href="./index.html">
<button>
📊 Dashboard
</button>
</a>

<a href="./orders.html">
<button>
📦 Orders
</button>
</a>

<a href="./wallet.html">
<button>
💰 Wallet
</button>
</a>

<a href="./withdraw.html">
<button class="activeBtn">
💳 Withdraw
</button>
</a>

<a href="./profile.html">
<button>
👤 Profile
</button>
</a>

<a href="./help.html">
<button>
🛠 Help
</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
💳 Withdraw Request
</h1>

<div class="partnerBox">
👨‍🏭 Partner
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">

<h2>Total Withdraw</h2>

<h1 id="totalWithdraw">
₹0
</h1>

</div>

<div class="card">

<h2>Pending</h2>

<h1 id="pendingWithdraw">
0
</h1>

</div>

<div class="card">

<h2>Approved</h2>

<h1 id="approvedWithdraw">
0
</h1>

</div>

<div class="card">

<h2>Rejected</h2>

<h1 id="rejectedWithdraw">
0
</h1>

</div>

</div>

<!-- FORM -->

<div class="formCard">

<h2>
Create Withdraw Request
</h2>

<div class="formGrid">

<input
type="number"
id="amount"
placeholder="Withdraw Amount"
>

<input
type="text"
id="upi"
placeholder="UPI ID"
>

</div>

<br>

<button
class="btn green"
onclick="createWithdraw()"
>
Request Withdraw
</button>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>
Withdraw History
</h2>

<table>

<thead>

<tr>

<th>Amount</th>
<th>UPI</th>
<th>Status</th>
<th>Date</th>

</tr>

</thead>

<tbody id="withdrawTable">

</tbody>

</table>

</div>

</div>

</div>
  
<script src="./auth-check.js"></script>
  
<script type="module">

import { db }
from "./firebase.js";

import {

collection,
onSnapshot,
addDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalWithdraw =
document.getElementById("totalWithdraw");

const pendingWithdraw =
document.getElementById("pendingWithdraw");

const approvedWithdraw =
document.getElementById("approvedWithdraw");

const rejectedWithdraw =
document.getElementById("rejectedWithdraw");

const withdrawTable =
document.getElementById("withdrawTable");

const amount =
document.getElementById("amount");

const upi =
document.getElementById("upi");

onSnapshot(
collection(db,"withdraws"),
(snapshot)=>{

let total = 0;
let pending = 0;
let approved = 0;
let rejected = 0;

let html = "";

snapshot.forEach((docSnap)=>{

const w = docSnap.data();

total += Number(w.amount || 0);

if(w.status === "pending"){
pending++;
}

if(w.status === "approved"){
approved++;
}

if(w.status === "rejected"){
rejected++;
}

let date =
new Date(
w.createdAt || Date.now()
).toLocaleString();

html += `

<tr>

<td>
₹${w.amount || 0}
</td>

<td>
${w.upi || "-"}
</td>

<td class="${w.status}">
${w.status}
</td>

<td>
${date}
</td>

</tr>

`;

});

totalWithdraw.innerHTML =
"₹" + total;

pendingWithdraw.innerHTML =
pending;

approvedWithdraw.innerHTML =
approved;

rejectedWithdraw.innerHTML =
rejected;

withdrawTable.innerHTML = html;

});

window.createWithdraw =
async function(){

if(
!amount.value ||
!upi.value
){
alert("Fill all fields");
return;
}

await addDoc(
collection(db,"withdraws"),
{

amount:Number(amount.value),

upi:upi.value,

status:"pending",

createdAt:Date.now(),

role:"partner"

}

);

alert("Withdraw Request Sent ✅");

amount.value = "";
upi.value = "";

}

</script>

</body>
</html>
