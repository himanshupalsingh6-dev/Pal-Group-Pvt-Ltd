<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Partner Profile</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:28px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.partnerBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* PROFILE */

.profileCard{
background:#fff;
padding:30px;
border-radius:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.profileTop{
display:flex;
align-items:center;
gap:25px;
margin-bottom:30px;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
}

.profileInfo h1{
margin:0;
}

.profileInfo p{
margin:5px 0;
color:#666;
}

/* FORM */

.formGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

input,textarea{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
width:100%;
box-sizing:border-box;
}

textarea{
height:120px;
resize:none;
}

/* BUTTON */

.btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Partner
</div>

<a href="./index.html">
<button>
📊 Dashboard
</button>
</a>

<a href="./orders.html">
<button>
📦 Orders
</button>
</a>

<a href="./wallet.html">
<button>
💰 Wallet
</button>
</a>

<a href="./withdraw.html">
<button>
💳 Withdraw
</button>
</a>

<a href="./profile.html">
<button class="activeBtn">
👤 Profile
</button>
</a>

<a href="./help.html">
<button>
🛠 Help
</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
👤 Partner Profile
</h1>

<div class="partnerBox">
👨‍🏭 Partner
</div>

</div>

<!-- PROFILE -->

<div class="profileCard">

<div class="profileTop">

<div class="avatar">
P
</div>

<div class="profileInfo">

<h1 id="partnerName">
Partner Name
</h1>

<p id="partnerEmail">
partner@gmail.com
</p>

<p id="partnerPhone">
+91 9876543210
</p>

</div>

</div>

<h2>
Profile Information
</h2>

<div class="formGrid">

<input
type="text"
id="nameInput"
placeholder="Partner Name"
>

<input
type="email"
id="emailInput"
placeholder="Email"
>

<input
type="text"
id="phoneInput"
placeholder="Phone"
>

<input
type="text"
id="shopInput"
placeholder="Shop Name"
>

<textarea
id="addressInput"
placeholder="Address"
></textarea>

</div>

<br>

<button
class="btn green"
onclick="saveProfile()"
>
Save Profile
</button>

</div>

</div>

</div>
  
<script src="./auth-check.js"></script>

<script type="module">

import { db }
from "./firebase.js";

import {

doc,
getDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/*

⚠ DEMO PARTNER ID

REAL LOGIN KE BAAD:

auth.currentUser.uid

USE KARNA

*/

const partnerId =
localStorage.getItem("partnerId");

/* ELEMENTS */

const partnerName =
document.getElementById("partnerName");

const partnerEmail =
document.getElementById("partnerEmail");

const partnerPhone =
document.getElementById("partnerPhone");

const nameInput =
document.getElementById("nameInput");

const emailInput =
document.getElementById("emailInput");

const phoneInput =
document.getElementById("phoneInput");

const shopInput =
document.getElementById("shopInput");

const addressInput =
document.getElementById("addressInput");

/* LOAD PROFILE */

async function loadProfile(){

const docRef =
doc(db,"partners",partnerId);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const p = docSnap.data();

partnerName.innerHTML =
p.name || "-";

partnerEmail.innerHTML =
p.email || "-";

partnerPhone.innerHTML =
p.phone || "-";

nameInput.value =
p.name || "";

emailInput.value =
p.email || "";

phoneInput.value =
p.phone || "";

shopInput.value =
p.shop || "";

addressInput.value =
p.address || "";

}

}

loadProfile();

/* SAVE PROFILE */

window.saveProfile =
async function(){

await updateDoc(
doc(db,"partners",partnerId),
{

name:nameInput.value,

email:emailInput.value,

phone:phoneInput.value,

shop:shopInput.value,

address:addressInput.value

}

);

alert("Profile Updated ✅");

loadProfile();

}

</script>

</body>
</html>
