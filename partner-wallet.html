<script type="module">
import { db } from "./js/firebase.js";

import {
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const email = localStorage.getItem("partnerEmail");

const walletSnap = await getDoc(doc(db,"partnerWallet",email));

if(walletSnap.exists()){
  balance.innerText = "₹"+walletSnap.data().balance;
}else{
  balance.innerText = "₹0";
}

const snap = await getDocs(query(
  collection(db,"payouts"),
  where("partnerEmail","==",email)
));

snap.forEach(d=>{
  history.innerHTML += `
    <div>
      ₹${d.data().amount} - ${d.data().status}
    </div>`;
});
</script>
