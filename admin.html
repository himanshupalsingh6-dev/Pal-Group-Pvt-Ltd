<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuickPress Admin PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
.header{background:#FFD400;padding:14px;text-align:center;font-weight:bold}
.nav{display:flex;background:#fff}
.nav div{padding:12px;cursor:pointer}
.nav .active{background:#FFD400}
.section{display:none;padding:15px}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:10px}
button{padding:6px;margin-top:5px}
</style>
</head>

<body>

<div class="header">⚡ Admin PRO Panel</div>

<div class="nav">
<div class="active" onclick="showTab(event,'dashboard')">Dashboard</div>
<div onclick="showTab(event,'orders')">Orders</div>
<div onclick="showTab(event,'partners')">Partners</div>
<div onclick="showTab(event,'riders')">Riders</div>
<div onclick="showTab(event,'users')">Users</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section" style="display:block">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<!-- ORDERS -->
<div id="orders" class="section">
<h2>Orders Full Detail</h2>
<div id="ordersList"></div>
</div>

<!-- PARTNERS -->
<div id="partners" class="section">
<h2>Partners</h2>
<div id="plist"></div>
</div>

<!-- RIDERS -->
<div id="riders" class="section">
<h2>Riders</h2>
<div id="rlist"></div>
</div>

<!-- USERS -->
<div id="users" class="section">
<h2>Users</h2>
<div id="userList"></div>
</div>

<script>
function showTab(e,id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
document.getElementById(id).style.display="block";
e.target.classList.add("active");
}
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* YOUR CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBBaslH5QsahoyESYpo1nVtlYIUYfVJ2d4",
  authDomain: "quickpress-offical.firebaseapp.com",
  projectId: "quickpress-offical",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 📊 DASHBOARD */
onSnapshot(collection(db,"orders"), snap=>{
let total=0,count=0;
snap.forEach(d=>{
count++;
total+=d.data().total||0;
});
stats.innerHTML=`
<div class="card">Orders: ${count}</div>
<div class="card">Revenue: ₹${total}</div>
`;
});

/* 📦 FULL ORDER DETAIL */
onSnapshot(collection(db,"orders"), snap=>{
let html="";
snap.forEach(d=>{
let o=d.data();

html+=`
<div class="card">
<b>Customer:</b> ${o.name || "-"} <br>
<b>Phone:</b> ${o.phone || "-"} <br>
<b>Address:</b> ${o.address || "-"} <br>

<b>Items:</b> ${JSON.stringify(o.items || [])} <br>
<b>Total:</b> ₹${o.total || 0} <br>

<b>Status:</b> ${o.status || "Pending"} <br>

<b>Pickup By:</b> ${o.partnerName || "-"} <br>
<b>Ironing By:</b> ${o.partnerName || "-"} <br>
<b>Delivery By:</b> ${o.riderName || "-"} <br>
</div>
`;
});
ordersList.innerHTML=html;
});

/* 👨‍🔧 PARTNER ANALYSIS */
onSnapshot(collection(db,"partners"), snap=>{
let html="";
snap.forEach(d=>{
let p=d.data();

let totalOrders = p.totalOrders || 0;
let earning = totalOrders * 20;

html+=`
<div class="card">
<b>${p.name}</b><br>
Phone: ${p.phone}<br>
Orders: ${totalOrders}<br>
Earning: ₹${earning}
</div>
`;
});
plist.innerHTML=html;
});

/* 🚚 RIDER ANALYSIS */
onSnapshot(collection(db,"delivery"), snap=>{
let html="";
snap.forEach(d=>{
let r=d.data();

let total = r.totalDeliveries || 0;
let earning = total * 15;

html+=`
<div class="card">
<b>${r.name}</b><br>
Phone: ${r.phone}<br>
Deliveries: ${total}<br>
Earning: ₹${earning}
</div>
`;
});
rlist.innerHTML=html;
});

/* 👥 USERS DETAIL */
onSnapshot(collection(db,"users"), snap=>{
let html="";
snap.forEach(d=>{
let u=d.data();

html+=`
<div class="card">
<b>${u.name}</b><br>
Phone: ${u.phone}<br>
Address: ${u.address || "-"}<br>
Orders: ${u.totalOrders || 0}
</div>
`;
});
userList.innerHTML=html;
});

</script>

</body>
</html>
