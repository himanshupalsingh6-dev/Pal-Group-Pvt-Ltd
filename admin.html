<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress – Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f6f7f9;
}
.header{
  background:#fff;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.header h2{margin:0}
.logout{
  color:red;
  font-weight:800;
  cursor:pointer;
}
.page{padding:18px}
.card{
  background:#fff;
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 6px 14px rgba(0,0,0,.08);
}
.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
  font-size:14px;
}
.items{
  margin-top:8px;
  font-size:13px;
  color:#444;
}
.status{
  margin-top:10px;
}
select{
  padding:6px;
  border-radius:8px;
}
.empty{
  text-align:center;
  color:#666;
  margin-top:80px;
}
</style>
</head>

<body>

<div class="header">
  <h2>⚡ QuickPress Admin</h2>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<div class="page">
  <div id="orders"></div>
</div>

<script type="module">
import { auth, db } from "./js/firebase.js";

import {
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  collection,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

// 🔐 Auth check
onAuthStateChanged(auth, user => {
  if(!user){
    location.href = "admin-login.html";
  }else{
    loadOrders();
  }
});

async function loadOrders(){
  ordersDiv.innerHTML = "Loading...";

  const snap = await getDocs(collection(db,"orders"));

  if(snap.empty){
    ordersDiv.innerHTML = `<div class="empty">No orders</div>`;
    return;
  }

  ordersDiv.innerHTML = "";

  snap.forEach(d=>{
    const o = d.data();

    ordersDiv.innerHTML += `
      <div class="card">
        <div class="row"><b>ID</b><span>${d.id}</span></div>
        <div class="row"><b>Total</b><span>₹${o.grandTotal || 0}</span></div>
        <div class="row"><b>Status</b><span>${o.status}</span></div>

        <div class="status">
          <select onchange="updateStatus('${d.id}',this.value)">
            <option>Placed</option>
            <option>Ready</option>
            <option>Delivered</option>
          </select>
        </div>
      </div>
    `;
  });
}

window.updateStatus = async (id,status)=>{
  await updateDoc(doc(db,"orders",id),{status});
};

window.logout = async ()=>{
  await signOut(auth);
  location.href="admin-login.html";
};
</script>

</body>
</html>
