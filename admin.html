<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Segoe UI;background:#f6f7f9}
.header{background:#FFD400;padding:14px;text-align:center;font-weight:bold}
.tabs{display:flex;background:#fff}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer}
.active{background:#FFD400}
.container{padding:12px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
button{padding:6px;margin:3px;border:none;background:#FFD400}
input{padding:8px;width:100%;margin:5px 0}
</style>
</head>

<body>

<div class="header">⚡ QuickPress Admin Panel</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('dashboard')">Dashboard</div>
  <div class="tab" onclick="showTab('orders')">Orders</div>
  <div class="tab" onclick="showTab('users')">Users</div>
  <div class="tab" onclick="showTab('delivery')">Delivery</div>
  <div class="tab" onclick="showTab('services')">Services</div>
</div>

<div class="container" id="content"></div>

<script type="module">

import { db } from "./firebase.js";
import {
collection,
onSnapshot,
addDoc,
doc,
updateDoc,
deleteDoc,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let orders=[], users=[], delivery=[], services=[];

/* ================= REALTIME ORDERS ================= */
onSnapshot(collection(db,"orders"), snap=>{
  orders=[];
  snap.forEach(d=>orders.push({...d.data(),docId:d.id}));
  loadDashboard();
});

/* ================= DASHBOARD ================= */
function loadDashboard(){
let total=orders.length;
let revenue=0;
let active=0;

orders.forEach(o=>{
  revenue+=o.total;
  if(o.status!="Delivered") active++;
});

content.innerHTML=`
<div class="card">📦 Orders: ${total}</div>
<div class="card">💰 Revenue: ₹${revenue}</div>
<div class="card">🚚 Active Orders: ${active}</div>
`;
}

/* ================= TAB SWITCH ================= */
window.showTab=function(tab){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

if(tab=="dashboard") loadDashboard();
if(tab=="orders") loadOrders();
if(tab=="users") loadUsers();
if(tab=="delivery") loadDelivery();
if(tab=="services") loadServices();
}

/* ================= ORDERS ================= */
function loadOrders(){
let html="";

orders.forEach(o=>{
html+=`
<div class="card">
<b>${o.id}</b><br>
${o.name} ₹${o.total}<br>
Status: ${o.status}<br>

<select onchange="updateStatus('${o.docId}',this.value)">
<option>Pickup</option>
<option>Processing</option>
<option>Out</option>
<option>Delivered</option>
</select>
</div>`;
});

content.innerHTML=html;
}

window.updateStatus = async(id,status)=>{
await updateDoc(doc(db,"orders",id),{status});
};

/* ================= USERS ================= */
function loadUsers(){

onSnapshot(collection(db,"users"), snap=>{
  users=[];
  snap.forEach(d=>users.push({...d.data(),id:d.id}));
  renderUsers(users);
});

}

function renderUsers(list){

let html=`
<div class="card">
<input id="search" placeholder="Search user..." oninput="searchUser()">
</div>
`;

list.forEach(u=>{
html+=`
<div class="card">
<b>${u.email}</b><br>
Status: ${u.status}<br>

<button onclick="toggleUser('${u.id}','${u.status}')">
${u.status=="active"?"Block":"Unblock"}
</button>

<button onclick="viewOrders('${u.id}')">Orders</button>
</div>
`;
});

content.innerHTML=html;
}

window.searchUser=function(){
let val=search.value.toLowerCase();
let filtered=users.filter(u=>u.email.toLowerCase().includes(val));
renderUsers(filtered);
};

window.toggleUser=async function(id,status){
let newStatus = status=="active"?"blocked":"active";
await updateDoc(doc(db,"users",id),{status:newStatus});
};

window.viewOrders = async function(userId){

let q = query(collection(db,"orders"), where("userId","==",userId));
let snap = await getDocs(q);

let html="<h3>User Orders</h3>";

snap.forEach(doc=>{
let o=doc.data();
html+=`
<div class="card">
${o.name} ₹${o.total}<br>
Status: ${o.status}
</div>
`;
});

content.innerHTML=html;

};

/* ================= DELIVERY ================= */
function loadDelivery(){

let html=`
<div class="card">
<input id="dname" placeholder="Delivery Name">
<button onclick="addDelivery()">Add</button>
</div>
`;

delivery.forEach((d,i)=>{
html+=`
<div class="card">
${d.name}
<button onclick="removeDelivery(${i})">Delete</button>
</div>`;
});

content.innerHTML=html;
}

window.addDelivery=()=>{
let name=document.getElementById("dname").value;
delivery.push({name});
loadDelivery();
}

window.removeDelivery=(i)=>{
delivery.splice(i,1);
loadDelivery();
}

/* ================= SERVICES ================= */
function loadServices(){

let html=`
<div class="card">
<input id="sname" placeholder="Service Name">
<input id="sprice" placeholder="Price">
<button onclick="addService()">Add</button>
</div>
`;

services.forEach((s,i)=>{
html+=`
<div class="card">
${s.name} ₹${s.price}
<button onclick="deleteService(${i})">Delete</button>
</div>`;
});

content.innerHTML=html;
}

window.addService=()=>{
services.push({name:sname.value,price:sprice.value});
loadServices();
}

window.deleteService=(i)=>{
services.splice(i,1);
loadServices();
}

/* INIT */
loadDashboard();

</script>

</body>
</html>
