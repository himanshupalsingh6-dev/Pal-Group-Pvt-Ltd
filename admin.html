<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f6f7f9;
}

.header{
  background:#FFD400;
  padding:14px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

.container{
  padding:12px;
}

.card{
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
}

button{
  padding:6px 10px;
  margin:4px;
  border:none;
  border-radius:6px;
  background:#FFD400;
  cursor:pointer;
}

.status{
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">⚡ Admin Panel</div>

<div class="container" id="ordersBox">
Loading orders...
</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const box = document.getElementById("ordersBox");

/* 🔥 REALTIME ORDERS */
onSnapshot(collection(db,"orders"), (snapshot)=>{

  let html = "";

  if(snapshot.empty){
    box.innerHTML = "No Orders Found";
    return;
  }

  snapshot.forEach(docSnap=>{
    let o = docSnap.data();
    let id = docSnap.id;

    html += `
    <div class="card">
      <b>Order ID:</b> ${o.id}<br>
      <b>Name:</b> ${o.name}<br>
      <b>Phone:</b> ${o.phone}<br>
      <b>Total:</b> ₹${o.total}<br>
      <b class="status">Status: ${o.status}</b><br><br>

      <button onclick="updateStatus('${id}','Pickup')">Pickup</button>
      <button onclick="updateStatus('${id}','Processing')">Processing</button>
      <button onclick="updateStatus('${id}','Out')">Out</button>
      <button onclick="updateStatus('${id}','Delivered')">Delivered</button>
    </div>
    `;
  });

  box.innerHTML = html;

});

/* 🔥 UPDATE STATUS */
window.updateStatus = async function(id,status){
  await updateDoc(doc(db,"orders",id),{
    status: status
  });
};

</script>

</body>
</html>
