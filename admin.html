<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f6f7f9}
.header{background:#FFD400;padding:14px;text-align:center;font-weight:bold}
.tabs{display:flex;background:#fff;flex-wrap:wrap}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer}
.active{background:#FFD400}
.container{padding:12px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
button{padding:6px;margin:3px;border:none;background:#FFD400}
input,select{padding:8px;width:100%;margin:5px 0}
.details{display:none;margin-top:10px}
</style>
</head>

<body>

<div class="header">⚡ QuickPress Admin Panel</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('dashboard')">Dashboard</div>
  <div class="tab" onclick="showTab('orders')">Orders</div>
  <div class="tab" onclick="showTab('users')">Users</div>
  <div class="tab" onclick="showTab('partners')">Partners</div>
  <div class="tab" onclick="showTab('riders')">Riders</div>
  <div class="tab" onclick="showTab('services')">Services</div>
  <div class="tab" onclick="showTab('area')">Analytics</div>
  <div class="tab" onclick="showTab('notify')">Notify</div>
</div>

<div class="container" id="content">Loading...</div>

<script type="module">

import { db } from "./js/firebase.js";

import {
collection,
onSnapshot,
addDoc,
doc,
updateDoc,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let orders=[], users=[], partners=[], riders=[];

/* ================= REALTIME ================= */

onSnapshot(collection(db,"orders"), snap=>{
  orders=[];
  snap.forEach(d=>orders.push({...d.data(),docId:d.id}));
  loadDashboard();
});

onSnapshot(collection(db,"users"), snap=>{
  users=[];
  snap.forEach(d=>users.push({...d.data(),id:d.id}));
});

onSnapshot(collection(db,"partners"), snap=>{
  partners=[];
  snap.forEach(d=>partners.push({...d.data(),id:d.id}));
});

onSnapshot(collection(db,"delivery"), snap=>{
  riders=[];
  snap.forEach(d=>riders.push({...d.data(),id:d.id}));
});

/* ================= TAB ================= */

window.showTab=function(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.querySelectorAll(".tab").forEach(t=>{
  if(t.innerText.toLowerCase().includes(tab)){
    t.classList.add("active");
  }
});

if(tab==="dashboard") loadDashboard();
if(tab==="orders") loadOrders();
if(tab==="users") loadUsers();
if(tab==="partners") loadPartners();
if(tab==="riders") loadRiders();
if(tab==="services") loadServices();
if(tab==="area") areaAnalytics();
if(tab==="notify") loadNotify();
}

/* ================= DASHBOARD ================= */

function loadDashboard(){

let total=0, delivered=0;

orders.forEach(o=>{
  total+=o.total || 0;
  if(o.status==="Delivered") delivered+=o.total || 0;
});

content.innerHTML=`
<div class="card">💰 Total Revenue: ₹${total}</div>
<div class="card">✅ Delivered: ₹${delivered}</div>
<div class="card">📦 Orders: ${orders.length}</div>
<canvas id="chart"></canvas>
`;

drawChart();
}

/* ================= CHART ================= */

function drawChart(){

let map={};

orders.forEach(o=>{
let d=new Date(o.time).toLocaleDateString();
if(!map[d]) map[d]=0;
map[d]+=o.total || 0;
});

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:Object.keys(map),
datasets:[{label:"Revenue",data:Object.values(map)}]
}
});
}

/* ================= ORDERS (ADVANCED) ================= */

function loadOrders(){

let html="";

orders.forEach((o,i)=>{

let itemsHTML="";

if(o.items){
o.items.forEach(it=>{
itemsHTML += `${it.name} x ${it.qty} = ₹${it.price * it.qty}<br>`;
});
}

html+=`
<div class="card">

<b>Order ID:</b> ${o.id || "N/A"}<br>
<b>Name:</b> ${o.name || "N/A"}<br>
<b>Phone:</b> ${o.phone || "N/A"}<br>
<b>Total:</b> ₹${o.total || 0}<br>
<b>Status:</b> ${o.status || "N/A"}<br>

<button onclick="toggleDetails(${i})">View Details</button>

<select onchange="updateStatus('${o.docId}',this.value)">
<option>Pickup</option>
<option>Processing</option>
<option>Out</option>
<option>Delivered</option>
</select>

<div class="details" id="d${i}">
<hr>
<b>Address:</b> ${o.address || "N/A"}<br><br>
<b>Items:</b><br>
${itemsHTML}
</div>

</div>
`;
});

content.innerHTML=html;
}

/* TOGGLE */
window.toggleDetails=function(i){
let el=document.getElementById("d"+i);
el.style.display = el.style.display=="block" ? "none":"block";
}

/* STATUS */
window.updateStatus=async(id,status)=>{
await updateDoc(doc(db,"orders",id),{status});
alert("Updated: "+status);
}

/* ================= USERS (ADVANCED) ================= */

function loadUsers(){

let html="";

users.forEach(u=>{
html+=`
<div class="card">

<b>Email:</b> ${u.email || "N/A"}<br>
<b>Name:</b> ${u.name || "N/A"}<br>
<b>Phone:</b> ${u.phone || "N/A"}<br>
<b>Address:</b> ${u.address || "N/A"}<br>

<button onclick="viewUserOrders('${u.id}')">View Orders</button>

</div>
`;
});

content.innerHTML=html;
}

/* USER ORDERS */
window.viewUserOrders=async function(uid){

let q = query(collection(db,"orders"), where("userId","==",uid));
let snap = await getDocs(q);

let html="<h3>User Orders</h3>";

snap.forEach(doc=>{
let o=doc.data();
html+=`
<div class="card">
${o.name} ₹${o.total}<br>
Status: ${o.status}
</div>
`;
});

content.innerHTML=html;
}

/* ================= PARTNERS ================= */

function loadPartners(){
content.innerHTML="<div class='card'>Partners panel</div>";
}

/* ================= RIDERS ================= */

function loadRiders(){
content.innerHTML="<div class='card'>Riders panel</div>";
}

/* ================= SERVICES ================= */

function loadServices(){
content.innerHTML="<div class='card'>Services panel</div>";
}

/* ================= AREA ================= */

function areaAnalytics(){
content.innerHTML="<div class='card'>Area analytics</div>";
}

/* ================= NOTIFY ================= */

function loadNotify(){
content.innerHTML="<div class='card'>Notification panel</div>";
}

</script>

</body>
</html>
