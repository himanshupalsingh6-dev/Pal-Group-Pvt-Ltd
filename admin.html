<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f6f7f9}
.header{background:#FFD400;padding:14px;text-align:center;font-weight:bold}
.tabs{display:flex;background:#fff;flex-wrap:wrap}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer}
.active{background:#FFD400}
.container{padding:12px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
button{padding:6px;margin:3px;border:none;background:#FFD400}
input{padding:8px;width:100%;margin:5px 0}
</style>
</head>

<body>

<div class="header">⚡ QuickPress Admin Panel</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('dashboard')">Dashboard</div>
  <div class="tab" onclick="showTab('orders')">Orders</div>
  <div class="tab" onclick="showTab('users')">Users</div>
  <div class="tab" onclick="showTab('partners')">Partners</div>
  <div class="tab" onclick="showTab('riders')">Riders</div>
  <div class="tab" onclick="showTab('services')">Services</div>
  <div class="tab" onclick="showTab('area')">Analytics</div>
  <div class="tab" onclick="showTab('notify')">Notify</div>
</div>

<div class="container" id="content"></div>

<script type="module">

import { db } from "./firebase.js";
import {
collection,
onSnapshot,
addDoc,
doc,
updateDoc,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let orders=[], users=[], partners=[], riders=[];

/* ================= REALTIME ================= */

onSnapshot(collection(db,"orders"), snap=>{
  orders=[];
  snap.forEach(d=>orders.push({...d.data(),docId:d.id}));
  loadDashboard();
});

onSnapshot(collection(db,"users"), snap=>{
  users=[];
  snap.forEach(d=>users.push({...d.data(),id:d.id}));
});

onSnapshot(collection(db,"partners"), snap=>{
  partners=[];
  snap.forEach(d=>partners.push({...d.data(),id:d.id}));
});

onSnapshot(collection(db,"delivery"), snap=>{
  riders=[];
  snap.forEach(d=>riders.push({...d.data(),id:d.id}));
});

/* ================= TAB ================= */

window.showTab=function(tab){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

if(tab=="dashboard") loadDashboard();
if(tab=="orders") loadOrders();
if(tab=="users") loadUsers();
if(tab=="partners") loadPartners();
if(tab=="riders") loadRiders();
if(tab=="services") loadServices();
if(tab=="area") areaAnalytics();
if(tab=="notify") loadNotify();
}

/* ================= DASHBOARD ================= */

function loadDashboard(){

let total=0,today=0,delivered=0;
let now=new Date().toDateString();

orders.forEach(o=>{
  total+=o.total;
  if(new Date(o.time).toDateString()==now) today+=o.total;
  if(o.status=="Delivered") delivered+=o.total;
});

content.innerHTML=`
<div class="card">💰 Total: ₹${total}</div>
<div class="card">📅 Today: ₹${today}</div>
<div class="card">✅ Delivered: ₹${delivered}</div>
<div class="card">⏳ Pending: ₹${total-delivered}</div>

<canvas id="chart"></canvas>
`;

drawChart();
}

/* ================= CHART ================= */

function drawChart(){

let map={};

orders.forEach(o=>{
let d=new Date(o.time).toLocaleDateString();
if(!map[d]) map[d]=0;
map[d]+=o.total;
});

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:Object.keys(map),
datasets:[{label:"Revenue",data:Object.values(map)}]
}
});
}

/* ================= ORDERS ================= */

function loadOrders(){
let html="";
orders.forEach(o=>{
html+=`
<div class="card">
${o.name} ₹${o.total}<br>
Status: ${o.status}<br>

<select onchange="updateStatus('${o.docId}',this.value)">
<option>Pickup</option>
<option>Processing</option>
<option>Out</option>
<option>Delivered</option>
</select>
</div>`;
});
content.innerHTML=html;
}

window.updateStatus=async(id,status)=>{
await updateDoc(doc(db,"orders",id),{status});
alert("Updated: "+status);
};

/* ================= USERS ================= */

function loadUsers(){

let html=`<div class="card">
<input id="searchUser" placeholder="Search User..." oninput="searchUsers()">
</div>`;

users.forEach(u=>{
html+=`<div class="card">${u.email} (${u.status})</div>`;
});

content.innerHTML=html;
}

window.searchUsers=()=>{
let val=searchUser.value.toLowerCase();
let filtered=users.filter(u=>u.email.toLowerCase().includes(val));
content.innerHTML="";
filtered.forEach(u=>{
content.innerHTML+=`<div class="card">${u.email}</div>`;
});
};

/* ================= PARTNERS ================= */

function loadPartners(){

let html=`
<div class="card">
<input id="pareaSearch" placeholder="Search Area" oninput="searchPartners()">
<input id="pname" placeholder="Name">
<input id="pphone" placeholder="Phone">
<input id="parea" placeholder="Area">
<button onclick="addPartner()">Add</button>
</div>
`;

partners.forEach(p=>{
html+=`<div class="card">${p.name} (${p.area})</div>`;
});

content.innerHTML=html;
}

window.searchPartners=()=>{
let val=pareaSearch.value.toLowerCase();
let filtered=partners.filter(p=>p.area.toLowerCase().includes(val));
content.innerHTML="";
filtered.forEach(p=>{
content.innerHTML+=`<div class="card">${p.name} (${p.area})</div>`;
});
};

window.addPartner=async()=>{
await addDoc(collection(db,"partners"),{
name:pname.value,
phone:pphone.value,
area:parea.value
});
};

/* ================= RIDERS ================= */

function loadRiders(){

let html=`
<div class="card">
<input id="rareaSearch" placeholder="Search Area" oninput="searchRiders()">
<input id="rname" placeholder="Name">
<input id="rphone" placeholder="Phone">
<input id="rarea" placeholder="Area">
<button onclick="addRider()">Add</button>
</div>
`;

riders.forEach(r=>{
html+=`<div class="card">${r.name} (${r.area})</div>`;
});

content.innerHTML=html;
}

window.searchRiders=()=>{
let val=rareaSearch.value.toLowerCase();
let filtered=riders.filter(r=>r.area.toLowerCase().includes(val));
content.innerHTML="";
filtered.forEach(r=>{
content.innerHTML+=`<div class="card">${r.name} (${r.area})</div>`;
});
};

window.addRider=async()=>{
await addDoc(collection(db,"delivery"),{
name:rname.value,
phone:rphone.value,
area:rarea.value,
status:"available"
});
};

/* ================= SERVICES ================= */

function loadServices(){
content.innerHTML="<div class='card'>Service system simple version</div>";
}

/* ================= AREA ================= */

function areaAnalytics(){

let map={};

orders.forEach(o=>{
let a=o.address||"Unknown";
if(!map[a]) map[a]=0;
map[a]++;
});

let html="<h3>Area Wise Orders</h3>";

for(let a in map){
html+=`<div class="card">${a} → ${map[a]}</div>`;
}

content.innerHTML=html;
}

/* ================= NOTIFY ================= */

function loadNotify(){
content.innerHTML=`
<div class="card">
<input id="msg" placeholder="Message">
<button onclick="sendNotify()">Send</button>
</div>`;
}

window.sendNotify=()=>{
alert("Notification Sent: "+msg.value);
};

/* INIT */
loadDashboard();

</script>

</body>
</html>
