<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuickPress Admin PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
.header{background:#FFD400;padding:14px;text-align:center;font-weight:bold}
.nav{display:flex;background:#fff}
.nav div{padding:12px;cursor:pointer}
.nav .active{background:#FFD400}
.section{display:none;padding:15px}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:10px}
button{padding:6px;margin-top:5px}
</style>
</head>

<body>

<div class="header">⚡ Admin Panel</div>

<div class="nav">
<div class="active" onclick="showTab(event,'orders')">Orders</div>
<div onclick="showTab(event,'wallet')">Wallet</div>
<div onclick="showTab(event,'transactions')">Transactions</div>
</div>

<!-- ORDERS -->
<div id="orders" class="section" style="display:block">
<h2>Orders</h2>
<div id="ordersList"></div>
</div>

<!-- WALLET -->
<div id="wallet" class="section">
<h2>Wallet</h2>
<div id="walletList"></div>
</div>

<!-- TRANSACTIONS -->
<div id="transactions" class="section">
<h2>Transactions</h2>
<div id="txList"></div>
</div>

<script>
function showTab(e,id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
document.getElementById(id).style.display="block";
e.target.classList.add("active");
}
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
increment,
addDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* 🔥 CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBBaslH5QsahoyESYpo1nVtlYIUYfVJ2d4",
  authDomain: "quickpress-offical.firebaseapp.com",
  projectId: "quickpress-offical",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 💰 COMMISSION SYSTEM */
async function distributePayment(order){

let total = order.total || 0;

let partnerAmount = total * 0.7;
let riderAmount = total * 0.2;
let adminAmount = total * 0.1;

/* PARTNER */
if(order.partnerUid){
await updateDoc(doc(db,"wallets",order.partnerUid),{
balance: increment(partnerAmount)
});

await addDoc(collection(db,"transactions"),{
uid:order.partnerUid,
amount:partnerAmount,
role:"partner",
type:"credit",
time:Date.now()
});
}

/* RIDER */
if(order.riderUid){
await updateDoc(doc(db,"wallets",order.riderUid),{
balance: increment(riderAmount)
});

await addDoc(collection(db,"transactions"),{
uid:order.riderUid,
amount:riderAmount,
role:"rider",
type:"credit",
time:Date.now()
});
}

/* ADMIN */
await updateDoc(doc(db,"wallets","admin"),{
balance: increment(adminAmount)
});

await addDoc(collection(db,"transactions"),{
uid:"admin",
amount:adminAmount,
role:"admin",
type:"credit",
time:Date.now()
});

}

/* 📦 ORDERS */
onSnapshot(collection(db,"orders"), snap=>{
let html="";

snap.forEach(d=>{
let o=d.data();

html+=`
<div class="card">
<b>${o.name || "User"}</b><br>
₹${o.total || 0}<br>
Status: ${o.status || "new"}<br>

<button onclick='complete("${d.id}", ${JSON.stringify(o)})'>
✅ Complete Order
</button>
</div>
`;

});

ordersList.innerHTML=html;
});

/* ✅ COMPLETE ORDER */
window.complete = async function(id, order){

await updateDoc(doc(db,"orders",id),{
status:"done"
});

/* 💰 PAYMENT */
await distributePayment(order);

alert("Payment Distributed 💰");

};

/* 💰 WALLET VIEW */
onSnapshot(collection(db,"wallets"), snap=>{
let html="";

snap.forEach(d=>{
let w=d.data();
html+=`
<div class="card">
<b>${d.id}</b><br>
Balance: ₹${w.balance}
</div>
`;
});

walletList.innerHTML=html;
});

/* 📊 TRANSACTIONS */
onSnapshot(collection(db,"transactions"), snap=>{
let html="";

snap.forEach(d=>{
let t=d.data();

html+=`
<div class="card">
₹${t.amount} → ${t.role}
</div>
`;
});

txList.innerHTML=html;
});

</script>

</body>
</html>
