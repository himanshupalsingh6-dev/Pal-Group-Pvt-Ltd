<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

.container{padding:15px}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

/* BUTTONS */
.btn{
  padding:6px 10px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#eee;
}
.active{background:var(--yellow);font-weight:bold}
</style>
</head>

<body>

<div class="container">
  <h2>📦 Admin Panel</h2>
  <div id="orders"></div>
</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders") || "[]");

function renderOrders(){

  if(orders.length==0){
    document.getElementById("orders").innerHTML="No Orders";
    return;
  }

  let html="";

  orders.forEach((order,index)=>{

    html+=`
    <div class="card">
      <b>ID:</b> ${order.id} <br>
      <b>Name:</b> ${order.name} <br>
      <b>Phone:</b> ${order.phone} <br>
      <b>Total:</b> ₹${order.total} <br>
      <b>Status:</b> ${order.status} <br><br>

      <b>Change Status:</b><br>

      ${statusBtn("Pickup",index)}
      ${statusBtn("Processing",index)}
      ${statusBtn("Out",index)}
      ${statusBtn("Delivered",index)}

    </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

function statusBtn(status,i){
  return `<button class="btn ${orders[i].status==status?'active':''}" 
    onclick="updateStatus(${i},'${status}')">${status}</button>`;
}

/* UPDATE STATUS */
function updateStatus(i,status){

  orders[i].status = status;

  // update orders list
  localStorage.setItem("orders", JSON.stringify(orders));

  // update current order also
  let current = JSON.parse(localStorage.getItem("currentOrder"));
  if(current && current.id === orders[i].id){
    current.status = status;
    localStorage.setItem("currentOrder", JSON.stringify(current));
  }

  renderOrders();
}

renderOrders();

</script>

</body>
</html>
