<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

.container{padding:15px}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

/* STATUS */
.status{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}
.step{
  text-align:center;
  flex:1;
}
.circle{
  width:30px;
  height:30px;
  border-radius:50%;
  background:#ddd;
  margin:auto;
}
.active{background:var(--yellow)}

/* ITEMS */
.item{margin-bottom:6px}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:var(--yellow);
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- ORDER INFO -->
  <div class="card">
    <b>Order ID:</b> <span id="id"></span><br>
    <b>Name:</b> <span id="name"></span><br>
    <b>Phone:</b> <span id="phone"></span><br>
    <b>Address:</b> <span id="address"></span>
  </div>

  <!-- STATUS -->
  <div class="card">
    <h3>Status</h3>
    <div class="status">
      <div class="step">
        <div class="circle" id="s1"></div>
        Pickup
      </div>
      <div class="step">
        <div class="circle" id="s2"></div>
        Processing
      </div>
      <div class="step">
        <div class="circle" id="s3"></div>
        Out
      </div>
      <div class="step">
        <div class="circle" id="s4"></div>
        Delivered
      </div>
    </div>
  </div>

  <!-- ITEMS -->
  <div class="card">
    <h3>Items</h3>
    <div id="items"></div>
    <hr>
    <b>Total: ₹<span id="total"></span></b>
  </div>

  <button onclick="goHome()">Back to Home</button>

</div>

<script>

let order = JSON.parse(localStorage.getItem("currentOrder"));

if(!order){
  alert("No order found");
  location.href="index.html";
}

/* SHOW DATA */
document.getElementById("id").innerText = order.id;
document.getElementById("name").innerText = order.name;
document.getElementById("phone").innerText = order.phone;
document.getElementById("address").innerText = order.address;

/* ITEMS */
let html="";
order.items.forEach(i=>{
  html+=`<div class="item">${i.name} x ${i.qty}</div>`;
});
document.getElementById("items").innerHTML=html;
document.getElementById("total").innerText=order.total;

/* STATUS FLOW */
let steps=["Pickup","Processing","Out","Delivered"];
let index=steps.indexOf(order.status);

for(let i=0;i<=index;i++){
  document.getElementById("s"+(i+1)).classList.add("active");
}

/* AUTO UPDATE (Demo) */
setTimeout(()=>{
  order.status="Processing";
  localStorage.setItem("currentOrder",JSON.stringify(order));
  location.reload();
},5000);

setTimeout(()=>{
  order.status="Out";
  localStorage.setItem("currentOrder",JSON.stringify(order));
  location.reload();
},10000);

setTimeout(()=>{
  order.status="Delivered";
  localStorage.setItem("currentOrder",JSON.stringify(order));
  location.reload();
},15000);

function goHome(){
  location.href="index.html";
}

</script>

</body>
</html>
