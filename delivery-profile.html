<script type="module">
import { db } from "./js/firebase.js";

import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const deliveryId = localStorage.getItem("deliveryId");

if(!deliveryId){
  location.href="delivery-login.html";
}

const snap = await getDoc(doc(db,"delivery",deliveryId));
const data = snap.data();

dname.innerText = data.name;
demail.innerText = data.email;
dwallet.innerText = data.wallet || 0;

window.logout = ()=>{
  localStorage.clear();
  location.href="delivery-login.html";
};
</script>
