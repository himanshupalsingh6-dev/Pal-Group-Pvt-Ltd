<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>QuickPress Secure Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f7fb;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:400px;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:25px;
color:#111827;
}

.tabs{
display:flex;
margin-bottom:20px;
border-radius:10px;
overflow:hidden;
border:1px solid #ddd;
}

.tabs button{
flex:1;
padding:12px;
border:none;
cursor:pointer;
background:#fff;
font-weight:bold;
}

.activeTab{
background:#facc15 !important;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#111827;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
opacity:0.9;
}

.small{
margin-top:15px;
text-align:center;
font-size:14px;
}

.link{
color:#2563eb;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
QuickPress
</div>

<div class="tabs">

<button id="loginTab" class="activeTab" onclick="showLogin()">
Login
</button>

<button id="signupTab" onclick="showSignup()">
Signup
</button>

</div>

<!-- LOGIN -->

<div id="loginBox">

<input type="email" id="loginEmail" placeholder="Email">

<input type="password" id="loginPassword" placeholder="Password">

<button class="btn" onclick="login()">
Login
</button>

</div>

<!-- SIGNUP -->

<div id="signupBox" style="display:none">

<input type="text" id="signupName" placeholder="Full Name">

<input type="text" id="signupPhone" placeholder="Phone Number">

<input type="email" id="signupEmail" placeholder="Email">

<input type="password" id="signupPassword" placeholder="Password">

<button class="btn" onclick="signup()">
Create Account
</button>

</div>

<div class="small">
Secure Login System 🔐
</div>

</div>

<script>

/* TAB SWITCH */

function showLogin(){

document.getElementById("loginBox").style.display="block";
document.getElementById("signupBox").style.display="none";

document.getElementById("loginTab")
.classList.add("activeTab");

document.getElementById("signupTab")
.classList.remove("activeTab");

}

function showSignup(){

document.getElementById("signupBox").style.display="block";
document.getElementById("loginBox").style.display="none";

document.getElementById("signupTab")
.classList.add("activeTab");

document.getElementById("loginTab")
.classList.remove("activeTab");

}

</script>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyBBaslH5QsahoyESYpo1nVtlYIUYfVJ2d4",
authDomain: "quickpress-offical.firebaseapp.com",
projectId: "quickpress-offical",
storageBucket: "quickpress-offical.firebasestorage.app",
messagingSenderId: "939286557961",
appId: "1:939286557961:web:ddac64f197e14877718fd8"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

/* SIGNUP */

window.signup = async function(){

try{

let name=document.getElementById("signupName").value;
let phone=document.getElementById("signupPhone").value;
let email=document.getElementById("signupEmail").value;
let password=document.getElementById("signupPassword").value;

let userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

let uid=userCredential.user.uid;

/* SAVE USER */

await setDoc(doc(db,"users",uid),{

name:name,
phone:phone,
email:email,
role:"user",
wallet:0,
createdAt:Date.now()

});

alert("Account Created ✅");

showLogin();

}catch(err){

alert(err.message);

}

}

/* LOGIN */

window.login = async function(){

try{

let email=document.getElementById("loginEmail").value;
let password=document.getElementById("loginPassword").value;

let userCredential =
await signInWithEmailAndPassword(
auth,
email,
password
);

let uid=userCredential.user.uid;

/* GET USER ROLE */

let snap=await getDoc(doc(db,"users",uid));

if(!snap.exists()){

alert("User Not Found ❌");
return;

}

let user=snap.data();

/* ROLE REDIRECT */

if(user.role==="admin"){

window.location.href="../admin/index.html";

}

else if(user.role==="partner"){

window.location.href="../partner/index.html";

}

else if(user.role==="rider"){

window.location.href="../rider/index.html";

}

else{

window.location.href="../index.html";

}

}catch(err){

alert(err.message);

}

}

/* AUTO LOGIN */

onAuthStateChanged(auth, async(user)=>{

if(user){

let snap=await getDoc(doc(db,"users",user.uid));

if(!snap.exists()) return;

let data=snap.data();

if(data.role==="admin"){

console.log("Admin Logged In");

}

}

});

</script>

</body>
</html>
