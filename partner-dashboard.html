<!DOCTYPE html>
<html>
<head>
<title>Partner Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h2 id="partnerName">Partner</h2>

<h3>New Orders</h3>
<div id="newOrders"></div>

<h3>In Process</h3>
<div id="processOrders"></div>

<h3>Completed</h3>
<div id="completedOrders"></div>

<script type="module">
import { db } from "./js/firebase.js";

import {
  collection,
  query,
  where,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const partnerId = localStorage.getItem("partnerId");
const partnerName = localStorage.getItem("partnerName");

if(!partnerId){
  location.href="partner-login.html";
}

document.getElementById("partnerName").innerText = partnerName || "Partner";

// New Orders
onSnapshot(
  query(collection(db,"orders"),where("partnerId","==",partnerId),where("status","==","Assigned")),
  snap=>{
    newOrders.innerHTML="";
    snap.forEach(d=>{
      newOrders.innerHTML+=`
        <div>
          Order #${d.id}
          <button onclick="accept('${d.id}')">Accept</button>
        </div>`;
    });
  }
);

// In Process
onSnapshot(
  query(collection(db,"orders"),where("partnerId","==",partnerId),where("status","==","Accepted")),
  snap=>{
    processOrders.innerHTML="";
    snap.forEach(d=>{
      processOrders.innerHTML+=`
        <div>
          Order #${d.id}
          <button onclick="ready('${d.id}')">Ready</button>
        </div>`;
    });
  }
);

// Completed
onSnapshot(
  query(collection(db,"orders"),where("partnerId","==",partnerId),where("status","==","Ready")),
  snap=>{
    completedOrders.innerHTML="";
    snap.forEach(d=>{
      completedOrders.innerHTML+=`<div>Order #${d.id}</div>`;
    });
  }
);

window.accept = async id=>{
  await updateDoc(doc(db,"orders",id),{status:"Accepted"});
};

window.ready = async id=>{
  await updateDoc(doc(db,"orders",id),{status:"Ready"});
};
</script>

</body>
</html>
