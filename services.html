<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress – Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

/* HEADER */
.header{
  padding:16px;
  font-size:20px;
  font-weight:bold;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

/* SEARCH */
.search{
  padding:12px;
}
.search input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #ddd;
}

/* FEATURED */
.featured{
  display:flex;
  gap:10px;
  overflow:auto;
  padding:12px;
}
.fcard{
  min-width:140px;
  background:#fff;
  padding:12px;
  border-radius:14px;
  text-align:center;
  font-weight:bold;
}

/* SERVICE */
.card{
  background:#fff;
  margin:12px;
  padding:14px;
  border-radius:16px;
  box-shadow:0 6px 14px rgba(0,0,0,.08);
  cursor:pointer;
}

/* ACCORDION */
.accordion{
  display:none;
  padding-top:10px;
}
.item{
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

/* ACTIVE */
.open .accordion{
  display:block;
}

/* BOTTOM NAV */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px;
  box-shadow:0 -2px 10px rgba(0,0,0,.1);
}
.bottom div{text-align:center;font-size:12px}

/* ANIMATION */
.card:hover{transform:scale(1.02)}
</style>
</head>

<body>

<div class="header">🛒 All Services</div>

<!-- SEARCH -->
<div class="search">
  <input type="text" placeholder="Search service..." onkeyup="searchService(this.value)">
</div>

<!-- FEATURED -->
<div class="featured">
  <div class="fcard">🔥 Ironing</div>
  <div class="fcard">💎 Dry Clean</div>
  <div class="fcard">⚡ Express</div>
</div>

<!-- SERVICES -->
<div id="services">

  <!-- IRONING -->
  <div class="card" onclick="toggle(this)">
    🧺 Ironing
    <div class="accordion">
      <div class="item">👔 Daily Wear</div>
      <div class="item">👗 Traditional</div>
      <div class="item">👚 Women Wear</div>
    </div>
  </div>

  <!-- WASHING -->
  <div class="card" onclick="toggle(this)">
    🧽 Washing
    <div class="accordion">
      <div class="item">👕 Daily Wear</div>
      <div class="item">🛏️ Home Items</div>
      <div class="item">👶 Special</div>
    </div>
  </div>

  <!-- DRY -->
  <div class="card" onclick="toggle(this)">
    🧼 Dry Cleaning
    <div class="accordion">
      <div class="item">👔 Formal Wear</div>
      <div class="item">👗 Wedding Wear</div>
      <div class="item">✨ Embroidery</div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom">
  <div onclick="go('index.html')">🏠<br>Home</div>
  <div onclick="go('services.html')">🛒<br>Services</div>
  <div onclick="go('account.html')">👤<br>Account</div>
  <div onclick="go('myorders.html')">📦<br>Orders</div>
</div>

<script>
function go(p){location.href=p}

/* ACCORDION */
function toggle(el){
  el.classList.toggle("open");
}

/* SEARCH */
function searchService(val){
  val=val.toLowerCase();

  document.querySelectorAll(".card").forEach(c=>{
    const text=c.innerText.toLowerCase();
    c.style.display = text.includes(val) ? "block" : "none";
  });
}
</script>

</body>
</html>
