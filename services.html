<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress – Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

/* HEADER */
.header{
  padding:16px;
  font-size:20px;
  font-weight:bold;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

/* GRID */
.grid{
  padding:16px;
  display:grid;
  gap:14px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 6px 14px rgba(0,0,0,.08);
  cursor:pointer;
  transition:.3s;
}
.card:hover{
  transform:translateY(-4px);
}

/* ICON */
.icon{
  font-size:30px;
}

/* TITLE */
.title{
  font-size:18px;
  font-weight:900;
  margin-top:6px;
}

/* SUB */
.sub{
  font-size:13px;
  color:#555;
  margin-top:6px;
}

/* TAGS */
.tags{
  margin-top:10px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.tag{
  background:#f1f1f1;
  padding:4px 8px;
  border-radius:10px;
  font-size:11px;
}

/* BOTTOM NAV */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px;
  box-shadow:0 -2px 10px rgba(0,0,0,.1);
}
.bottom div{
  text-align:center;
  font-size:12px;
}

/* ANIMATION */
.fade{opacity:0;transform:translateY(20px)}
.fade.show{opacity:1;transform:translateY(0)}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">🛒 All Services</div>

<!-- SERVICES -->
<div class="grid">

  <!-- IRONING -->
  <div class="card fade" onclick="goService('ironing')">
    <div class="icon">🧺</div>
    <div class="title">Ironing</div>
    <div class="sub">Perfect press & wrinkle-free clothes</div>

    <div class="tags">
      <div class="tag">Shirt</div>
      <div class="tag">Pant</div>
      <div class="tag">Saree</div>
      <div class="tag">Kurta</div>
    </div>
  </div>

  <!-- WASHING -->
  <div class="card fade" onclick="goService('washing')">
    <div class="icon">🧽</div>
    <div class="title">Washing</div>
    <div class="sub">Clean & fresh everyday clothes</div>

    <div class="tags">
      <div class="tag">T-shirt</div>
      <div class="tag">Jeans</div>
      <div class="tag">Bedsheet</div>
    </div>
  </div>

  <!-- DRY CLEAN -->
  <div class="card fade" onclick="goService('dry')">
    <div class="icon">🧼</div>
    <div class="title">Dry Cleaning</div>
    <div class="sub">Premium care for special clothes</div>

    <div class="tags">
      <div class="tag">Blazer</div>
      <div class="tag">Lehenga</div>
      <div class="tag">Coat</div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom">
  <div onclick="go('index.html')">🏠<br>Home</div>
  <div onclick="go('services.html')">🛒<br>Services</div>
  <div onclick="go('account.html')">👤<br>Account</div>
  <div onclick="go('myorders.html')">📦<br>Orders</div>
</div>

<script>
function go(p){location.href=p}

function goService(s){
  localStorage.setItem("service",s);
  location.href="products.html";
}

/* FADE */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".card").forEach(el=>{
  observer.observe(el);
});
</script>

</body>
</html>
