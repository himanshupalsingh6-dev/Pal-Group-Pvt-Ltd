<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress – Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

.page{padding:14px}

/* SEARCH 🔥 */
.search{
background:#fff;
padding:10px;
border-radius:12px;
margin-bottom:12px;
}
.search input{
width:100%;
border:none;
outline:none;
font-size:14px;
}

/* SERVICE */
.services{display:flex;gap:10px;margin-bottom:10px}
.service{
flex:1;background:#fff;padding:10px;border-radius:12px;text-align:center;font-weight:800
}
.active{background:var(--yellow)}

/* POPULAR 🔥 */
.popular{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:12px;
}
.pop-card{
min-width:120px;
background:#fff;
padding:10px;
border-radius:12px;
text-align:center;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:#fff;
border-radius:16px;
padding:12px;
text-align:center;
position:relative;
}

/* OFFER */
.offer{
position:absolute;
top:8px;
left:8px;
background:red;
color:#fff;
font-size:10px;
padding:3px 6px;
border-radius:6px;
}

.icon{font-size:36px}
.name{font-weight:900}
.price{font-weight:800;margin:4px 0}

/* BUTTON */
.add{
background:var(--yellow);
border:none;
padding:8px;
border-radius:12px;
font-weight:900;
width:100%;
}

/* QTY */
.qty{
display:flex;
justify-content:space-between;
margin-top:6px;
background:#eee;
border-radius:10px;
padding:4px;
}
.qty button{
border:none;
background:#000;
color:#fff;
border-radius:50%;
width:26px;height:26px;
}

/* CART */
.cart-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
padding:14px;
display:flex;
justify-content:space-between;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
}
.cart-bar button{
background:var(--yellow);
border:none;
padding:10px;
border-radius:20px;
font-weight:900;
}
</style>
</head>

<body>

<div class="page">

<!-- 🔍 SEARCH -->
<div class="search">
<input placeholder="Search clothes..." oninput="searchItem(this.value)">
</div>

<!-- SERVICES -->
<div class="services">
<div class="service active" onclick="setService('ironing')">🧺 Ironing</div>
<div class="service" onclick="setService('dry')">🧼 Dry</div>
<div class="service" onclick="setService('washing')">🧽 Wash</div>
</div>

<!-- 🔥 POPULAR -->
<div class="popular" id="popular"></div>

<!-- PRODUCTS -->
<div class="products" id="list"></div>

</div>

<!-- CART -->
<div class="cart-bar" id="cartBar" style="display:none">
<div><b id="count">0</b> items • ₹<b id="total">0</b></div>
<button onclick="goCart()">View Cart</button>
</div>

<script>

/* 🔥 FULL DATA */
const DATA = {
ironing:[
{name:"Shirt",icon:"👕",price:10,offer:true},
{name:"T-shirt",icon:"👕",price:8},
{name:"Jeans",icon:"👖",price:15},
{name:"Kurta",icon:"🥻",price:12},
{name:"Saree",icon:"🥻",price:20},
{name:"Blazer",icon:"🧥",price:30},
{name:"Bedsheet",icon:"🛏️",price:25}
],
dry:[
{name:"Suit",icon:"🤵",price:120,offer:true},
{name:"Coat",icon:"🧥",price:100},
{name:"Lehenga",icon:"👗",price:150},
{name:"Sherwani",icon:"🤵",price:180},
{name:"Designer Dress",icon:"👗",price:130}
],
washing:[
{name:"T-shirt",icon:"👕",price:10},
{name:"Jeans",icon:"👖",price:15},
{name:"Track Pant",icon:"👖",price:12},
{name:"Towel",icon:"🧻",price:8},
{name:"Bedsheet",icon:"🛏️",price:20},
{name:"Gym Wear",icon:"🏋️",price:15}
]
};

let service="ironing";
let cart = JSON.parse(localStorage.getItem("cart")||"[]");
let filtered=[];

/* SEARCH */
function searchItem(q){
q=q.toLowerCase();
filtered = DATA[service].filter(i=> i.name.toLowerCase().includes(q));
render(filtered);
}

/* SERVICE */
function setService(s){
service=s;
filtered=[];
document.querySelectorAll(".service").forEach(el=>el.classList.remove("active"));
event.target.classList.add("active");
render();
renderPopular();
}

/* POPULAR */
function renderPopular(){
popular.innerHTML="";

DATA[service].slice(0,5).forEach(i=>{
popular.innerHTML+=`
<div class="pop-card">${i.icon}<br>${i.name}</div>
`;
});
}

/* RENDER */
function render(listData){
let data = listData || DATA[service];

list.innerHTML="";

data.forEach(item=>{

let found = cart.find(i=>i.name===item.name && i.service===service);
let qty = found?found.qty:0;

list.innerHTML+=`
<div class="card">

${item.offer?'<div class="offer">20% OFF</div>':''}

<div class="icon">${item.icon}</div>
<div class="name">${item.name}</div>
<div class="price">₹${item.price}</div>

${
!found
? `<button class="add" onclick="add('${item.name}',${item.price})">ADD</button>`
: `<div class="qty">
<button onclick="dec('${item.name}')">-</button>
<b>${qty}</b>
<button onclick="inc('${item.name}',${item.price})">+</button>
</div>`
}

</div>
`;
});

updateCart();
}

/* CART */
function add(name,price){
let item = cart.find(i=>i.name===name && i.service===service);
if(item){item.qty++}
else{cart.push({name,price,qty:1,service})}
save();
}

function inc(n,p){add(n,p)}
function dec(name){
let i = cart.findIndex(x=>x.name===name && x.service===service);
if(i>-1){cart[i].qty--; if(cart[i].qty<=0) cart.splice(i,1);}
save();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

/* CART BAR */
function updateCart(){
let t=0,c=0;
cart.forEach(i=>{t+=i.price*i.qty;c+=i.qty});
cartBar.style.display = cart.length?"flex":"none";
total.innerText=t;
count.innerText=c;
}

/* NAV */
function goCart(){
location.href="cart.html";
}

/* INIT */
render();
renderPopular();

</script>

</body>
</html>
