<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Services
</title>

<link
rel="stylesheet"
href="./css/style.css"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<style>

.servicesGrid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:20px;
}

.serviceCard{
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
transition:0.3s;
}

.serviceCard:hover{
transform:translateY(-5px);
}

.serviceImage{
height:180px;
background:#f3f4f6;
display:flex;
align-items:center;
justify-content:center;
font-size:70px;
}

.serviceContent{
padding:20px;
}

.serviceContent h2{
margin-top:0;
margin-bottom:10px;
}

.price{
font-size:24px;
font-weight:bold;
color:#2563eb;
margin-bottom:12px;
}

.qtyBox{
display:flex;
align-items:center;
gap:10px;
margin-top:15px;
}

.qtyBtn{
width:38px;
height:38px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:18px;
font-weight:bold;
background:#FFD400;
}

.addBtn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#07142b;
color:#fff;
font-size:15px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.topBanner{
background:linear-gradient(
135deg,
#07142b,
#0d2247
);
color:#fff;
padding:30px;
border-radius:24px;
margin-bottom:25px;
}

.topBanner h1{
margin:0;
font-size:36px;
}

.searchArea{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

.cartFloat{
position:fixed;
right:20px;
bottom:20px;
background:#07142b;
color:#fff;
padding:15px 20px;
border-radius:50px;
font-weight:bold;
box-shadow:0 5px 18px rgba(0,0,0,0.2);
cursor:pointer;
z-index:999;
}

.bottomNav{
display:none;
}

@media screen and (max-width:768px){

.bottomNav{
display:flex;
position:fixed;
bottom:0;
left:0;
width:100%;
background:#fff;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -5px 15px rgba(0,0,0,0.08);
z-index:999;
}

.bottomNav a{
text-decoration:none;
color:#333;
font-size:13px;
text-align:center;
}

.bottomNav i{
display:block;
font-size:20px;
margin-bottom:4px;
}

.main{
padding-bottom:100px;
}

.topBanner h1{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>
🏠 Dashboard
</button>
</a>

<a href="./services.html">
<button class="activeBtn">
🧺 Services
</button>
</a>

<a href="./cart.html">
<button>
🛒 Cart
</button>
</a>

<a href="./orders.html">
<button>
📦 Orders
</button>
</a>

<a href="./tracking.html">
<button>
🚚 Tracking
</button>
</a>

<a href="./wallet.html">
<button>
💰 Wallet
</button>
</a>

<a href="./support.html">
<button>
🛠 Support
</button>
</a>

<a href="./profile.html">
<button>
👤 Profile
</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<button
class="menuBtn"
onclick="toggleSidebar()"
>
☰
</button>

<div>

<h1>
🧺 Laundry Services
</h1>

<p>
Choose your service and add to cart
</p>

</div>

<div class="adminBox">

🛒 Cart:
<span id="cartCount">
0
</span>

</div>

</div>

<!-- BANNER -->

<div class="topBanner">

<h1>
Premium Laundry Services ✨
</h1>

<p>
Fast pickup, expert ironing and
doorstep delivery.
</p>

</div>

<!-- SEARCH -->

<div class="filterCard">

<div class="searchArea">

<input
type="text"
id="searchInput"
placeholder="Search services..."
>

<select id="categoryFilter">

<option value="all">
All Categories
</option>

<option value="Ironing">
Ironing
</option>

<option value="Wash">
Wash
</option>

<option value="Dry Clean">
Dry Clean
</option>

</select>

</div>

</div>

<!-- SERVICES -->

<div
class="servicesGrid"
id="servicesGrid"
>

</div>

</div>

</div>

<!-- FLOAT CART -->

<div
class="cartFloat"
onclick="
location.href='./cart.html'
"
>

🛒 Go To Cart

</div>

<!-- MOBILE NAV -->

<div class="bottomNav">

<a href="./index.html">
<i class="fa-solid fa-house"></i>
Home
</a>

<a href="./services.html">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="./cart.html">
<i class="fa-solid fa-cart-shopping"></i>
Cart
</a>

<a href="./orders.html">
<i class="fa-solid fa-box"></i>
Orders
</a>

<a href="./profile.html">
<i class="fa-solid fa-user"></i>
Profile
</a>

</div>

<script type="module">

import {

initializeApp

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot,
addDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:
"AIzaSyBBaslH5QsahoyESYpo1nVtlYIUYfVJ2d4",

authDomain:
"quickpress-offical.firebaseapp.com",

projectId:
"quickpress-offical",

storageBucket:
"quickpress-offical.firebasestorage.app",

messagingSenderId:
"939286557961",

appId:
"1:939286557961:web:ddac64f197e14877718fd8"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* USER */

const userId =
localStorage.getItem("userId");

/* SERVICES */

const servicesGrid =
document.getElementById(
"servicesGrid"
);

const cartCount =
document.getElementById(
"cartCount"
);

let allServices = [];

onSnapshot(
collection(db,"services"),
(snapshot)=>{

allServices = [];

snapshot.forEach((doc)=>{

allServices.push({
id:doc.id,
...doc.data()
});

});

renderServices();

});

/* RENDER */

function renderServices(){

const keyword =
document.getElementById(
"searchInput"
).value.toLowerCase();

const category =
document.getElementById(
"categoryFilter"
).value;

let html = "";

const filtered =
allServices.filter((s)=>{

const matchSearch =

(s.name || "")
.toLowerCase()
.includes(keyword);

const matchCategory =

category === "all"
? true
: s.category === category;

return matchSearch &&
matchCategory;

});

filtered.forEach((s)=>{

html += `

<div class="serviceCard">

<div class="serviceImage">
🧺
</div>

<div class="serviceContent">

<h2>
${s.name || "-"}
</h2>

<p>
${s.description || ""}
</p>

<div class="price">
₹${s.price || 0}
</div>

<button
class="addBtn"
onclick='addToCart(${JSON.stringify(s)})'
>
Add To Cart
</button>

</div>

</div>

`;

});

servicesGrid.innerHTML = html;

}

/* SEARCH */

document
.getElementById("searchInput")
.addEventListener(
"input",
renderServices
);

document
.getElementById("categoryFilter")
.addEventListener(
"change",
renderServices
);

/* CART */

window.addToCart =
async function(service){

await addDoc(
collection(db,"cart"),
{

userId:userId,

serviceId:service.id,

name:service.name,

price:service.price,

qty:1,

total:service.price,

createdAt:Date.now()

}
);

alert("Added To Cart ✅");

loadCartCount();

}

/* COUNT */

function loadCartCount(){

onSnapshot(
collection(db,"cart"),
(snapshot)=>{

let count = 0;

snapshot.forEach((doc)=>{

if(
doc.data().userId === userId
){
count++;
}

});

cartCount.innerHTML =
count;

});

}

loadCartCount();

/* SIDEBAR */

window.toggleSidebar =
function(){

document
.querySelector(".sidebar")
.classList.toggle("active");

}

</script>

</body>
</html>
