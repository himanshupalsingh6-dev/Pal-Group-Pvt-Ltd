<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress – Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

.header{
  padding:16px;
  font-size:20px;
  font-weight:bold;
  background:#fff;
}

/* CARD */
.card{
  background:#fff;
  margin:12px;
  padding:14px;
  border-radius:16px;
  box-shadow:0 6px 14px rgba(0,0,0,.08);
  cursor:pointer;
}

/* CATEGORY */
.accordion{
  display:none;
  margin-top:10px;
}
.cat{
  padding:10px;
  background:#f6f6f6;
  border-radius:10px;
  margin-bottom:6px;
  cursor:pointer;
}

.open .accordion{
  display:block;
}

/* NAV */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px;
  box-shadow:0 -2px 10px rgba(0,0,0,.1);
}
.bottom div{text-align:center;font-size:12px}
</style>
</head>

<body>

<div class="header">🛒 All Services</div>

<!-- IRONING -->
<div class="card" onclick="toggle(this)">
  🧺 Ironing
  <div class="accordion">
    <div class="cat" onclick="go('ironing','daily')">👔 Daily Wear</div>
    <div class="cat" onclick="go('ironing','traditional')">👗 Traditional</div>
    <div class="cat" onclick="go('ironing','women')">👚 Women Wear</div>
    <div class="cat" onclick="go('ironing','home')">🛏️ Home Items</div>
    <div class="cat" onclick="go('ironing','winter')">🧥 Winter</div>
  </div>
</div>

<!-- DRY CLEAN -->
<div class="card" onclick="toggle(this)">
  🧼 Dry Cleaning
  <div class="accordion">
    <div class="cat" onclick="go('dry','formal')">👔 Formal Wear</div>
    <div class="cat" onclick="go('dry','wedding')">👗 Wedding Wear</div>
    <div class="cat" onclick="go('dry','delicate')">👚 Delicate</div>
    <div class="cat" onclick="go('dry','embroidery')">✨ Embroidery</div>
    <div class="cat" onclick="go('dry','home')">🏠 Home</div>
    <div class="cat" onclick="go('dry','special')">👖 Special</div>
  </div>
</div>

<!-- WASHING -->
<div class="card" onclick="toggle(this)">
  🧽 Washing
  <div class="accordion">
    <div class="cat" onclick="go('washing','daily')">👕 Daily Wear</div>
    <div class="cat" onclick="go('washing','traditional')">👗 Traditional</div>
    <div class="cat" onclick="go('washing','home')">🛏️ Home</div>
    <div class="cat" onclick="go('washing','special')">👶 Special</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom">
  <div onclick="nav('index.html')">🏠<br>Home</div>
  <div onclick="nav('services.html')">🛒<br>Services</div>
  <div onclick="nav('account.html')">👤<br>Account</div>
  <div onclick="nav('myorders.html')">📦<br>Orders</div>
</div>

<script>
function nav(p){location.href=p}

/* ACCORDION */
function toggle(el){
  el.classList.toggle("open");
}

/* GO PRODUCT PAGE */
function go(service,cat){
  localStorage.setItem("service",service);
  localStorage.setItem("category",cat);
  location.href="products.html";
}
</script>

</body>
</html>
