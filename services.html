<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress – Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

.page{padding:16px}

/* SERVICE TABS 🔥 */
.services{
display:flex;
gap:10px;
margin-bottom:12px;
overflow:auto;
}

.service{
flex:1;
background:#fff;
padding:10px;
border-radius:14px;
text-align:center;
font-weight:800;
cursor:pointer;
}

.service.active{
background:var(--yellow);
}

/* CATEGORY */
.cats{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:14px;
}

.cat{
padding:8px 14px;
background:#fff;
border-radius:20px;
font-weight:800;
cursor:pointer;
}

.cat.active{
background:var(--yellow);
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.card{
background:#fff;
border-radius:18px;
padding:14px;
text-align:center;
box-shadow:0 6px 14px rgba(0,0,0,.08);
}

.icon{
font-size:40px;
}

.name{
font-weight:900;
margin-top:6px;
}

.price{
font-weight:800;
margin:4px 0;
}

.tag{
font-size:12px;
background:#eee;
padding:4px 8px;
border-radius:10px;
display:inline-block;
margin-top:4px;
}

/* BUTTON */
.add{
margin-top:10px;
width:100%;
padding:10px;
border:none;
background:var(--yellow);
border-radius:14px;
font-weight:900;
}

/* QTY */
.qty{
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
background:#f1f1f1;
border-radius:14px;
padding:6px 12px;
}

.qty button{
border:none;
background:#000;
color:#fff;
width:30px;
height:30px;
border-radius:50%;
}

/* CART BAR */
.cart-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
padding:14px;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
display:flex;
justify-content:space-between;
}

.cart-bar button{
padding:10px 16px;
border:none;
background:var(--yellow);
border-radius:20px;
font-weight:900;
}
</style>
</head>

<body>

<div class="page">

<h2>🧺 Select Service</h2>

<!-- 🔥 SERVICE TABS -->
<div class="services">
<div class="service active" onclick="setService('ironing')">🧺 Ironing</div>
<div class="service" onclick="setService('dry')">🧼 Dry Clean</div>
<div class="service" onclick="setService('washing')">🧽 Washing</div>
</div>

<!-- CATEGORY -->
<div class="cats" id="cats"></div>

<!-- PRODUCTS -->
<div class="products" id="list"></div>

</div>

<!-- CART BAR -->
<div class="cart-bar" id="cartBar" style="display:none">
<div><b id="count">0</b> items • ₹<b id="total">0</b></div>
<button onclick="goCart()">View Cart</button>
</div>

<script>

/* 🔥 DATA WITH SERVICE TAG */
const DATA = {
ironing:{
daily:[
{name:"Shirt",price:10,icon:"👕"},
{name:"Pant",price:15,icon:"👖"},
{name:"T-shirt",price:8,icon:"👕"}
]
},
dry:{
premium:[
{name:"Blazer",price:80,icon:"🧥"},
{name:"Coat",price:90,icon:"🧥"}
]
},
washing:{
daily:[
{name:"Clothes (1kg)",price:50,icon:"🧺"},
{name:"Blanket",price:100,icon:"🛏️"}
]
}
};

let service="ironing";
let currentCat="daily";
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

/* SERVICE SWITCH */
function setService(s){
service=s;
currentCat=Object.keys(DATA[s])[0];

document.querySelectorAll(".service").forEach(el=>el.classList.remove("active"));
event.target.classList.add("active");

renderCats();
render();
}

/* CATEGORY */
function renderCats(){
cats.innerHTML = Object.keys(DATA[service]).map(c=>
`<div class="cat ${c==currentCat?'active':''}" onclick="setCat('${c}')">${c}</div>`
).join("");
}

function setCat(c){
currentCat=c;
render();
}

/* RENDER */
function render(){

list.innerHTML="";

DATA[service][currentCat].forEach(item=>{

let found = cart.find(i=>i.name===item.name && i.service===service);
let qty = found ? found.qty : 0;

list.innerHTML+=`
<div class="card">

<div class="icon">${item.icon}</div>
<div class="name">${item.name}</div>
<div class="price">₹${item.price}</div>

<div class="tag">${service.toUpperCase()}</div>

${
!found
? `<button class="add" onclick="add('${item.name}',${item.price})">ADD</button>`
: `<div class="qty">
<button onclick="dec('${item.name}')">-</button>
<b>${qty}</b>
<button onclick="inc('${item.name}',${item.price})">+</button>
</div>`
}

</div>
`;
});

updateCart();
}

/* CART */
function add(name,price){

let item = cart.find(i=>i.name===name && i.service===service);

if(item){
item.qty++;
}else{
cart.push({name,price,qty:1,service});
}

save();
}

function inc(name,price){ add(name,price); }

function dec(name){

let i = cart.findIndex(x=>x.name===name && x.service===service);

if(i>-1){
cart[i].qty--;
if(cart[i].qty<=0) cart.splice(i,1);
}

save();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

/* CART BAR */
function updateCart(){
let total=0,count=0;

cart.forEach(i=>{
total+=i.price*i.qty;
count+=i.qty;
});

cartBar.style.display = cart.length?"flex":"none";
totalEl = document.getElementById("total");
countEl = document.getElementById("count");

totalEl.innerText=total;
countEl.innerText=count;
}

/* NAV */
function goCart(){
location.href="cart.html";
}

/* INIT */
renderCats();
render();

</script>

</body>
</html>
