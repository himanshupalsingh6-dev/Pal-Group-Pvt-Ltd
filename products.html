<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress – Products</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

.page{padding:18px}
h2{margin-bottom:12px}

.cats{display:flex;gap:10px;overflow-x:auto;margin-bottom:16px}
.cat{padding:8px 14px;background:#fff;border-radius:20px;font-weight:800;cursor:pointer}
.cat.active{background:var(--yellow)}

.products{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}

.card{
  background:#fff;
  border-radius:18px;
  padding:14px;
  box-shadow:0 6px 14px rgba(0,0,0,.08);
  text-align:center;
}
.icon{font-size:42px}
.name{font-weight:900;margin-top:6px}
.price{font-weight:800;margin:4px 0}

.add{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  background:var(--yellow);
  border-radius:14px;
  font-weight:900;
}

.qty{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#f1f1f1;
  border-radius:14px;
  padding:6px 12px;
}
.qty button{
  border:none;
  background:#000;
  color:#fff;
  width:30px;
  height:30px;
  border-radius:50%;
}

.cart-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:14px;
  box-shadow:0 -2px 10px rgba(0,0,0,.15);
  display:flex;
  justify-content:space-between;
}
.cart-bar button{
  padding:10px 16px;
  border:none;
  background:var(--yellow);
  border-radius:20px;
  font-weight:900;
}
</style>
</head>

<body>

<div class="page">
  <h2>Select Items</h2>
  <div class="cats" id="cats"></div>
  <div class="products" id="list"></div>
</div>

<div class="cart-bar" id="cartBar" style="display:none">
  <div><b id="cartCount">0</b> items • ₹<b id="cartTotal">0</b></div>
  <button onclick="goCart()">View Cart</button>
</div>

<script>
/* ===== DATA ===== */
const DATA = {
  ironing:{
    daily:["Shirt","T-shirt","Jeans","Pant","Uniform"],
    traditional:["Kurta","Saree","Suit","Dupatta"]
  },
  dry:{
    formal:["Shirt","Coat","Blazer"]
  },
  washing:{
    daily:["Shirt","Pant","Towel"]
  }
};

/* ===== STATE ===== */
const service = localStorage.getItem("service") || "ironing";
const categories = Object.keys(DATA[service]);
let currentCat = localStorage.getItem("category") || categories[0];

let cart = JSON.parse(localStorage.getItem("cart")||"[]");

/* CATEGORY UI */
cats.innerHTML = categories.map(c =>
  `<div class="cat ${c==currentCat?'active':''}" onclick="setCat('${c}')">${c}</div>`
).join("");

function setCat(c){
  currentCat=c;
  render();
}

/* ===== RENDER ===== */
function render(){
  list.innerHTML="";

  DATA[service][currentCat].forEach(name=>{
    const price = 10;

    const item = cart.find(i =>
      i.name===name &&
      i.service===service &&
      i.category===currentCat
    );

    list.innerHTML+=`
      <div class="card">
        <div class="icon">🧺</div>
        <div class="name">${name}</div>
        <div class="price">₹${price}</div>

        ${
          !item
          ? `<button class="add" onclick="add('${name}','${service}','${currentCat}',${price})">ADD</button>`
          : `<div class="qty">
              <button onclick="dec('${name}','${service}','${currentCat}')">−</button>
              <b>${item.qty}</b>
              <button onclick="inc('${name}','${service}','${currentCat}',${price})">+</button>
            </div>`
        }
      </div>
    `;
  });

  updateCart();
}

/* ===== CART SYSTEM ===== */
function add(name,service,category,price){
  const exist = cart.find(i =>
    i.name===name &&
    i.service===service &&
    i.category===category
  );

  if(exist){
    exist.qty++;
  }else{
    cart.push({name,service,category,price,qty:1});
  }

  save();
}

function inc(name,service,category,price){
  add(name,service,category,price);
}

function dec(name,service,category){
  const i = cart.findIndex(x =>
    x.name===name &&
    x.service===service &&
    x.category===category
  );

  cart[i].qty--;

  if(cart[i].qty<=0) cart.splice(i,1);

  save();
}

function save(){
  localStorage.setItem("cart",JSON.stringify(cart));
  render();
}

/* ===== CART BAR ===== */
function updateCart(){
  let total=0,count=0;

  cart.forEach(i=>{
    total+=i.price*i.qty;
    count+=i.qty;
  });

  cartBar.style.display = cart.length?"flex":"none";
  cartTotal.innerText=total;
  cartCount.innerText=count;
}

function goCart(){
  location.href="cart.html";
}

/* INIT */
render();
</script>

</body>
</html>
