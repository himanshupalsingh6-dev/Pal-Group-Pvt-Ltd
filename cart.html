<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

.header{
  padding:14px;
  font-weight:bold;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.container{padding:14px}

.section{
  margin-bottom:16px;
}

.title{
  font-weight:bold;
  margin-bottom:8px;
}

.item{
  background:#fff;
  padding:12px;
  border-radius:12px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
}

.qty{
  display:flex;
  gap:8px;
}
.qty button{
  width:28px;
  height:28px;
  border:none;
  background:#000;
  color:#fff;
  border-radius:50%;
}

.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:14px;
  box-shadow:0 -2px 10px rgba(0,0,0,.15);
  display:flex;
  justify-content:space-between;
}
.footer button{
  background:var(--yellow);
  border:none;
  padding:10px 16px;
  border-radius:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🛒 Your Cart</div>

<div class="container" id="cartBox"></div>

<div class="footer">
  <div>Total: ₹<b id="total">0</b></div>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

const box = document.getElementById("cartBox");
const totalEl = document.getElementById("total");

/* SERVICE NAME */
function getServiceName(s){
  return {
    ironing:"🧺 Ironing",
    dry:"🧼 Dry Cleaning",
    washing:"🧽 Washing"
  }[s];
}

/* GROUP DATA */
function groupCart(){
  const grouped = {};

  cart.forEach(item=>{
    if(!grouped[item.service]){
      grouped[item.service] = [];
    }
    grouped[item.service].push(item);
  });

  return grouped;
}

/* RENDER */
function render(){
  box.innerHTML="";
  let total = 0;

  const grouped = groupCart();

  for(let service in grouped){

    box.innerHTML += `<div class="section">
      <div class="title">${getServiceName(service)}</div>
    `;

    grouped[service].forEach(item=>{
      total += item.price * item.qty;

      box.innerHTML += `
        <div class="item">
          <div>
            <b>${item.name}</b><br>
            <small>${item.category}</small>
          </div>

          <div class="qty">
            <button onclick="dec('${item.name}','${item.service}','${item.category}')">-</button>
            <b>${item.qty}</b>
            <button onclick="inc('${item.name}','${item.service}','${item.category}',${item.price})">+</button>
          </div>
        </div>
      `;
    });

    box.innerHTML += `</div>`;
  }

  totalEl.innerText = total;
}

/* CART LOGIC */
function inc(name,service,category,price){
  const item = cart.find(i =>
    i.name===name &&
    i.service===service &&
    i.category===category
  );
  item.qty++;
  save();
}

function dec(name,service,category){
  const i = cart.findIndex(x =>
    x.name===name &&
    x.service===service &&
    x.category===category
  );

  cart[i].qty--;

  if(cart[i].qty<=0){
    cart.splice(i,1);
  }

  save();
}

function save(){
  localStorage.setItem("cart",JSON.stringify(cart));
  render();
}

/* CHECKOUT */
function checkout(){
  alert("Proceeding to checkout...");
}

/* INIT */
render();
</script>

</body>
</html>
