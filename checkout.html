<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<style>
body{font-family:Segoe UI;background:#f6f7f9}
.container{padding:15px}
.card{background:#fff;padding:15px;margin:10px;border-radius:10px}
input,select,textarea{width:100%;padding:10px;margin-top:8px}
button{padding:12px;width:100%;background:#FFD400;border:none}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Customer Details</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<label>Select Area</label>
<select id="area">
<option>Delhi</option>
<option>Noida</option>
<option>Ghaziabad</option>
<option>Meerut</option>
</select>

<textarea id="address" placeholder="Full Address"></textarea>
</div>

<button onclick="placeOrder()">Place Order</button>

</div>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

window.placeOrder = async function(){

let name=name.value;
let phone=phone.value;
let address=address.value;
let area=document.getElementById("area").value;

let cart = JSON.parse(localStorage.getItem("cart")||"[]");

let total=0;
cart.forEach(i=> total+=i.price*i.qty);

let order={
id:"QP"+Date.now(),
name,
phone,
address,
area,   // 🔥 AREA ADDED
items:cart,
total,
status:"Pickup",
paymentMethod:"COD",
paymentStatus:"Pending",
time:new Date(),
userId:localStorage.getItem("userId")
};

await addDoc(collection(db,"orders"),order);

localStorage.removeItem("cart");

alert("Order Placed ✅");

location.href="tracking.html";
}

</script>

</body>
</html>
