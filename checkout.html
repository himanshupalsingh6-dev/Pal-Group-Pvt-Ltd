<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

.header{
  padding:14px;
  font-weight:bold;
  background:#fff;
}

.container{padding:14px}

.card{
  background:#fff;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.total{
  font-weight:bold;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  background:var(--yellow);
  border-radius:12px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">💳 Checkout</div>

<div class="container">

  <!-- ITEMS -->
  <div id="items"></div>

  <!-- BILL -->
  <div class="card">
    <div class="row"><span>Subtotal</span><span>₹<b id="subtotal">0</b></span></div>
    <div class="row"><span>Delivery</span><span>₹12</span></div>
    <div class="row"><span>Handling</span><span>₹3</span></div>
    <hr>
    <div class="row total">
      <span>Total</span>
      <span>₹<b id="total">0</b></span>
    </div>
  </div>

  <!-- ADDRESS -->
  <div class="card">

    <input id="name" placeholder="Full Name" style="width:100%;padding:10px;margin-bottom:8px">
    <input id="phone" placeholder="Phone Number" style="width:100%;padding:10px;margin-bottom:8px">
    <input id="house" placeholder="House / Flat No" style="width:100%;padding:10px;margin-bottom:8px">
    <input id="street" placeholder="Street / Road" style="width:100%;padding:10px;margin-bottom:8px">
    <input id="landmark" placeholder="Landmark" style="width:100%;padding:10px;margin-bottom:8px">
    <input id="city" placeholder="City" style="width:100%;padding:10px;margin-bottom:8px">
    <input id="state" placeholder="State" style="width:100%;padding:10px;margin-bottom:8px">

    <button onclick="getLocation()" style="width:100%;padding:10px;margin-top:6px">
      📍 Use My Location
    </button>

    <button onclick="openMap()" style="width:100%;padding:10px;margin-top:6px">
      🗺️ Open Map
    </button>

    <p id="locText" style="font-size:12px;color:green"></p>

  </div>

  <button class="btn" onclick="placeOrder()">Place Order</button>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

let userLocation = "";

/* SERVICE NAME */
function getServiceName(s){
  return {
    ironing:"🧺 Ironing",
    dry:"🧼 Dry Cleaning",
    washing:"🧽 Washing"
  }[s];
}

/* GROUP */
function groupCart(){
  const g={};
  cart.forEach(i=>{
    if(!g[i.service]) g[i.service]=[];
    g[i.service].push(i);
  });
  return g;
}

/* RENDER */
function render(){
  let subtotal=0;
  items.innerHTML="";

  const grouped = groupCart();

  for(let s in grouped){
    items.innerHTML+=`<div class="card"><b>${getServiceName(s)}</b>`;

    grouped[s].forEach(i=>{
      subtotal += i.price*i.qty;

      items.innerHTML+=`
        <div class="row">
          <span>${i.name} x${i.qty}</span>
          <span>₹${i.price*i.qty}</span>
        </div>
      `;
    });

    items.innerHTML+=`</div>`;
  }

  subtotalEl.innerText=subtotal;
  totalEl.innerText = subtotal + 12 + 3;
}

/* LOCATION */
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    userLocation = lat + "," + lng;

    document.getElementById("locText").innerText = "Location Selected ✅";
  },()=>{
    alert("Location permission denied");
  });
}

/* OPEN MAP */
function openMap(){
  window.open("https://www.google.com/maps","_blank");
}

/* PLACE ORDER */
function placeOrder(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const house = document.getElementById("house").value;
  const street = document.getElementById("street").value;
  const landmark = document.getElementById("landmark").value;
  const city = document.getElementById("city").value;
  const state = document.getElementById("state").value;

  if(!name || !phone || !house || !street || !city || !state){
    alert("Fill all address fields");
    return;
  }

  if(!userLocation){
    alert("Please select location");
    return;
  }

  const order = {
    cart,
    name,
    phone,
    address:{
      house,street,landmark,city,state
    },
    location:userLocation,
    total: totalEl.innerText,
    status:"Placed",
    time:Date.now()
  };

  console.log(order);

  localStorage.setItem("lastOrder",JSON.stringify(order));
  localStorage.removeItem("cart");

  location.href="success.html";
}

/* INIT */
render();
</script>

</body>
</html>
