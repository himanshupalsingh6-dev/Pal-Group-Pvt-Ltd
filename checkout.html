<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}
.container{padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:12px}
input,textarea{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:1px solid #ddd}
button{width:100%;padding:14px;background:var(--yellow);border:none;border-radius:10px;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<div class="card">
<b>Order ID:</b> <span id="orderId"></span>
</div>

<div class="card">
<h3>Customer Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>
</div>

<div class="card">
<h3>Order</h3>
<div id="summary"></div>
<hr>
<b>Total: ₹<span id="total"></span></b>
</div>

<button onclick="placeOrder()">Place Order</button>

</div>

<script type="module">

import { db } from "./firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let cart = JSON.parse(localStorage.getItem("cart")||"[]");

let orderId = "QP"+Date.now();
document.getElementById("orderId").innerText=orderId;

let total=0,html="";
cart.forEach(i=>{
  total+=i.price*i.qty;
  html+=`${i.name} x ${i.qty}<br>`;
});
document.getElementById("summary").innerHTML=html;
document.getElementById("total").innerText=total;

window.placeOrder = async function(){

let name=nameInput.value;
let phone=phoneInput.value;
let address=addressInput.value;

if(!name||!phone||!address){
alert("Fill all");
return;
}

let order={
id:orderId,
name,phone,address,
items:cart,
total,
status:"Pickup",
time:new Date()
};

await addDoc(collection(db,"orders"),order);

localStorage.setItem("currentOrder",JSON.stringify(order));
localStorage.removeItem("cart");

location.href="tracking.html";
};

</script>

</body>
</html>
