<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

.header{
  padding:16px;
  font-size:18px;
  font-weight:bold;
  background:#fff;
}

.container{padding:16px}

.card{
  background:#fff;
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:8px;
  border-radius:12px;
  border:1px solid #ddd;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  background:var(--yellow);
  border-radius:14px;
  font-weight:bold;
}

.map{
  width:100%;
  height:200px;
  border-radius:12px;
  margin-top:8px;
}

.success{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.tick{font-size:80px}
</style>
</head>

<body>

<script>
const user = localStorage.getItem("userId");

if(!user){
  alert("⚠️ Please login first");
  localStorage.setItem("redirect","checkout.html");
  location.href="customer-login.html";
}
</script>

<div class="header">💳 Checkout</div>

<div class="container">

<div id="items"></div>

<div class="card">
  <div class="row">Subtotal ₹<b id="subtotal">0</b></div>
  <div class="row">Delivery ₹12</div>
  <div class="row">Handling ₹3</div>
  <hr>
  <div class="row"><b>Total ₹<span id="total">0</span></b></div>
</div>

<div class="card">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="house" placeholder="House">
<input id="street" placeholder="Street">
<input id="city" placeholder="City">

<button class="btn" onclick="getLocation()">📍 Get Location</button>
<iframe id="map" class="map"></iframe>
</div>

<button class="btn" onclick="placeOrder()">Place Order</button>

</div>

<div class="success" id="success">
  <div class="tick">✅</div>
  <h2>Order Placed</h2>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

function render(){
  let total=0;
  items.innerHTML="";

  cart.forEach(i=>{
    total+=i.price*i.qty;
    items.innerHTML+=`
      <div class="card">
        ${i.name} (${i.service}) x${i.qty}
      </div>
    `;
  });

  subtotal.innerText=total;
  totalEl.innerText=total+15;
}

let userLocation="";

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;
    userLocation=lat+","+lng;

    map.src=`https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed`;
  });
}

function placeOrder(){

  if(!userLocation){
    alert("Select location");
    return;
  }

  localStorage.removeItem("cart");

  success.style.display="flex";

  setTimeout(()=>{
    location.href="order-tracking.html";
  },3000);
}

render();
</script>

</body>
</html>
