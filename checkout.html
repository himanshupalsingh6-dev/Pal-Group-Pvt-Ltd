<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}

.header{
  padding:14px;
  font-weight:bold;
  background:#fff;
}

.container{padding:14px}

.card{
  background:#fff;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.total{
  font-weight:bold;
  font-size:16px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  background:var(--yellow);
  border-radius:12px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">💳 Checkout</div>

<div class="container">

  <!-- ITEMS -->
  <div id="items"></div>

  <!-- BILL -->
  <div class="card">
    <div class="row"><span>Subtotal</span><span>₹<b id="subtotal">0</b></span></div>
    <div class="row"><span>Delivery</span><span>₹12</span></div>
    <div class="row"><span>Handling Fee</span><span>₹3</span></div>
    <hr>
    <div class="row total">
      <span>Total</span>
      <span>₹<b id="total">0</b></span>
    </div>
  </div>

  <!-- ADDRESS -->
  <div class="card">
    <input id="name" placeholder="Your Name" style="width:100%;padding:10px;margin-bottom:8px">
    <input id="phone" placeholder="Phone" style="width:100%;padding:10px;margin-bottom:8px">
    <input id="address" placeholder="Address" style="width:100%;padding:10px">
  </div>

  <button class="btn" onclick="placeOrder()">Place Order</button>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

const itemsBox = document.getElementById("items");
const subtotalEl = document.getElementById("subtotal");
const totalEl = document.getElementById("total");

function getServiceName(s){
  return {
    ironing:"🧺 Ironing",
    dry:"🧼 Dry Cleaning",
    washing:"🧽 Washing"
  }[s];
}

/* GROUP */
function groupCart(){
  const g={};
  cart.forEach(i=>{
    if(!g[i.service]) g[i.service]=[];
    g[i.service].push(i);
  });
  return g;
}

/* RENDER */
function render(){
  let subtotal=0;
  itemsBox.innerHTML="";

  const grouped = groupCart();

  for(let s in grouped){
    itemsBox.innerHTML+=`<div class="card"><b>${getServiceName(s)}</b>`;

    grouped[s].forEach(i=>{
      subtotal += i.price*i.qty;

      itemsBox.innerHTML+=`
        <div class="row">
          <span>${i.name} x${i.qty}</span>
          <span>₹${i.price*i.qty}</span>
        </div>
      `;
    });

    itemsBox.innerHTML+=`</div>`;
  }

  subtotalEl.innerText=subtotal;

  const total = subtotal + 12 + 3;
  totalEl.innerText = total;
}

/* PLACE ORDER */
function placeOrder(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill all details");
    return;
  }

  const order = {
    cart,
    name,
    phone,
    address,
    subtotal: subtotalEl.innerText,
    total: totalEl.innerText,
    status:"Placed"
  };

  console.log(order);

  alert("Order Placed ✅");

  localStorage.removeItem("cart");

  location.href="index.html";
}

render();
</script>

</body>
</html>
