<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
--yellow:#FFD400;
--bg:#f6f7f9;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
}

.header{
padding:14px;
font-weight:bold;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.container{
padding:14px;
padding-bottom:110px;
}

/* CARD */
.card{
background:#fff;
padding:16px;
border-radius:14px;
margin-bottom:14px;
}

/* TITLE */
.title{
font-weight:bold;
margin-bottom:10px;
}

/* INPUT GRID 🔥 */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input, textarea, select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
}

/* FULL WIDTH */
.full{
grid-column:span 2;
}

/* ITEM */
.item{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #eee;
}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
padding:14px;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
display:flex;
justify-content:space-between;
align-items:center;
}

.footer button{
background:var(--yellow);
border:none;
padding:12px 18px;
border-radius:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🧾 Checkout</div>

<div class="container">

<!-- CUSTOMER -->
<div class="card">
<div class="title">👤 Customer Details</div>

<div class="grid">

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">

<input id="house" placeholder="House No">
<input id="landmark" placeholder="Landmark">

<input id="city" placeholder="City">
<input id="state" placeholder="State">

<input id="pincode" placeholder="Pincode">

<select id="area" class="full">
<option>Delhi</option>
<option>Noida</option>
<option>Ghaziabad</option>
<option>Meerut</option>
</select>

<textarea id="address" class="full" placeholder="Full Address"></textarea>

</div>
</div>

<!-- SUMMARY -->
<div class="card">
<div class="title">🛒 Order Summary</div>
<div id="items"></div>
</div>

<!-- PAYMENT -->
<div class="card">
<div class="title">💳 Payment</div>

<label><input type="radio" name="pay" value="cod" checked> COD</label><br>
<label><input type="radio" name="pay" value="upi"> UPI</label><br>
<label><input type="radio" name="pay" value="card"> Card</label>

</div>

<!-- PRICE -->
<div class="card">

<div class="item">
<span>Subtotal</span>
<span>₹<span id="total">0</span></span>
</div>

<div class="item">
<span>Delivery</span>
<span>₹20</span>
</div>

<div class="item">
<span>Handling Fee</span>
<span>₹3</span>
</div>

<div class="item">
<span>GST (5%)</span>
<span>₹<span id="gst">0</span></span>
</div>

<div class="item">
<b>Total</b>
<b>₹<span id="grand">0</span></b>
</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
<div>₹<b id="finalTotal">0</b></div>
<button onclick="placeOrder()">Place Order</button>
</div>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIXED CART */
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

let total = 0;

/* GROUP */
function groupSummary(){
let summary={ironing:0,dry:0,washing:0};

cart.forEach(i=>{
summary[i.service]+=i.qty;
});

return summary;
}

/* RENDER */
function render(){

total=0;

let html="";

let grouped = groupSummary();

html+=`
<div class="item"><b>Ironing</b><span>${grouped.ironing}</span></div>
<div class="item"><b>Dry Cleaning</b><span>${grouped.dry}</span></div>
<div class="item"><b>Washing</b><span>${grouped.washing}</span></div>
<hr>
`;

cart.forEach(i=>{
let price=i.price*i.qty;
total+=price;

html+=`<div class="item">
<span>${i.name} x ${i.qty}</span>
<span>₹${price}</span>
</div>`;
});

/* GST + TOTAL */
let delivery = 20;
let handling = 3;
let gst = Math.round((total * 5) / 100);

let grand = total + delivery + handling + gst;

document.getElementById("items").innerHTML = html;
document.getElementById("total").innerText = total;
document.getElementById("gst").innerText = gst;
document.getElementById("grand").innerText = grand;
document.getElementById("finalTotal").innerText = grand;

}

render();

/* ORDER */
window.placeOrder = async function(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let house = document.getElementById("house").value;
let city = document.getElementById("city").value;
let pincode = document.getElementById("pincode").value;

if(!name || !phone || !house || !city || !pincode){
alert("Fill required details ❌");
return;
}

let payMethod = document.querySelector('input[name="pay"]:checked').value;

await addDoc(collection(db,"orders"),{
name,phone,house,city,pincode,
items:cart,
paymentMethod:payMethod,
total:document.getElementById("grand").innerText,
status:"new",
time:Date.now()
});

localStorage.removeItem("cart");

alert("Order Placed ✅");

location.href="tracking.html";

};

</script>

</body>
</html>
