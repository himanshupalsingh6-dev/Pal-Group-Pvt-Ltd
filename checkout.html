<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --yellow:#FFD400;
  --bg:#f6f7f9;
}
body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
}

/* HEADER */
.header{
  padding:16px;
  font-size:18px;
  font-weight:bold;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

/* CONTAINER */
.container{padding:16px}

/* CARD */
.card{
  background:#fff;
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
  box-shadow:0 6px 14px rgba(0,0,0,.08);
}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-bottom:8px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  background:var(--yellow);
  border-radius:14px;
  font-weight:bold;
  font-size:16px;
}

/* MAP */
.map{
  width:100%;
  height:200px;
  border-radius:12px;
  margin-top:8px;
}

/* SUCCESS */
.success{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.tick{
  font-size:80px;
  animation:pop 0.5s ease;
}
@keyframes pop{
  from{transform:scale(0)}
  to{transform:scale(1)}
}
</style>
</head>

<body>

<!-- LOGIN CHECK -->
<script>
const user = localStorage.getItem("user");

if(!user){
  alert("⚠️ Please login first to continue checkout");
  location.href = "login.html";
}
</script>

<div class="header">💳 Checkout</div>

<div class="container">

  <!-- ITEMS -->
  <div id="items"></div>

  <!-- BILL -->
  <div class="card">
    <div class="row"><span>Subtotal</span><span>₹<b id="subtotal">0</b></span></div>
    <div class="row"><span>Delivery</span><span>₹12</span></div>
    <div class="row"><span>Handling</span><span>₹3</span></div>
    <hr>
    <div class="row"><b>Total</b><b>₹<span id="total">0</span></b></div>
  </div>

  <!-- ADDRESS -->
  <div class="card">
    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <input id="house" placeholder="House / Flat">
    <input id="street" placeholder="Street / Road">
    <input id="landmark" placeholder="Landmark">
    <input id="city" placeholder="City">
    <input id="state" placeholder="State">

    <button class="btn" onclick="getLocation()">📍 Detect Location</button>

    <iframe id="map" class="map"></iframe>
  </div>

  <button class="btn" onclick="placeOrder()">Place Order</button>

</div>

<!-- SUCCESS -->
<div class="success" id="success">
  <div class="tick">✅</div>
  <h2>Order Placed Successfully</h2>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

/* GROUP */
function groupCart(){
  const g={};
  cart.forEach(i=>{
    if(!g[i.service]) g[i.service]=[];
    g[i.service].push(i);
  });
  return g;
}

/* RENDER */
function render(){
  let subtotal=0;
  items.innerHTML="";

  const grouped = groupCart();

  for(let s in grouped){
    items.innerHTML+=`<div class="card"><b>${s.toUpperCase()}</b>`;

    grouped[s].forEach(i=>{
      subtotal += i.price*i.qty;

      items.innerHTML+=`
        <div class="row">
          <span>${i.name} x${i.qty}</span>
          <span>₹${i.price*i.qty}</span>
        </div>
      `;
    });

    items.innerHTML+=`</div>`;
  }

  subtotalEl.innerText=subtotal;
  totalEl.innerText = subtotal + 12 + 3;
}

/* LOCATION */
let userLocation="";

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    userLocation = lat+","+lng;

    document.getElementById("map").src =
      `https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed`;

  },()=>{
    alert("Location permission denied");
  });
}

/* PLACE ORDER */
function placeOrder(){

  if(!userLocation){
    alert("📍 Please select location first");
    return;
  }

  const order={
    cart,
    total: totalEl.innerText,
    location:userLocation,
    status:"Placed",
    time:Date.now()
  };

  localStorage.setItem("lastOrder",JSON.stringify(order));
  localStorage.removeItem("cart");

  /* SUCCESS ANIMATION */
  document.getElementById("success").style.display="flex";

  setTimeout(()=>{
    location.href="order-tracking.html";
  },3000);
}

/* INIT */
render();
</script>

</body>
</html>
