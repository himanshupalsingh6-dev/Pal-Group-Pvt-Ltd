<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
:root{
--yellow:#FFD400;
--bg:#f6f7f9;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
}

/* HEADER */
.header{
padding:14px;
font-weight:bold;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

/* CONTAINER */
.container{
padding:14px;
padding-bottom:90px;
}

/* CARD */
.card{
background:#fff;
padding:12px;
border-radius:12px;
margin-bottom:12px;
}

/* TITLE */
.title{
font-weight:bold;
margin-bottom:8px;
}

/* INPUT */
input, textarea, select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}

/* ITEM */
.item{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #eee;
}

/* COUPON */
.coupon{
display:flex;
gap:8px;
margin-top:8px;
}
.coupon input{
flex:1;
}
.coupon button{
background:#000;
color:#fff;
border:none;
border-radius:10px;
padding:10px;
}

/* PRICE */
.price-row{
display:flex;
justify-content:space-between;
margin-top:6px;
}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
padding:14px;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
display:flex;
justify-content:space-between;
align-items:center;
}

.footer button{
background:var(--yellow);
border:none;
padding:12px 18px;
border-radius:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🧾 Checkout</div>

<div class="container">

<!-- ADDRESS -->
<div class="card">
<div class="title">📍 Delivery Details</div>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<select id="area">
<option>Delhi</option>
<option>Noida</option>
<option>Ghaziabad</option>
<option>Meerut</option>
</select>

<textarea id="address" placeholder="Full Address"></textarea>

<button onclick="getLocation()">📍 Detect Location</button>

</div>

<!-- CART -->
<div class="card">
<div class="title">🛒 Order Summary</div>
<div id="items"></div>
</div>

<!-- COUPON -->
<div class="card">
<div class="title">🎯 Apply Coupon</div>

<div class="coupon">
<input id="coupon" placeholder="SAVE50">
<button onclick="applyCoupon()">Apply</button>
</div>

</div>

<!-- PRICE -->
<div class="card">

<div class="price-row">
<span>Subtotal</span>
<span>₹<span id="total">0</span></span>
</div>

<div class="price-row">
<span>Delivery</span>
<span>₹20</span>
</div>

<div class="price-row">
<span>Discount</span>
<span>-₹<span id="discount">0</span></span>
</div>

<div class="price-row">
<span>Delivery Time</span>
<span>30 mins ⚡</span>
</div>

<hr>

<div class="price-row">
<b>Total</b>
<b>₹<span id="grand">0</span></b>
</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
<div>₹<b id="finalTotal">0</b></div>
<button onclick="pay()">Pay Now</button>
</div>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let cart = JSON.parse(localStorage.getItem("cart")||[]);

let total=0;
let discount=0;

const itemsBox = document.getElementById("items");

function render(){
total=0;
let html="";

cart.forEach(i=>{
let price=i.price*i.qty;
total+=price;

html+=`<div class="item">
<span>${i.name} x ${i.qty}</span>
<span>₹${price}</span>
</div>`;
});

itemsBox.innerHTML=html;
update();
}

function update(){
let grand = total+20-discount;

document.getElementById("total").innerText=total;
document.getElementById("discount").innerText=discount;
document.getElementById("grand").innerText=grand;
document.getElementById("finalTotal").innerText=grand;
}

render();

/* COUPON */
window.applyCoupon=function(){
let code=document.getElementById("coupon").value;

if(code==="SAVE50"){
discount=50;
alert("Applied ✅");
}else{
discount=0;
alert("Invalid ❌");
}

update();
};

/* LOCATION */
window.getLocation=function(){
navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("address").value =
pos.coords.latitude+","+pos.coords.longitude;
});
};

/* PAYMENT */
window.pay=function(){

let finalAmount=total+20-discount;

let options={
key:"rzp_test_xxxxx",
amount:finalAmount*100,
currency:"INR",
name:"QuickPress",

handler:async function(res){

await addDoc(collection(db,"orders"),{
items:cart,
total:finalAmount,
paymentId:res.razorpay_payment_id,
time:Date.now()
});

localStorage.removeItem("cart");

alert("Success ✅");
location.href="tracking.html";

}
};

new Razorpay(options).open();
};

</script>

</body>
</html>
