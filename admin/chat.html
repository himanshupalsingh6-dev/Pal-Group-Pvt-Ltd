<!-- =========================================================
FILE : admin/chat.html
QUICKPRESS ENTERPRISE LIVE CHAT SYSTEM
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Live Chat
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="./css/global.css"/>
  
<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}


/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
height:calc(100vh - 82px);
display:flex;
}

/* =====================================================
CHAT SIDEBAR
===================================================== */

.chatSidebar{
width:360px;
background:#fff;
border-right:1px solid #E5E7EB;
display:flex;
flex-direction:column;
}

.chatHeader{
padding:24px;
border-bottom:1px solid #E5E7EB;
}

.chatHeader h1{
font-size:34px;
font-weight:900;
margin-bottom:18px;
}

.searchBox{
width:100%;
height:52px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

/* =====================================================
CHAT USERS
===================================================== */

.chatUsers{
flex:1;
overflow:auto;
padding:14px;
}

.chatUser{
display:flex;
align-items:center;
gap:14px;
padding:16px;
border-radius:18px;
cursor:pointer;
margin-bottom:10px;
transition:0.2s;
}

.chatUser:hover{
background:#F3F4F6;
}

.chatUser.active{
background:#111827;
color:#fff;
}

.avatar{
position:relative;
width:56px;
height:56px;
border-radius:18px;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:900;
}

.onlineDot{
position:absolute;
bottom:0;
right:0;
width:14px;
height:14px;
border-radius:50%;
background:#22C55E;
border:2px solid white;
}

.userInfo{
flex:1;
}

.userInfo h3{
font-size:16px;
font-weight:900;
margin-bottom:4px;
}

.userInfo p{
font-size:13px;
opacity:0.7;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:180px;
}

.chatTime{
font-size:11px;
font-weight:700;
opacity:0.6;
}

/* =====================================================
CHAT AREA
===================================================== */

.chatArea{
flex:1;
display:flex;
flex-direction:column;
}

/* =====================================================
CHAT TOP
===================================================== */

.chatTop{
height:82px;
background:#fff;
border-bottom:1px solid #E5E7EB;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
}

.chatUserTop{
display:flex;
align-items:center;
gap:14px;
}

.chatUserTop h2{
font-size:20px;
font-weight:900;
}

.chatUserTop p{
font-size:13px;
color:#16A34A;
margin-top:4px;
}

/* =====================================================
MESSAGES
===================================================== */

.messages{
flex:1;
overflow:auto;
padding:24px;
display:flex;
flex-direction:column;
gap:18px;
}

/* =====================================================
MESSAGE
===================================================== */

.message{
max-width:420px;
padding:16px 18px;
border-radius:20px;
font-size:14px;
line-height:1.6;
position:relative;
}

.adminMessage{
background:#111827;
color:#fff;
align-self:flex-end;
border-bottom-right-radius:6px;
}

.userMessage{
background:#fff;
border:1px solid #E5E7EB;
align-self:flex-start;
border-bottom-left-radius:6px;
}

.msgTime{
font-size:11px;
margin-top:8px;
opacity:0.7;
}

/* =====================================================
INPUT AREA
===================================================== */

.chatInputArea{
padding:18px 24px;
background:#fff;
border-top:1px solid #E5E7EB;
display:flex;
align-items:center;
gap:14px;
}

.chatInput{
flex:1;
height:56px;
border-radius:16px;
border:1px solid #E5E7EB;
padding:0 20px;
font-size:14px;
outline:none;
}

.iconBtn{
width:56px;
height:56px;
border:none;
border-radius:16px;
background:#F3F4F6;
font-size:20px;
cursor:pointer;
}

.sendBtn{
width:120px;
height:56px;
border:none;
border-radius:16px;
background:#111827;
color:#fff;
font-size:14px;
font-weight:800;
cursor:pointer;
}

/* =====================================================
EMPTY
===================================================== */

.emptyState{
flex:1;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.emptyState i{
font-size:70px;
margin-bottom:20px;
color:#D1D5DB;
}

.emptyState h2{
font-size:32px;
font-weight:900;
margin-bottom:12px;
}

.emptyState p{
font-size:15px;
color:#6B7280;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>
<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<!-- =====================================================
LEFT CHAT USERS
===================================================== -->

<div class="chatSidebar">

<div class="chatHeader">

<h1>
Live Chat
</h1>

<input
type="text"
placeholder="Search chat..."
class="searchBox"
id="searchInput"
/>

</div>

<div
class="chatUsers"
id="chatUsers">

<!-- USERS -->

</div>

</div>

<!-- =====================================================
CHAT AREA
===================================================== -->

<div class="chatArea">

<div
id="emptyState"
class="emptyState">

<i class="fa-solid fa-comments"></i>

<h2>
QuickPress Chat
</h2>

<p>
Select a user to start conversation
</p>

</div>

<!-- =====================================================
ACTIVE CHAT
===================================================== -->

<div
id="activeChat"
style="
display:none;
height:100%;
flex-direction:column;
">

<!-- TOP -->

<div class="chatTop">

<div class="chatUserTop">

<div class="avatar"
id="topAvatar">

A

<div class="onlineDot"></div>

</div>

<div>

<h2 id="topName">
User
</h2>

<p>
Online
</p>

</div>

</div>

<div style="
display:flex;
gap:12px;
">

<button class="iconBtn">
📞
</button>

<button class="iconBtn">
📍
</button>

</div>

</div>

<!-- MESSAGES -->

<div
class="messages"
id="messages">

</div>

<!-- INPUT -->

<div class="chatInputArea">

<button class="iconBtn">
📎
</button>

<input
type="text"
placeholder="Type message..."
class="chatInput"
id="messageInput"
/>

<button
class="sendBtn"
id="sendBtn">

Send

</button>

</div>

</div>

</div>

</div>

<script type="module"
src="./js/chat.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>
  
</body>
</html>
