<!-- =========================================================
FILE : admin/offers.html
QUICKPRESS OFFERS PANEL
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Offers
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="./css/global.css"/>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
}
  
.main{
margin-left:240px;
margin-top:82px;
padding:24px;
}

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

.addBtn{
height:52px;
padding:0 22px;
border:none;
border-radius:14px;
background:#111827;
color:#fff;
font-weight:800;
cursor:pointer;
}

.offerGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.offerCard{
background:#fff;
border-radius:24px;
padding:24px;
border:1px solid #E5E7EB;
}

.offerCard h2{
font-size:24px;
font-weight:900;
margin-bottom:10px;
}

.offerCard p{
font-size:14px;
color:#6B7280;
line-height:1.6;
margin-bottom:18px;
}

.coupon{
background:#111827;
color:#fff;
padding:14px;
border-radius:14px;
font-size:18px;
font-weight:900;
text-align:center;
margin-bottom:18px;
}

.offerBtn{
width:100%;
height:48px;
border:none;
border-radius:14px;
background:#2563EB;
color:#fff;
font-size:14px;
font-weight:800;
cursor:pointer;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>

<div class="main">

<div class="pageHeader">

<h1>
Offers
</h1>

<button
class="addBtn"
onclick="addOffer()">

+ Create Offer

</button>

</div>

<div
class="offerGrid"
id="offerGrid">

</div>

</div>

<script type="module"
src="./js/offers.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>

</body>
</html>
