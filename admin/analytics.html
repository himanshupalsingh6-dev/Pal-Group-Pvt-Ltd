<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuickPress Analytics</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F5F7FB;
}

/* SIDEBAR */

.sidebar{
width:270px;
background:#111827;
color:#fff;
padding:24px 18px;
position:fixed;
left:0;
top:0;
height:100%;
overflow:auto;
z-index:999;
}

.logo{
font-size:30px;
font-weight:900;
margin-bottom:40px;
color:#FFD400;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
text-decoration:none;
color:#D1D5DB;
padding:16px;
border-radius:18px;
display:flex;
align-items:center;
gap:14px;
font-size:15px;
font-weight:600;
transition:0.3s;
}

.menu a:hover,
.menu a.active{
background:#1F2937;
color:#fff;
}

/* MAIN */

.main{
margin-left:270px;
padding:24px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.topbar h1{
font-size:34px;
font-weight:900;
}

/* STATS */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
padding:22px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
position:relative;
overflow:hidden;
}

.statCard::after{
content:'';
position:absolute;
right:-30px;
top:-30px;
width:120px;
height:120px;
background:rgba(255,212,0,0.15);
border-radius:50%;
}

.statTitle{
font-size:14px;
color:#6B7280;
margin-bottom:10px;
}

.statValue{
font-size:32px;
font-weight:900;
}

/* CHARTS */

.chartGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.chartCard{
background:#fff;
padding:24px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.chartTitle{
font-size:22px;
font-weight:900;
margin-bottom:20px;
}

/* MOBILE */

.mobileMenuBtn{
display:none;
}

@media(max-width:1000px){

.statsGrid{
grid-template-columns:1fr 1fr;
}

.chartGrid{
grid-template-columns:1fr;
}

}

@media(max-width:768px){

.sidebar{
left:-100%;
transition:0.3s;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
padding:16px;
padding-top:80px;
}

.mobileMenuBtn{
display:flex;
position:fixed;
top:18px;
left:18px;
width:52px;
height:52px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:22px;
align-items:center;
justify-content:center;
z-index:1000;
}

.statsGrid{
grid-template-columns:1fr;
}

.topbar h1{
font-size:26px;
}

}

</style>
</head>
<body>

<!-- MOBILE BUTTON -->

<button class="mobileMenuBtn"
onclick="toggleSidebar()">

<i class="fa-solid fa-bars"></i>

</button>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html">
<i class="fa-solid fa-basket-shopping"></i>
Orders
</a>

<a href="services.html">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="users.html">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="delivery.html">
<i class="fa-solid fa-truck"></i>
Delivery
</a>

<a href="partners.html">
<i class="fa-solid fa-handshake"></i>
Partners
</a>

<a href="riders.html">
<i class="fa-solid fa-motorcycle"></i>
Riders
</a>

<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Payments
</a>

<a href="analytics.html" class="active">
<i class="fa-solid fa-chart-pie"></i>
Analytics
</a>

<a href="offers.html">
<i class="fa-solid fa-tags"></i>
Offers
</a>

<a href="notifications.html">
<i class="fa-solid fa-bell"></i>
Notifications
</a>

<a href="settings.html">
<i class="fa-solid fa-gear"></i>
Settings
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<h1>
Analytics
</h1>

</div>

<!-- STATS -->

<div class="statsGrid">

<div class="statCard">
<div class="statTitle">
Total Orders
</div>
<div class="statValue"
id="totalOrders">
0
</div>
</div>

<div class="statCard">
<div class="statTitle">
Revenue
</div>
<div class="statValue"
id="totalRevenue">
₹0
</div>
</div>

<div class="statCard">
<div class="statTitle">
Users
</div>
<div class="statValue"
id="totalUsers">
0
</div>
</div>

<div class="statCard">
<div class="statTitle">
Delivered Orders
</div>
<div class="statValue"
id="deliveredOrders">
0
</div>
</div>

</div>

<!-- CHARTS -->

<div class="chartGrid">

<div class="chartCard">

<div class="chartTitle">
Revenue Analytics
</div>

<canvas id="revenueChart"></canvas>

</div>

<div class="chartCard">

<div class="chartTitle">
Orders Analytics
</div>

<canvas id="ordersChart"></canvas>

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* LOAD */

async function loadAnalytics(){

const ordersSnap =

await getDocs(
collection(db,"orders")
);

const usersSnap =

await getDocs(
collection(db,"users")
);

let revenue = 0;
let delivered = 0;

ordersSnap.forEach((doc)=>{

const order =
doc.data();

revenue +=
order.total || 0;

if(
order.status ===
"Delivered"
){

delivered++;

}

});

document.getElementById(
"totalOrders"
).innerHTML =
ordersSnap.size;

document.getElementById(
"totalRevenue"
).innerHTML =
"₹"+revenue;

document.getElementById(
"totalUsers"
).innerHTML =
usersSnap.size;

document.getElementById(
"deliveredOrders"
).innerHTML =
delivered;

/* CHART */

new Chart(

document.getElementById(
"revenueChart"
),

{

type:"line",

data:{

labels:[
"Mon",
"Tue",
"Wed",
"Thu",
"Fri",
"Sat",
"Sun"
],

datasets:[{

label:"Revenue",

data:[
1200,
2100,
1800,
3200,
2800,
4500,
3900
],

borderWidth:3,
tension:0.4

}]

}

}

);

/* CHART */

new Chart(

document.getElementById(
"ordersChart"
),

{

type:"bar",

data:{

labels:[
"Pending",
"Pickup",
"Ironing",
"Delivery",
"Delivered"
],

datasets:[{

label:"Orders",

data:[
12,
19,
9,
14,
22
],

borderWidth:1

}]

}

}

);

}

loadAnalytics();

/* SIDEBAR */

window.toggleSidebar =
function(){

document
.querySelector(".sidebar")
.classList.toggle("active");

};

</script>

</body>
</html>
