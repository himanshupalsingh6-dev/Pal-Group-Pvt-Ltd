<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:30px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:17px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* STATS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:12px;
}

.card h1{
margin:0;
font-size:42px;
}

/* CHARTS */

.chartGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
gap:25px;
}

.chartCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.chartCard h2{
margin-top:0;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

<a href="./analytics.html">
<button class="activeBtn">
📈 Analytics
</button>
</a>

<a href="./help.html">
<button>🛠 Help</button>
</a>

<a href="./staff.html">
<button>👨‍💼 Staff</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>📈 Analytics Dashboard</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Revenue</h2>
<h1 id="totalRevenue">₹0</h1>
</div>

<div class="card">
<h2>Total Orders</h2>
<h1 id="totalOrders">0</h1>
</div>

<div class="card">
<h2>Total Users</h2>
<h1 id="totalUsers">0</h1>
</div>

<div class="card">
<h2>Total Partners</h2>
<h1 id="totalPartners">0</h1>
</div>

</div>

<!-- CHARTS -->

<div class="chartGrid">

<div class="chartCard">

<h2>📦 Orders Overview</h2>

<canvas id="ordersChart"></canvas>

</div>

<div class="chartCard">

<h2>💰 Revenue Analytics</h2>

<canvas id="revenueChart"></canvas>

</div>

<div class="chartCard">

<h2>👥 Users Growth</h2>

<canvas id="usersChart"></canvas>

</div>

<div class="chartCard">

<h2>🚚 Riders Performance</h2>

<canvas id="ridersChart"></canvas>

</div>

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {

collection,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalRevenue =
document.getElementById("totalRevenue");

const totalOrders =
document.getElementById("totalOrders");

const totalUsers =
document.getElementById("totalUsers");

const totalPartners =
document.getElementById("totalPartners");

/* CHARTS */

let ordersChart;
let revenueChart;
let usersChart;
let ridersChart;

/* ORDERS */

onSnapshot(collection(db,"orders"),(snapshot)=>{

let revenue = 0;

let pending = 0;
let processing = 0;
let completed = 0;

snapshot.forEach((docSnap)=>{

const o = docSnap.data();

revenue += Number(o.total || 0);

if(o.status === "Pending"){
pending++;
}

if(o.status === "Processing"){
processing++;
}

if(o.status === "Completed"){
completed++;
}

});

totalRevenue.innerHTML =
"₹" + revenue;

totalOrders.innerHTML =
snapshot.size;

/* ORDERS CHART */

const orderCtx =
document.getElementById("ordersChart");

if(ordersChart){
ordersChart.destroy();
}

ordersChart = new Chart(orderCtx,{

type:"doughnut",

data:{

labels:[
"Pending",
"Processing",
"Completed"
],

datasets:[{

data:[
pending,
processing,
completed
]

}]

}

});

/* REVENUE CHART */

const revenueCtx =
document.getElementById("revenueChart");

if(revenueChart){
revenueChart.destroy();
}

revenueChart = new Chart(revenueCtx,{

type:"bar",

data:{

labels:[
"Orders Revenue"
],

datasets:[{

label:"Revenue",

data:[revenue]

}]

}

});

});

/* USERS */

onSnapshot(collection(db,"users"),(snapshot)=>{

totalUsers.innerHTML =
snapshot.size;

const usersCtx =
document.getElementById("usersChart");

if(usersChart){
usersChart.destroy();
}

usersChart = new Chart(usersCtx,{

type:"line",

data:{

labels:["Users"],

datasets:[{

label:"Total Users",

data:[snapshot.size]

}]

}

});

});

/* PARTNERS */

onSnapshot(collection(db,"partners"),(snapshot)=>{

totalPartners.innerHTML =
snapshot.size;

});

/* RIDERS */

onSnapshot(collection(db,"riders"),(snapshot)=>{

let deliveries = 0;

snapshot.forEach((docSnap)=>{

const rider = docSnap.data();

deliveries += Number(
rider.totalDeliveries || 0
);

});

const ridersCtx =
document.getElementById("ridersChart");

if(ridersChart){
ridersChart.destroy();
}

ridersChart = new Chart(ridersCtx,{

type:"polarArea",

data:{

labels:[
"Deliveries"
],

datasets:[{

data:[deliveries]

}]

}

});

});

</script>

</body>
</html>
