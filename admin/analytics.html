FILE : admin/analytics.html
QUICKPRESS ENTERPRISE ANALYTICS PANEL
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Analytics
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}

/* =====================================================
TOPBAR
===================================================== */

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:82px;
background:#fff;
border-bottom:1px solid #E5E7EB;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
z-index:999;
}

.logo{
font-size:32px;
font-weight:900;
}

/* =====================================================
SIDEBAR
===================================================== */

.sidebar{
position:fixed;
top:82px;
left:0;
bottom:0;
width:240px;
background:#fff;
border-right:1px solid #E5E7EB;
padding:18px 10px;
overflow:auto;
}

.sidebarMenu{
display:flex;
flex-direction:column;
gap:6px;
}

.sidebarMenu a{
height:52px;
padding:0 16px;
display:flex;
align-items:center;
gap:14px;
border-radius:14px;
text-decoration:none;
font-size:15px;
font-weight:600;
color:#374151;
}

.sidebarMenu a.active{
background:#111827;
color:#fff;
}

/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
height:calc(100vh - 82px);
overflow:auto;
padding:24px;
}

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:22px;
padding:22px;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:32px;
font-weight:900;
margin-top:10px;
}

/* =====================================================
GRAPH
===================================================== */

.graphGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

.graphCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:24px;
}

.graphCard h2{
font-size:24px;
font-weight:900;
margin-bottom:20px;
}

</style>

</head>

<body>

<!-- =====================================================
TOPBAR
===================================================== -->

<div class="topbar">

<div class="logo">
QuickPress
</div>

</div>

<!-- =====================================================
SIDEBAR
===================================================== -->

<div class="sidebar">

<div class="sidebarMenu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html">
<i class="fa-solid fa-box"></i>
Orders
</a>

<a href="services.html">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="users.html">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="partners.html">
<i class="fa-solid fa-store"></i>
Partners
</a>

<a href="riders.html">
<i class="fa-solid fa-motorcycle"></i>
Riders
</a>

<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Finance
</a>

<a href="settlements.html">
<i class="fa-solid fa-money-bill-transfer"></i>
Settlements
</a>

<a href="analytics.html" class="active">
<i class="fa-solid fa-chart-column"></i>
Analytics
</a>

</div>

</div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<div class="pageHeader">

<h1>
Analytics
</h1>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Orders
</span>

<h2 id="analyticsOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Total Revenue
</span>

<h2 id="analyticsRevenue">
₹0
</h2>

</div>

<div class="statCard">

<span>
Active Users
</span>

<h2 id="analyticsUsers">
0
</h2>

</div>

<div class="statCard">

<span>
Growth Rate
</span>

<h2 id="growthRate">
0%
</h2>

</div>

</div>

<!-- =====================================================
GRAPHS
===================================================== -->

<div class="graphGrid">

<div class="graphCard">

<h2>
Revenue Growth
</h2>

<canvas id="revenueChart"></canvas>

</div>

<div class="graphCard">

<h2>
Orders Analytics
</h2>

<canvas id="ordersChart"></canvas>

</div>

<div class="graphCard">

<h2>
Payment Methods
</h2>

<canvas id="paymentChart"></canvas>

</div>

<div class="graphCard">

<h2>
Cities Analytics
</h2>

<canvas id="cityChart"></canvas>

</div>

</div>

</div>

<script type="module"
src="./js/analytics.js">
</script>

</body>
</html>
