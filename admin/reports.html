<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Reports
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="./css/global.css"/>
  
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
}

main{
margin-left:240px;
margin-top:82px;
padding:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
margin-bottom:24px;
}

.reportGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

.reportCard{
background:#fff;
border-radius:24px;
padding:24px;
border:1px solid #E5E7EB;
}

.reportCard h2{
font-size:24px;
font-weight:900;
margin-bottom:20px;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>

<div class="main">

<div class="pageHeader">

<h1>
Reports
</h1>

</div>

<div class="reportGrid">

<div class="reportCard">

<h2>
Revenue Report
</h2>

<canvas id="revenueReportChart"></canvas>

</div>

<div class="reportCard">

<h2>
Orders Report
</h2>

<canvas id="ordersReportChart"></canvas>

</div>

</div>

</div>

<script type="module"
src="./js/reports.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>
  
</body>
</html>
