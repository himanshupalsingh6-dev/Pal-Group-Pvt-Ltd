<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Admin Panel</title>

<link rel="stylesheet" href="./css/style.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#07142b;
color:#fff;
padding-top:20px;
position:fixed;
height:100%;
overflow:auto;
}

.logo{
font-size:30px;
font-weight:bold;
padding-left:25px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
background:none;
border:none;
color:#fff;
padding:16px 25px;
text-align:left;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:30px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:10px 18px;
border-radius:12px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* CARDS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
}

.card h1{
margin:0;
font-size:35px;
}

/* TABLE */

.tableCard{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:14px;
text-align:left;
}

td{
padding:14px;
border-bottom:1px solid #eee;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:14px;
font-weight:bold;
}

.pending{
background:#ffe08a;
}

.processing{
background:#93c5fd;
}

.completed{
background:#86efac;
}

.btn{
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#3b82f6;
color:#fff;
}

.searchBar{
display:flex;
gap:10px;
margin-bottom:20px;
}

.searchBar input,
.searchBar select{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
width:250px;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
width:80px;
}

.sidebar button{
font-size:12px;
padding:14px 10px;
text-align:center;
}

.logo{
font-size:18px;
padding-left:10px;
}

.main{
margin-left:80px;
padding:15px;
}

}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button class="activeBtn">📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

<a href="./analytics.html">
<button>📈 Analytics</button>
</a>

<a href="./help.html">
<button>🛠 Help</button>
</a>

<a href="./staff.html">
<button>👨‍💼 Staff</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>Admin Dashboard</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Orders</h2>
<h1 id="totalOrders">0</h1>
</div>

<div class="card">
<h2>Total Revenue</h2>
<h1 id="totalRevenue">₹0</h1>
</div>

<div class="card">
<h2>Total Users</h2>
<h1 id="totalUsers">0</h1>
</div>

<div class="card">
<h2>Total Partners</h2>
<h1 id="totalPartners">0</h1>
</div>

<div class="card">
<h2>Total Riders</h2>
<h1 id="totalRiders">0</h1>
</div>

<div class="card">
<h2>Pending Withdraws</h2>
<h1 id="pendingWithdraws">0</h1>
</div>

</div>

<!-- LIVE ORDERS -->

<div class="tableCard">

<h2>📦 Latest Orders</h2>

<div class="searchBar">

<input
type="text"
id="searchInput"
placeholder="Search customer/order"
/>

<select id="statusFilter">

<option value="">All Status</option>
<option value="Pending">Pending</option>
<option value="Processing">Processing</option>
<option value="Completed">Completed</option>

</select>

</div>

<table>

<thead>

<tr>
<th>Customer</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db } from "./firebase.js";

import {
collection,
onSnapshot,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* ELEMENTS */

const totalOrders = document.getElementById("totalOrders");
const totalRevenue = document.getElementById("totalRevenue");
const totalUsers = document.getElementById("totalUsers");
const totalPartners = document.getElementById("totalPartners");
const totalRiders = document.getElementById("totalRiders");
const pendingWithdraws = document.getElementById("pendingWithdraws");

const ordersTable = document.getElementById("ordersTable");

const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");

let allOrders = [];

/* DASHBOARD STATS */

onSnapshot(collection(db,"orders"),(snapshot)=>{

let revenue = 0;

allOrders = [];

snapshot.forEach((docSnap)=>{

const order = docSnap.data();

allOrders.push({
id:docSnap.id,
...order
});

revenue += Number(order.total || 0);

});

totalOrders.innerHTML = snapshot.size;
totalRevenue.innerHTML = "₹" + revenue;

renderOrders();

});

onSnapshot(collection(db,"users"),(snapshot)=>{
totalUsers.innerHTML = snapshot.size;
});

onSnapshot(collection(db,"partners"),(snapshot)=>{
totalPartners.innerHTML = snapshot.size;
});

onSnapshot(collection(db,"riders"),(snapshot)=>{
totalRiders.innerHTML = snapshot.size;
});

onSnapshot(collection(db,"withdraws"),(snapshot)=>{

let count = 0;

snapshot.forEach((d)=>{

const w = d.data();

if(w.status === "pending"){
count++;
}

});

pendingWithdraws.innerHTML = count;

});

/* RENDER ORDERS */

function renderOrders(){

let search = searchInput.value.toLowerCase();
let filter = statusFilter.value;

let html = "";

allOrders.forEach((o)=>{

let customer = (o.name || "").toLowerCase();
let status = o.status || "Pending";

if(
customer.includes(search) &&
(filter === "" || status === filter)
){

html += `

<tr>

<td>${o.name || "User"}</td>

<td>₹${o.total || 0}</td>

<td>
<span class="status ${status.toLowerCase()}">
${status}
</span>
</td>

<td>

<button
class="btn green"
onclick="completeOrder('${o.id}')"
>
Complete
</button>

</td>

</tr>

`;

}

});

ordersTable.innerHTML = html;

}

/* FILTER */

searchInput.addEventListener("input",renderOrders);
statusFilter.addEventListener("change",renderOrders);

/* COMPLETE ORDER */

window.completeOrder = async function(id){

await updateDoc(doc(db,"orders",id),{
status:"Completed"
});

alert("Order Completed ✅");

};

</script>

</body>
</html>
