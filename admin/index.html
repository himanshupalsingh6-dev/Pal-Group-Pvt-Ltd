<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Admin Dashboard
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F4F7FB;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#0F172A;
position:fixed;
left:0;
top:0;
height:100%;
padding:24px 18px;
overflow:auto;
z-index:999;
}

.logo{
font-size:32px;
font-weight:900;
color:#FFD400;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
text-decoration:none;
color:#CBD5E1;
padding:16px;
border-radius:18px;
display:flex;
align-items:center;
gap:14px;
font-size:15px;
font-weight:700;
transition:0.3s;
}

.menu a:hover,
.menu a.active{
background:linear-gradient(
135deg,
#FFD400,
#FFB800
);
color:#111827;
}

/* MAIN */

.main{
margin-left:260px;
padding:24px;
}

/* TOP */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:26px;
gap:18px;
}

.topbar h1{
font-size:36px;
font-weight:900;
}

.searchBox{
flex:1;
height:58px;
border:none;
outline:none;
background:#fff;
border-radius:20px;
padding:0 20px;
font-size:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

/* STATS */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:26px;
}

.statCard{
position:relative;
overflow:hidden;
padding:24px;
border-radius:30px;
color:#fff;
cursor:pointer;
transition:0.3s;
min-height:150px;
}

.statCard:hover{
transform:translateY(-5px);
}

.statCard::before{
content:"";
position:absolute;
width:200px;
height:200px;
background:rgba(255,255,255,0.12);
border-radius:50%;
top:-80px;
right:-80px;
}

.statIcon{
font-size:28px;
margin-bottom:16px;
}

.statTitle{
font-size:15px;
margin-bottom:10px;
font-weight:600;
}

.statValue{
font-size:38px;
font-weight:900;
}

.orders{
background:linear-gradient(
135deg,
#4F46E5,
#7C3AED
);
}

.users{
background:linear-gradient(
135deg,
#0EA5E9,
#06B6D4
);
}

.revenue{
background:linear-gradient(
135deg,
#16A34A,
#22C55E
);
}

.delivery{
background:linear-gradient(
135deg,
#EA580C,
#F97316
);
}

.partner{
background:linear-gradient(
135deg,
#E11D48,
#F43F5E
);
}

.rider{
background:linear-gradient(
135deg,
#7C3AED,
#A855F7
);
}

.withdraw{
background:linear-gradient(
135deg,
#0891B2,
#06B6D4
);
}

.support{
background:linear-gradient(
135deg,
#DC2626,
#EF4444
);
}

/* AREA SECTION */

.section{
margin-bottom:28px;
}

.sectionTitle{
font-size:26px;
font-weight:900;
margin-bottom:18px;
}

/* AREA CARDS */

.areaGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.areaCard{
background:#fff;
padding:24px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.areaTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.areaName{
font-size:18px;
font-weight:800;
}

.areaRevenue{
font-size:28px;
font-weight:900;
color:#111827;
}

.progressBar{
width:100%;
height:14px;
background:#E5E7EB;
border-radius:50px;
overflow:hidden;
margin-top:12px;
}

.progress{
height:100%;
border-radius:50px;
background:linear-gradient(
90deg,
#FFD400,
#F59E0B
);
}

/* GRAPH */

.chartCard{
background:#fff;
padding:24px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* POPUP */

.popup{
position:fixed;
top:0;
right:-450px;
width:420px;
height:100%;
background:#fff;
z-index:9999;
padding:24px;
overflow:auto;
transition:0.4s;
box-shadow:-10px 0 30px rgba(0,0,0,0.08);
}

.popup.active{
right:0;
}

.popupTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.popupTop h2{
font-size:28px;
font-weight:900;
}

.closeBtn{
width:46px;
height:46px;
border:none;
border-radius:14px;
background:#F3F4F6;
font-size:18px;
cursor:pointer;
}

.popupList{
display:flex;
flex-direction:column;
gap:16px;
}

.popupCard{
background:#F9FAFB;
padding:18px;
border-radius:22px;
}

.popupCard h3{
font-size:18px;
margin-bottom:6px;
}

.popupCard p{
font-size:13px;
color:#6B7280;
margin-bottom:5px;
}

/* MOBILE */

.mobileMenuBtn{
display:none;
}

@media(max-width:1200px){

.statsGrid{
grid-template-columns:1fr 1fr;
}

.areaGrid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:768px){

.sidebar{
left:-100%;
transition:0.3s;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
padding:16px;
padding-top:80px;
}

.mobileMenuBtn{
display:flex;
position:fixed;
top:18px;
left:18px;
width:52px;
height:52px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:22px;
align-items:center;
justify-content:center;
z-index:9999;
}

.statsGrid{
grid-template-columns:1fr;
}

.areaGrid{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
align-items:flex-start;
}

.searchBox{
width:100%;
}

.popup{
width:100%;
}

}

</style>
</head>
<body>

<!-- MOBILE -->

<button class="mobileMenuBtn"
onclick="toggleSidebar()">

<i class="fa-solid fa-bars"></i>

</button>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="index.html"
class="active">

<i class="fa-solid fa-chart-line"></i>
Dashboard

</a>

<a href="orders.html">

<i class="fa-solid fa-basket-shopping"></i>
Orders

</a>

<a href="services.html">

<i class="fa-solid fa-shirt"></i>
Services

</a>

<a href="users.html">

<i class="fa-solid fa-users"></i>
Users

</a>

<a href="delivery.html">

<i class="fa-solid fa-truck"></i>
Delivery

</a>

<a href="partners.html">

<i class="fa-solid fa-handshake"></i>
Partners

</a>

<a href="riders.html">

<i class="fa-solid fa-motorcycle"></i>
Riders

</a>

<a href="payments.html">

<i class="fa-solid fa-wallet"></i>
Payments

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOP -->

<div class="topbar">

<h1>
Dashboard
</h1>

<input
type="text"
placeholder="Search..."
class="searchBox"
/>

</div>

<!-- STATS -->

<div class="statsGrid">

<div class="statCard orders"
onclick="openPopup('orders')">

<div class="statIcon">
<i class="fa-solid fa-basket-shopping"></i>
</div>

<div class="statTitle">
Total Orders
</div>

<div class="statValue"
id="totalOrders">
0
</div>

</div>

<div class="statCard users"
onclick="openPopup('users')">

<div class="statIcon">
<i class="fa-solid fa-users"></i>
</div>

<div class="statTitle">
Users
</div>

<div class="statValue"
id="totalUsers">
0
</div>

</div>

<div class="statCard revenue">

<div class="statIcon">
<i class="fa-solid fa-wallet"></i>
</div>

<div class="statTitle">
Revenue
</div>

<div class="statValue"
id="totalRevenue">
₹0
</div>

</div>

<div class="statCard delivery">

<div class="statIcon">
<i class="fa-solid fa-truck"></i>
</div>

<div class="statTitle">
Active Deliveries
</div>

<div class="statValue"
id="activeDeliveries">
0
</div>

</div>

<div class="statCard partner"
onclick="location.href='partners.html'">

<div class="statIcon">
<i class="fa-solid fa-handshake"></i>
</div>

<div class="statTitle">
Partners
</div>

<div class="statValue"
id="totalPartners">
0
</div>

</div>

<div class="statCard rider"
onclick="location.href='riders.html'">

<div class="statIcon">
<i class="fa-solid fa-motorcycle"></i>
</div>

<div class="statTitle">
Riders
</div>

<div class="statValue"
id="totalRiders">
0
</div>

</div>

<div class="statCard withdraw">

<div class="statIcon">
<i class="fa-solid fa-money-bill-transfer"></i>
</div>

<div class="statTitle">
Withdrawals
</div>

<div class="statValue">
₹0
</div>

</div>

<div class="statCard support">

<div class="statIcon">
<i class="fa-solid fa-headset"></i>
</div>

<div class="statTitle">
Support Tickets
</div>

<div class="statValue">
0
</div>

</div>

</div>

<!-- AREA REVENUE -->

<div class="section">

<div class="sectionTitle">
Area Wise Revenue
</div>

<div class="areaGrid"
id="areaGrid">

</div>

</div>

<!-- GRAPH -->

<div class="section">

<div class="sectionTitle">
Revenue Progress
</div>

<div class="chartCard">

<canvas id="revenueChart"></canvas>

</div>

</div>

</div>

<!-- POPUP -->

<div class="popup"
id="popup">

<div class="popupTop">

<h2 id="popupTitle">
Data
</h2>

<button
class="closeBtn"
onclick="closePopup()">

<i class="fa-solid fa-xmark"></i>

</button>

</div>

<div class="popupList"
id="popupList">

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* LOAD */

async function loadDashboard(){

/* COLLECTIONS */

const ordersSnap =
await getDocs(
collection(db,"orders")
);

const usersSnap =
await getDocs(
collection(db,"users")
);

const partnersSnap =
await getDocs(
collection(db,"partners")
);

const ridersSnap =
await getDocs(
collection(db,"riders")
);

/* COUNTS */

document.getElementById(
"totalOrders"
).innerHTML =
ordersSnap.size;

document.getElementById(
"totalUsers"
).innerHTML =
usersSnap.size;

document.getElementById(
"totalPartners"
).innerHTML =
partnersSnap.size;

document.getElementById(
"totalRiders"
).innerHTML =
ridersSnap.size;

/* REVENUE */

let revenue = 0;
let active = 0;

const areaRevenue = {};

ordersSnap.forEach((doc)=>{

const order =
doc.data();

revenue +=
order.total || 0;

if(
order.status !== "Delivered"
){

active++;

}

const city =
order.city || "Unknown";

if(
!areaRevenue[city]
){

areaRevenue[city] = 0;

}

areaRevenue[city] +=
order.total || 0;

});

/* SET */

document.getElementById(
"totalRevenue"
).innerHTML =
"₹"+revenue;

document.getElementById(
"activeDeliveries"
).innerHTML =
active;

/* AREA CARDS */

const areaGrid =
document.getElementById(
"areaGrid"
);

let areaHTML = "";

Object.keys(areaRevenue)
.forEach((city)=>{

const amount =
areaRevenue[city];

const percent =
Math.min(
100,
amount / 1000
);

areaHTML += `

<div class="areaCard">

<div class="areaTop">

<div class="areaName">
${city}
</div>

<div class="areaRevenue">
₹${amount}
</div>

</div>

<div class="progressBar">

<div class="progress"
style="
width:${percent}%;
">
</div>

</div>

</div>

`;

});

areaGrid.innerHTML =
areaHTML;

/* GRAPH */

const ctx =
document.getElementById(
"revenueChart"
);

new Chart(ctx,{

type:"line",

data:{

labels:Object.keys(areaRevenue),

datasets:[{

label:"Revenue",

data:Object.values(
areaRevenue
),

borderWidth:4,
tension:0.4,
fill:true

}]

},

options:{

responsive:true

}

});

/* POPUP DATA */

window.ordersData = [];
window.usersData = [];

ordersSnap.forEach((doc)=>{

window.ordersData.push(
doc.data()
);

});

usersSnap.forEach((doc)=>{

window.usersData.push(
doc.data()
);

});

}

loadDashboard();

/* POPUP */

window.openPopup =
function(type){

const popup =
document.getElementById(
"popup"
);

const popupTitle =
document.getElementById(
"popupTitle"
);

const popupList =
document.getElementById(
"popupList"
);

popup.classList.add(
"active"
);

let html = "";

/* ORDERS */

if(type==="orders"){

popupTitle.innerHTML =
"Orders";

window.ordersData
.forEach((order)=>{

html += `

<div class="popupCard">

<h3>
${order.name || ""}
</h3>

<p>
${order.phone || ""}
</p>

<p>
${order.city || ""}
</p>

<p>
₹${order.total || 0}
</p>

</div>

`;

});

}

/* USERS */

if(type==="users"){

popupTitle.innerHTML =
"Users";

window.usersData
.forEach((user)=>{

html += `

<div class="popupCard">

<h3>
${user.name || ""}
</h3>

<p>
${user.phone || ""}
</p>

<p>
${user.city || ""}
</p>

</div>

`;

});

}

popupList.innerHTML =
html;

};

/* CLOSE */

window.closePopup =
function(){

document
.getElementById(
"popup"
)
.classList.remove(
"active"
);

};

/* SIDEBAR */

window.toggleSidebar =
function(){

document
.querySelector(".sidebar")
.classList.toggle("active");

};

</script>

</body>
</html>
