<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
onSnapshot,
query,
orderBy

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* =====================================================
ELEMENTS
===================================================== */

const ordersContainer =
document.getElementById(
"ordersContainer"
);

const totalOrders =
document.getElementById(
"totalOrders"
);

const pendingOrders =
document.getElementById(
"pendingOrders"
);

const preparingOrders =
document.getElementById(
"preparingOrders"
);

const deliveryOrders =
document.getElementById(
"deliveryOrders"
);

const deliveredOrders =
document.getElementById(
"deliveredOrders"
);

const revenue =
document.getElementById(
"revenue"
);

const cityFilter =
document.getElementById(
"cityFilter"
);

const searchInput =
document.getElementById(
"searchInput"
);

const statusFilter =
document.getElementById(
"statusFilter"
);

/* =====================================================
DATA
===================================================== */

let allOrders = [];

/* =====================================================
REALTIME
===================================================== */

onSnapshot(

query(
collection(db,"orders"),
orderBy("createdAt","desc")
),

(snapshot)=>{

allOrders = [];

let totalRevenue = 0;

let pending = 0;
let preparing = 0;
let delivery = 0;
let delivered = 0;

/* ========================================= */

ordersContainer.innerHTML = "";

snapshot.forEach((doc)=>{

const order = doc.data();

allOrders.push(order);

/* ========================================= */

totalRevenue +=
Number(order.total || 0);

/* ========================================= */

if(order.status === "Pending"){

pending++;

}

if(order.status === "Preparing"){

preparing++;

}

if(order.status === "Out For Delivery"){

delivery++;

}

if(order.status === "Delivered"){

delivered++;

}

/* ========================================= */

const row = `

<div class="orderRow">

<div>

#${doc.id.slice(0,6)}

</div>

<div class="customer">

<div class="customerAvatar">

${order.name?.charAt(0) || "U"}

</div>

<div>

<b>

${order.name || "Customer"}

</b>

<br>

<small>

${order.city || ""}

</small>

</div>

</div>

<div>

${order.items?.length || 0}
Items

</div>

<div>

₹${order.total || 0}

</div>

<div>

${order.paymentMethod || "COD"}

</div>

<div>

<div class="status ${

order.status === "Delivered"

?

"delivered"

:

order.status ===
"Out For Delivery"

?

"delivery"

:

"pending"

}">

${order.status || "Pending"}

</div>

</div>

<div>

${order.createdAt?.seconds

?

new Date(
order.createdAt.seconds * 1000
).toLocaleTimeString()

:

"--"

}

</div>

<div>

<button
class="actionBtn">

View

</button>

</div>

</div>

`;

ordersContainer.innerHTML += row;

});

/* ========================================= */

totalOrders.innerHTML =
snapshot.size;

pendingOrders.innerHTML =
pending;

preparingOrders.innerHTML =
preparing;

deliveryOrders.innerHTML =
delivery;

deliveredOrders.innerHTML =
delivered;

revenue.innerHTML =
`₹${totalRevenue}`;

/* =========================================
GRAPH
========================================= */

loadChart();

}

/* END */

);

/* =====================================================
GRAPH
===================================================== */

function loadChart(){

const ctx =
document.getElementById(
"revenueChart"
);

new Chart(ctx, {

type:'line',

data:{

labels:[
'Mon',
'Tue',
'Wed',
'Thu',
'Fri',
'Sat',
'Sun'
],

datasets:[{

label:'Revenue',

data:[
1200,
2500,
1800,
4200,
5100,
6600,
8200
],

borderWidth:4,
fill:true,
tension:0.4

}]

},

options:{
responsive:true
}

});

}

/* =====================================================
EXPORT
===================================================== */

window.exportOrders =
()=>{

let csv =
"Customer,Amount,City,Status\n";

allOrders.forEach((order)=>{

csv += `

${order.name},
${order.total},
${order.city},
${order.status}

`;

});

const blob =
new Blob([csv],{
type:"text/csv"
});

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"orders.csv";

a.click();

};

</script>
