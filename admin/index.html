<!-- =========================================================
FILE : admin/index.html
QUICKPRESS ENTERPRISE DASHBOARD
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Enterprise Dashboard
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
 
<link
rel="stylesheet"
href="./css/global.css"/>

  
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
  <body>
    <div id="topbar"></div>

<div id="sidebar"></div>



<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<div class="pageHeader">

<h1>
Dashboard
</h1>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<div class="statTop">

<div class="statIcon blue">

<i class="fa-solid fa-bag-shopping"></i>

</div>

<div>

<span>Total Orders</span>

<h2 id="totalOrders">
0
</h2>

</div>

</div>

</div>

<div class="statCard">

<div class="statTop">

<div class="statIcon yellow">

<i class="fa-regular fa-clock"></i>

</div>

<div>

<span>Pending</span>

<h2 id="pendingOrders">
0
</h2>

</div>

</div>

</div>

<div class="statCard">

<div class="statTop">

<div class="statIcon purple">

<i class="fa-solid fa-box"></i>

</div>

<div>

<span>Preparing</span>

<h2 id="preparingOrders">
0
</h2>

</div>

</div>

</div>

<div class="statCard">

<div class="statTop">

<div class="statIcon orange">

<i class="fa-solid fa-motorcycle"></i>

</div>

<div>

<span>On The Way</span>

<h2 id="deliveryOrders">
0
</h2>

</div>

</div>

</div>

<div class="statCard">

<div class="statTop">

<div class="statIcon green">

<i class="fa-solid fa-circle-check"></i>

</div>

<div>

<span>Delivered</span>

<h2 id="deliveredOrders">
0
</h2>

</div>

</div>

</div>

<div class="statCard">

<div class="statTop">

<div class="statIcon red">

<i class="fa-solid fa-wallet"></i>

</div>

<div>

<span>Revenue</span>

<h2 id="revenue">
₹0
</h2>

</div>

</div>

</div>

</div>

<!-- =====================================================
FILTER BAR
===================================================== -->

<div class="filterBar">

<div class="leftFilters">

<input
type="text"
placeholder="Search Order / Customer / Mobile"
class="searchBox"
id="searchInput"
/>

<select
class="selectBox"
id="cityFilter">

<option value="All">
All Cities
</option>

</select>

<select
class="selectBox"
id="statusFilter">

<option value="All">
All Status
</option>

<option value="Pending">
Pending
</option>

<option value="Preparing">
Preparing
</option>

<option value="Out For Delivery">
Out For Delivery
</option>

<option value="Delivered">
Delivered
</option>

</select>

</div>

<div class="leftFilters">

<button
class="exportBtn"
onclick="exportOrders()">

Export CSV

</button>

</div>

</div>

<!-- =====================================================
LIVE ORDERS
===================================================== -->

<div class="ordersWrap">

<div class="tableHead">

<div>ID</div>
<div>Customer</div>
<div>Items</div>
<div>Amount</div>
<div>Payment</div>
<div>Status</div>
<div>Time</div>
<div>Action</div>

</div>

<div id="ordersContainer">

</div>

</div>

<!-- =====================================================
GRAPH
===================================================== -->

<div class="graphWrap">

<div class="graphTop">

<h2>
Revenue Growth
</h2>

</div>

<canvas id="revenueChart"></canvas>

</div>

</div>

<script type="module"
src="./js/dashboard.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>

</body>
</html>
