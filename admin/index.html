<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Dashboard
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#EEF2FF;
display:flex;
overflow-x:hidden;
}

/* =====================================================
SIDEBAR
===================================================== */

.sidebar{
width:260px;
height:100vh;
background:#081028;
position:fixed;
left:0;
top:0;
padding:20px;
overflow:auto;
}

.logo{
font-size:34px;
font-weight:900;
color:#fff;
margin-bottom:35px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
height:58px;
display:flex;
align-items:center;
gap:14px;
padding:0 18px;
border-radius:18px;
text-decoration:none;
font-size:15px;
font-weight:700;
color:#fff;
transition:0.3s;
}

.menu a.active{
background:#1D4ED8;
}

.menu a:hover{
background:#111C44;
}

/* =====================================================
MAIN
===================================================== */

.main{
margin-left:260px;
width:calc(100% - 260px);
padding:24px;
}

/* =====================================================
TOPBAR
===================================================== */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
gap:18px;
flex-wrap:wrap;
}

.topLeft h1{
font-size:44px;
font-weight:900;
}

.topLeft p{
font-size:15px;
color:#6B7280;
margin-top:8px;
}

.citySelect{
height:58px;
padding:0 18px;
border:none;
outline:none;
border-radius:18px;
background:#fff;
font-size:14px;
font-weight:700;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
padding:24px;
border-radius:30px;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
position:relative;
overflow:hidden;
}

.statCard:hover{
transform:translateY(-4px);
}

.statCard::after{
content:'';
position:absolute;
width:130px;
height:130px;
background:#EEF2FF;
border-radius:50%;
right:-40px;
top:-40px;
}

.statTop{
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
z-index:2;
}

.statTop i{
font-size:26px;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:38px;
font-weight:900;
margin-top:18px;
position:relative;
z-index:2;
}

/* =====================================================
GRAPH
===================================================== */

.graphCard{
background:#fff;
padding:24px;
border-radius:30px;
margin-bottom:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.graphHead{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.graphHead h2{
font-size:30px;
font-weight:900;
}

.liveBadge{
padding:10px 16px;
border-radius:16px;
background:#DCFCE7;
color:#166534;
font-size:13px;
font-weight:900;
}

/* =====================================================
LIVE ACTIVITY
===================================================== */

.activityCard{
background:#fff;
padding:24px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.activityHead{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.activityHead h2{
font-size:30px;
font-weight:900;
}

.activityGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

.activityItem{
background:#F9FAFB;
padding:20px;
border-radius:24px;
cursor:pointer;
transition:0.3s;
border:2px solid transparent;
}

.activityItem:hover{
border-color:#2563EB;
transform:translateY(-3px);
}

.activityTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.activityLeft{
display:flex;
align-items:center;
gap:14px;
}

.activityIcon{
width:60px;
height:60px;
border-radius:20px;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

.activityLeft h4{
font-size:16px;
font-weight:900;
}

.activityLeft p{
font-size:12px;
color:#6B7280;
margin-top:4px;
}

.status{
padding:8px 14px;
border-radius:14px;
font-size:12px;
font-weight:900;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

.delivery{
background:#DBEAFE;
color:#1D4ED8;
}

.delivered{
background:#DCFCE7;
color:#166534;
}

.summary{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:16px;
}

.summaryBox{
background:#fff;
padding:12px;
border-radius:16px;
}

.summaryBox span{
font-size:11px;
color:#6B7280;
}

.summaryBox h5{
font-size:16px;
font-weight:900;
margin-top:6px;
}

/* =====================================================
RESPONSIVE
===================================================== */

@media(max-width:1600px){

.statsGrid{
grid-template-columns:repeat(3,1fr);
}

.activityGrid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

===================================================== -->

</div>

<div

</span>

</div>

₹0
</h2>

</div>

<div
class="statCard"
onclick="window.location='payments.html'">

<span>
Admin Profit
</span>

<i class="fa-solid fa-money-bill-trend-up"></i>

</div>

<!-- =====================================================

===================================================== -->

<div class="graphCard">

<div class="graphHead">

</div>

<!-- =====================================================
LIVE ACTIVITY
===================================================== -->

<div class="activityCard">

<div class="activityHead">

</h2>

</div>

<div
class="activityGrid"
id="activityFeed">

</div>

</div>

</div>

<script type="module"
src="./js/dashboard.js">
</script>

</body>
</html>
