<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link
rel="stylesheet"
href="./css/style.css"
>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button class="activeBtn">📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

<a href="./analytics.html">
<button>📈 Analytics</button>
</a>

<a href="./help.html">
<button>🛠 Help</button>
</a>

<a href="./staff.html">
<button>👨‍💼 Staff</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>⚡ Advanced Admin Dashboard</h1>

<div class="adminBox">
👤 Super Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Orders</h2>
<h1 id="totalOrders">0</h1>
</div>

<div class="card">
<h2>Total Revenue</h2>
<h1 id="totalRevenue">₹0</h1>
</div>

<div class="card">
<h2>Total Users</h2>
<h1 id="totalUsers">0</h1>
</div>

<div class="card">
<h2>Total Partners</h2>
<h1 id="totalPartners">0</h1>
</div>

<div class="card">
<h2>Total Riders</h2>
<h1 id="totalRiders">0</h1>
</div>

<div class="card">
<h2>Pending Withdraws</h2>
<h1 id="pendingWithdraws">0</h1>
</div>

</div>

<!-- CHARTS -->

<div class="chartGrid">

<div class="chartCard">
<h2>📦 Orders Analytics</h2>
<canvas id="ordersChart"></canvas>
</div>

<div class="chartCard">
<h2>💰 Revenue Analytics</h2>
<canvas id="revenueChart"></canvas>
</div>

</div>

<!-- SEARCH -->

<div class="searchBox">

<div class="searchGrid">

<input
id="searchInput"
type="text"
placeholder="Search customer..."
>

<select id="statusFilter">
<option value="all">All Status</option>
<option value="Pending">Pending</option>
<option value="Processing">Processing</option>
<option value="Completed">Completed</option>
</select>

</div>

</div>

<!-- LIVE ORDERS -->

<div class="tableCard">

<h2>📦 Latest Live Orders</h2>

<table>

<thead>

<tr>
<th>Customer</th>
<th>Phone</th>
<th>Total</th>
<th>Status</th>
<th>Partner</th>
<th>Rider</th>
<th>Action</th>
</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
onSnapshot,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalOrders =
document.getElementById("totalOrders");

const totalRevenue =
document.getElementById("totalRevenue");

const totalUsers =
document.getElementById("totalUsers");

const totalPartners =
document.getElementById("totalPartners");

const totalRiders =
document.getElementById("totalRiders");

const pendingWithdraws =
document.getElementById("pendingWithdraws");

const ordersTable =
document.getElementById("ordersTable");

const searchInput =
document.getElementById("searchInput");

const statusFilter =
document.getElementById("statusFilter");

let allOrders = [];

let ordersChart;
let revenueChart;

/* ORDERS */

onSnapshot(collection(db,"orders"),(snapshot)=>{

let revenue = 0;

let pending = 0;
let processing = 0;
let completed = 0;

allOrders = [];

snapshot.forEach((docSnap)=>{

const o = docSnap.data();

allOrders.push({
id:docSnap.id,
...o
});

revenue += Number(o.total || 0);

if(o.status === "Pending"){
pending++;
}

if(o.status === "Processing"){
processing++;
}

if(o.status === "Completed"){
completed++;
}

});

totalOrders.innerHTML =
snapshot.size;

totalRevenue.innerHTML =
"₹" + revenue;

renderOrders();

/* ORDERS CHART */

const orderCtx =
document.getElementById("ordersChart");

if(ordersChart){
ordersChart.destroy();
}

ordersChart = new Chart(orderCtx,{

type:"doughnut",

data:{

labels:[
"Pending",
"Processing",
"Completed"
],

datasets:[{

data:[
pending,
processing,
completed
]

}]

}

});

/* REVENUE */

const revenueCtx =
document.getElementById("revenueChart");

if(revenueChart){
revenueChart.destroy();
}

revenueChart = new Chart(revenueCtx,{

type:"bar",

data:{

labels:["Revenue"],

datasets:[{
label:"Total Revenue",
data:[revenue]

}]

}

});

});

/* USERS */

onSnapshot(collection(db,"users"),(snapshot)=>{

totalUsers.innerHTML =
snapshot.size;

});

/* PARTNERS */

onSnapshot(collection(db,"partners"),(snapshot)=>{

totalPartners.innerHTML =
snapshot.size;

});

/* RIDERS */

onSnapshot(collection(db,"riders"),(snapshot)=>{

totalRiders.innerHTML =
snapshot.size;

});

/* WITHDRAWS */

onSnapshot(collection(db,"withdraws"),(snapshot)=>{

let pending = 0;

snapshot.forEach((docSnap)=>{

const w = docSnap.data();

if(w.status === "pending"){
pending++;
}

});

pendingWithdraws.innerHTML = pending;

});

/* RENDER ORDERS */

function renderOrders(){

let keyword =
searchInput.value.toLowerCase();

let status =
statusFilter.value;

let html = "";

let filtered = allOrders.filter((o)=>{

let matchSearch =
(o.name || "")
.toLowerCase()
.includes(keyword);

let matchStatus =
status === "all"
? true
: o.status === status;

return matchSearch && matchStatus;

});

filtered.reverse().forEach((o)=>{

html += `

<tr>

<td>${o.name || "-"}</td>

<td>${o.phone || "-"}</td>

<td>₹${o.total || 0}</td>

<td class="${(o.status || '').toLowerCase()}">
${o.status || "-"}
</td>

<td>${o.partnerName || "-"}</td>

<td>${o.riderName || "-"}</td>

<td>

<button
class="btn green"
onclick="completeOrder('${o.id}')"
>
Complete
</button>

</td>

</tr>

`;

});

ordersTable.innerHTML = html;

}

searchInput.addEventListener(
"input",
renderOrders
);

statusFilter.addEventListener(
"change",
renderOrders
);

/* COMPLETE */

window.completeOrder =
async function(id){

await updateDoc(
doc(db,"orders",id),
{
status:"Completed"
}
);

alert("Order Completed ✅");

}

</script>

</body>
</html>
```
