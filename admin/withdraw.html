<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuickPress Withdraw</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#07142b;
position:fixed;
height:100%;
overflow:auto;
color:#fff;
}

.logo{
font-size:30px;
font-weight:bold;
padding:25px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:25px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* STATS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
color:#666;
}

.card h1{
margin:0;
font-size:38px;
}

/* FILTER */

.filterCard{
background:#fff;
padding:25px;
border-radius:22px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.filterGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
width:100%;
box-sizing:border-box;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#2563eb;
color:#fff;
}

/* STATUS */

.pending{
color:#d97706;
font-weight:bold;
}

.approved{
color:#16a34a;
font-weight:bold;
}

.rejected{
color:#dc2626;
font-weight:bold;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
overflow:auto;
}

.modalContent{
background:#fff;
margin:30px auto;
padding:25px;
width:90%;
max-width:900px;
border-radius:25px;
}

.closeBtn{
float:right;
font-size:25px;
cursor:pointer;
}

.detailGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:25px;
}

.detailCard{
background:#f7f7f7;
padding:18px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button class="activeBtn">
💳 Withdraw
</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
💳 Advanced Withdraw Management
</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Requests</h2>
<h1 id="totalRequests">0</h1>
</div>

<div class="card">
<h2>Pending</h2>
<h1 id="pendingRequests">0</h1>
</div>

<div class="card">
<h2>Approved</h2>
<h1 id="approvedRequests">0</h1>
</div>

<div class="card">
<h2>Total Amount</h2>
<h1 id="totalAmount">₹0</h1>
</div>

</div>

<!-- FILTER -->

<div class="filterCard">

<div class="filterGrid">

<input
type="text"
id="searchInput"
placeholder="Search withdraw..."
>

<select id="statusFilter">

<option value="all">
All Status
</option>

<option value="pending">
Pending
</option>

<option value="approved">
Approved
</option>

<option value="rejected">
Rejected
</option>

</select>

</div>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>
All Withdraw Requests
</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Role</th>
<th>Amount</th>
<th>UPI</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody id="withdrawTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="withdrawModal">

<div class="modalContent">

<span
class="closeBtn"
onclick="closeWithdrawModal()"
>
✖
</span>

<h1>
💳 Withdraw Full Details
</h1>

<div
class="detailGrid"
id="withdrawDetails"
>

</div>

<br><br>

<button
class="btn green"
onclick="approveWithdraw()"
>
Approve
</button>

<button
class="btn red"
onclick="rejectWithdraw()"
>
Reject
</button>

</div>

</div>

<script type="module">

import {

initializeApp

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
increment,
addDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBBaslH5QsahoyESYpo1nVtlYIUYfVJ2d4",

authDomain:
"quickpress-offical.firebaseapp.com",

projectId:
"quickpress-offical",

storageBucket:
"quickpress-offical.firebasestorage.app",

messagingSenderId:
"939286557961",

appId:
"1:939286557961:web:ddac64f197e14877718fd8"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* ELEMENTS */

const totalRequests =
document.getElementById("totalRequests");

const pendingRequests =
document.getElementById("pendingRequests");

const approvedRequests =
document.getElementById("approvedRequests");

const totalAmount =
document.getElementById("totalAmount");

const withdrawTable =
document.getElementById("withdrawTable");

const searchInput =
document.getElementById("searchInput");

const statusFilter =
document.getElementById("statusFilter");

let allWithdraws = [];
let currentWithdraw = null;

/* LIVE */

onSnapshot(
collection(db,"withdraws"),
(snapshot)=>{

let pending = 0;
let approved = 0;
let amount = 0;

allWithdraws = [];

snapshot.forEach((docSnap)=>{

const w = docSnap.data();

allWithdraws.push({
id:docSnap.id,
...w
});

amount +=
Number(w.amount || 0);

if(w.status === "pending"){
pending++;
}

if(w.status === "approved"){
approved++;
}

});

totalRequests.innerHTML =
snapshot.size;

pendingRequests.innerHTML =
pending;

approvedRequests.innerHTML =
approved;

totalAmount.innerHTML =
"₹" + amount;

renderWithdraws();

});

/* RENDER */

function renderWithdraws(){

let keyword =
searchInput.value.toLowerCase();

let status =
statusFilter.value;

let html = "";

let filtered = allWithdraws.filter((w)=>{

let matchSearch =

(w.name || "")
.toLowerCase()
.includes(keyword)

||

(w.upi || "")
.toLowerCase()
.includes(keyword);

let matchStatus =

status === "all"
? true
: w.status === status;

return matchSearch && matchStatus;

});

filtered.reverse().forEach((w)=>{

let date =
new Date(
w.createdAt || Date.now()
).toLocaleString();

html += `

<tr>

<td>${w.name || "-"}</td>

<td>${w.role || "-"}</td>

<td>₹${w.amount || 0}</td>

<td>${w.upi || "-"}</td>

<td class="${w.status}">
${w.status}
</td>

<td>${date}</td>

<td>

<button
class="btn blue"
onclick='viewWithdraw(${JSON.stringify(w)})'
>
View
</button>

</td>

</tr>

`;

});

withdrawTable.innerHTML = html;

}

searchInput.addEventListener(
"input",
renderWithdraws
);

statusFilter.addEventListener(
"change",
renderWithdraws
);

/* VIEW */

window.viewWithdraw =
function(w){

currentWithdraw = w;

document.getElementById(
"withdrawModal"
).style.display = "block";

let date =
new Date(
w.createdAt || Date.now()
).toLocaleString();

document.getElementById(
"withdrawDetails"
).innerHTML = `

<div class="detailCard">
<b>Name</b><br>
${w.name || "-"}
</div>

<div class="detailCard">
<b>Role</b><br>
${w.role || "-"}
</div>

<div class="detailCard">
<b>Amount</b><br>
₹${w.amount || 0}
</div>

<div class="detailCard">
<b>UPI ID</b><br>
${w.upi || "-"}
</div>

<div class="detailCard">
<b>Status</b><br>
${w.status || "-"}
</div>

<div class="detailCard">
<b>Request Date</b><br>
${date}
</div>

`;

}

/* APPROVE */

window.approveWithdraw =
async function(){

if(!currentWithdraw){
return;
}

await updateDoc(
doc(db,"withdraws",currentWithdraw.id),
{
status:"approved"
}
);

/* WALLET UPDATE */

await updateDoc(
doc(db,"wallets",currentWithdraw.uid),
{
balance:increment(
-currentWithdraw.amount
)
}
);

/* TRANSACTION */

await addDoc(
collection(db,"walletTransactions"),
{

uid:currentWithdraw.uid,

amount:currentWithdraw.amount,

type:"debit",

note:"Withdraw Approved",

createdAt:Date.now()

}
);

alert("Withdraw Approved ✅");

closeWithdrawModal();

}

/* REJECT */

window.rejectWithdraw =
async function(){

if(!currentWithdraw){
return;
}

await updateDoc(
doc(db,"withdraws",currentWithdraw.id),
{
status:"rejected"
}
);

alert("Withdraw Rejected ❌");

closeWithdrawModal();

}

/* CLOSE */

window.closeWithdrawModal =
function(){

document.getElementById(
"withdrawModal"
).style.display = "none";

}

</script>

</body>
</html>
