<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Withdraw</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:30px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:17px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:12px;
}

.card h1{
margin:0;
font-size:42px;
}

/* FILTER */

.filterBox{
background:#fff;
padding:20px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.filterGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#3b82f6;
color:#fff;
}

/* STATUS */

.pending{
color:#d97706;
font-weight:bold;
}

.approved{
color:#16a34a;
font-weight:bold;
}

.rejected{
color:#dc2626;
font-weight:bold;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button class="activeBtn">
💳 Withdraw
</button>
</a>

<a href="./analytics.html">
<button>📈 Analytics</button>
</a>

<a href="./help.html">
<button>🛠 Help</button>
</a>

<a href="./staff.html">
<button>👨‍💼 Staff</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>💳 Withdraw Management</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Requests</h2>
<h1 id="totalRequests">0</h1>
</div>

<div class="card">
<h2>Pending</h2>
<h1 id="pendingCount">0</h1>
</div>

<div class="card">
<h2>Approved</h2>
<h1 id="approvedCount">0</h1>
</div>

<div class="card">
<h2>Total Amount</h2>
<h1 id="totalAmount">₹0</h1>
</div>

</div>

<!-- FILTER -->

<div class="filterBox">

<div class="filterGrid">

<input
type="text"
id="searchInput"
placeholder="Search user..."
>

<select id="statusFilter">

<option value="all">
All Status
</option>

<option value="pending">
Pending
</option>

<option value="approved">
Approved
</option>

<option value="rejected">
Rejected
</option>

</select>

</div>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>Withdraw Requests</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Phone</th>
<th>Role</th>
<th>Amount</th>
<th>UPI</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="withdrawTable">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {

collection,
onSnapshot,
doc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalRequests =
document.getElementById("totalRequests");

const pendingCount =
document.getElementById("pendingCount");

const approvedCount =
document.getElementById("approvedCount");

const totalAmount =
document.getElementById("totalAmount");

const withdrawTable =
document.getElementById("withdrawTable");

const searchInput =
document.getElementById("searchInput");

const statusFilter =
document.getElementById("statusFilter");

let allWithdraws = [];

onSnapshot(collection(db,"withdraws"),(snapshot)=>{

let pending = 0;
let approved = 0;
let amount = 0;

allWithdraws = [];

snapshot.forEach((docSnap)=>{

const w = docSnap.data();

allWithdraws.push({
id:docSnap.id,
...w
});

amount += Number(w.amount || 0);

if(w.status === "pending"){
pending++;
}

if(w.status === "approved"){
approved++;
}

});

totalRequests.innerHTML =
snapshot.size;

pendingCount.innerHTML =
pending;

approvedCount.innerHTML =
approved;

totalAmount.innerHTML =
"₹" + amount;

renderWithdraws();

});

function renderWithdraws(){

let keyword =
searchInput.value.toLowerCase();

let status =
statusFilter.value;

let html = "";

let filtered = allWithdraws.filter((w)=>{

let matchSearch =
(w.name || "")
.toLowerCase()
.includes(keyword);

let matchStatus =
status === "all"
? true
: w.status === status;

return matchSearch && matchStatus;

});

filtered.reverse().forEach((w)=>{

html += `

<tr>

<td>${w.name || "-"}</td>

<td>${w.phone || "-"}</td>

<td>${w.role || "-"}</td>

<td>₹${w.amount || 0}</td>

<td>${w.upi || "-"}</td>

<td class="${w.status}">
${w.status}
</td>

<td>

${
w.status === "pending"
?

`

<button
class="btn green"
onclick="approveWithdraw('${w.id}')"
>
Approve
</button>

<button
class="btn red"
onclick="rejectWithdraw('${w.id}')"
>
Reject
</button>

`

:

`Completed`

}

</td>

</tr>

`;

});

withdrawTable.innerHTML = html;

}

searchInput.addEventListener(
"input",
renderWithdraws
);

statusFilter.addEventListener(
"change",
renderWithdraws
);

window.approveWithdraw =
async function(id){

await updateDoc(
doc(db,"withdraws",id),
{
status:"approved"
}
);

alert("Withdraw Approved ✅");

}

window.rejectWithdraw =
async function(id){

await updateDoc(
doc(db,"withdraws",id),
{
status:"rejected"
}
);

alert("Withdraw Rejected ❌");

}

</script>

</body>
</html>
