QUICKPRESS HEATMAP ANALYTICS

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
Heatmap Analytics
</title>

<link rel="stylesheet"
href="./css/global.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:52px;
font-weight:900;
}

/* =====================================================
GRID
===================================================== */

.layoutGrid{
display:grid;
grid-template-columns:360px 1fr;
gap:24px;
}

/* =====================================================
LEFT PANEL
===================================================== */

.leftPanel{
display:flex;
flex-direction:column;
gap:18px;
}

.statCard{
background:#fff;
border-radius:28px;
border:1px solid #E5E7EB;
padding:24px;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
display:block;
margin-bottom:8px;
}

.statCard h2{
font-size:36px;
font-weight:900;
}

/* =====================================================
CITY LIST
===================================================== */

.cityList{
background:#fff;
border-radius:28px;
border:1px solid #E5E7EB;
padding:20px;
}

.cityList h3{
font-size:24px;
font-weight:900;
margin-bottom:18px;
}

.cityItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 0;
border-bottom:1px solid #F3F4F6;
font-size:14px;
font-weight:700;
}

/* =====================================================
MAP
===================================================== */

.mapWrap{
background:#fff;
border-radius:28px;
border:1px solid #E5E7EB;
overflow:hidden;
height:calc(100vh - 150px);
}

#heatmap{
width:100%;
height:100%;
}

/* =====================================================
BADGE
===================================================== */

.badge{
padding:10px 14px;
border-radius:999px;
font-size:12px;
font-weight:900;
}

.hot{
background:#FEE2E2;
color:#991B1B;
}

.medium{
background:#FEF3C7;
color:#92400E;
}

.low{
background:#DCFCE7;
color:#166534;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<!-- =====================================================
HEADER
===================================================== -->

<div class="pageHeader">

<h1>
Heatmap Analytics
</h1>

</div>

<!-- =====================================================
GRID
===================================================== -->

<div class="layoutGrid">

<!-- =====================================================
LEFT PANEL
===================================================== -->

<div class="leftPanel">

<div class="statCard">

<span>
Total Orders Today
</span>

<h2 id="totalOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Hot Zones
</span>

<h2 id="hotZones">
0
</h2>

</div>

<div class="statCard">

<span>
Active Riders
</span>

<h2 id="activeRiders">
0
</h2>

</div>

<!-- =====================================================
CITY LIST
===================================================== -->

<div class="cityList">

<h3>
Top Cities
</h3>

<div id="cityContainer">

</div>

</div>

</div>

<!-- =====================================================
MAP
===================================================== -->

<div class="mapWrap">

<div id="heatmap"></div>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>

<script type="module"
src="./js/heatmap.js">
</script>

</body>
</html>
