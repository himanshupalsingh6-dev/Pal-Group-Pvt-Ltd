<!-- =========================================================
FILE : admin/notifications.html
QUICKPRESS ENTERPRISE NOTIFICATION CENTER
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Notifications
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="./css/global.css"/>

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}


/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
height:calc(100vh - 82px);
overflow:auto;
padding:24px;
}

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:22px;
padding:22px;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:34px;
font-weight:900;
margin-top:10px;
}

/* =====================================================
NOTIFICATION LIST
===================================================== */

.notificationList{
display:flex;
flex-direction:column;
gap:18px;
}

.notificationCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:22px;
display:flex;
justify-content:space-between;
align-items:center;
}

.left{
display:flex;
align-items:center;
gap:18px;
}

.icon{
width:60px;
height:60px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
background:#DBEAFE;
}

.content h3{
font-size:18px;
font-weight:900;
margin-bottom:6px;
}

.content p{
font-size:14px;
color:#6B7280;
}

.time{
font-size:12px;
font-weight:700;
color:#9CA3AF;
margin-top:6px;
}

.status{
padding:10px 16px;
border-radius:999px;
font-size:12px;
font-weight:800;
}

.unread{
background:#FEF3C7;
color:#92400E;
}

.read{
background:#DCFCE7;
color:#166534;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>
<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<div class="pageHeader">

<h1>
Notification Center
</h1>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Notifications
</span>

<h2 id="totalNotifications">
0
</h2>

</div>

<div class="statCard">

<span>
Unread
</span>

<h2 id="unreadNotifications">
0
</h2>

</div>

<div class="statCard">

<span>
Today Alerts
</span>

<h2 id="todayNotifications">
0
</h2>

</div>

</div>

<!-- =====================================================
LIST
===================================================== -->

<div
class="notificationList"
id="notificationList">

</div>

</div>

<script type="module"
src="./js/notifications.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>
  
</body>
</html>
