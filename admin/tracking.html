<!-- =========================================================
FILE : admin/tracking.html
QUICKPRESS LIVE RIDER TRACKING SYSTEM
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Live Tracking
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  
<link rel="stylesheet" href="./css/global.css"/>
  

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}


/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
height:calc(100vh - 82px);
display:flex;
}

/* =====================================================
LEFT PANEL
===================================================== */

.leftPanel{
width:420px;
background:#fff;
border-right:1px solid #E5E7EB;
display:flex;
flex-direction:column;
}

.panelHeader{
padding:24px;
border-bottom:1px solid #E5E7EB;
}

.panelHeader h1{
font-size:36px;
font-weight:900;
margin-bottom:18px;
}

.searchBox{
width:100%;
height:54px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

/* =====================================================
RIDER LIST
===================================================== */

.riderList{
flex:1;
overflow:auto;
padding:14px;
}

.riderCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:22px;
padding:18px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:14px;
cursor:pointer;
transition:0.2s;
}

.riderCard:hover{
background:#F9FAFB;
}

.riderLeft{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
position:relative;
width:60px;
height:60px;
border-radius:18px;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:900;
}

.onlineDot{
position:absolute;
bottom:0;
right:0;
width:14px;
height:14px;
border-radius:50%;
background:#22C55E;
border:2px solid white;
}

.riderInfo h3{
font-size:16px;
font-weight:900;
margin-bottom:6px;
}

.riderInfo p{
font-size:13px;
color:#6B7280;
}

.status{
padding:10px 14px;
border-radius:999px;
font-size:12px;
font-weight:800;
}

.online{
background:#DCFCE7;
color:#166534;
}

/* =====================================================
MAP AREA
===================================================== */

.mapArea{
flex:1;
position:relative;
}

/* =====================================================
MAP
===================================================== */

#map{
width:100%;
height:100%;
}

/* =====================================================
LIVE CARD
===================================================== */

.liveCard{
position:absolute;
top:24px;
left:24px;
width:360px;
background:#fff;
border-radius:24px;
padding:22px;
z-index:999;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

.liveTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.liveTop h2{
font-size:24px;
font-weight:900;
}

.liveBadge{
padding:10px 14px;
border-radius:999px;
background:#DCFCE7;
color:#166534;
font-size:12px;
font-weight:800;
}

.liveInfo{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.infoBox{
background:#F9FAFB;
padding:16px;
border-radius:16px;
}

.infoBox span{
font-size:12px;
font-weight:700;
color:#6B7280;
}

.infoBox h3{
font-size:18px;
font-weight:900;
margin-top:8px;
}

</style>

</head>

<body>
<div id="topbar"></div>

<div id="sidebar"></div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<!-- =====================================================
LEFT PANEL
===================================================== -->

<div class="leftPanel">

<div class="panelHeader">

<h1>
Live Tracking
</h1>

<input
type="text"
placeholder="Search rider..."
class="searchBox"
id="searchInput"
/>

</div>

<div
class="riderList"
id="riderList">

</div>

</div>

<!-- =====================================================
MAP AREA
===================================================== -->

<div class="mapArea">

<!-- LIVE CARD -->

<div class="liveCard">

<div class="liveTop">

<h2>
Live Rider
</h2>

<div class="liveBadge">
ONLINE
</div>

</div>

<div class="liveInfo">

<div class="infoBox">

<span>
Current Order
</span>

<h3 id="liveOrder">
--
</h3>

</div>

<div class="infoBox">

<span>
ETA
</span>

<h3 id="liveEta">
--
</h3>

</div>

<div class="infoBox">

<span>
City
</span>

<h3 id="liveCity">
--
</h3>

</div>

<div class="infoBox">

<span>
Speed
</span>

<h3 id="liveSpeed">
--
</h3>

</div>

</div>

</div>

<!-- MAP -->

<div id="map"></div>

</div>

</div>

<script type="module"
src="./js/tracking.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>
  
</body>
</html>
