FILE : admin/payments.html
QUICKPRESS ENTERPRISE FINANCE PANEL
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Finance
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="./css/global.css"/>
  
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}

/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
height:calc(100vh - 82px);
overflow:auto;
padding:24px;
}

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:22px;
padding:22px;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:30px;
font-weight:900;
margin-top:10px;
}

/* =====================================================
FILTER
===================================================== */

.filterBar{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:18px;
display:flex;
gap:14px;
margin-bottom:24px;
}

.searchBox{
width:320px;
height:52px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

/* =====================================================
TABLE
===================================================== */

.tableWrap{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
overflow:hidden;
margin-bottom:24px;
}

.tableHead{
height:60px;
display:grid;
grid-template-columns:
120px
1fr
160px
160px
160px
160px
160px;
align-items:center;
padding:0 20px;
font-size:14px;
font-weight:800;
border-bottom:1px solid #E5E7EB;
}

.paymentRow{
min-height:76px;
display:grid;
grid-template-columns:
120px
1fr
160px
160px
160px
160px
160px;
align-items:center;
padding:0 20px;
border-bottom:1px solid #F3F4F6;
font-size:14px;
}

/* =====================================================
STATUS
===================================================== */

.status{
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:800;
width:max-content;
}

.success{
background:#DCFCE7;
color:#166534;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

/* =====================================================
GRAPH
===================================================== */

.graphWrap{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:24px;
}

.graphWrap h2{
font-size:28px;
font-weight:900;
margin-bottom:24px;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<div class="pageHeader">

<h1>
Finance
</h1>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Revenue
</span>

<h2 id="totalRevenue">
₹0
</h2>

</div>

<div class="statCard">

<span>
Online Payment
</span>

<h2 id="onlineRevenue">
₹0
</h2>

</div>

<div class="statCard">

<span>
COD Revenue
</span>

<h2 id="codRevenue">
₹0
</h2>

</div>

<div class="statCard">

<span>
Wallet Revenue
</span>

<h2 id="walletRevenue">
₹0
</h2>

</div>

<div class="statCard">

<span>
Partner Payout
</span>

<h2 id="partnerPayout">
₹0
</h2>

</div>

<div class="statCard">

<span>
Admin Profit
</span>

<h2 id="adminProfit">
₹0
</h2>

</div>

</div>

<!-- =====================================================
FILTER
===================================================== -->

<div class="filterBar">

<input
type="text"
placeholder="Search Payments"
class="searchBox"
id="searchInput"
/>

</div>

<!-- =====================================================
TABLE
===================================================== -->

<div class="tableWrap">

<div class="tableHead">

<div>ID</div>
<div>Customer</div>
<div>Total</div>
<div>Partner</div>
<div>Rider</div>
<div>Payment</div>
<div>Status</div>

</div>

<div id="paymentsContainer">

</div>

</div>

<!-- =====================================================
GRAPH
===================================================== -->

<div class="graphWrap">

<h2>
Revenue Analytics
</h2>

<canvas id="financeChart"></canvas>

</div>

</div>

<script type="module"
src="./js/payments.js">
</script>
  
<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>
  
</body>
</html>
