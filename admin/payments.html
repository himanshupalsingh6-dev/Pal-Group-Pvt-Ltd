<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Admin Settlement Dashboard
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F4F7FC;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:250px;
height:100vh;
background:#081028;
position:fixed;
left:0;
top:0;
padding:20px;
overflow:auto;
}

.logo{
font-size:28px;
font-weight:900;
color:#FFD400;
margin-bottom:30px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
height:56px;
display:flex;
align-items:center;
gap:14px;
padding:0 18px;
border-radius:16px;
text-decoration:none;
font-size:15px;
font-weight:700;
color:#fff;
}

.menu a.active{
background:#111C44;
}

/* MAIN */

.main{
margin-left:250px;
width:calc(100% - 250px);
padding:24px;
}

/* TOP */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
gap:16px;
flex-wrap:wrap;
}

.topBar h1{
font-size:40px;
font-weight:900;
}

/* FILTERS */

.filters{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.filterBox{
height:54px;
padding:0 18px;
border:none;
outline:none;
border-radius:16px;
background:#fff;
font-size:14px;
font-weight:700;
min-width:180px;
}

/* STATS */

.statsGrid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
padding:22px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.statCard span{
font-size:13px;
color:#6B7280;
font-weight:700;
}

.statCard h2{
font-size:30px;
font-weight:900;
margin-top:10px;
}

/* GRAPH */

.graphGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-bottom:24px;
}

.graphCard{
background:#fff;
padding:24px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.graphCard h2{
font-size:24px;
font-weight:900;
margin-bottom:18px;
}

/* SETTLEMENT */

.settlementGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

.settlementCard{
background:#fff;
padding:22px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.cardTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.partnerInfo{
display:flex;
align-items:center;
gap:12px;
}

.logoBox{
width:60px;
height:60px;
border-radius:20px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:900;
}

.partnerInfo h3{
font-size:22px;
font-weight:900;
}

.partnerInfo p{
font-size:12px;
color:#6B7280;
margin-top:4px;
}

.status{
padding:8px 14px;
border-radius:18px;
font-size:12px;
font-weight:900;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

.paid{
background:#DCFCE7;
color:#166534;
}

.hold{
background:#FEE2E2;
color:#B91C1C;
}

/* MINI */

.miniGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:18px;
}

.miniCard{
background:#F9FAFB;
padding:14px;
border-radius:18px;
}

.miniCard span{
font-size:11px;
color:#6B7280;
}

.miniCard h4{
font-size:18px;
font-weight:900;
margin-top:8px;
}

/* DETAIL */

.detailBox{
background:#F9FAFB;
padding:16px;
border-radius:18px;
margin-bottom:16px;
}

.detailBox h4{
font-size:15px;
margin-bottom:12px;
}

.detailBox p{
font-size:14px;
margin-top:6px;
color:#444;
}

/* BUTTONS */

.btnGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:16px;
}

.btnGrid button{
height:52px;
border:none;
border-radius:16px;
font-size:13px;
font-weight:900;
cursor:pointer;
}

.payBtn{
background:#22C55E;
color:#fff;
}

.holdBtn{
background:#EF4444;
color:#fff;
}

.invoiceBtn{
background:#2563EB;
color:#fff;
}

.exportBtn{
background:#000;
color:#fff;
}

/* MOBILE */

@media(max-width:1300px){

.statsGrid{
grid-template-columns:repeat(3,1fr);
}

.settlementGrid{
grid-template-columns:1fr;
}

}

@media(max-width:900px){

.sidebar{
display:none;
}

.main{
margin-left:0;
width:100%;
padding:16px;
}

.statsGrid{
grid-template-columns:repeat(2,1fr);
}

.graphGrid{
grid-template-columns:1fr;
}

.btnGrid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html">
<i class="fa-solid fa-basket-shopping"></i>
Orders
</a>

<a href="partners.html">
<i class="fa-solid fa-store"></i>
Partners
</a>

<a href="riders.html">
<i class="fa-solid fa-motorcycle"></i>
Riders
</a>

<a href="settlements.html"
class="active">

<i class="fa-solid fa-money-bill-transfer"></i>

Settlements

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOP -->

<div class="topBar">

<h1>
Settlement Dashboard
</h1>

<div class="filters">

<input
type="text"
placeholder="Search Partner..."
class="filterBox"
id="searchInput"
/>

<select
class="filterBox"
id="statusFilter">

<option value="All">
All Status
</option>

<option value="Pending">
Pending
</option>

<option value="Paid">
Paid
</option>

<option value="Hold">
Hold
</option>

</select>

<select
class="filterBox"
id="cityFilter">

<option value="All">
All Cities
</option>

<option value="Kasganj">
Kasganj
</option>

<option value="Noida">
Noida
</option>

<option value="Delhi">
Delhi
</option>

<option value="Mumbai">
Mumbai
</option>

</select>

</div>

</div>

<!-- STATS -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Revenue
</span>

<h2 id="totalRevenue">
₹0
</h2>

</div>

<div class="statCard">

<span>
Admin Earnings
</span>

<h2 id="adminRevenue">
₹0
</h2>

</div>

<div class="statCard">

<span>
Partner Payout
</span>

<h2 id="partnerPayout">
₹0
</h2>

</div>

<div class="statCard">

<span>
Rider Payout
</span>

<h2 id="riderPayout">
₹0
</h2>

</div>

<div class="statCard">

<span>
Pending Settlement
</span>

<h2 id="pendingSettlement">
₹0
</h2>

</div>

<div class="statCard">

<span>
Paid Settlement
</span>

<h2 id="paidSettlement">
₹0
</h2>

</div>

</div>

<!-- GRAPHS -->

<div class="graphGrid">

<div class="graphCard">

<h2>
Revenue Growth
</h2>

<canvas id="revenueChart">

</canvas>

</div>

<div class="graphCard">

<h2>
City Revenue
</h2>

<canvas id="cityChart">

</canvas>

</div>

</div>

<!-- SETTLEMENTS -->

<div class="settlementGrid"
id="settlementGrid">

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs,
doc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* GLOBAL */

let settlements = [];

/* ELEMENTS */

const settlementGrid =
document.getElementById(
"settlementGrid"
);

const searchInput =
document.getElementById(
"searchInput"
);

const statusFilter =
document.getElementById(
"statusFilter"
);

const cityFilter =
document.getElementById(
"cityFilter"
);

/* LOAD */

async function loadSettlements(){

const snap =
await getDocs(
collection(db,"settlements")
);

settlements = [];

snap.forEach((docSnap)=>{

settlements.push({

id:docSnap.id,

...docSnap.data()

});

});

renderSettlements();

createCharts();

}

loadSettlements();

/* RENDER */

function renderSettlements(){

let html = "";

let totalRevenue = 0;
let adminRevenue = 0;
let partnerRevenue = 0;
let riderRevenue = 0;
let pendingRevenue = 0;
let paidRevenue = 0;

const search =
searchInput.value
.toLowerCase();

settlements.forEach((item)=>{

if(

!(item.partnerName || "")
.toLowerCase()
.includes(search)

){

return;

}

if(

statusFilter.value !== "All"

&&

(item.status || "Pending")
!== statusFilter.value

){

return;

}

if(

cityFilter.value !== "All"

&&

item.city !== cityFilter.value

){

return;

}

const total =
Number(item.customerPay || 0);

const gst =
Number(item.gst || 0);

const handling =
Number(item.handling || 0);

const serviceAmount =
total - gst - handling;

const partnerShare =
Math.floor(serviceAmount * 0.60);

const riderShare =
Math.floor(serviceAmount * 0.20);

const adminShare =
Math.floor(serviceAmount * 0.20);

const adminFinal =
adminShare + gst + handling;

totalRevenue += total;
adminRevenue += adminFinal;
partnerRevenue += partnerShare;
riderRevenue += riderShare;

if((item.status || "Pending") === "Pending"){

pendingRevenue += partnerShare;

}

if((item.status || "") === "Paid"){

paidRevenue += partnerShare;

}

html += `

<div class="settlementCard">

<div class="cardTop">

<div class="partnerInfo">

<div class="logoBox">

${(item.partnerName || "P")
.charAt(0)}

</div>

<div>

<h3>
${item.partnerName || 'Partner'}
</h3>

<p>
${item.city || 'Kasganj'}
</p>

</div>

</div>

<div class="status ${
(item.status || 'Pending')
=== 'Paid'
? 'paid'
: (item.status === 'Hold'
? 'hold'
: 'pending')
}">

${item.status || 'Pending'}

</div>

</div>

<div class="miniGrid">

<div class="miniCard">

<span>
Customer Pay
</span>

<h4>
₹${total}
</h4>

</div>

<div class="miniCard">

<span>
Partner Share
</span>

<h4>
₹${partnerShare}
</h4>

</div>

<div class="miniCard">

<span>
Rider Share
</span>

<h4>
₹${riderShare}
</h4>

</div>

<div class="miniCard">

<span>
Admin Revenue
</span>

<h4>
₹${adminFinal}
</h4>

</div>

<div class="miniCard">

<span>
GST
</span>

<h4>
₹${gst}
</h4>

</div>

<div class="miniCard">

<span>
Handling
</span>

<h4>
₹${handling}
</h4>

</div>

</div>

<div class="detailBox">

<h4>
Customer Details
</h4>

<p>
👤 ${item.customerName || ''}
</p>

<p>
📞 ${item.mobile || ''}
</p>

<p>
📍 ${item.address || ''}
</p>

<p>
🕒 ${item.createdAt || 'Today'}
</p>

</div>

<div class="detailBox">

<h4>
Settlement Details
</h4>

<p>
💰 Service Amount : ₹${serviceAmount}
</p>

<p>
🎁 Incentives : ₹${item.incentives || 0}
</p>

<p>
⚠ Penalty : ₹${item.penalties || 0}
</p>

<p>
🏦 Final Partner Payout : ₹${partnerShare + Number(item.incentives || 0) - Number(item.penalties || 0)}
</p>

</div>

<div class="btnGrid">

<button
class="payBtn"
onclick="markPaid('${item.id}')">

Mark Paid

</button>

<button
class="holdBtn"
onclick="markHold('${item.id}')">

Hold

</button>

<button
class="invoiceBtn">

Invoice

</button>

<button
class="exportBtn">

Export

</button>

</div>

</div>

`;

});

settlementGrid.innerHTML =
html;

/* STATS */

document.getElementById(
"totalRevenue"
).innerHTML =
`₹${totalRevenue}`;

document.getElementById(
"adminRevenue"
).innerHTML =
`₹${adminRevenue}`;

document.getElementById(
"partnerPayout"
).innerHTML =
`₹${partnerRevenue}`;

document.getElementById(
"riderPayout"
).innerHTML =
`₹${riderRevenue}`;

document.getElementById(
"pendingSettlement"
).innerHTML =
`₹${pendingRevenue}`;

document.getElementById(
"paidSettlement"
).innerHTML =
`₹${paidRevenue}`;

}

/* FILTER */

searchInput.addEventListener(
"keyup",
renderSettlements
);

statusFilter.addEventListener(
"change",
renderSettlements
);

cityFilter.addEventListener(
"change",
renderSettlements
);

/* UPDATE */

window.markPaid =
async(id)=>{

await updateDoc(

doc(db,"settlements",id),

{

status:"Paid"

}

);

loadSettlements();

};

window.markHold =
async(id)=>{

await updateDoc(

doc(db,"settlements",id),

{

status:"Hold"

}

);

loadSettlements();

};

/* CHARTS */

function createCharts(){

const ctx1 =
document.getElementById(
'revenueChart'
);

new Chart(ctx1, {

type:'line',

data:{

labels:[
'Mon',
'Tue',
'Wed',
'Thu',
'Fri',
'Sat',
'Sun'
],

datasets:[{

label:'Revenue',

data:[
1200,
2500,
4200,
5800,
7600,
9200,
12000
],

borderWidth:4,
tension:0.4

}]

},

options:{

responsive:true,

plugins:{
legend:{
display:false
}
}

}

});

const ctx2 =
document.getElementById(
'cityChart'
);

new Chart(ctx2, {

type:'doughnut',

data:{

labels:[
'Kasganj',
'Noida',
'Delhi',
'Mumbai'
],

datasets:[{

data:[
45,
25,
20,
10
]

}]

},

options:{

responsive:true

}

});

}

</script>

</body>
</html>
