<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Settlement Dashboard
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F3F6FB;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:250px;
height:100vh;
background:#081028;
position:fixed;
left:0;
top:0;
padding:20px;
overflow:auto;
}

.logo{
font-size:28px;
font-weight:900;
color:#FFD400;
margin-bottom:30px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
height:56px;
display:flex;
align-items:center;
gap:14px;
padding:0 18px;
border-radius:16px;
text-decoration:none;
font-size:15px;
font-weight:700;
color:#fff;
}

.menu a.active{
background:#111C44;
}

/* MAIN */

.main{
margin-left:250px;
width:calc(100% - 250px);
padding:24px;
}

/* TOP */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
gap:14px;
flex-wrap:wrap;
}

.topBar h1{
font-size:40px;
font-weight:900;
}

/* FILTER */

.filters{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.filterBox{
height:54px;
padding:0 18px;
border:none;
outline:none;
border-radius:16px;
background:#fff;
font-size:14px;
font-weight:700;
min-width:180px;
}

/* STATS */

.statsGrid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
padding:22px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.statCard span{
font-size:13px;
color:#6B7280;
font-weight:700;
}

.statCard h2{
font-size:28px;
font-weight:900;
margin-top:10px;
}

/* TODAY PAYOUT */

.todayBox{
background:#fff;
padding:24px;
border-radius:30px;
margin-bottom:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.todayBox h2{
font-size:30px;
font-weight:900;
margin-bottom:20px;
}

/* GRAPH */

.graphCard{
background:#fff;
padding:24px;
border-radius:30px;
margin-bottom:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.graphCard h2{
font-size:28px;
font-weight:900;
margin-bottom:20px;
}

/* SETTLEMENT */

.settlementGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

.card{
background:#fff;
padding:22px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.cardTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.profile{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:62px;
height:62px;
border-radius:20px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:900;
}

.profile h3{
font-size:22px;
font-weight:900;
}

.profile p{
font-size:12px;
color:#6B7280;
margin-top:4px;
}

.status{
padding:8px 14px;
border-radius:18px;
font-size:12px;
font-weight:900;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

.paid{
background:#DCFCE7;
color:#166534;
}

/* MINI */

.miniGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:18px;
}

.mini{
background:#F9FAFB;
padding:14px;
border-radius:18px;
}

.mini span{
font-size:11px;
color:#6B7280;
}

.mini h4{
font-size:18px;
font-weight:900;
margin-top:8px;
}

/* DETAILS */

.detail{
background:#F9FAFB;
padding:16px;
border-radius:18px;
margin-bottom:16px;
}

.detail h4{
font-size:15px;
margin-bottom:12px;
}

.detail p{
font-size:14px;
margin-top:6px;
color:#444;
}

/* BUTTON */

.btnGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:16px;
}

.btnGrid button{
height:52px;
border:none;
border-radius:16px;
font-size:13px;
font-weight:900;
cursor:pointer;
}

.payBtn{
background:#22C55E;
color:#fff;
}

.holdBtn{
background:#EF4444;
color:#fff;
}

.invoiceBtn{
background:#2563EB;
color:#fff;
}

.exportBtn{
background:#000;
color:#fff;
}

/* MOBILE */

@media(max-width:1300px){

.statsGrid{
grid-template-columns:repeat(3,1fr);
}

.settlementGrid{
grid-template-columns:1fr;
}

}

@media(max-width:900px){

.sidebar{
display:none;
}

.main{
margin-left:0;
width:100%;
padding:16px;
}

.statsGrid{
grid-template-columns:repeat(2,1fr);
}

.btnGrid{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html">
<i class="fa-solid fa-basket-shopping"></i>
Orders
</a>

<a href="partners.html">
<i class="fa-solid fa-store"></i>
Partners
</a>

<a href="riders.html">
<i class="fa-solid fa-motorcycle"></i>
Riders
</a>

<a href="settlements.html"
class="active">

<i class="fa-solid fa-money-bill-transfer"></i>

Settlements

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOP -->

<div class="topBar">

<h1>
Settlement Dashboard
</h1>

<div class="filters">

<input
type="text"
placeholder="Search..."
class="filterBox"
id="searchInput"
/>

<select
class="filterBox"
id="cityFilter">

<option value="All">
All Cities
</option>

<option value="Kasganj">
Kasganj
</option>

<option value="Noida">
Noida
</option>

<option value="Delhi">
Delhi
</option>

<option value="Mumbai">
Mumbai
</option>

</select>

</div>

</div>

<!-- STATS -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Revenue
</span>

<h2 id="totalRevenue">
₹0
</h2>

</div>

<div class="statCard">

<span>
Admin Earnings
</span>

<h2 id="adminRevenue">
₹0
</h2>

</div>

<div class="statCard">

<span>
Partner Pending
</span>

<h2 id="partnerPending">
₹0
</h2>

</div>

<div class="statCard">

<span>
Rider Pending
</span>

<h2 id="riderPending">
₹0
</h2>

</div>

<div class="statCard">

<span>
Paid Settlements
</span>

<h2 id="paidSettlement">
₹0
</h2>

</div>

<div class="statCard">

<span>
Today's Payout
</span>

<h2 id="todayPayout">
₹0
</h2>

</div>

</div>

<!-- TODAY -->

<div class="todayBox">

<h2>
Today's Settlement Cycle
</h2>

<div id="todaySettlement">

</div>

</div>

<!-- GRAPH -->

<div class="graphCard">

<h2>
Revenue Growth
</h2>

<canvas id="revenueChart">

</canvas>

</div>

<!-- SETTLEMENT -->

<div class="settlementGrid"
id="settlementGrid">

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs,
doc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let settlements = [];

const settlementGrid =
document.getElementById(
"settlementGrid"
);

const todaySettlement =
document.getElementById(
"todaySettlement"
);

const searchInput =
document.getElementById(
"searchInput"
);

const cityFilter =
document.getElementById(
"cityFilter"
);

/* LOAD */

async function loadData(){

const snap =
await getDocs(
collection(db,"settlements")
);

settlements = [];

snap.forEach((docSnap)=>{

settlements.push({

id:docSnap.id,

...docSnap.data()

});

});

renderData();
createGraph();

}

loadData();

/* RENDER */

function renderData(){

let html = "";
let todayHtml = "";

let totalRevenue = 0;
let adminRevenue = 0;
let partnerPending = 0;
let riderPending = 0;
let paidSettlement = 0;
let todayPayout = 0;

const search =
searchInput.value
.toLowerCase();

settlements.forEach((item)=>{

if(

!(item.partnerName || "")
.toLowerCase()
.includes(search)

){

return;

}

if(

cityFilter.value !== "All"

&&

item.city !== cityFilter.value

){

return;

}

const total =
Number(item.customerPay || 0);

const gst =
Number(item.gst || 0);

const handling =
Number(item.handling || 0);

const serviceAmount =
total - gst - handling;

const partnerShare =
Math.floor(serviceAmount * 0.60);

const riderShare =
Math.floor(serviceAmount * 0.20);

const adminShare =
Math.floor(serviceAmount * 0.20);

const adminFinal =
adminShare + gst + handling;

const finalPartner =
partnerShare
+
Number(item.incentives || 0)
-
Number(item.penalties || 0);

const finalRider =
riderShare;

totalRevenue += total;
adminRevenue += adminFinal;

if((item.status || "Pending") === "Pending"){

partnerPending += finalPartner;
riderPending += finalRider;

}

if((item.status || "") === "Paid"){

paidSettlement += finalPartner;

}

/* 7 DAY PAYOUT */

const created =
new Date(
item.createdAt || Date.now()
);

const now =
new Date();

const diff =
Math.floor(

(now - created)
/

(1000*60*60*24)

);

if(diff >= 7){

todayPayout += finalPartner;

todayHtml += `

<div class="detail"
style="margin-bottom:16px;">

<h4>
${item.partnerName || 'Partner'}
</h4>

<p>
📍 ${item.city || ''}
</p>

<p>
💰 Payout : ₹${finalPartner}
</p>

<p>
🏦 Rider : ₹${finalRider}
</p>

<p>
📦 Orders : ${item.totalOrders || 0}
</p>

</div>

`;

}

html += `

<div class="card">

<div class="cardTop">

<div class="profile">

<div class="avatar">

${(item.partnerName || "P")
.charAt(0)}

</div>

<div>

<h3>
${item.partnerName || 'Partner'}
</h3>

<p>
${item.city || 'Kasganj'}
</p>

</div>

</div>

<div class="status ${
(item.status || 'Pending')
=== 'Paid'
? 'paid'
: 'pending'
}">

${item.status || 'Pending'}

</div>

</div>

<div class="miniGrid">

<div class="mini">

<span>
Customer Pay
</span>

<h4>
₹${total}
</h4>

</div>

<div class="mini">

<span>
Partner Payout
</span>

<h4>
₹${finalPartner}
</h4>

</div>

<div class="mini">

<span>
Rider Payout
</span>

<h4>
₹${finalRider}
</h4>

</div>

<div class="mini">

<span>
Admin Revenue
</span>

<h4>
₹${adminFinal}
</h4>

</div>

<div class="mini">

<span>
Paid Till Now
</span>

<h4>
₹${item.paidAmount || 0}
</h4>

</div>

<div class="mini">

<span>
Pending
</span>

<h4>
₹${finalPartner - Number(item.paidAmount || 0)}
</h4>

</div>

</div>

<div class="detail">

<h4>
Partner Details
</h4>

<p>
👤 ${item.partnerName || ''}
</p>

<p>
📞 ${item.partnerMobile || ''}
</p>

<p>
🏦 ${item.bank || 'SBI'}
</p>

<p>
🆔 ${item.partnerId || ''}
</p>

</div>

<div class="detail">

<h4>
Rider Details
</h4>

<p>
👤 ${item.riderName || ''}
</p>

<p>
📞 ${item.riderMobile || ''}
</p>

<p>
🚴 Trips : ${item.totalTrips || 0}
</p>

<p>
⭐ Rating : ${item.rating || 5}
</p>

</div>

<div class="detail">

<h4>
Settlement Summary
</h4>

<p>
💰 Service Amount : ₹${serviceAmount}
</p>

<p>
🎁 Incentives : ₹${item.incentives || 0}
</p>

<p>
⚠ Penalties : ₹${item.penalties || 0}
</p>

<p>
🧾 GST : ₹${gst}
</p>

<p>
📦 Handling : ₹${handling}
</p>

</div>

<div class="btnGrid">

<button
class="payBtn"
onclick="markPaid('${item.id}')">

Mark Paid

</button>

<button
class="holdBtn">

Hold

</button>

<button
class="invoiceBtn">

Invoice

</button>

<button
class="exportBtn">

Export

</button>

</div>

</div>

`;

});

settlementGrid.innerHTML =
html;

todaySettlement.innerHTML =
todayHtml;

/* STATS */

document.getElementById(
"totalRevenue"
).innerHTML =
`₹${totalRevenue}`;

document.getElementById(
"adminRevenue"
).innerHTML =
`₹${adminRevenue}`;

document.getElementById(
"partnerPending"
).innerHTML =
`₹${partnerPending}`;

document.getElementById(
"riderPending"
).innerHTML =
`₹${riderPending}`;

document.getElementById(
"paidSettlement"
).innerHTML =
`₹${paidSettlement}`;

document.getElementById(
"todayPayout"
).innerHTML =
`₹${todayPayout}`;

}

/* FILTER */

searchInput.addEventListener(
"keyup",
renderData
);

cityFilter.addEventListener(
"change",
renderData
);

/* UPDATE */

window.markPaid =
async(id)=>{

await updateDoc(

doc(db,"settlements",id),

{

status:"Paid"

}

);

loadData();

};

/* CHART */

function createGraph(){

const ctx =
document.getElementById(
'revenueChart'
);

new Chart(ctx, {

type:'line',

data:{

labels:[
'Mon',
'Tue',
'Wed',
'Thu',
'Fri',
'Sat',
'Sun'
],

datasets:[{

data:[
1200,
3200,
4800,
6200,
8900,
11000,
15000
],

borderWidth:4,
tension:0.4

}]

},

options:{

responsive:true,

plugins:{
legend:{
display:false
}
}

}

});

}

</script>

</body>
</html>
