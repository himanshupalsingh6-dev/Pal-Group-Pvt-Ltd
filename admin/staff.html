<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Partner</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f5f6fa;
padding:30px;
}

.box{
max-width:500px;
margin:auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
background:#FFD400;
font-weight:bold;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.card{
background:#fafafa;
padding:12px;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="box">

<h1>👨‍🏭 Create Partner</h1>

<input type="text" id="name" placeholder="Partner Name">

<input type="text" id="phone" placeholder="Phone">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<input type="text" id="shop" placeholder="Shop Name">

<input type="text" id="address" placeholder="Address">

<button onclick="createPartner()">
CREATE PARTNER
</button>

<hr>

<h2>Partners List</h2>

<div id="partnerList"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
collection,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {
apiKey: "AIzaSyBBaslH5QsahoyESYpo1nVtlYIUYfVJ2d4",
authDomain: "quickpress-offical.firebaseapp.com",
projectId: "quickpress-offical",
storageBucket: "quickpress-offical.firebasestorage.app",
messagingSenderId: "939286557961",
appId: "1:939286557961:web:ddac64f197e14877718fd8"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* CREATE PARTNER */

window.createPartner = async function(){

try{

const name = document.getElementById("name").value;
const phone = document.getElementById("phone").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const shop = document.getElementById("shop").value;
const address = document.getElementById("address").value;

/* CREATE AUTH */

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const uid = userCredential.user.uid;

/* SAVE PARTNER */

await setDoc(doc(db,"users",uid),{

uid,
name,
phone,
email,
shop,
address,

role:"partner",

wallet:0,
totalOrders:0,
totalEarning:0,

createdAt:Date.now()

});

/* PARTNER COLLECTION */

await setDoc(doc(db,"partners",uid),{

uid,
name,
phone,
email,
shop,
address,

status:"active",

wallet:0,
totalOrders:0,
totalEarning:0,

createdAt:Date.now()

});

/* WALLET */

await setDoc(doc(db,"wallets",uid),{

balance:0,
role:"partner"

});

alert("Partner Created ✅");

}
catch(err){

alert(err.message);

}

}

/* PARTNER LIST */

const partnerList =
document.getElementById("partnerList");

onSnapshot(collection(db,"partners"),(snap)=>{

let html = "";

snap.forEach((docu)=>{

const p = docu.data();

html += `

<div class="card">

<b>${p.name}</b><br>

📞 ${p.phone}<br>

📧 ${p.email}<br>

🏪 ${p.shop}<br>

💰 Wallet: ₹${p.wallet || 0}<br>

📦 Orders: ${p.totalOrders || 0}

</div>

`;

});

partnerList.innerHTML = html;

});

</script>

</body>
</html>
