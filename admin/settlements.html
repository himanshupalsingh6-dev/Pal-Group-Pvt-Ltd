<!-- =========================================================
FILE : admin/settlements.html
QUICKPRESS ENTERPRISE SETTLEMENT PANEL
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Settlements
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="./css/global.css"/>
  
<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}


/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
height:calc(100vh - 82px);
overflow:auto;
padding:24px;
}

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:22px;
padding:22px;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:30px;
font-weight:900;
margin-top:10px;
}

/* =====================================================
TABLE
===================================================== */

.tableWrap{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
overflow:hidden;
}

.tableHead{
height:60px;
display:grid;
grid-template-columns:
1fr
180px
180px
180px
180px
180px;
align-items:center;
padding:0 20px;
font-size:14px;
font-weight:800;
border-bottom:1px solid #E5E7EB;
}

.row{
min-height:74px;
display:grid;
grid-template-columns:
1fr
180px
180px
180px
180px
180px;
align-items:center;
padding:0 20px;
border-bottom:1px solid #F3F4F6;
font-size:14px;
}

.partner{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:52px;
height:52px;
border-radius:16px;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:900;
}

/* =====================================================
STATUS
===================================================== */

.status{
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:800;
width:max-content;
}

.paid{
background:#DCFCE7;
color:#166534;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

/* =====================================================
BUTTON
===================================================== */

.payBtn{
height:44px;
padding:0 18px;
border:none;
border-radius:12px;
background:#111827;
color:#fff;
font-size:13px;
font-weight:800;
cursor:pointer;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>
<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<div class="pageHeader">

<h1>
Settlements
</h1>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Settlement
</span>

<h2 id="totalSettlement">
₹0
</h2>

</div>

<div class="statCard">

<span>
Partner Payout
</span>

<h2 id="partnerSettlement">
₹0
</h2>

</div>

<div class="statCard">

<span>
Rider Payout
</span>

<h2 id="riderSettlement">
₹0
</h2>

</div>

<div class="statCard">

<span>
Admin Profit
</span>

<h2 id="adminSettlement">
₹0
</h2>

</div>

<div class="statCard">

<span>
Pending Payout
</span>

<h2 id="pendingSettlement">
₹0
</h2>

</div>

</div>

<!-- =====================================================
TABLE
===================================================== -->

<div class="tableWrap">

<div class="tableHead">

<div>Partner</div>
<div>Total Orders</div>
<div>Total Revenue</div>
<div>Payout</div>
<div>Status</div>
<div>Action</div>

</div>

<div id="settlementContainer">

</div>

</div>

</div>

<script type="module"
src="./js/settlements.js">
</script>
  
<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>
  
</body>
</html>
