<!-- =========================================================
FILE : admin/wallets.html
QUICKPRESS WALLET & TRANSACTION SYSTEM
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Wallets
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="./css/global.css"/>

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}

/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
padding:24px;
height:calc(100vh - 82px);
overflow:auto;
}

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border-radius:24px;
padding:24px;
border:1px solid #E5E7EB;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:34px;
font-weight:900;
margin-top:10px;
}

/* =====================================================
FILTER
===================================================== */

.filterBar{
background:#fff;
border-radius:24px;
padding:18px;
border:1px solid #E5E7EB;
display:flex;
gap:14px;
margin-bottom:24px;
}

.searchBox{
width:320px;
height:54px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

.selectBox{
height:54px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
font-weight:700;
background:#fff;
}

/* =====================================================
TABLE
===================================================== */

.tableWrap{
background:#fff;
border-radius:24px;
border:1px solid #E5E7EB;
overflow:hidden;
}

.tableHead{
height:64px;
display:grid;
grid-template-columns:
1fr
160px
160px
160px
160px
160px;
align-items:center;
padding:0 20px;
font-size:14px;
font-weight:900;
border-bottom:1px solid #E5E7EB;
}

.walletRow{
min-height:74px;
display:grid;
grid-template-columns:
1fr
160px
160px
160px
160px
160px;
align-items:center;
padding:0 20px;
border-bottom:1px solid #F3F4F6;
font-size:14px;
}

/* =====================================================
USER
===================================================== */

.user{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:56px;
height:56px;
border-radius:18px;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:900;
}

/* =====================================================
STATUS
===================================================== */

.status{
padding:10px 14px;
border-radius:999px;
font-size:12px;
font-weight:800;
width:max-content;
}

.credit{
background:#DCFCE7;
color:#166534;
}

.debit{
background:#FEE2E2;
color:#991B1B;
}

/* =====================================================
BUTTON
===================================================== */

.actionBtn{
height:44px;
padding:0 18px;
border:none;
border-radius:12px;
background:#111827;
color:#fff;
font-size:13px;
font-weight:800;
cursor:pointer;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>
<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<!-- =====================================================
HEADER
===================================================== -->

<div class="pageHeader">

<h1>
Wallet History
</h1>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Partner Wallet
</span>

<h2 id="partnerWallet">
₹0
</h2>

</div>

<div class="statCard">

<span>
Rider Wallet
</span>

<h2 id="riderWallet">
₹0
</h2>

</div>

<div class="statCard">

<span>
Total Credit
</span>

<h2 id="totalCredit">
₹0
</h2>

</div>

<div class="statCard">

<span>
Total Debit
</span>

<h2 id="totalDebit">
₹0
</h2>

</div>

</div>

<!-- =====================================================
FILTERS
===================================================== -->

<div class="filterBar">

<input
type="text"
placeholder="Search wallet..."
class="searchBox"
id="searchInput"
/>

<select
class="selectBox"
id="typeFilter">

<option value="All">
All Types
</option>

<option value="Partner">
Partner
</option>

<option value="Rider">
Rider
</option>

</select>

</div>

<!-- =====================================================
TABLE
===================================================== -->

<div class="tableWrap">

<div class="tableHead">

<div>
Name
</div>

<div>
Type
</div>

<div>
Amount
</div>

<div>
Transaction
</div>

<div>
Date
</div>

<div>
Action
</div>

</div>

<div id="walletContainer">

</div>

</div>

</div>

<script type="module"
src="./js/wallets.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>
  
</body>
</html>
