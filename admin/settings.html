<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuickPress Settings</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F5F7FB;
}

/* SIDEBAR */

.sidebar{
width:270px;
background:#111827;
color:#fff;
padding:24px 18px;
position:fixed;
left:0;
top:0;
height:100%;
overflow:auto;
z-index:999;
}

.logo{
font-size:30px;
font-weight:900;
margin-bottom:40px;
color:#FFD400;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
text-decoration:none;
color:#D1D5DB;
padding:16px;
border-radius:18px;
display:flex;
align-items:center;
gap:14px;
font-size:15px;
font-weight:600;
transition:0.3s;
}

.menu a:hover,
.menu a.active{
background:#1F2937;
color:#fff;
}

/* MAIN */

.main{
margin-left:270px;
padding:24px;
}

/* TOPBAR */

.topbar{
margin-bottom:24px;
}

.topbar h1{
font-size:34px;
font-weight:900;
}

/* SETTINGS */

.settingsGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.settingCard{
background:#fff;
padding:24px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.settingTitle{
font-size:22px;
font-weight:900;
margin-bottom:20px;
}

.input{
width:100%;
height:56px;
border:none;
outline:none;
background:#F3F4F6;
border-radius:18px;
padding:0 18px;
font-size:15px;
margin-bottom:16px;
}

.saveBtn{
width:100%;
height:56px;
border:none;
border-radius:18px;
background:#FFD400;
font-size:16px;
font-weight:900;
cursor:pointer;
}

/* SWITCH */

.switchRow{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 0;
border-bottom:1px solid #F3F4F6;
}

.switchRow:last-child{
border-bottom:none;
}

.switchLabel{
font-size:15px;
font-weight:600;
}

.toggle{
width:54px;
height:30px;
background:#E5E7EB;
border-radius:50px;
position:relative;
cursor:pointer;
transition:0.3s;
}

.toggle.active{
background:#FFD400;
}

.toggleCircle{
width:24px;
height:24px;
background:#fff;
border-radius:50%;
position:absolute;
top:3px;
left:3px;
transition:0.3s;
}

.toggle.active .toggleCircle{
left:27px;
}

/* MOBILE */

.mobileMenuBtn{
display:none;
}

@media(max-width:900px){

.settingsGrid{
grid-template-columns:1fr;
}

}

@media(max-width:768px){

.sidebar{
left:-100%;
transition:0.3s;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
padding:16px;
padding-top:80px;
}

.mobileMenuBtn{
display:flex;
position:fixed;
top:18px;
left:18px;
width:52px;
height:52px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:22px;
align-items:center;
justify-content:center;
z-index:1000;
}

.topbar h1{
font-size:26px;
}

}

</style>
</head>
<body>

<!-- MOBILE BUTTON -->

<button class="mobileMenuBtn"
onclick="toggleSidebar()">

<i class="fa-solid fa-bars"></i>

</button>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html">
<i class="fa-solid fa-basket-shopping"></i>
Orders
</a>

<a href="services.html">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="users.html">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="delivery.html">
<i class="fa-solid fa-truck"></i>
Delivery
</a>

<a href="partners.html">
<i class="fa-solid fa-handshake"></i>
Partners
</a>

<a href="riders.html">
<i class="fa-solid fa-motorcycle"></i>
Riders
</a>

<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Payments
</a>

<a href="analytics.html">
<i class="fa-solid fa-chart-pie"></i>
Analytics
</a>

<a href="offers.html">
<i class="fa-solid fa-tags"></i>
Offers
</a>

<a href="notifications.html">
<i class="fa-solid fa-bell"></i>
Notifications
</a>

<a href="settings.html" class="active">
<i class="fa-solid fa-gear"></i>
Settings
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<h1>
Settings
</h1>

</div>

<!-- GRID -->

<div class="settingsGrid">

<!-- APP SETTINGS -->

<div class="settingCard">

<div class="settingTitle">
App Settings
</div>

<input
type="text"
placeholder="App Name"
class="input"
id="appName"
/>

<input
type="text"
placeholder="Delivery Charge"
class="input"
id="deliveryCharge"
/>

<input
type="text"
placeholder="Support Number"
class="input"
id="supportNumber"
/>

<button
class="saveBtn"
onclick="saveSettings()">

Save Settings

</button>

</div>

<!-- TOGGLES -->

<div class="settingCard">

<div class="settingTitle">
System Controls
</div>

<div class="switchRow">

<div class="switchLabel">
Enable Orders
</div>

<div class="toggle active"
onclick="toggleSwitch(this)">
<div class="toggleCircle"></div>
</div>

</div>

<div class="switchRow">

<div class="switchLabel">
Enable Payments
</div>

<div class="toggle active"
onclick="toggleSwitch(this)">
<div class="toggleCircle"></div>
</div>

</div>

<div class="switchRow">

<div class="switchLabel">
Enable Notifications
</div>

<div class="toggle active"
onclick="toggleSwitch(this)">
<div class="toggleCircle"></div>
</div>

</div>

<div class="switchRow">

<div class="switchLabel">
Enable Riders
</div>

<div class="toggle active"
onclick="toggleSwitch(this)">
<div class="toggleCircle"></div>
</div>

</div>

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

doc,
setDoc,
getDoc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* LOAD */

async function loadSettings(){

const settingsRef =

doc(db,"settings","main");

const snap =
await getDoc(settingsRef);

if(snap.exists()){

const settings =
snap.data();

document.getElementById(
"appName"
).value =
settings.appName || "";

document.getElementById(
"deliveryCharge"
).value =
settings.deliveryCharge || "";

document.getElementById(
"supportNumber"
).value =
settings.supportNumber || "";

}

}

loadSettings();

/* SAVE */

window.saveSettings =
async function(){

const appName =
document.getElementById(
"appName"
).value;

const deliveryCharge =
document.getElementById(
"deliveryCharge"
).value;

const supportNumber =
document.getElementById(
"supportNumber"
).value;

await setDoc(

doc(db,"settings","main"),

{

appName:appName,
deliveryCharge:deliveryCharge,
supportNumber:supportNumber

}

);

alert(
"Settings Saved"
);

};

/* SWITCH */

window.toggleSwitch =
function(el){

el.classList.toggle("active");

};

/* SIDEBAR */

window.toggleSidebar =
function(){

document
.querySelector(".sidebar")
.classList.toggle("active");

};

</script>

</body>
</html>
