<!-- =========================================================
FILE : admin/settings.html
QUICKPRESS ENTERPRISE SETTINGS PANEL
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Settings
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="./css/global.css"/>

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}


/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
height:calc(100vh - 82px);
overflow:auto;
padding:24px;
}

.pageHeader{
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

/* =====================================================
SETTINGS GRID
===================================================== */

.settingsGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

/* =====================================================
CARD
===================================================== */

.settingCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:24px;
}

.settingCard h2{
font-size:24px;
font-weight:900;
margin-bottom:20px;
}

/* =====================================================
INPUT
===================================================== */

.inputGroup{
margin-bottom:18px;
}

.inputGroup label{
display:block;
font-size:13px;
font-weight:700;
margin-bottom:8px;
color:#6B7280;
}

.inputBox{
width:100%;
height:54px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

textarea.inputBox{
height:120px;
padding:18px;
resize:none;
}

/* =====================================================
BUTTON
===================================================== */

.saveBtn{
height:52px;
padding:0 24px;
border:none;
border-radius:14px;
background:#111827;
color:#fff;
font-size:14px;
font-weight:800;
cursor:pointer;
}

.switchRow{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 0;
border-bottom:1px solid #F3F4F6;
}

.switchRow h3{
font-size:15px;
font-weight:800;
}

.switchRow p{
font-size:13px;
color:#6B7280;
margin-top:4px;
}

/* =====================================================
SWITCH
===================================================== */

.switch{
width:54px;
height:30px;
background:#111827;
border-radius:999px;
position:relative;
cursor:pointer;
}

.switch::before{
content:"";
position:absolute;
width:22px;
height:22px;
border-radius:50%;
background:#fff;
top:4px;
right:4px;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<div class="pageHeader">

<h1>
Settings
</h1>

</div>

<!-- =====================================================
GRID
===================================================== -->

<div class="settingsGrid">

<!-- =====================================================
BUSINESS SETTINGS
===================================================== -->

<div class="settingCard">

<h2>
Business Settings
</h2>

<div class="inputGroup">

<label>
Business Name
</label>

<input
type="text"
class="inputBox"
id="businessName"
placeholder="QuickPress"
/>

</div>

<div class="inputGroup">

<label>
Support Email
</label>

<input
type="email"
class="inputBox"
id="supportEmail"
placeholder="support@quickpress.com"
/>

</div>

<div class="inputGroup">

<label>
Support Number
</label>

<input
type="text"
class="inputBox"
id="supportNumber"
placeholder="+91"
/>

</div>

<div class="inputGroup">

<label>
Business Address
</label>

<textarea
class="inputBox"
id="businessAddress"
placeholder="Business Address">
</textarea>

</div>

<button
class="saveBtn"
onclick="saveBusinessSettings()">

Save Settings

</button>

</div>

<!-- =====================================================
SYSTEM SETTINGS
===================================================== -->

<div class="settingCard">

<h2>
System Settings
</h2>

<div class="switchRow">

<div>

<h3>
Order Notification
</h3>

<p>
Receive real-time order alerts
</p>

</div>

<div class="switch"></div>

</div>

<div class="switchRow">

<div>

<h3>
Auto Assignment
</h3>

<p>
Automatically assign riders
</p>

</div>

<div class="switch"></div>

</div>

<div class="switchRow">

<div>

<h3>
Live Tracking
</h3>

<p>
Enable live order tracking
</p>

</div>

<div class="switch"></div>

</div>

<div class="switchRow">

<div>

<h3>
Settlement System
</h3>

<p>
Enable weekly settlements
</p>

</div>

<div class="switch"></div>

</div>

<div class="switchRow">

<div>

<h3>
Multi City System
</h3>

<p>
Enable all india operations
</p>

</div>

<div class="switch"></div>

</div>

</div>

</div>

</div>

<script type="module"
src="./js/settings.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>

</body>
</html>
