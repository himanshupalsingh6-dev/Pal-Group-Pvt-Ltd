<!-- =========================================================
FILE : admin/attendance.html
QUICKPRESS STAFF ATTENDANCE SYSTEM
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Attendance
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}

/* =====================================================
TOPBAR
===================================================== */

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:82px;
background:#fff;
border-bottom:1px solid #E5E7EB;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
z-index:999;
}

.logo{
font-size:32px;
font-weight:900;
}

/* =====================================================
SIDEBAR
===================================================== */

.sidebar{
position:fixed;
top:82px;
left:0;
bottom:0;
width:240px;
background:#fff;
border-right:1px solid #E5E7EB;
padding:18px 10px;
overflow:auto;
}

.sidebarMenu{
display:flex;
flex-direction:column;
gap:6px;
}

.sidebarMenu a{
height:52px;
padding:0 16px;
display:flex;
align-items:center;
gap:14px;
border-radius:14px;
text-decoration:none;
font-size:15px;
font-weight:700;
color:#374151;
}

.sidebarMenu a.active{
background:#111827;
color:#fff;
}

/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
padding:24px;
height:calc(100vh - 82px);
overflow:auto;
}

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

.markBtn{
height:54px;
padding:0 24px;
border:none;
border-radius:14px;
background:#111827;
color:#fff;
font-size:14px;
font-weight:800;
cursor:pointer;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border-radius:24px;
padding:24px;
border:1px solid #E5E7EB;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:34px;
font-weight:900;
margin-top:10px;
}

/* =====================================================
FILTER
===================================================== */

.filterBar{
background:#fff;
border-radius:24px;
padding:18px;
border:1px solid #E5E7EB;
display:flex;
gap:14px;
margin-bottom:24px;
}

.searchBox{
width:320px;
height:54px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

.selectBox{
height:54px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
font-weight:700;
background:#fff;
}

/* =====================================================
TABLE
===================================================== */

.tableWrap{
background:#fff;
border-radius:24px;
border:1px solid #E5E7EB;
overflow:hidden;
}

.tableHead{
height:64px;
display:grid;
grid-template-columns:
1fr
180px
180px
180px
160px
160px;
align-items:center;
padding:0 20px;
font-size:14px;
font-weight:900;
border-bottom:1px solid #E5E7EB;
}

.attendanceRow{
min-height:74px;
display:grid;
grid-template-columns:
1fr
180px
180px
180px
160px
160px;
align-items:center;
padding:0 20px;
border-bottom:1px solid #F3F4F6;
font-size:14px;
}

/* =====================================================
USER
===================================================== */

.user{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:56px;
height:56px;
border-radius:18px;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:900;
}

/* =====================================================
STATUS
===================================================== */

.badge{
padding:10px 14px;
border-radius:999px;
font-size:12px;
font-weight:900;
width:max-content;
}

.present{
background:#DCFCE7;
color:#166534;
}

.absent{
background:#FEE2E2;
color:#991B1B;
}

.late{
background:#FEF3C7;
color:#92400E;
}

/* =====================================================
BUTTON
===================================================== */

.actionBtn{
height:44px;
padding:0 18px;
border:none;
border-radius:12px;
background:#111827;
color:#fff;
font-size:13px;
font-weight:800;
cursor:pointer;
}

</style>

</head>

<body>

<!-- =====================================================
TOPBAR
===================================================== -->

<div class="topbar">

<div class="logo">
QuickPress
</div>

</div>

<!-- =====================================================
SIDEBAR
===================================================== -->

<div class="sidebar">

<div class="sidebarMenu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="roles.html">
<i class="fa-solid fa-user-shield"></i>
Admin Roles
</a>

<a href="attendance.html" class="active">
<i class="fa-solid fa-user-check"></i>
Attendance
</a>

<a href="auditlogs.html">
<i class="fa-solid fa-clock-rotate-left"></i>
Audit Logs
</a>

</div>

</div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<!-- =====================================================
HEADER
===================================================== -->

<div class="pageHeader">

<h1>
Attendance System
</h1>

<button
class="markBtn"
onclick="markAttendance()">

+ Mark Attendance

</button>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Present Today
</span>

<h2 id="presentCount">
0
</h2>

</div>

<div class="statCard">

<span>
Absent Today
</span>

<h2 id="absentCount">
0
</h2>

</div>

<div class="statCard">

<span>
Late Entry
</span>

<h2 id="lateCount">
0
</h2>

</div>

<div class="statCard">

<span>
Total Staff
</span>

<h2 id="totalStaff">
0
</h2>

</div>

</div>

<!-- =====================================================
FILTERS
===================================================== -->

<div class="filterBar">

<input
type="text"
placeholder="Search staff..."
class="searchBox"
id="searchInput"
/>

<select
class="selectBox"
id="statusFilter">

<option value="All">
All Status
</option>

<option value="Present">
Present
</option>

<option value="Absent">
Absent
</option>

<option value="Late">
Late
</option>

</select>

</div>

<!-- =====================================================
TABLE
===================================================== -->

<div class="tableWrap">

<div class="tableHead">

<div>
Staff
</div>

<div>
Role
</div>

<div>
Check In
</div>

<div>
Check Out
</div>

<div>
Status
</div>

<div>
Action
</div>

</div>

<div id="attendanceContainer">

</div>

</div>

</div>

<script type="module"
src="./js/attendance.js">
</script>

</body>
</html>
