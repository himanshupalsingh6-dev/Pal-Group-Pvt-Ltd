<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Riders</title>

<link rel="stylesheet" href="./css/style.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
color:#fff;
position:fixed;
height:100%;
padding-top:20px;
}

.logo{
font-size:28px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:17px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:19px;
margin-bottom:15px;
}

.card h1{
margin:0;
font-size:42px;
}

/* FORM */

.formCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.formGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* STATUS */

.status{
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
}

.active{
background:#86efac;
}

.blocked{
background:#fecaca;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#3b82f6;
color:#fff;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button class="activeBtn">
🚚 Riders
</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

<a href="./analytics.html">
<button>📈 Analytics</button>
</a>

<a href="./help.html">
<button>🛠 Help</button>
</a>

<a href="./staff.html">
<button>👨‍💼 Staff</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>🚚 Riders Management</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Riders</h2>
<h1 id="totalRiders">0</h1>
</div>

<div class="card">
<h2>Active Riders</h2>
<h1 id="activeRiders">0</h1>
</div>

<div class="card">
<h2>Total Deliveries</h2>
<h1 id="totalDeliveries">0</h1>
</div>

<div class="card">
<h2>Total Earnings</h2>
<h1 id="totalEarnings">₹0</h1>
</div>

</div>

<!-- CREATE RIDER -->

<div class="formCard">

<h2>Create Rider</h2>

<div class="formGrid">

<input type="text" id="riderName" placeholder="Rider Name">

<input type="text" id="riderPhone" placeholder="Phone">

<input type="email" id="riderEmail" placeholder="Email">

<input type="text" id="riderVehicle" placeholder="Vehicle">

<input type="text" id="riderAddress" placeholder="Address">

<select id="riderStatus">

<option value="active">
Active
</option>

<option value="blocked">
Blocked
</option>

</select>

</div>

<br>

<button
class="btn green"
onclick="createRider()"
>
Create Rider
</button>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>Riders List</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Phone</th>
<th>Vehicle</th>
<th>Deliveries</th>
<th>Earnings</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="ridersTable">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {

collection,
onSnapshot,
addDoc,
doc,
updateDoc,
deleteDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalRiders =
document.getElementById("totalRiders");

const activeRiders =
document.getElementById("activeRiders");

const totalDeliveries =
document.getElementById("totalDeliveries");

const totalEarnings =
document.getElementById("totalEarnings");

const ridersTable =
document.getElementById("ridersTable");

const riderName =
document.getElementById("riderName");

const riderPhone =
document.getElementById("riderPhone");

const riderEmail =
document.getElementById("riderEmail");

const riderVehicle =
document.getElementById("riderVehicle");

const riderAddress =
document.getElementById("riderAddress");

const riderStatus =
document.getElementById("riderStatus");

let allRiders = [];

onSnapshot(collection(db,"riders"),(snapshot)=>{

let active = 0;
let deliveries = 0;
let earnings = 0;

allRiders = [];

snapshot.forEach((docSnap)=>{

const rider = docSnap.data();

allRiders.push({
id:docSnap.id,
...rider
});

if(rider.status === "active"){
active++;
}

deliveries += Number(rider.totalDeliveries || 0);

earnings += Number(rider.totalEarning || 0);

});

totalRiders.innerHTML = snapshot.size;

activeRiders.innerHTML = active;

totalDeliveries.innerHTML = deliveries;

totalEarnings.innerHTML = "₹" + earnings;

renderRiders();

});

function renderRiders(){

let html = "";

allRiders.forEach((r)=>{

html += `

<tr>

<td>${r.name || "-"}</td>

<td>${r.phone || "-"}</td>

<td>${r.vehicle || "-"}</td>

<td>${r.totalDeliveries || 0}</td>

<td>₹${r.totalEarning || 0}</td>

<td>

<span class="status ${r.status}">
${r.status}
</span>

</td>

<td>

<button
class="btn blue"
onclick="toggleStatus('${r.id}','${r.status}')"
>
Toggle
</button>

<button
class="btn red"
onclick="deleteRider('${r.id}')"
>
Delete
</button>

</td>

</tr>

`;

});

ridersTable.innerHTML = html;

}

window.createRider = async function(){

if(
!riderName.value ||
!riderPhone.value
){
alert("Fill required fields");
return;
}

await addDoc(collection(db,"riders"),{

name:riderName.value,
phone:riderPhone.value,
email:riderEmail.value,
vehicle:riderVehicle.value,
address:riderAddress.value,
status:riderStatus.value,

totalDeliveries:0,
totalEarning:0,

createdAt:Date.now()

});

alert("Rider Created ✅");

riderName.value="";
riderPhone.value="";
riderEmail.value="";
riderVehicle.value="";
riderAddress.value="";

}

window.toggleStatus = async function(id,status){

let newStatus =
status === "active"
? "blocked"
: "active";

await updateDoc(doc(db,"riders",id),{
status:newStatus
});

}

window.deleteRider = async function(id){

let confirmDelete =
confirm("Delete Rider ?");

if(confirmDelete){

await deleteDoc(doc(db,"riders",id));

}

}

</script>

</body>
</html>
