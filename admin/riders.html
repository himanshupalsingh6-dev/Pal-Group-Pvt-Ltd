<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Riders</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#07142b;
position:fixed;
height:100%;
overflow:auto;
color:#fff;
}

.logo{
font-size:30px;
font-weight:bold;
padding:25px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:25px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* CARDS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
color:#666;
}

.card h1{
margin:0;
font-size:38px;
}

/* FORM */

.formCard{
background:#fff;
padding:25px;
border-radius:22px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.formGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
width:100%;
box-sizing:border-box;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#2563eb;
color:#fff;
}

/* STATUS */

.active{
color:#16a34a;
font-weight:bold;
}

.blocked{
color:#dc2626;
font-weight:bold;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
overflow:auto;
}

.modalContent{
background:#fff;
margin:30px auto;
padding:25px;
width:90%;
max-width:900px;
border-radius:25px;
}

.closeBtn{
float:right;
font-size:25px;
cursor:pointer;
}

.detailGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:25px;
}

.detailCard{
background:#f7f7f7;
padding:18px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button class="activeBtn">
🚚 Riders
</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
🚚 Advanced Riders Management
</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Riders</h2>
<h1 id="totalRiders">0</h1>
</div>

<div class="card">
<h2>Active Riders</h2>
<h1 id="activeRiders">0</h1>
</div>

<div class="card">
<h2>Total Earnings</h2>
<h1 id="totalEarnings">₹0</h1>
</div>

<div class="card">
<h2>Total Deliveries</h2>
<h1 id="totalDeliveries">0</h1>
</div>

</div>

<!-- CREATE RIDER -->

<div class="formCard">

<h2>
Create Rider Account
</h2>

<div class="formGrid">

<input
type="text"
id="riderName"
placeholder="Rider Name"
>

<input
type="text"
id="riderPhone"
placeholder="Phone Number"
>

<input
type="email"
id="riderEmail"
placeholder="Email"
>

<input
type="password"
id="riderPassword"
placeholder="Password"
>

<input
type="text"
id="riderVehicle"
placeholder="Vehicle Name"
>

<input
type="text"
id="riderNumber"
placeholder="Vehicle Number"
>

<input
type="text"
id="riderAddress"
placeholder="Address"
>

<input
type="text"
id="riderCity"
placeholder="City"
>

<select id="riderStatus">

<option value="active">
Active
</option>

<option value="blocked">
Blocked
</option>

</select>

</div>

<br>

<button
class="btn green"
onclick="createRider()"
>
Create Rider
</button>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>
All Riders
</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Vehicle</th>
<th>Deliveries</th>
<th>Earnings</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="ridersTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="riderModal">

<div class="modalContent">

<span
class="closeBtn"
onclick="closeRiderModal()"
>
✖
</span>

<h1>
🚚 Rider Full Details
</h1>

<div
class="detailGrid"
id="riderDetails"
>

</div>

</div>

</div>

<script type="module">

import {

initializeApp

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot,
doc,
setDoc,
deleteDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {

getAuth,
createUserWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBBaslH5QsahoyESYpo1nVtlYIUYfVJ2d4",

authDomain:
"quickpress-offical.firebaseapp.com",

projectId:
"quickpress-offical",

storageBucket:
"quickpress-offical.firebasestorage.app",

messagingSenderId:
"939286557961",

appId:
"1:939286557961:web:ddac64f197e14877718fd8"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

/* ELEMENTS */

const totalRiders =
document.getElementById("totalRiders");

const activeRiders =
document.getElementById("activeRiders");

const totalEarnings =
document.getElementById("totalEarnings");

const totalDeliveries =
document.getElementById("totalDeliveries");

const ridersTable =
document.getElementById("ridersTable");

const riderName =
document.getElementById("riderName");

const riderPhone =
document.getElementById("riderPhone");

const riderEmail =
document.getElementById("riderEmail");

const riderPassword =
document.getElementById("riderPassword");

const riderVehicle =
document.getElementById("riderVehicle");

const riderNumber =
document.getElementById("riderNumber");

const riderAddress =
document.getElementById("riderAddress");

const riderCity =
document.getElementById("riderCity");

const riderStatus =
document.getElementById("riderStatus");

let allRiders = [];

/* LIVE */

onSnapshot(
collection(db,"riders"),
(snapshot)=>{

let active = 0;
let earnings = 0;
let deliveries = 0;

allRiders = [];

snapshot.forEach((docSnap)=>{

const r = docSnap.data();

allRiders.push({
id:docSnap.id,
...r
});

if(r.status === "active"){
active++;
}

earnings +=
Number(r.totalEarning || 0);

deliveries +=
Number(r.totalDeliveries || 0);

});

totalRiders.innerHTML =
snapshot.size;

activeRiders.innerHTML =
active;

totalEarnings.innerHTML =
"₹" + earnings;

totalDeliveries.innerHTML =
deliveries;

renderRiders();

});

/* RENDER */

function renderRiders(){

let html = "";

allRiders.forEach((r)=>{

html += `

<tr>

<td>${r.name || "-"}</td>

<td>${r.phone || "-"}</td>

<td>${r.email || "-"}</td>

<td>${r.vehicle || "-"}</td>

<td>${r.totalDeliveries || 0}</td>

<td>₹${r.totalEarning || 0}</td>

<td class="${r.status}">
${r.status}
</td>

<td>

<button
class="btn blue"
onclick='viewRider(${JSON.stringify(r)})'
>
View
</button>

<button
class="btn green"
onclick="
toggleStatus(
'${r.id}',
'${r.status}'
)
"
>
Toggle
</button>

<button
class="btn red"
onclick="
deleteRider(
'${r.id}'
)
"
>
Delete
</button>

</td>

</tr>

`;

});

ridersTable.innerHTML = html;

}

/* CREATE */

window.createRider =
async function(){

if(
!riderName.value ||
!riderPhone.value ||
!riderEmail.value ||
!riderPassword.value
){
alert("Fill required fields");
return;
}

try{

const result =
await createUserWithEmailAndPassword(
auth,
riderEmail.value,
riderPassword.value
);

const uid =
result.user.uid;

await setDoc(
doc(db,"riders",uid),
{

uid:uid,

name:riderName.value,

phone:riderPhone.value,

email:riderEmail.value,

vehicle:riderVehicle.value,

vehicleNumber:riderNumber.value,

address:riderAddress.value,

city:riderCity.value,

status:riderStatus.value,

wallet:0,

totalDeliveries:0,

totalEarning:0,

createdAt:Date.now()

}
);

alert("Rider Created ✅");

riderName.value="";
riderPhone.value="";
riderEmail.value="";
riderPassword.value="";
riderVehicle.value="";
riderNumber.value="";
riderAddress.value="";
riderCity.value="";

}catch(error){

alert(error.message);

}

}

/* VIEW */

window.viewRider =
function(r){

const modal =
document.getElementById(
"riderModal"
);

const details =
document.getElementById(
"riderDetails"
);

modal.style.display =
"block";

let date =
new Date(
r.createdAt || Date.now()
).toLocaleString();

details.innerHTML = `

<div class="detailCard">
<b>Name</b><br>
${r.name || "-"}
</div>

<div class="detailCard">
<b>Phone</b><br>
${r.phone || "-"}
</div>

<div class="detailCard">
<b>Email</b><br>
${r.email || "-"}
</div>

<div class="detailCard">
<b>Vehicle</b><br>
${r.vehicle || "-"}
</div>

<div class="detailCard">
<b>Vehicle Number</b><br>
${r.vehicleNumber || "-"}
</div>

<div class="detailCard">
<b>Address</b><br>
${r.address || "-"}
</div>

<div class="detailCard">
<b>City</b><br>
${r.city || "-"}
</div>

<div class="detailCard">
<b>Total Deliveries</b><br>
${r.totalDeliveries || 0}
</div>

<div class="detailCard">
<b>Total Earnings</b><br>
₹${r.totalEarning || 0}
</div>

<div class="detailCard">
<b>Wallet</b><br>
₹${r.wallet || 0}
</div>

<div class="detailCard">
<b>Status</b><br>
${r.status || "-"}
</div>

<div class="detailCard">
<b>Created</b><br>
${date}
</div>

`;

}

/* CLOSE */

window.closeRiderModal =
function(){

document.getElementById(
"riderModal"
).style.display = "none";

}

/* DELETE */

window.deleteRider =
async function(id){

let confirmDelete =
confirm("Delete Rider ?");

if(confirmDelete){

await deleteDoc(
doc(db,"riders",id)
);

}

}

/* STATUS */

window.toggleStatus =
async function(id,status){

let newStatus =
status === "active"
? "blocked"
: "active";

await updateDoc(
doc(db,"riders",id),
{
status:newStatus
}
);

}

</script>

</body>
</html>
