<!-- =========================================================
FILE : admin/franchise.html
QUICKPRESS FRANCHISE MANAGEMENT
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Franchise
</title>

<link rel="stylesheet"
href="./css/global.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:52px;
font-weight:900;
}

/* =====================================================
BUTTON
===================================================== */

.addBtn{
height:54px;
padding:0 24px;
border:none;
border-radius:16px;
background:#111827;
color:#fff;
font-size:14px;
font-weight:800;
cursor:pointer;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border-radius:28px;
border:1px solid #E5E7EB;
padding:24px;
}

.statCard span{
font-size:14px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:38px;
font-weight:900;
margin-top:10px;
}

/* =====================================================
TABLE
===================================================== */

.tableWrap{
background:#fff;
border-radius:28px;
border:1px solid #E5E7EB;
overflow:hidden;
}

.tableHead{
height:62px;
display:grid;
grid-template-columns:
1fr
160px
160px
160px
160px
160px;
align-items:center;
padding:0 20px;
font-size:14px;
font-weight:900;
border-bottom:1px solid #E5E7EB;
}

.franchiseRow{
min-height:84px;
display:grid;
grid-template-columns:
1fr
160px
160px
160px
160px
160px;
align-items:center;
padding:0 20px;
border-bottom:1px solid #F3F4F6;
font-size:14px;
}

/* =====================================================
STATUS
===================================================== */

.badge{
padding:10px 14px;
border-radius:999px;
font-size:12px;
font-weight:900;
width:max-content;
}

.active{
background:#DCFCE7;
color:#166534;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

.closed{
background:#FEE2E2;
color:#991B1B;
}

/* =====================================================
BUTTON
===================================================== */

.actionBtn{
height:44px;
padding:0 18px;
border:none;
border-radius:14px;
background:#111827;
color:#fff;
font-size:13px;
font-weight:800;
cursor:pointer;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<!-- =====================================================
HEADER
===================================================== -->

<div class="pageHeader">

<h1>
Franchise Management
</h1>

<button
class="addBtn"
onclick="addFranchise()">

+ Add Franchise

</button>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Franchise
</span>

<h2 id="totalFranchise">
0
</h2>

</div>

<div class="statCard">

<span>
Active Franchise
</span>

<h2 id="activeFranchise">
0
</h2>

</div>

<div class="statCard">

<span>
Monthly Revenue
</span>

<h2 id="monthlyRevenue">
₹0
</h2>

</div>

<div class="statCard">

<span>
Pending Approval
</span>

<h2 id="pendingFranchise">
0
</h2>

</div>

</div>

<!-- =====================================================
TABLE
===================================================== -->

<div class="tableWrap">

<div class="tableHead">

<div>
Franchise
</div>

<div>
City
</div>

<div>
Orders
</div>

<div>
Revenue
</div>

<div>
Status
</div>

<div>
Action
</div>

</div>

<div id="franchiseContainer">

</div>

</div>

</div>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>

<script type="module"
src="./js/franchise.js">
</script>

</body>
</html>
