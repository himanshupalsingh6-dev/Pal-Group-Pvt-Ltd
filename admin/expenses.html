<!-- =========================================================
FILE : admin/expenses.html
QUICKPRESS EXPENSE MANAGER
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Expense Manager
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="./css/global.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}

/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
padding:24px;
height:calc(100vh - 82px);
overflow:auto;
}

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

.addBtn{
height:54px;
padding:0 24px;
border:none;
border-radius:14px;
background:#111827;
color:#fff;
font-size:14px;
font-weight:800;
cursor:pointer;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border-radius:24px;
padding:24px;
border:1px solid #E5E7EB;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:34px;
font-weight:900;
margin-top:10px;
}

/* =====================================================
CHART + TABLE
===================================================== */

.layout{
display:grid;
grid-template-columns:420px 1fr;
gap:24px;
}

/* =====================================================
CHART CARD
===================================================== */

.chartCard{
background:#fff;
border-radius:24px;
padding:24px;
border:1px solid #E5E7EB;
height:420px;
}

.chartCard h2{
font-size:24px;
font-weight:900;
margin-bottom:24px;
}

/* =====================================================
TABLE
===================================================== */

.tableWrap{
background:#fff;
border-radius:24px;
border:1px solid #E5E7EB;
overflow:hidden;
}

.tableHead{
height:64px;
display:grid;
grid-template-columns:
1fr
180px
180px
180px
140px;
align-items:center;
padding:0 20px;
font-size:14px;
font-weight:900;
border-bottom:1px solid #E5E7EB;
}

.expenseRow{
min-height:74px;
display:grid;
grid-template-columns:
1fr
180px
180px
180px
140px;
align-items:center;
padding:0 20px;
border-bottom:1px solid #F3F4F6;
font-size:14px;
}

/* =====================================================
BADGES
===================================================== */

.badge{
padding:10px 14px;
border-radius:999px;
font-size:12px;
font-weight:900;
width:max-content;
}

.office{
background:#DBEAFE;
color:#1E40AF;
}

.salary{
background:#DCFCE7;
color:#166534;
}

.delivery{
background:#FEF3C7;
color:#92400E;
}

.marketing{
background:#FEE2E2;
color:#991B1B;
}

/* =====================================================
BUTTON
===================================================== */

.actionBtn{
height:42px;
padding:0 16px;
border:none;
border-radius:12px;
background:#111827;
color:#fff;
font-size:13px;
font-weight:800;
cursor:pointer;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<!-- =====================================================
HEADER
===================================================== -->

<div class="pageHeader">

<h1>
Expense Manager
</h1>

<button
class="addBtn"
onclick="addExpense()">

+ Add Expense

</button>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Expense
</span>

<h2 id="totalExpense">
₹0
</h2>

</div>

<div class="statCard">

<span>
Office Expense
</span>

<h2 id="officeExpense">
₹0
</h2>

</div>

<div class="statCard">

<span>
Salary Expense
</span>

<h2 id="salaryExpense">
₹0
</h2>

</div>

<div class="statCard">

<span>
Marketing Expense
</span>

<h2 id="marketingExpense">
₹0
</h2>

</div>

</div>

<!-- =====================================================
LAYOUT
===================================================== -->

<div class="layout">

<!-- CHART -->

<div class="chartCard">

<h2>
Expense Analytics
</h2>

<canvas id="expenseChart"></canvas>

</div>

<!-- TABLE -->

<div class="tableWrap">

<div class="tableHead">

<div>
Expense Name
</div>

<div>
Category
</div>

<div>
Amount
</div>

<div>
Date
</div>

<div>
Action
</div>

</div>

<div id="expenseContainer">

</div>

</div>

</div>

</div>

<script type="module"
src="./js/expenses.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>
  

</body>
</html>
