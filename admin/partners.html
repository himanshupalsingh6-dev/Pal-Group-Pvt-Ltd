<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Partners</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:30px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:17px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:12px;
}

.card h1{
margin:0;
font-size:42px;
}

/* FORM */

.formCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.formGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#3b82f6;
color:#fff;
}

/* STATUS */

.status{
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
}

.active{
background:#86efac;
}

.blocked{
background:#fecaca;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button class="activeBtn">
👨‍🏭 Partners
</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

<a href="./analytics.html">
<button>📈 Analytics</button>
</a>

<a href="./help.html">
<button>🛠 Help</button>
</a>

<a href="./staff.html">
<button>👨‍💼 Staff</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>👨‍🏭 Partners Management</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Partners</h2>
<h1 id="totalPartners">0</h1>
</div>

<div class="card">
<h2>Active Partners</h2>
<h1 id="activePartners">0</h1>
</div>

<div class="card">
<h2>Total Orders</h2>
<h1 id="totalOrders">0</h1>
</div>

<div class="card">
<h2>Total Earnings</h2>
<h1 id="totalEarnings">₹0</h1>
</div>

</div>

<!-- CREATE PARTNER -->

<div class="formCard">

<h2>Create Partner</h2>

<div class="formGrid">

<input type="text" id="partnerName" placeholder="Partner Name">

<input type="text" id="partnerPhone" placeholder="Phone">

<input type="email" id="partnerEmail" placeholder="Email">

<input type="text" id="partnerShop" placeholder="Shop Name">

<input type="text" id="partnerAddress" placeholder="Address">

<select id="partnerStatus">

<option value="active">
Active
</option>

<option value="blocked">
Blocked
</option>

</select>

</div>

<br>

<button
class="btn green"
onclick="createPartner()"
>
Create Partner
</button>

</div>

<!-- PARTNERS TABLE -->

<div class="tableCard">

<h2>Partners List</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Phone</th>
<th>Shop</th>
<th>Orders</th>
<th>Earnings</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="partnersTable">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {

collection,
onSnapshot,
addDoc,
doc,
updateDoc,
deleteDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalPartners =
document.getElementById("totalPartners");

const activePartners =
document.getElementById("activePartners");

const totalOrders =
document.getElementById("totalOrders");

const totalEarnings =
document.getElementById("totalEarnings");

const partnersTable =
document.getElementById("partnersTable");

const partnerName =
document.getElementById("partnerName");

const partnerPhone =
document.getElementById("partnerPhone");

const partnerEmail =
document.getElementById("partnerEmail");

const partnerShop =
document.getElementById("partnerShop");

const partnerAddress =
document.getElementById("partnerAddress");

const partnerStatus =
document.getElementById("partnerStatus");

let allPartners = [];

onSnapshot(collection(db,"partners"),(snapshot)=>{

let active = 0;
let orders = 0;
let earnings = 0;

allPartners = [];

snapshot.forEach((docSnap)=>{

const partner = docSnap.data();

allPartners.push({
id:docSnap.id,
...partner
});

if(partner.status === "active"){
active++;
}

orders += Number(partner.totalOrders || 0);

earnings += Number(partner.totalEarning || 0);

});

totalPartners.innerHTML = snapshot.size;

activePartners.innerHTML = active;

totalOrders.innerHTML = orders;

totalEarnings.innerHTML = "₹" + earnings;

renderPartners();

});

function renderPartners(){

let html = "";

allPartners.forEach((p)=>{

html += `

<tr>

<td>${p.name || "-"}</td>

<td>${p.phone || "-"}</td>

<td>${p.shop || "-"}</td>

<td>${p.totalOrders || 0}</td>

<td>₹${p.totalEarning || 0}</td>

<td>

<span class="status ${p.status}">
${p.status}
</span>

</td>

<td>

<button
class="btn blue"
onclick="toggleStatus('${p.id}','${p.status}')"
>
Toggle
</button>

<button
class="btn red"
onclick="deletePartner('${p.id}')"
>
Delete
</button>

</td>

</tr>

`;

});

partnersTable.innerHTML = html;

}

window.createPartner = async function(){

if(
!partnerName.value ||
!partnerPhone.value
){
alert("Fill required fields");
return;
}

await addDoc(collection(db,"partners"),{

name:partnerName.value,
phone:partnerPhone.value,
email:partnerEmail.value,
shop:partnerShop.value,
address:partnerAddress.value,
status:partnerStatus.value,

totalOrders:0,
totalEarning:0,

createdAt:Date.now()

});

alert("Partner Created ✅");

partnerName.value="";
partnerPhone.value="";
partnerEmail.value="";
partnerShop.value="";
partnerAddress.value="";

}

window.toggleStatus = async function(id,status){

let newStatus =
status === "active"
? "blocked"
: "active";

await updateDoc(doc(db,"partners",id),{
status:newStatus
});

}

window.deletePartner = async function(id){

let confirmDelete =
confirm("Delete Partner ?");

if(confirmDelete){

await deleteDoc(doc(db,"partners",id));

}

}

</script>

</body>
</html>
