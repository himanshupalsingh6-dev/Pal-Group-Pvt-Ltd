<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Partners</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#07142b;
position:fixed;
height:100%;
overflow:auto;
color:#fff;
}

.logo{
font-size:30px;
font-weight:bold;
padding:25px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:25px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* CARDS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
color:#666;
}

.card h1{
margin:0;
font-size:38px;
}

/* FORM */

.formCard{
background:#fff;
padding:25px;
border-radius:22px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.formGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
width:100%;
box-sizing:border-box;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#2563eb;
color:#fff;
}

/* STATUS */

.active{
color:#16a34a;
font-weight:bold;
}

.blocked{
color:#dc2626;
font-weight:bold;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
overflow:auto;
}

.modalContent{
background:#fff;
margin:30px auto;
padding:25px;
width:90%;
max-width:900px;
border-radius:25px;
}

.closeBtn{
float:right;
font-size:25px;
cursor:pointer;
}

.detailGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:25px;
}

.detailCard{
background:#f7f7f7;
padding:18px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="layout">



<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
👨‍🏭 Advanced Partners Management
</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Partners</h2>
<h1 id="totalPartners">0</h1>
</div>

<div class="card">
<h2>Active Partners</h2>
<h1 id="activePartners">0</h1>
</div>

<div class="card">
<h2>Total Earnings</h2>
<h1 id="totalEarnings">₹0</h1>
</div>

<div class="card">
<h2>Total Orders</h2>
<h1 id="totalOrders">0</h1>
</div>

</div>

<!-- CREATE PARTNER -->

<div class="formCard">

<h2>
Create Partner Account
</h2>

<div class="formGrid">

<input
type="text"
id="partnerName"
placeholder="Partner Name"
>

<input
type="text"
id="partnerPhone"
placeholder="Phone Number"
>

<input
type="email"
id="partnerEmail"
placeholder="Email"
>

<input
type="password"
id="partnerPassword"
placeholder="Password"
>

<input
type="text"
id="partnerShop"
placeholder="Shop Name"
>

<input
type="text"
id="partnerAddress"
placeholder="Address"
>

<input
type="text"
id="partnerCity"
placeholder="City"
>

<input
type="text"
id="partnerPincode"
placeholder="Pincode"
>

<select id="partnerStatus">

<option value="active">
Active
</option>

<option value="blocked">
Blocked
</option>

</select>

</div>

<br>

<button
class="btn green"
onclick="createPartner()"
>
Create Partner
</button>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>
All Partners
</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Shop</th>
<th>Orders</th>
<th>Earnings</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="partnersTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="partnerModal">

<div class="modalContent">

<span
class="closeBtn"
onclick="closePartnerModal()"
>
✖
</span>

<h1>
👨‍🏭 Partner Full Details
</h1>

<div
class="detailGrid"
id="partnerDetails"
>

</div>

</div>

</div>

<script type="module">

import {

initializeApp

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot,
doc,
setDoc,
deleteDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {

getAuth,
createUserWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBBaslH5QsahoyESYpo1nVtlYIUYfVJ2d4",

authDomain:
"quickpress-offical.firebaseapp.com",

projectId:
"quickpress-offical",

storageBucket:
"quickpress-offical.firebasestorage.app",

messagingSenderId:
"939286557961",

appId:
"1:939286557961:web:ddac64f197e14877718fd8"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

/* ELEMENTS */

const totalPartners =
document.getElementById("totalPartners");

const activePartners =
document.getElementById("activePartners");

const totalEarnings =
document.getElementById("totalEarnings");

const totalOrders =
document.getElementById("totalOrders");

const partnersTable =
document.getElementById("partnersTable");

const partnerName =
document.getElementById("partnerName");

const partnerPhone =
document.getElementById("partnerPhone");

const partnerEmail =
document.getElementById("partnerEmail");

const partnerPassword =
document.getElementById("partnerPassword");

const partnerShop =
document.getElementById("partnerShop");

const partnerAddress =
document.getElementById("partnerAddress");

const partnerCity =
document.getElementById("partnerCity");

const partnerPincode =
document.getElementById("partnerPincode");

const partnerStatus =
document.getElementById("partnerStatus");

let allPartners = [];

/* LIVE DATA */

onSnapshot(
collection(db,"partners"),
(snapshot)=>{

let active = 0;
let earnings = 0;
let orders = 0;

allPartners = [];

snapshot.forEach((docSnap)=>{

const p = docSnap.data();

allPartners.push({
id:docSnap.id,
...p
});

if(p.status === "active"){
active++;
}

earnings +=
Number(p.totalEarning || 0);

orders +=
Number(p.totalOrders || 0);

});

totalPartners.innerHTML =
snapshot.size;

activePartners.innerHTML =
active;

totalEarnings.innerHTML =
"₹" + earnings;

totalOrders.innerHTML =
orders;

renderPartners();

});

/* RENDER */

function renderPartners(){

let html = "";

allPartners.forEach((p)=>{

html += `

<tr>

<td>${p.name || "-"}</td>

<td>${p.phone || "-"}</td>

<td>${p.email || "-"}</td>

<td>${p.shop || "-"}</td>

<td>${p.totalOrders || 0}</td>

<td>₹${p.totalEarning || 0}</td>

<td class="${p.status}">
${p.status}
</td>

<td>

<button
class="btn blue"
onclick='viewPartner(${JSON.stringify(p)})'
>
View
</button>

<button
class="btn green"
onclick="
toggleStatus(
'${p.id}',
'${p.status}'
)
"
>
Toggle
</button>

<button
class="btn red"
onclick="
deletePartner(
'${p.id}'
)
"
>
Delete
</button>

</td>

</tr>

`;

});

partnersTable.innerHTML = html;

}

/* CREATE */

window.createPartner =
async function(){

if(
!partnerName.value ||
!partnerPhone.value ||
!partnerEmail.value ||
!partnerPassword.value
){
alert("Fill required fields");
return;
}

try{

const result =
await createUserWithEmailAndPassword(
auth,
partnerEmail.value,
partnerPassword.value
);

const uid =
result.user.uid;

await setDoc(
doc(db,"partners",uid),
{

uid:uid,

name:partnerName.value,

phone:partnerPhone.value,

email:partnerEmail.value,

shop:partnerShop.value,

address:partnerAddress.value,

city:partnerCity.value,

pincode:partnerPincode.value,

status:partnerStatus.value,

wallet:0,

totalOrders:0,

totalEarning:0,

createdAt:Date.now()

}
);

alert("Partner Created ✅");

partnerName.value="";
partnerPhone.value="";
partnerEmail.value="";
partnerPassword.value="";
partnerShop.value="";
partnerAddress.value="";
partnerCity.value="";
partnerPincode.value="";

}catch(error){

alert(error.message);

}

}

/* VIEW */

window.viewPartner =
function(p){

const modal =
document.getElementById(
"partnerModal"
);

const details =
document.getElementById(
"partnerDetails"
);

modal.style.display =
"block";

let date =
new Date(
p.createdAt || Date.now()
).toLocaleString();

details.innerHTML = `

<div class="detailCard">
<b>Name</b><br>
${p.name || "-"}
</div>

<div class="detailCard">
<b>Phone</b><br>
${p.phone || "-"}
</div>

<div class="detailCard">
<b>Email</b><br>
${p.email || "-"}
</div>

<div class="detailCard">
<b>Shop</b><br>
${p.shop || "-"}
</div>

<div class="detailCard">
<b>Address</b><br>
${p.address || "-"}
</div>

<div class="detailCard">
<b>City</b><br>
${p.city || "-"}
</div>

<div class="detailCard">
<b>Pincode</b><br>
${p.pincode || "-"}
</div>

<div class="detailCard">
<b>Total Orders</b><br>
${p.totalOrders || 0}
</div>

<div class="detailCard">
<b>Total Earnings</b><br>
₹${p.totalEarning || 0}
</div>

<div class="detailCard">
<b>Wallet</b><br>
₹${p.wallet || 0}
</div>

<div class="detailCard">
<b>Status</b><br>
${p.status || "-"}
</div>

<div class="detailCard">
<b>Created</b><br>
${date}
</div>

`;

}

/* CLOSE */

window.closePartnerModal =
function(){

document.getElementById(
"partnerModal"
).style.display = "none";

}

/* DELETE */

window.deletePartner =
async function(id){

let confirmDelete =
confirm("Delete Partner ?");

if(confirmDelete){

await deleteDoc(
doc(db,"partners",id)
);

}

}

/* STATUS */

window.toggleStatus =
async function(id,status){

let newStatus =
status === "active"
? "blocked"
: "active";

await updateDoc(
doc(db,"partners",id),
{
status:newStatus
}
);

}

</script>

</body>
</html>
