<!-- =========================================================
FILE : admin/partners.html
QUICKPRESS ENTERPRISE PARTNERS PANEL
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Partners
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  
<link rel="stylesheet" href="./css/global.css"/>
  
<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}

/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
height:calc(100vh - 82px);
overflow:auto;
padding:24px;
}

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

.addBtn{
height:52px;
padding:0 22px;
border:none;
border-radius:14px;
background:#111827;
color:#fff;
font-size:14px;
font-weight:700;
cursor:pointer;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:22px;
padding:22px;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:34px;
font-weight:900;
margin-top:10px;
}

/* =====================================================
FILTERS
===================================================== */

.filterBar{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:18px;
display:flex;
gap:14px;
margin-bottom:24px;
}

.searchBox{
width:320px;
height:52px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

.selectBox{
height:52px;
padding:0 16px;
border-radius:14px;
border:1px solid #E5E7EB;
font-size:14px;
font-weight:600;
background:#fff;
}

/* =====================================================
GRID
===================================================== */

.partnersGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

/* =====================================================
CARD
===================================================== */

.partnerCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:22px;
}

.partnerTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.partnerInfo{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:58px;
height:58px;
border-radius:18px;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
}

.partnerInfo h3{
font-size:18px;
font-weight:900;
}

.partnerInfo p{
font-size:12px;
color:#6B7280;
margin-top:4px;
}

/* =====================================================
STATUS
===================================================== */

.status{
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:800;
}

.active{
background:#DCFCE7;
color:#166534;
}

.inactive{
background:#FEE2E2;
color:#991B1B;
}

/* =====================================================
INFO
===================================================== */

.infoGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:18px;
}

.infoBox{
background:#F9FAFB;
padding:14px;
border-radius:16px;
}

.infoBox span{
font-size:11px;
color:#6B7280;
}

.infoBox h4{
font-size:15px;
font-weight:900;
margin-top:5px;
}

/* =====================================================
BUTTONS
===================================================== */

.btnGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.btn{
height:46px;
border:none;
border-radius:14px;
font-size:13px;
font-weight:800;
cursor:pointer;
}

.viewBtn{
background:#111827;
color:#fff;
}

.callBtn{
background:#16A34A;
color:#fff;
}

.toggleBtn{
background:#2563EB;
color:#fff;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<div class="pageHeader">

<h1>
Partners
</h1>

<button
class="addBtn"
onclick="addPartner()">

+ Add Partner

</button>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Partners
</span>

<h2 id="totalPartners">
0
</h2>

</div>

<div class="statCard">

<span>
Active Partners
</span>

<h2 id="activePartners">
0
</h2>

</div>

<div class="statCard">

<span>
Total Orders
</span>

<h2 id="partnerOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Total Earnings
</span>

<h2 id="partnerRevenue">
₹0
</h2>

</div>

</div>

<!-- =====================================================
FILTERS
===================================================== -->

<div class="filterBar">

<input
type="text"
placeholder="Search Partner"
class="searchBox"
id="searchInput"
/>

<select
class="selectBox"
id="cityFilter">

<option value="All">
All Cities
</option>

</select>

</div>

<!-- =====================================================
GRID
===================================================== -->

<div
class="partnersGrid"
id="partnersGrid">

</div>

</div>

<script type="module"
src="./js/partners.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>
  
</body>
</html>
