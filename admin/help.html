<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Help Center</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:30px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:17px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* STATS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:12px;
}

.card h1{
margin:0;
font-size:42px;
}

/* FILTER */

.filterBox{
background:#fff;
padding:20px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.filterGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,select,textarea{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
width:100%;
box-sizing:border-box;
}

/* TICKETS */

.ticketCard{
background:#fff;
padding:25px;
border-radius:22px;
margin-bottom:20px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.ticketTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.ticketMessage{
background:#f7f7f7;
padding:15px;
border-radius:12px;
margin-top:10px;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#3b82f6;
color:#fff;
}

/* STATUS */

.open{
color:#d97706;
font-weight:bold;
}

.resolved{
color:#16a34a;
font-weight:bold;
}

.closed{
color:#dc2626;
font-weight:bold;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

<a href="./analytics.html">
<button>📈 Analytics</button>
</a>

<a href="./help.html">
<button class="activeBtn">
🛠 Help
</button>
</a>

<a href="./staff.html">
<button>👨‍💼 Staff</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>🛠 Help Center</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Tickets</h2>
<h1 id="totalTickets">0</h1>
</div>

<div class="card">
<h2>Open Tickets</h2>
<h1 id="openTickets">0</h1>
</div>

<div class="card">
<h2>Resolved</h2>
<h1 id="resolvedTickets">0</h1>
</div>

<div class="card">
<h2>Closed</h2>
<h1 id="closedTickets">0</h1>
</div>

</div>

<!-- FILTER -->

<div class="filterBox">

<div class="filterGrid">

<input
type="text"
id="searchInput"
placeholder="Search ticket..."
>

<select id="statusFilter">

<option value="all">
All Status
</option>

<option value="open">
Open
</option>

<option value="resolved">
Resolved
</option>

<option value="closed">
Closed
</option>

</select>

</div>

</div>

<!-- TICKETS -->

<div id="ticketsContainer">

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {

collection,
onSnapshot,
doc,
updateDoc,
deleteDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalTickets =
document.getElementById("totalTickets");

const openTickets =
document.getElementById("openTickets");

const resolvedTickets =
document.getElementById("resolvedTickets");

const closedTickets =
document.getElementById("closedTickets");

const ticketsContainer =
document.getElementById("ticketsContainer");

const searchInput =
document.getElementById("searchInput");

const statusFilter =
document.getElementById("statusFilter");

let allTickets = [];

onSnapshot(collection(db,"supportTickets"),(snapshot)=>{

let open = 0;
let resolved = 0;
let closed = 0;

allTickets = [];

snapshot.forEach((docSnap)=>{

const ticket = docSnap.data();

allTickets.push({
id:docSnap.id,
...ticket
});

if(ticket.status === "open"){
open++;
}

if(ticket.status === "resolved"){
resolved++;
}

if(ticket.status === "closed"){
closed++;
}

});

totalTickets.innerHTML =
snapshot.size;

openTickets.innerHTML =
open;

resolvedTickets.innerHTML =
resolved;

closedTickets.innerHTML =
closed;

renderTickets();

});

function renderTickets(){

let keyword =
searchInput.value.toLowerCase();

let status =
statusFilter.value;

let html = "";

let filtered = allTickets.filter((t)=>{

let matchSearch =
(t.subject || "")
.toLowerCase()
.includes(keyword);

let matchStatus =
status === "all"
? true
: t.status === status;

return matchSearch && matchStatus;

});

filtered.reverse().forEach((t)=>{

html += `

<div class="ticketCard">

<div class="ticketTop">

<div>

<h2>${t.subject || "-"}</h2>

<p>
${t.name || "-"}
</p>

</div>

<div class="${t.status}">
${t.status}
</div>

</div>

<div class="ticketMessage">

${t.message || "-"}

</div>

<br>

<button
class="btn green"
onclick="updateTicket(
'${t.id}',
'resolved'
)"
>
Resolve
</button>

<button
class="btn blue"
onclick="updateTicket(
'${t.id}',
'open'
)"
>
Open
</button>

<button
class="btn red"
onclick="deleteTicket('${t.id}')"
>
Delete
</button>

</div>

`;

});

ticketsContainer.innerHTML = html;

}

searchInput.addEventListener(
"input",
renderTickets
);

statusFilter.addEventListener(
"change",
renderTickets
);

window.updateTicket =
async function(id,status){

await updateDoc(
doc(db,"supportTickets",id),
{
status:status
}
);

alert("Ticket Updated ✅");

}

window.deleteTicket =
async function(id){

let confirmDelete =
confirm("Delete Ticket ?");

if(confirmDelete){

await deleteDoc(
doc(db,"supportTickets",id)
);

}

}

</script>

</body>
</html>
