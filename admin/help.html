<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuickPress Help Center</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#07142b;
position:fixed;
height:100%;
overflow:auto;
color:#fff;
}

.logo{
font-size:30px;
font-weight:bold;
padding:25px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:25px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* STATS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
color:#666;
}

.card h1{
margin:0;
font-size:38px;
}

/* FILTER */

.filterCard{
background:#fff;
padding:25px;
border-radius:22px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.filterGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

input,select,textarea{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
width:100%;
box-sizing:border-box;
}

textarea{
height:120px;
resize:none;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#2563eb;
color:#fff;
}

/* STATUS */

.open{
color:#d97706;
font-weight:bold;
}

.pending{
color:#2563eb;
font-weight:bold;
}

.closed{
color:#16a34a;
font-weight:bold;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
overflow:auto;
}

.modalContent{
background:#fff;
margin:30px auto;
padding:25px;
width:90%;
max-width:900px;
border-radius:25px;
}

.closeBtn{
float:right;
font-size:25px;
cursor:pointer;
}

.detailGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:25px;
}

.detailCard{
background:#f7f7f7;
padding:18px;
border-radius:15px;
}

.replyBox{
margin-top:25px;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

<a href="./help.html">
<button class="activeBtn">
🛠 Help
</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
🛠 Advanced Help & Support
</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Tickets</h2>
<h1 id="totalTickets">0</h1>
</div>

<div class="card">
<h2>Open Tickets</h2>
<h1 id="openTickets">0</h1>
</div>

<div class="card">
<h2>Pending Tickets</h2>
<h1 id="pendingTickets">0</h1>
</div>

<div class="card">
<h2>Closed Tickets</h2>
<h1 id="closedTickets">0</h1>
</div>

</div>

<!-- FILTER -->

<div class="filterCard">

<div class="filterGrid">

<input
type="text"
id="searchInput"
placeholder="Search ticket..."
>

<select id="statusFilter">

<option value="all">
All Status
</option>

<option value="open">
Open
</option>

<option value="pending">
Pending
</option>

<option value="closed">
Closed
</option>

</select>

</div>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>
All Support Tickets
</h2>

<table>

<thead>

<tr>

<th>User</th>
<th>Role</th>
<th>Subject</th>
<th>Priority</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody id="ticketsTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="ticketModal">

<div class="modalContent">

<span
class="closeBtn"
onclick="closeTicketModal()"
>
✖
</span>

<h1>
🎫 Ticket Full Details
</h1>

<div
class="detailGrid"
id="ticketDetails"
>

</div>

<div class="replyBox">

<h2>
💬 Admin Reply
</h2>

<textarea
id="replyMessage"
placeholder="Write reply..."
></textarea>

<br><br>

<button
class="btn green"
onclick="sendReply()"
>
Send Reply
</button>

<button
class="btn blue"
onclick="markPending()"
>
Mark Pending
</button>

<button
class="btn red"
onclick="closeTicket()"
>
Close Ticket
</button>

</div>

</div>

</div>

<script type="module">

import {

initializeApp

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
addDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBBaslH5QsahoyESYpo1nVtlYIUYfVJ2d4",

authDomain:
"quickpress-offical.firebaseapp.com",

projectId:
"quickpress-offical",

storageBucket:
"quickpress-offical.firebasestorage.app",

messagingSenderId:
"939286557961",

appId:
"1:939286557961:web:ddac64f197e14877718fd8"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* ELEMENTS */

const totalTickets =
document.getElementById("totalTickets");

const openTickets =
document.getElementById("openTickets");

const pendingTickets =
document.getElementById("pendingTickets");

const closedTickets =
document.getElementById("closedTickets");

const ticketsTable =
document.getElementById("ticketsTable");

const searchInput =
document.getElementById("searchInput");

const statusFilter =
document.getElementById("statusFilter");

let allTickets = [];
let currentTicket = null;

/* LIVE */

onSnapshot(
collection(db,"supportTickets"),
(snapshot)=>{

let open = 0;
let pending = 0;
let closed = 0;

allTickets = [];

snapshot.forEach((docSnap)=>{

const t = docSnap.data();

allTickets.push({
id:docSnap.id,
...t
});

if(t.status === "open"){
open++;
}

if(t.status === "pending"){
pending++;
}

if(t.status === "closed"){
closed++;
}

});

totalTickets.innerHTML =
snapshot.size;

openTickets.innerHTML =
open;

pendingTickets.innerHTML =
pending;

closedTickets.innerHTML =
closed;

renderTickets();

});

/* RENDER */

function renderTickets(){

let keyword =
searchInput.value.toLowerCase();

let status =
statusFilter.value;

let html = "";

let filtered = allTickets.filter((t)=>{

let matchSearch =

(t.subject || "")
.toLowerCase()
.includes(keyword)

||

(t.name || "")
.toLowerCase()
.includes(keyword);

let matchStatus =

status === "all"
? true
: t.status === status;

return matchSearch && matchStatus;

});

filtered.reverse().forEach((t)=>{

let date =
new Date(
t.createdAt || Date.now()
).toLocaleString();

html += `

<tr>

<td>${t.name || "-"}</td>

<td>${t.role || "-"}</td>

<td>${t.subject || "-"}</td>

<td>${t.priority || "-"}</td>

<td class="${t.status}">
${t.status}
</td>

<td>${date}</td>

<td>

<button
class="btn blue"
onclick='viewTicket(${JSON.stringify(t)})'
>
View
</button>

</td>

</tr>

`;

});

ticketsTable.innerHTML = html;

}

searchInput.addEventListener(
"input",
renderTickets
);

statusFilter.addEventListener(
"change",
renderTickets
);

/* VIEW */

window.viewTicket =
function(t){

currentTicket = t;

document.getElementById(
"ticketModal"
).style.display = "block";

let date =
new Date(
t.createdAt || Date.now()
).toLocaleString();

document.getElementById(
"ticketDetails"
).innerHTML = `

<div class="detailCard">
<b>Name</b><br>
${t.name || "-"}
</div>

<div class="detailCard">
<b>Role</b><br>
${t.role || "-"}
</div>

<div class="detailCard">
<b>Subject</b><br>
${t.subject || "-"}
</div>

<div class="detailCard">
<b>Priority</b><br>
${t.priority || "-"}
</div>

<div class="detailCard">
<b>Status</b><br>
${t.status || "-"}
</div>

<div class="detailCard">
<b>Date</b><br>
${date}
</div>

<div class="detailCard">
<b>Message</b><br>
${t.message || "-"}
</div>

<div class="detailCard">
<b>Admin Reply</b><br>
${t.reply || "No Reply"}
</div>

`;

}

/* SEND REPLY */

window.sendReply =
async function(){

let message =
document.getElementById(
"replyMessage"
).value;

if(!message){
alert("Write reply");
return;
}

await updateDoc(
doc(db,"supportTickets",currentTicket.id),
{

reply:message,

status:"pending",

repliedAt:Date.now()

}
);

await addDoc(
collection(db,"notifications"),
{

uid:currentTicket.uid,

title:"Support Reply",

message:message,

createdAt:Date.now()

}
);

alert("Reply Sent ✅");

}

/* PENDING */

window.markPending =
async function(){

await updateDoc(
doc(db,"supportTickets",currentTicket.id),
{
status:"pending"
}
);

alert("Marked Pending");

}

/* CLOSE */

window.closeTicket =
async function(){

await updateDoc(
doc(db,"supportTickets",currentTicket.id),
{
status:"closed"
}
);

alert("Ticket Closed ✅");

}

/* CLOSE MODAL */

window.closeTicketModal =
function(){

document.getElementById(
"ticketModal"
).style.display = "none";

}

</script>

</body>
</html>
