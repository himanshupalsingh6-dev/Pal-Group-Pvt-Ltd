<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Orders Management
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F3F6FB;
display:flex;
}

/* ======================================================
SIDEBAR
====================================================== */

.sidebar{
width:260px;
height:100vh;
background:#081028;
position:fixed;
left:0;
top:0;
padding:20px;
overflow:auto;
}

.logo{
display:flex;
align-items:center;
gap:14px;
margin-bottom:30px;
}

.logoBox{
width:60px;
height:60px;
border-radius:20px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

.logoText h1{
font-size:28px;
font-weight:900;
color:#fff;
}

.logoText p{
font-size:12px;
color:#9CA3AF;
margin-top:4px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
height:56px;
display:flex;
align-items:center;
gap:14px;
padding:0 18px;
border-radius:18px;
text-decoration:none;
font-size:15px;
font-weight:700;
color:#fff;
}

.menu a.active{
background:#1D4ED8;
}

/* ======================================================
MAIN
====================================================== */

.main{
margin-left:260px;
width:calc(100% - 260px);
padding:24px;
}

/* TOPBAR */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
gap:16px;
flex-wrap:wrap;
}

.topBar h1{
font-size:40px;
font-weight:900;
}

.filters{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.filterBox{
height:54px;
padding:0 18px;
border:none;
outline:none;
border-radius:16px;
background:#fff;
font-size:14px;
font-weight:700;
min-width:180px;
}

/* STATS */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
padding:24px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.statCard span{
font-size:13px;
color:#6B7280;
font-weight:700;
}

.statCard h2{
font-size:34px;
font-weight:900;
margin-top:12px;
}

/* ORDERS */

.orderGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

.orderCard{
background:#fff;
padding:22px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* TOP */

.cardTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.userInfo{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:60px;
height:60px;
border-radius:20px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:900;
}

.userInfo h3{
font-size:22px;
font-weight:900;
}

.userInfo p{
font-size:12px;
color:#6B7280;
margin-top:4px;
}

/* STATUS */

.status{
padding:8px 14px;
border-radius:18px;
font-size:12px;
font-weight:900;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

.pickup{
background:#DBEAFE;
color:#1D4ED8;
}

.ironing{
background:#EDE9FE;
color:#6D28D9;
}

.delivery{
background:#FCE7F3;
color:#BE185D;
}

.delivered{
background:#DCFCE7;
color:#166534;
}

/* MINI */

.miniGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:18px;
}

.mini{
background:#F9FAFB;
padding:14px;
border-radius:18px;
}

.mini span{
font-size:11px;
color:#6B7280;
}

.mini h4{
font-size:18px;
font-weight:900;
margin-top:8px;
}

/* DETAILS */

.detail{
background:#F9FAFB;
padding:16px;
border-radius:18px;
margin-bottom:16px;
}

.detail h4{
font-size:15px;
margin-bottom:12px;
}

.detail p{
font-size:14px;
margin-top:6px;
color:#444;
}

/* ITEMS */

.item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

/* BUTTONS */

.btnGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.btnGrid button{
height:54px;
border:none;
border-radius:18px;
font-size:14px;
font-weight:900;
cursor:pointer;
}

.viewBtn{
background:#2563EB;
color:#fff;
}

.updateBtn{
background:#22C55E;
color:#fff;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:99999;
}

.modalBox{
width:650px;
max-height:90vh;
overflow:auto;
background:#fff;
border-radius:30px;
padding:26px;
}

.modalHead{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.modalHead h2{
font-size:30px;
font-weight:900;
}

.closeBtn{
width:50px;
height:50px;
border:none;
border-radius:16px;
background:#EF4444;
color:#fff;
font-size:20px;
cursor:pointer;
}

.selectBox{
width:100%;
height:56px;
border:none;
outline:none;
background:#F3F4F6;
border-radius:18px;
padding:0 18px;
font-size:14px;
font-weight:700;
margin-top:14px;
}

/* MOBILE */

@media(max-width:1300px){

.orderGrid{
grid-template-columns:1fr;
}

.statsGrid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<div class="logoBox">

⚡

</div>

<div class="logoText">

<h1>
QuickPress
</h1>

<p>
Enterprise Admin
</p>

</div>

</div>

<div class="menu">

<a href="index.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="orders.html"
class="active">

<i class="fa-solid fa-basket-shopping"></i>

Orders

</a>

<a href="services.html">

<i class="fa-solid fa-shirt"></i>

Services

</a>

<a href="users.html">

<i class="fa-solid fa-users"></i>

Users

</a>

<a href="partners.html">

<i class="fa-solid fa-store"></i>

Partners

</a>

<a href="riders.html">

<i class="fa-solid fa-motorcycle"></i>

Riders

</a>

<a href="payments.html">

<i class="fa-solid fa-wallet"></i>

Payments

</a>

<a href="settlements.html">

<i class="fa-solid fa-money-bill-transfer"></i>

Settlements

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOP -->

<div class="topBar">

<h1>
Orders Management
</h1>

<div class="filters">

<input
type="text"
placeholder="Search Orders..."
class="filterBox"
id="searchInput"
/>

<select
class="filterBox"
id="cityFilter">

<option value="All">
All Cities
</option>

<option value="Kasganj">
Kasganj
</option>

<option value="Noida">
Noida
</option>

<option value="Delhi">
Delhi
</option>

</select>

<select
class="filterBox"
id="statusFilter">

<option value="All">
All Status
</option>

<option value="Pending">
Pending
</option>

<option value="Pickup">
Pickup
</option>

<option value="Ironing">
Ironing
</option>

<option value="Out For Delivery">
Out For Delivery
</option>

<option value="Delivered">
Delivered
</option>

</select>

</div>

</div>

<!-- STATS -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Orders
</span>

<h2 id="totalOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Pending Orders
</span>

<h2 id="pendingOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Active Orders
</span>

<h2 id="activeOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Delivered Orders
</span>

<h2 id="deliveredOrders">
0
</h2>

</div>

</div>

<!-- ORDERS -->

<div class="orderGrid"
id="orderGrid">

</div>

</div>

<!-- MODAL -->

<div class="modal"
id="viewModal">

<div class="modalBox">

<div class="modalHead">

<h2>
Order Details
</h2>

<button
class="closeBtn"
onclick="closeModal()">

✕

</button>

</div>

<div id="modalContent">

</div>

</div>

</div>

<!-- JS -->

<script type="module"
src="./js/orders.js">
</script>

</body>
</html>
