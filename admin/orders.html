<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Orders
</title>

<link rel="stylesheet" href="layout.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =====================================================
PAGE
===================================================== */

.content{
padding:28px;
}

/* =====================================================
TITLE
===================================================== */

.pageHeader{

display:flex;

align-items:center;

justify-content:space-between;

margin-bottom:24px;

}

.pageTitle{

font-size:52px;

font-weight:900;

letter-spacing:-2px;

}

/* =====================================================
FILTERS
===================================================== */

.filterWrap{

display:flex;

gap:14px;

margin-bottom:24px;

flex-wrap:wrap;

}

.filterBtn{

height:52px;

padding:0 22px;

border:none;

background:#fff;

border:1px solid #E5E7EB;

border-radius:16px;

font-weight:800;

cursor:pointer;

}

.filterBtn.active{

background:#111827;

color:#fff;

}

/* =====================================================
TABLE
===================================================== */

.ordersCard{

background:#fff;

border-radius:30px;

border:1px solid #E5E7EB;

overflow:hidden;

}

.ordersTop{

padding:24px;

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:1px solid #F3F4F6;

}

.ordersTop h3{

font-size:28px;

font-weight:900;

}

.exportBtn{

height:52px;

padding:0 24px;

border:none;

border-radius:16px;

background:#111827;

color:#fff;

font-weight:900;

cursor:pointer;

}

.tableWrap{
overflow:auto;
}

table{

width:100%;

border-collapse:collapse;

min-width:1400px;

}

th{

padding:22px;

text-align:left;

font-size:13px;

font-weight:900;

border-bottom:1px solid #F3F4F6;

}

td{

padding:22px;

font-size:14px;

font-weight:700;

border-bottom:1px solid #F3F4F6;

vertical-align:top;

}

/* =====================================================
CUSTOMER
===================================================== */

.customer{

display:flex;

flex-direction:column;

gap:4px;

}

.customer span{

font-size:12px;

color:#6B7280;

}

/* =====================================================
STATUS
===================================================== */

.status{

padding:10px 14px;

border-radius:999px;

font-size:12px;

font-weight:900;

display:inline-block;

}

.pending{
background:#FEF3C7;
color:#B45309;
}

.processing{
background:#EDE9FE;
color:#7C3AED;
}

.delivered{
background:#DCFCE7;
color:#15803D;
}

.cancelled{
background:#FEE2E2;
color:#DC2626;
}

/* =====================================================
ACTION
===================================================== */

.actionWrap{

display:flex;

gap:8px;

}

.actionBtn{

width:42px;
height:42px;

border:none;

border-radius:14px;

background:#111827;

color:#fff;

cursor:pointer;

}

/* =====================================================
RESPONSIVE
===================================================== */

@media(max-width:700px){

.content{
padding:16px;
}

.pageTitle{
font-size:34px;
}

}

</style>

</head>

<body>

<div class="adminLayout">

<div id="layoutContainer"></div>

<div class="main">

<div class="content">

<!-- =====================================================
HEADER
===================================================== -->

<div class="pageHeader">

<div class="pageTitle">
Orders
</div>

<button class="exportBtn" id="exportBtn">

<i class="fa-solid fa-download"></i>

Export CSV

</button>

</div>

<!-- =====================================================
FILTERS
===================================================== -->

<div class="filterWrap">

<button class="filterBtn active"
data-filter="All">

All Orders

</button>

<button class="filterBtn"
data-filter="Pending">

Pending

</button>

<button class="filterBtn"
data-filter="Preparing">

Preparing

</button>

<button class="filterBtn"
data-filter="Delivered">

Delivered

</button>

<button class="filterBtn"
data-filter="Cancelled">

Cancelled

</button>

</div>

<!-- =====================================================
ORDERS TABLE
===================================================== -->

<div class="ordersCard">

<div class="ordersTop">

<h3>
All Orders
</h3>

</div>

<div class="tableWrap">

<table>

<thead>

<tr>

<th>ID</th>
<th>Customer</th>
<th>Items</th>
<th>Address</th>
<th>Amount</th>
<th>Payment</th>
<th>Status</th>
<th>Time</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<script type="module"
src="layout.js">
</script>

<script type="module"
src="orders.js">
</script>

</body>
</html>
