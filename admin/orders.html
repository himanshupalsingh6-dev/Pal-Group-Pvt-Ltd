<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuickPress Orders</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F5F7FB;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#111827;
position:fixed;
left:0;
top:0;
height:100%;
padding:24px 18px;
overflow:auto;
z-index:999;
}

.logo{
font-size:30px;
font-weight:900;
color:#FFD400;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
text-decoration:none;
color:#D1D5DB;
padding:16px;
border-radius:18px;
display:flex;
align-items:center;
gap:14px;
font-size:15px;
font-weight:700;
transition:0.3s;
}

.menu a:hover,
.menu a.active{
background:#1F2937;
color:#fff;
}

/* MAIN */

.main{
margin-left:260px;
padding:24px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:16px;
margin-bottom:24px;
}

.topbar h1{
font-size:34px;
font-weight:900;
}

.searchBox{
flex:1;
height:58px;
border:none;
outline:none;
background:#fff;
border-radius:20px;
padding:0 20px;
font-size:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

/* FILTERS */

.filterSection{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:16px;
margin-bottom:24px;
}

.selectBox{
width:100%;
height:58px;
border:none;
outline:none;
background:#fff;
border-radius:18px;
padding:0 18px;
font-size:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

/* STATS */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
padding:22px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.statTitle{
font-size:14px;
color:#6B7280;
margin-bottom:10px;
}

.statValue{
font-size:32px;
font-weight:900;
}

/* ORDERS */

.ordersGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.orderCard{
background:#fff;
padding:20px;
border-radius:26px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.orderTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.userBox{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:58px;
height:58px;
border-radius:18px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
}

.userInfo h3{
font-size:17px;
margin-bottom:4px;
}

.userInfo p{
font-size:12px;
color:#6B7280;
}

.status{
padding:8px 12px;
border-radius:12px;
background:#DCFCE7;
font-size:11px;
font-weight:800;
}

/* DETAILS */

.details{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:16px;
}

.detailBox{
background:#F9FAFB;
padding:12px;
border-radius:14px;
}

.detailBox span{
display:block;
font-size:11px;
color:#6B7280;
margin-bottom:4px;
}

.detailBox b{
font-size:13px;
}

/* BUTTONS */

.btnGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.actionBtn{
height:50px;
border:none;
border-radius:16px;
font-size:13px;
font-weight:800;
cursor:pointer;
}

.viewBtn{
background:#111827;
color:#fff;
}

.callBtn{
background:#FFD400;
color:#111827;
}

/* MOBILE */

.mobileMenuBtn{
display:none;
}

@media(max-width:1200px){

.ordersGrid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:900px){

.statsGrid{
grid-template-columns:1fr 1fr;
}

.filterSection{
grid-template-columns:1fr;
}

}

@media(max-width:768px){

.sidebar{
left:-100%;
transition:0.3s;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
padding:16px;
padding-top:80px;
}

.mobileMenuBtn{
display:flex;
position:fixed;
top:18px;
left:18px;
width:52px;
height:52px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:22px;
align-items:center;
justify-content:center;
z-index:1000;
}

.ordersGrid{
grid-template-columns:1fr;
}

.statsGrid{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
align-items:flex-start;
}

.topbar h1{
font-size:26px;
}

.searchBox{
width:100%;
}

}

</style>
</head>
<body>

<!-- MOBILE -->

<button class="mobileMenuBtn"
onclick="toggleSidebar()">

<i class="fa-solid fa-bars"></i>

</button>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="orders.html"
class="active">

<i class="fa-solid fa-basket-shopping"></i>
Orders

</a>

<a href="services.html">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="users.html">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="delivery.html">
<i class="fa-solid fa-truck"></i>
Delivery
</a>

<a href="partners.html">
<i class="fa-solid fa-handshake"></i>
Partners
</a>

<a href="riders.html">
<i class="fa-solid fa-motorcycle"></i>
Riders
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOP -->

<div class="topbar">

<h1>
Orders
</h1>

<input
type="text"
placeholder="Search Customer..."
class="searchBox"
id="searchInput"
/>

</div>

<!-- FILTERS -->

<div class="filterSection">

<select
class="selectBox"
id="stateFilter"
onchange="loadCities()">

<option>
Select State
</option>

</select>

<select
class="selectBox"
id="cityFilter"
onchange="filterOrders()">

<option>
Select City
</option>

</select>

<select
class="selectBox"
id="dateFilter"
onchange="filterOrders()">

<option value="All">
All Time
</option>

<option value="Today">
Today
</option>

<option value="7">
Last 7 Days
</option>

<option value="15">
Last 15 Days
</option>

<option value="30">
This Month
</option>

</select>

</div>

<!-- STATS -->

<div class="statsGrid">

<div class="statCard">

<div class="statTitle">
Total Orders
</div>

<div class="statValue"
id="totalOrders">
0
</div>

</div>

<div class="statCard">

<div class="statTitle">
Revenue
</div>

<div class="statValue"
id="totalRevenue">
₹0
</div>

</div>

<div class="statCard">

<div class="statTitle">
Pending
</div>

<div class="statValue"
id="pendingOrders">
0
</div>

</div>

<div class="statCard">

<div class="statTitle">
Running
</div>

<div class="statValue"
id="runningOrders">
0
</div>

</div>

</div>

<!-- ORDERS -->

<div class="ordersGrid"
id="ordersGrid">

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* STATES */

const statesData = {

"Uttar Pradesh":[
"Lucknow",
"Noida",
"Kanpur",
"Agra",
"Moradabad",
"Meerut"
],

"Delhi":[
"New Delhi",
"Dwarka",
"Rohini",
"Saket"
],

"Maharashtra":[
"Mumbai",
"Pune",
"Nagpur",
"Nashik"
],

"Rajasthan":[
"Jaipur",
"Jodhpur",
"Kota",
"Ajmer"
],

"Haryana":[
"Gurgaon",
"Faridabad",
"Panipat"
],

"Punjab":[
"Ludhiana",
"Amritsar",
"Patiala"
]

};

/* LOAD STATES */

const stateFilter =
document.getElementById(
"stateFilter"
);

Object.keys(statesData)
.forEach((state)=>{

stateFilter.innerHTML += `

<option value="${state}">
${state}
</option>

`;

});

/* LOAD CITIES */

window.loadCities =
function(){

const state =
document.getElementById(
"stateFilter"
).value;

const cityFilter =
document.getElementById(
"cityFilter"
);

cityFilter.innerHTML = `

<option value="">
All Cities
</option>

`;

if(
statesData[state]
){

statesData[state]
.forEach((city)=>{

cityFilter.innerHTML += `

<option value="${city}">
${city}
</option>

`;

});

}

};

/* ORDERS */

let allOrders = [];

/* LOAD */

async function loadOrders(){

const ordersGrid =
document.getElementById(
"ordersGrid"
);

const snap =
await getDocs(
collection(db,"orders")
);

let html = "";

let revenue = 0;
let pending = 0;
let running = 0;

allOrders = [];

snap.forEach((doc)=>{

const order =
doc.data();

allOrders.push(order);

revenue +=
order.total || 0;

if(
order.status ===
"Order Placed"
){

pending++;

}

if(
order.status !==
"Delivered"
){

running++;

}

html += createCard(order);

});

ordersGrid.innerHTML = html;

document.getElementById(
"totalOrders"
).innerHTML =
snap.size;

document.getElementById(
"totalRevenue"
).innerHTML =
"₹"+revenue;

document.getElementById(
"pendingOrders"
).innerHTML =
pending;

document.getElementById(
"runningOrders"
).innerHTML =
running;

}

loadOrders();

/* CARD */

function createCard(order){

return `

<div class="orderCard">

<div class="orderTop">

<div class="userBox">

<div class="avatar">
${order.name
? order.name.charAt(0)
: "U"}
</div>

<div class="userInfo">

<h3>
${order.name || ""}
</h3>

<p>
${order.phone || ""}
</p>

</div>

</div>

<div class="status">
${order.status || ""}
</div>

</div>

<div class="details">

<div class="detailBox">
<span>Total</span>
<b>₹${order.total || 0}</b>
</div>

<div class="detailBox">
<span>City</span>
<b>${order.city || ""}</b>
</div>

<div class="detailBox">
<span>Partner</span>
<b>${order.partnerName || ""}</b>
</div>

<div class="detailBox">
<span>Rider</span>
<b>${order.riderName || ""}</b>
</div>

<div class="detailBox">
<span>Pickup By</span>
<b>${order.pickupBy || ""}</b>
</div>

<div class="detailBox">
<span>Delivery By</span>
<b>${order.deliveryBy || ""}</b>
</div>

</div>

<div class="btnGrid">

<button class="actionBtn viewBtn">
View
</button>

<a
href="tel:${order.phone || ""}"
class="actionBtn callBtn">

Call

</a>

</div>

</div>

`;

}

/* FILTER */

window.filterOrders =
function(){

const city =
document.getElementById(
"cityFilter"
).value;

const date =
document.getElementById(
"dateFilter"
).value;

const ordersGrid =
document.getElementById(
"ordersGrid"
);

let html = "";

allOrders.forEach((order)=>{

/* CITY */

if(
city &&
order.city !== city
){

return;

}

/* DATE */

if(
date !== "All"
){

const orderDate =
order.createdAt?.seconds
? new Date(
order.createdAt.seconds*1000
)
: new Date();

const now =
new Date();

const diff =
Math.floor(
(now-orderDate)
/
(1000*60*60*24)
);

if(
date==="Today" &&
diff!==0
){

return;

}

if(
date!=="Today" &&
diff > Number(date)
){

return;

}

}

html += createCard(order);

});

ordersGrid.innerHTML = html;

};

/* SIDEBAR */

window.toggleSidebar =
function(){

document
.querySelector(".sidebar")
.classList.toggle("active");

};

</script>

</body>
</html>
