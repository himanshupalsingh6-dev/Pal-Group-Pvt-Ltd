<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuickPress Orders</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F5F7FB;
}

/* SIDEBAR */

.sidebar{
width:270px;
background:#111827;
color:#fff;
padding:24px 18px;
position:fixed;
left:0;
top:0;
height:100%;
overflow:auto;
z-index:999;
}

.logo{
font-size:30px;
font-weight:900;
margin-bottom:40px;
color:#FFD400;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
text-decoration:none;
color:#D1D5DB;
padding:16px;
border-radius:18px;
display:flex;
align-items:center;
gap:14px;
font-size:15px;
font-weight:600;
transition:0.3s;
}

.menu a:hover,
.menu a.active{
background:#1F2937;
color:#fff;
}

/* MAIN */

.main{
margin-left:270px;
padding:24px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
gap:16px;
}

.topbar h1{
font-size:34px;
font-weight:900;
}

.searchBox{
flex:1;
height:58px;
border:none;
outline:none;
background:#fff;
border-radius:20px;
padding:0 20px;
font-size:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

/* STATS */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
padding:22px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.statTitle{
font-size:14px;
color:#6B7280;
margin-bottom:10px;
}

.statValue{
font-size:32px;
font-weight:900;
}

/* FILTERS */

.filters{
display:flex;
gap:12px;
overflow:auto;
margin-bottom:24px;
}

.filterBtn{
padding:12px 18px;
border:none;
border-radius:16px;
background:#fff;
font-weight:700;
cursor:pointer;
white-space:nowrap;
box-shadow:0 4px 14px rgba(0,0,0,0.05);
}

.filterBtn.active{
background:#111827;
color:#fff;
}

/* ORDERS */

.ordersGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.orderCard{
background:#fff;
padding:24px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.orderTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.userBox{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:70px;
height:70px;
border-radius:22px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:900;
}

.userInfo h3{
font-size:20px;
margin-bottom:4px;
}

.userInfo p{
font-size:13px;
color:#6B7280;
}

.status{
padding:10px 14px;
border-radius:14px;
font-size:12px;
font-weight:800;
background:#DCFCE7;
color:#166534;
}

/* DETAILS */

.details{
margin-bottom:18px;
}

.detailRow{
display:flex;
justify-content:space-between;
margin-bottom:12px;
gap:10px;
font-size:14px;
}

.detailRow span:last-child{
font-weight:700;
text-align:right;
}

/* SELECT */

.selectBox{
width:100%;
height:56px;
border:none;
outline:none;
background:#F3F4F6;
border-radius:18px;
padding:0 18px;
font-size:15px;
margin-bottom:14px;
}

/* BUTTONS */

.btnGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:12px;
}

.actionBtn{
height:54px;
border:none;
border-radius:18px;
font-size:14px;
font-weight:800;
cursor:pointer;
}

.acceptBtn{
background:#111827;
color:#fff;
}

.rejectBtn{
background:#FEE2E2;
color:#DC2626;
}

.updateBtn{
width:100%;
height:56px;
border:none;
border-radius:18px;
background:#FFD400;
font-size:15px;
font-weight:900;
margin-top:14px;
cursor:pointer;
}

/* MOBILE */

.mobileMenuBtn{
display:none;
}

@media(max-width:1100px){

.statsGrid{
grid-template-columns:1fr 1fr;
}

.ordersGrid{
grid-template-columns:1fr;
}

}

@media(max-width:768px){

.sidebar{
left:-100%;
transition:0.3s;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
padding:16px;
padding-top:80px;
}

.mobileMenuBtn{
display:flex;
position:fixed;
top:18px;
left:18px;
width:52px;
height:52px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:22px;
align-items:center;
justify-content:center;
z-index:1000;
}

.statsGrid{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
align-items:flex-start;
}

.topbar h1{
font-size:26px;
}

.searchBox{
width:100%;
}

}

</style>
</head>
<body>

<!-- MOBILE BUTTON -->

<button class="mobileMenuBtn"
onclick="toggleSidebar()">

<i class="fa-solid fa-bars"></i>

</button>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html" class="active">
<i class="fa-solid fa-basket-shopping"></i>
Orders
</a>

<a href="services.html">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="users.html">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="delivery.html">
<i class="fa-solid fa-truck"></i>
Delivery
</a>

<a href="partners.html">
<i class="fa-solid fa-handshake"></i>
Partners
</a>

<a href="riders.html">
<i class="fa-solid fa-motorcycle"></i>
Riders
</a>

<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Payments
</a>

<a href="analytics.html">
<i class="fa-solid fa-chart-pie"></i>
Analytics
</a>

<a href="offers.html">
<i class="fa-solid fa-tags"></i>
Offers
</a>

<a href="notifications.html">
<i class="fa-solid fa-bell"></i>
Notifications
</a>


<a href="settings.html">
<i class="fa-solid fa-gear"></i>
Settings
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<h1>
Orders
</h1>

<input
type="text"
placeholder="Search order..."
class="searchBox"
id="searchInput"
/>

</div>

<!-- STATS -->

<div class="statsGrid">

<div class="statCard">
<div class="statTitle">
Total Orders
</div>
<div class="statValue"
id="totalOrders">
0
</div>
</div>

<div class="statCard">
<div class="statTitle">
Revenue
</div>
<div class="statValue"
id="totalRevenue">
₹0
</div>
</div>

<div class="statCard">
<div class="statTitle">
Pending Orders
</div>
<div class="statValue"
id="pendingOrders">
0
</div>
</div>

<div class="statCard">
<div class="statTitle">
Running Orders
</div>
<div class="statValue"
id="runningOrders">
0
</div>
</div>

</div>

<!-- FILTERS -->

<div class="filters">

<button class="filterBtn active"
onclick="filterOrders('All')">
All
</button>

<button class="filterBtn"
onclick="filterOrders('Order Placed')">
Pending
</button>

<button class="filterBtn"
onclick="filterOrders('Pickup Assigned')">
Pickup
</button>

<button class="filterBtn"
onclick="filterOrders('Ironing Started')">
Ironing
</button>

<button class="filterBtn"
onclick="filterOrders('Out For Delivery')">
Delivery
</button>

<button class="filterBtn"
onclick="filterOrders('Delivered')">
Delivered
</button>

</div>

<!-- ORDERS -->

<div class="ordersGrid"
id="ordersGrid">

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs,
doc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let allOrders = [];

/* LOAD */

async function loadOrders(){

const ordersGrid =
document.getElementById(
"ordersGrid"
);

const ordersSnap =
await getDocs(
collection(db,"orders")
);

const partnersSnap =
await getDocs(
collection(db,"partners")
);

const ridersSnap =
await getDocs(
collection(db,"riders")
);

let partnerOptions = "";
let riderOptions = "";

partnersSnap.forEach((doc)=>{

const partner =
doc.data();

partnerOptions += `

<option value="${partner.name}">
${partner.name}
(${partner.city || ""})
</option>

`;

});

ridersSnap.forEach((doc)=>{

const rider =
doc.data();

riderOptions += `

<option value="${rider.name}">
${rider.name}
(${rider.city || ""})
</option>

`;

});

let html = "";

let totalRevenue = 0;
let pending = 0;
let running = 0;

allOrders = [];

ordersSnap.forEach((docSnap)=>{

const order =
docSnap.data();

allOrders.push({
id:docSnap.id,
...order
});

totalRevenue +=
order.total || 0;

if(
order.status !== "Delivered"
){

running++;

}

if(
order.status === "Order Placed"
){

pending++;

}

html += createOrderCard(
docSnap.id,
order,
partnerOptions,
riderOptions
);

});

document.getElementById(
"ordersGrid"
).innerHTML =
html;

document.getElementById(
"totalOrders"
).innerHTML =
ordersSnap.size;

document.getElementById(
"totalRevenue"
).innerHTML =
"₹"+totalRevenue;

document.getElementById(
"pendingOrders"
).innerHTML =
pending;

document.getElementById(
"runningOrders"
).innerHTML =
running;

}

loadOrders();

/* CARD */

function createOrderCard(
id,
order,
partnerOptions,
riderOptions
){

return `

<div class="orderCard">

<div class="orderTop">

<div class="userBox">

<div class="avatar">
${order.name
? order.name.charAt(0)
: "U"}
</div>

<div class="userInfo">

<h3>
${order.name || ""}
</h3>

<p>
${order.phone || ""}
</p>

</div>

</div>

<div class="status">
${order.status || ""}
</div>

</div>

<div class="details">

<div class="detailRow">
<span>Order Total</span>
<span>₹${order.total || 0}</span>
</div>

<div class="detailRow">
<span>Address</span>
<span>${order.address || ""}</span>
</div>

<div class="detailRow">
<span>City</span>
<span>${order.city || ""}</span>
</div>

<div class="detailRow">
<span>Pickup Time</span>
<span>${order.pickupTime || ""}</span>
</div>

<div class="detailRow">
<span>Placed By</span>
<span>${order.name || ""}</span>
</div>

<div class="detailRow">
<span>Assigned Partner</span>
<span>${order.partnerName || "Not Assigned"}</span>
</div>

<div class="detailRow">
<span>Assigned Rider</span>
<span>${order.riderName || "Not Assigned"}</span>
</div>

<div class="detailRow">
<span>Delivery By</span>
<span>${order.deliveryBy || "Pending"}</span>
</div>

<div class="detailRow">
<span>Order Time</span>
<span>${order.createdAt?.seconds
? new Date(
order.createdAt.seconds * 1000
).toLocaleString()
: "N/A"}
</span>
</div>

</div>

<select
class="selectBox"
id="partner-${id}">

<option>
Assign Partner
</option>

${partnerOptions}

</select>

<select
class="selectBox"
id="rider-${id}">

<option>
Assign Rider
</option>

${riderOptions}

</select>

<select
class="selectBox"
id="status-${id}">

<option value="Order Placed">
Order Placed
</option>

<option value="Pickup Assigned">
Pickup Assigned
</option>

<option value="Picked Up">
Picked Up
</option>

<option value="Ironing Started">
Ironing Started
</option>

<option value="Ironing Complete">
Ironing Complete
</option>

<option value="Out For Delivery">
Out For Delivery
</option>

<option value="Delivered">
Delivered
</option>

<option value="Cancelled">
Cancelled
</option>

</select>

<button
class="updateBtn"
onclick="updateOrder('${id}')">

Update Order

</button>

<div class="btnGrid">

<button
class="actionBtn acceptBtn"
onclick="acceptOrder('${id}')">

Accept

</button>

<button
class="actionBtn rejectBtn"
onclick="rejectOrder('${id}')">

Reject

</button>

</div>

</div>

`;

}

/* UPDATE */

window.updateOrder =
async function(id){

const partner =
document.getElementById(
`partner-${id}`
).value;

const rider =
document.getElementById(
`rider-${id}`
).value;

const status =
document.getElementById(
`status-${id}`
).value;

await updateDoc(

doc(db,"orders",id),

{

partnerName:partner,
riderName:rider,
deliveryBy:rider,
status:status

}

);

alert(
"Order Updated"
);

loadOrders();

};

/* ACCEPT */

window.acceptOrder =
async function(id){

await updateDoc(

doc(db,"orders",id),

{

status:"Pickup Assigned"

}

);

alert(
"Order Accepted"
);

loadOrders();

};

/* REJECT */

window.rejectOrder =
async function(id){

await updateDoc(

doc(db,"orders",id),

{

status:"Cancelled"

}

);

alert(
"Order Cancelled"
);

loadOrders();

};

/* FILTER */

window.filterOrders =
function(status){

const buttons =
document.querySelectorAll(
".filterBtn"
);

buttons.forEach((btn)=>{

btn.classList.remove("active");

if(
btn.innerText === status ||
(
status === "All" &&
btn.innerText === "All"
)
){

btn.classList.add("active");

}

});

const ordersGrid =
document.getElementById(
"ordersGrid"
);

let html = "";

allOrders.forEach((order)=>{

if(
status === "All" ||
order.status === status
){

html += createOrderCard(
order.id,
order,
"",
""
);

}

});

ordersGrid.innerHTML = html;

};

/* SIDEBAR */

window.toggleSidebar =
function(){

document
.querySelector(".sidebar")
.classList.toggle("active");

};

</script>

</body>
</html>
