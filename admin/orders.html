<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuickPress Advanced Orders</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F5F7FB;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#111827;
position:fixed;
left:0;
top:0;
height:100%;
padding:24px 18px;
overflow:auto;
z-index:999;
}

.logo{
font-size:30px;
font-weight:900;
color:#FFD400;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
text-decoration:none;
color:#D1D5DB;
padding:16px;
border-radius:18px;
display:flex;
align-items:center;
gap:14px;
font-size:15px;
font-weight:700;
transition:0.3s;
}

.menu a:hover,
.menu a.active{
background:#1F2937;
color:#fff;
}

/* MAIN */

.main{
margin-left:260px;
padding:24px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:16px;
margin-bottom:24px;
}

.topbar h1{
font-size:34px;
font-weight:900;
}

.searchBox{
flex:1;
height:58px;
border:none;
outline:none;
background:#fff;
border-radius:20px;
padding:0 20px;
font-size:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

/* STATS */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
padding:22px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.statTitle{
font-size:14px;
color:#6B7280;
margin-bottom:10px;
}

.statValue{
font-size:32px;
font-weight:900;
}

/* FILTERS */

.filters{
display:flex;
gap:12px;
overflow:auto;
margin-bottom:24px;
padding-bottom:4px;
}

.filterBtn{
padding:12px 18px;
border:none;
border-radius:16px;
background:#fff;
font-weight:700;
cursor:pointer;
white-space:nowrap;
box-shadow:0 4px 14px rgba(0,0,0,0.05);
}

.filterBtn.active{
background:#111827;
color:#fff;
}

/* ORDERS */

.ordersGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
}

/* CARD */

.orderCard{
background:#fff;
border-radius:26px;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* TOP */

.miniTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.miniLeft{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:58px;
height:58px;
border-radius:18px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
}

.miniLeft h3{
font-size:17px;
margin-bottom:3px;
}

.miniLeft p{
font-size:12px;
color:#6B7280;
}

.miniStatus{
padding:8px 12px;
border-radius:12px;
background:#DCFCE7;
font-size:11px;
font-weight:800;
}

/* MINI INFO */

.miniInfo{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-bottom:16px;
}

.miniInfo div{
background:#F9FAFB;
padding:12px;
border-radius:14px;
font-size:13px;
font-weight:700;
text-align:center;
}

/* BUTTONS */

.miniBtns{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.viewBtn,
.callBtn{
height:48px;
border:none;
border-radius:16px;
font-size:13px;
font-weight:800;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
cursor:pointer;
}

.viewBtn{
background:#111827;
color:#fff;
}

.callBtn{
background:#FFD400;
color:#111827;
}

/* DETAIL */

.fullDetail{
display:none;
margin-top:18px;
padding-top:18px;
border-top:1px solid #F3F4F6;
}

.fullDetail.active{
display:block;
}

.detailGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:18px;
}

.detailItem{
background:#F9FAFB;
padding:14px;
border-radius:16px;
}

.detailItem span{
display:block;
font-size:12px;
color:#6B7280;
margin-bottom:5px;
}

.detailItem b{
font-size:13px;
}

/* CALLS */

.callGrid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-bottom:14px;
}

.callAction{
height:46px;
background:#111827;
color:#fff;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
font-size:12px;
font-weight:700;
text-decoration:none;
}

/* SELECT */

.selectBox{
width:100%;
height:52px;
border:none;
outline:none;
background:#F3F4F6;
border-radius:16px;
padding:0 16px;
margin-bottom:12px;
}

.updateBtn{
width:100%;
height:54px;
border:none;
border-radius:16px;
background:#FFD400;
font-size:14px;
font-weight:900;
cursor:pointer;
}

/* MOBILE */

.mobileMenuBtn{
display:none;
}

@media(max-width:1200px){

.ordersGrid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:900px){

.statsGrid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:768px){

.sidebar{
left:-100%;
transition:0.3s;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
padding:16px;
padding-top:80px;
}

.mobileMenuBtn{
display:flex;
position:fixed;
top:18px;
left:18px;
width:52px;
height:52px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:22px;
align-items:center;
justify-content:center;
z-index:1000;
}

.ordersGrid{
grid-template-columns:1fr;
}

.statsGrid{
grid-template-columns:1fr;
}

.detailGrid{
grid-template-columns:1fr;
}

.callGrid{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
align-items:flex-start;
}

.topbar h1{
font-size:26px;
}

.searchBox{
width:100%;
}

}

</style>
</head>
<body>

<!-- MOBILE BUTTON -->

<button class="mobileMenuBtn"
onclick="toggleSidebar()">

<i class="fa-solid fa-bars"></i>

</button>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html" class="active">
<i class="fa-solid fa-basket-shopping"></i>
Orders
</a>

<a href="services.html">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="users.html">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="delivery.html">
<i class="fa-solid fa-truck"></i>
Delivery
</a>

<a href="partners.html">
<i class="fa-solid fa-handshake"></i>
Partners
</a>

<a href="riders.html">
<i class="fa-solid fa-motorcycle"></i>
Riders
</a>

<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Payments
</a>

<a href="analytics.html">
<i class="fa-solid fa-chart-pie"></i>
Analytics
</a>

<a href="offers.html">
<i class="fa-solid fa-tags"></i>
Offers
</a>

<a href="notifications.html">
<i class="fa-solid fa-bell"></i>
Notifications
</a>

<a href="withdrawal.html">
<i class="fa-solid fa-money-bill-transfer"></i>
Withdrawals
</a>

<a href="settings.html">
<i class="fa-solid fa-gear"></i>
Settings
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<h1>
Orders
</h1>

<input
type="text"
placeholder="Search order..."
class="searchBox"
/>

</div>

<!-- STATS -->

<div class="statsGrid">

<div class="statCard">

<div class="statTitle">
Total Orders
</div>

<div class="statValue"
id="totalOrders">
0
</div>

</div>

<div class="statCard">

<div class="statTitle">
Revenue
</div>

<div class="statValue"
id="totalRevenue">
₹0
</div>

</div>

<div class="statCard">

<div class="statTitle">
Pending
</div>

<div class="statValue"
id="pendingOrders">
0
</div>

</div>

<div class="statCard">

<div class="statTitle">
Running
</div>

<div class="statValue"
id="runningOrders">
0
</div>

</div>

</div>

<!-- FILTERS -->

<div class="filters">

<button class="filterBtn active"
onclick="filterOrders('All')">
All
</button>

<button class="filterBtn"
onclick="filterOrders('Order Placed')">
Pending
</button>

<button class="filterBtn"
onclick="filterOrders('Pickup Assigned')">
Pickup
</button>

<button class="filterBtn"
onclick="filterOrders('Ironing Started')">
Ironing
</button>

<button class="filterBtn"
onclick="filterOrders('Out For Delivery')">
Delivery
</button>

<button class="filterBtn"
onclick="filterOrders('Delivered')">
Delivered
</button>

<button class="filterBtn"
onclick="filterOrders('Today')">
Today
</button>

<button class="filterBtn"
onclick="filterOrders('7 Days')">
7 Days
</button>

<button class="filterBtn"
onclick="filterOrders('15 Days')">
15 Days
</button>

<button class="filterBtn"
onclick="filterOrders('Month')">
Month
</button>

</div>

<!-- ORDERS -->

<div class="ordersGrid"
id="ordersGrid">

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs,
doc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let allOrders = [];

window.partnerOptions = "";
window.riderOptions = "";

const statusFlow = [

"Order Placed",
"Pickup Assigned",
"Picked Up",
"Ironing Started",
"Ironing Complete",
"Out For Delivery",
"Delivered"

];

/* LOAD */

async function loadOrders(){

const ordersGrid =
document.getElementById(
"ordersGrid"
);

const ordersSnap =
await getDocs(
collection(db,"orders")
);

const partnersSnap =
await getDocs(
collection(db,"partners")
);

const ridersSnap =
await getDocs(
collection(db,"riders")
);

window.partnerOptions = "";
window.riderOptions = "";

partnersSnap.forEach((doc)=>{

const partner =
doc.data();

window.partnerOptions += `

<option value="${partner.name}">
${partner.name}
(${partner.city || ""})
</option>

`;

});

ridersSnap.forEach((doc)=>{

const rider =
doc.data();

window.riderOptions += `

<option value="${rider.name}">
${rider.name}
(${rider.city || ""})
</option>

`;

});

let html = "";

let totalRevenue = 0;
let pending = 0;
let running = 0;

allOrders = [];

ordersSnap.forEach((docSnap)=>{

const order =
docSnap.data();

allOrders.push({
id:docSnap.id,
...order
});

totalRevenue +=
order.total || 0;

if(
order.status === "Order Placed"
){

pending++;

}

if(
order.status !== "Delivered"
){

running++;

}

html += createOrderCard(
docSnap.id,
order
);

});

ordersGrid.innerHTML = html;

document.getElementById(
"totalOrders"
).innerHTML =
ordersSnap.size;

document.getElementById(
"totalRevenue"
).innerHTML =
"₹"+totalRevenue;

document.getElementById(
"pendingOrders"
).innerHTML =
pending;

document.getElementById(
"runningOrders"
).innerHTML =
running;

}

loadOrders();

/* CARD */

function createOrderCard(
id,
order
){

return `

<div class="orderCard">

<div class="miniTop">

<div class="miniLeft">

<div class="avatar">
${order.name
? order.name.charAt(0)
: "U"}
</div>

<div>

<h3>
${order.name || ""}
</h3>

<p>
#${id.slice(0,6)}
</p>

</div>

</div>

<div class="miniStatus">
${order.status || ""}
</div>

</div>

<div class="miniInfo">

<div>
₹${order.total || 0}
</div>

<div>
${order.city || ""}
</div>

<div>
${order.items?.length || 0} Items
</div>

</div>

<div class="miniBtns">

<button
class="viewBtn"
onclick="openOrder('${id}')">

View

</button>

<a
href="tel:${order.phone || ""}"
class="callBtn">

Customer

</a>

</div>

<div
class="fullDetail"
id="detail-${id}">

<div class="detailGrid">

<div class="detailItem">
<span>Mobile</span>
<b>${order.phone || ""}</b>
</div>

<div class="detailItem">
<span>Address</span>
<b>${order.address || ""}</b>
</div>

<div class="detailItem">
<span>City</span>
<b>${order.city || ""}</b>
</div>

<div class="detailItem">
<span>Pickup Time</span>
<b>${order.pickupTime || ""}</b>
</div>

<div class="detailItem">
<span>Partner</span>
<b>${order.partnerName || "Pending"}</b>
</div>

<div class="detailItem">
<span>Pickup By</span>
<b>${order.pickupBy || "Pending"}</b>
</div>

<div class="detailItem">
<span>Delivery By</span>
<b>${order.deliveryBy || "Pending"}</b>
</div>

<div class="detailItem">
<span>Status</span>
<b>${order.status || ""}</b>
</div>

</div>

<div class="callGrid">

<a
href="tel:${order.phone || ""}"
class="callAction">

<i class="fa-solid fa-phone"></i>
Customer

</a>

<a
href="tel:${order.riderPhone || ""}"
class="callAction">

<i class="fa-solid fa-motorcycle"></i>
Rider

</a>

<a
href="tel:${order.partnerPhone || ""}"
class="callAction">

<i class="fa-solid fa-store"></i>
Partner

</a>

</div>

<select
class="selectBox"
id="partner-${id}">

<option value="">
Assign Partner
</option>

${window.partnerOptions}

</select>

<select
class="selectBox"
id="rider-${id}">

<option value="">
Assign Rider
</option>

${window.riderOptions}

</select>

<select
class="selectBox"
id="status-${id}">

<option value="">
Update Status
</option>

${statusFlow.map(status=>`

<option value="${status}">
${status}
</option>

`).join("")}

</select>

<button
class="updateBtn"
onclick="updateOrder('${id}')">

Update Order

</button>

</div>

</div>

`;

}

/* VIEW */

window.openOrder =
function(id){

document
.getElementById(
`detail-${id}`
)
.classList.toggle("active");

};

/* UPDATE */

window.updateOrder =
async function(id){

const order =
allOrders.find(o=>o.id===id);

const partner =
document.getElementById(
`partner-${id}`
).value;

const rider =
document.getElementById(
`rider-${id}`
).value;

const status =
document.getElementById(
`status-${id}`
).value;

/* LOCK */

if(
order.status === "Delivered"
){

alert(
"Delivered order locked"
);

return;

}

/* REQUIRE */

if(
!partner ||
!rider
){

alert(
"Assign partner & rider first"
);

return;

}

const currentIndex =
statusFlow.indexOf(
order.status
);

const newIndex =
statusFlow.indexOf(
status);

/* BACK BLOCK */

if(
newIndex < currentIndex
){

alert(
"Cannot move backward"
);

return;

}

await updateDoc(

doc(db,"orders",id),

{

partnerName:partner,
riderName:rider,

pickupBy:
newIndex >= 2
? rider
: "",

deliveryBy:
newIndex >= 5
? rider
: "",

status:status

}

);

alert(
"Order Updated"
);

loadOrders();

};

/* FILTER */

window.filterOrders =
function(type){

const ordersGrid =
document.getElementById(
"ordersGrid"
);

let html = "";

allOrders.forEach((order)=>{

const orderDate =
order.createdAt?.seconds
? new Date(
order.createdAt.seconds*1000
)
: new Date();

const now =
new Date();

const diff =
Math.floor(
(now-orderDate)
/
(1000*60*60*24)
);

if(
type==="Today" &&
diff!==0
)return;

if(
type==="7 Days" &&
diff>7
)return;

if(
type==="15 Days" &&
diff>15
)return;

if(
type==="Month" &&
diff>30
)return;

if(

type!=="All" &&
[
"Today",
"7 Days",
"15 Days",
"Month"
].includes(type)===false &&
order.status!==type

)return;

html += createOrderCard(
order.id,
order
);

});

ordersGrid.innerHTML = html;

};

/* SIDEBAR */

window.toggleSidebar =
function(){

document
.querySelector(".sidebar")
.classList.toggle("active");

};

</script>

</body>
</html>
