<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Admin Orders
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F4F7FC;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:#081028;
position:fixed;
left:0;
top:0;
padding:20px;
overflow:auto;
}

.logo{
font-size:24px;
font-weight:900;
color:#FFD400;
margin-bottom:30px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
height:54px;
display:flex;
align-items:center;
gap:14px;
padding:0 18px;
border-radius:16px;
text-decoration:none;
font-size:15px;
font-weight:700;
color:#fff;
transition:0.2s;
}

.menu a.active{
background:#111C44;
}

.menu a:hover{
background:#111C44;
}

/* MAIN */

.main{
margin-left:240px;
width:calc(100% - 240px);
padding:24px;
}

/* TOP */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
gap:14px;
flex-wrap:wrap;
}

.topBar h1{
font-size:38px;
font-weight:900;
}

/* FILTERS */

.filters{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.filterBox{
height:52px;
padding:0 18px;
border:none;
outline:none;
border-radius:16px;
background:#fff;
font-size:14px;
font-weight:700;
min-width:160px;
}

/* STATS */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border-radius:22px;
padding:22px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.statCard span{
font-size:13px;
color:#6B7280;
font-weight:600;
}

.statCard h2{
font-size:34px;
font-weight:900;
margin-top:10px;
}

/* FILTER BUTTONS */

.statusBar{
display:flex;
gap:12px;
overflow:auto;
margin-bottom:24px;
}

.statusBtn{
padding:14px 20px;
background:#fff;
border-radius:14px;
font-size:14px;
font-weight:800;
cursor:pointer;
white-space:nowrap;
}

.statusBtn.active{
background:#081028;
color:#fff;
}

/* ORDERS */

.ordersGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.orderCard{
background:#fff;
border-radius:28px;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* TOP */

.orderTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.userBox{
display:flex;
align-items:center;
gap:12px;
}

.userLogo{
width:54px;
height:54px;
border-radius:18px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:900;
}

.userBox h3{
font-size:24px;
font-weight:900;
}

.userBox p{
font-size:13px;
color:#6B7280;
margin-top:4px;
}

.statusTag{
padding:8px 14px;
border-radius:20px;
font-size:12px;
font-weight:800;
}

.Pending{
background:#FEF3C7;
color:#B45309;
}

.Pickup{
background:#DBEAFE;
color:#1D4ED8;
}

.Ironing{
background:#E0E7FF;
color:#4338CA;
}

.Delivery{
background:#FCE7F3;
color:#BE185D;
}

.Delivered{
background:#DCFCE7;
color:#166534;
}

/* MINI GRID */

.miniGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:16px;
}

.miniCard{
background:#F9FAFB;
border-radius:16px;
padding:12px;
}

.miniCard span{
font-size:11px;
color:#6B7280;
}

.miniCard h4{
font-size:18px;
font-weight:900;
margin-top:6px;
}

/* SERVICES */

.servicesBox{
background:#F9FAFB;
padding:14px;
border-radius:18px;
margin-bottom:16px;
}

.sectionTitle{
font-size:15px;
font-weight:900;
margin-bottom:12px;
}

.serviceItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#fff;
border-radius:14px;
margin-bottom:10px;
}

.serviceLeft{
display:flex;
align-items:center;
gap:10px;
}

.serviceIcon{
width:42px;
height:42px;
border-radius:14px;
background:#FFF7CC;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.serviceItem h5{
font-size:14px;
font-weight:800;
}

.serviceItem p{
font-size:11px;
color:#6B7280;
margin-top:3px;
}

.servicePrice{
font-size:15px;
font-weight:900;
color:#22C55E;
}

/* DETAILS */

.detailGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:16px;
}

.detailCard{
background:#F9FAFB;
padding:12px;
border-radius:14px;
}

.detailCard span{
font-size:11px;
color:#6B7280;
}

.detailCard h4{
font-size:14px;
font-weight:800;
margin-top:6px;
}

/* TIMER */

.timerBox{
background:#081028;
padding:14px;
border-radius:16px;
color:#fff;
font-size:14px;
font-weight:800;
margin-bottom:16px;
}

/* ACTIONS */

.actionGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:14px;
}

.actionBtn{
height:46px;
border-radius:14px;
background:#081028;
color:#fff;
font-size:13px;
font-weight:800;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
}

/* SELECT */

.selectBox{
width:100%;
height:52px;
border:none;
outline:none;
background:#F3F4F6;
border-radius:14px;
padding:0 14px;
font-size:14px;
font-weight:700;
margin-bottom:12px;
}

/* UPDATE */

.updateBtn{
width:100%;
height:54px;
border:none;
border-radius:16px;
background:#FFD400;
font-size:15px;
font-weight:900;
cursor:pointer;
}

/* MOBILE */

@media(max-width:1200px){

.ordersGrid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:900px){

.sidebar{
display:none;
}

.main{
margin-left:0;
width:100%;
padding:16px;
}

.statsGrid{
grid-template-columns:repeat(2,1fr);
}

.ordersGrid{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html"
class="active">
<i class="fa-solid fa-basket-shopping"></i>
Orders
</a>

<a href="services.html">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="users.html">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="delivery.html">
<i class="fa-solid fa-truck"></i>
Delivery
</a>

<a href="partners.html">
<i class="fa-solid fa-store"></i>
Partners
</a>

<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Payments
</a>

<a href="analytics.html">
<i class="fa-solid fa-chart-pie"></i>
Analytics
</a>

<a href="settings.html">
<i class="fa-solid fa-gear"></i>
Settings
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOP -->

<div class="topBar">

<h1>
Orders
</h1>

<div class="filters">

<input
type="text"
placeholder="Search Customer..."
class="filterBox"
id="searchInput"
/>

<select
id="cityFilter"
class="filterBox">

<option value="All">
All Cities
</option>

<option value="Kasganj">
Kasganj
</option>

<option value="Noida">
Noida
</option>

<option value="Aligarh">
Aligarh
</option>

<option value="Delhi">
Delhi
</option>

<option value="Mumbai">
Mumbai
</option>

</select>

</div>

</div>

<!-- STATS -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Orders
</span>

<h2 id="totalOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Revenue
</span>

<h2 id="totalRevenue">
₹0
</h2>

</div>

<div class="statCard">

<span>
Pending
</span>

<h2 id="pendingOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Delivered
</span>

<h2 id="deliveredOrders">
0
</h2>

</div>

</div>

<!-- STATUS -->

<div class="statusBar">

<div class="statusBtn active"
data-status="All">

All

</div>

<div class="statusBtn"
data-status="Pending">

Pending

</div>

<div class="statusBtn"
data-status="Pickup">

Pickup

</div>

<div class="statusBtn"
data-status="Ironing">

Ironing

</div>

<div class="statusBtn"
data-status="Delivery">

Delivery

</div>

<div class="statusBtn"
data-status="Delivered">

Delivered

</div>

</div>

<!-- ORDERS -->

<div class="ordersGrid"
id="ordersGrid">

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs,
doc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* GLOBAL */

let orders = [];

let currentStatus =
"All";

/* ELEMENTS */

const ordersGrid =
document.getElementById(
"ordersGrid"
);

const cityFilter =
document.getElementById(
"cityFilter"
);

const searchInput =
document.getElementById(
"searchInput"
);

/* LOAD */

async function loadOrders(){

const snap =
await getDocs(
collection(db,"orders")
);

orders = [];

snap.forEach((docu)=>{

orders.push({

id:docu.id,

...docu.data()

});

});

renderOrders();

}

loadOrders();

/* RENDER */

function renderOrders(){

let html = "";

/* FILTER */

const search =
searchInput.value
.toLowerCase();

let revenue = 0;

let pending = 0;

let delivered = 0;

orders.forEach((order)=>{

/* STATUS */

if(

currentStatus !== "All"

&&

order.status !== currentStatus

){

return;

}

/* CITY */

if(

cityFilter.value !== "All"

&&

order.city !== cityFilter.value

){

return;

}

/* SEARCH */

if(

!(order.name || "")
.toLowerCase()
.includes(search)

){

return;

}

/* STATS */

revenue +=
Number(order.total || 0);

if(order.status === "Pending"){
pending++;
}

if(order.status === "Delivered"){
delivered++;
}

/* CARD */

html += `

<div class="orderCard">

<div class="orderTop">

<div class="userBox">

<div class="userLogo">

${order.name?.charAt(0) || "Q"}

</div>

<div>

<h3>
${order.name || "Customer"}
</h3>

<p>
#${order.orderId || order.id}
</p>

</div>

</div>

<div class="statusTag ${order.status}">

${order.status || "Pending"}

</div>

</div>

<div class="miniGrid">

<div class="miniCard">

<span>
Total
</span>

<h4>
₹${order.total || 0}
</h4>

</div>

<div class="miniCard">

<span>
City
</span>

<h4>
${order.city || "Kasganj"}
</h4>

</div>

<div class="miniCard">

<span>
Items
</span>

<h4>
${order.items?.length || 0}
</h4>

</div>

</div>

<div class="servicesBox">

<h4 class="sectionTitle">

🧺 Ordered Services

</h4>

${
order.items?.map(item=>`

<div class="serviceItem">

<div class="serviceLeft">

<div class="serviceIcon">

🧺

</div>

<div>

<h5>
${item.name}
</h5>

<p>
Qty : ${item.qty || 1}
</p>

</div>

</div>

<div class="servicePrice">

₹${item.price}

</div>

</div>

`).join("")
|| ""
}

</div>

<div class="detailGrid">

<div class="detailCard">

<span>
Mobile
</span>

<h4>
${order.mobile || "N/A"}
</h4>

</div>

<div class="detailCard">

<span>
Address
</span>

<h4>
${order.address || "N/A"}
</h4>

</div>

<div class="detailCard">

<span>
Partner
</span>

<h4>
${order.partner || "Pending"}
</h4>

</div>

<div class="detailCard">

<span>
Rider
</span>

<h4>
${order.rider || "Pending"}
</h4>

</div>

<div class="detailCard">

<span>
Pickup By
</span>

<h4>
${order.pickupBy || "Pending"}
</h4>

</div>

<div class="detailCard">

<span>
Delivery By
</span>

<h4>
${order.deliveryBy || "Pending"}
</h4>

</div>

</div>

<div class="timerBox">

⏱️ Order Running :
<span id="timer-${order.id}">
Loading...
</span>

</div>

<div class="actionGrid">

<a
href="tel:${order.mobile || ''}"
class="actionBtn">

📞 Customer

</a>

<a
href="tel:${order.riderMobile || ''}"
class="actionBtn">

🚴 Rider

</a>

<a
href="tel:${order.partnerMobile || ''}"
class="actionBtn">

🏪 Partner

</a>

</div>

<select
class="selectBox"
id="partner-${order.id}">

<option>
Assign Partner
</option>

<option>
QuickPress Laundry
</option>

<option>
Kasganj Laundry
</option>

<option>
Noida Premium
</option>

</select>

<select
class="selectBox"
id="rider-${order.id}">

<option>
Assign Rider
</option>

<option>
Rider 1
</option>

<option>
Rider 2
</option>

<option>
Rider 3
</option>

</select>

<select
class="selectBox"
id="status-${order.id}">

<option>
Pending
</option>

<option>
Pickup
</option>

<option>
Ironing
</option>

<option>
Delivery
</option>

<option>
Delivered
</option>

</select>

<button
class="updateBtn"
onclick="updateOrder(
'${order.id}'
)">

Update Order

</button>

</div>

`;

});

/* STATS */

document.getElementById(
"totalOrders"
).innerHTML =
orders.length;

document.getElementById(
"totalRevenue"
).innerHTML =
`₹${revenue}`;

document.getElementById(
"pendingOrders"
).innerHTML =
pending;

document.getElementById(
"deliveredOrders"
).innerHTML =
delivered;

/* EMPTY */

if(html === ""){

html =

`

<div style="
padding:40px;
font-size:18px;
font-weight:800;
">

No Orders Found

</div>

`;

}

ordersGrid.innerHTML =
html;

startOrderTimers();

}

/* STATUS BUTTONS */

document
.querySelectorAll(
".statusBtn"
)
.forEach((btn)=>{

btn.addEventListener(

"click",

()=>{

document
.querySelectorAll(
".statusBtn"
)
.forEach((b)=>{

b.classList.remove(
"active"
);

});

btn.classList.add(
"active"
);

currentStatus =
btn.dataset.status;

renderOrders();

}

);

});

/* FILTER */

cityFilter.addEventListener(
"change",
renderOrders
);

searchInput.addEventListener(
"keyup",
renderOrders
);

/* TIMER */

function startOrderTimers(){

orders.forEach((order)=>{

const timer =
document.getElementById(
`timer-${order.id}`
);

if(!timer)return;

setInterval(()=>{

const start =
new Date(
order.createdAt || Date.now()
);

const now =
new Date();

const diff =
now - start;

const hours =
Math.floor(
diff / 3600000
);

const mins =
Math.floor(
(diff % 3600000)
/ 60000
);

timer.innerHTML =
`${hours}h ${mins}m`;

},1000);

});

}

/* UPDATE */

window.updateOrder =
async function(id){

const partner =
document.getElementById(
`partner-${id}`
).value;

const rider =
document.getElementById(
`rider-${id}`
).value;

const status =
document.getElementById(
`status-${id}`
).value;

await updateDoc(

doc(db,"orders",id),

{

partner,
rider,
status

}

);

alert(
"Order Updated"
);

loadOrders();

};

</script>

</body>
</html>
