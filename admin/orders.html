FILE : admin/orders.html
QUICKPRESS ENTERPRISE ORDER MANAGEMENT
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Orders
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#EEF2FF;
display:flex;
overflow-x:hidden;
}

/* =====================================================
SIDEBAR
===================================================== */

.sidebar{
width:260px;
height:100vh;
background:#081028;
position:fixed;
left:0;
top:0;
padding:20px;
overflow:auto;
}

.logo{
font-size:34px;
font-weight:900;
color:#fff;
margin-bottom:35px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
height:58px;
display:flex;
align-items:center;
gap:14px;
padding:0 18px;
border-radius:18px;
text-decoration:none;
font-size:15px;
font-weight:700;
color:#fff;
transition:0.3s;
}

.menu a.active{
background:#1D4ED8;
}

.menu a:hover{
background:#111C44;
}

/* =====================================================
MAIN
===================================================== */

.main{
margin-left:260px;
width:calc(100% - 260px);
padding:24px;
}

/* =====================================================
TOPBAR
===================================================== */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
gap:18px;
flex-wrap:wrap;
}

.topBar h1{
font-size:42px;
font-weight:900;
}

/* FILTERS */

.filters{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.filterBox{
height:56px;
padding:0 18px;
border:none;
outline:none;
border-radius:18px;
background:#fff;
font-size:14px;
font-weight:700;
min-width:190px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
padding:22px;
border-radius:26px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.statCard span{
font-size:12px;
color:#6B7280;
font-weight:700;
}

.statCard h2{
font-size:32px;
font-weight:900;
margin-top:12px;
}

/* =====================================================
ORDER GRID
===================================================== */

.orderGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
}

/* =====================================================
ORDER CARD
===================================================== */

.orderCard{
background:#fff;
padding:18px;
border-radius:26px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* TOP */

.orderTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
gap:10px;
}

.userInfo{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:58px;
height:58px;
border-radius:18px;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.userInfo h3{
font-size:17px;
font-weight:900;
}

.userInfo p{
font-size:11px;
color:#6B7280;
margin-top:4px;
}

/* STATUS */

.status{
padding:8px 14px;
border-radius:14px;
font-size:11px;
font-weight:900;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

.pickup{
background:#DBEAFE;
color:#1D4ED8;
}

.ironing{
background:#EDE9FE;
color:#7C3AED;
}

.delivery{
background:#FCE7F3;
color:#BE185D;
}

.delivered{
background:#DCFCE7;
color:#166534;
}

/* SUMMARY */

.summaryGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:16px;
}

.summaryBox{
background:#F9FAFB;
padding:12px;
border-radius:16px;
}

.summaryBox span{
font-size:10px;
color:#6B7280;
}

.summaryBox h4{
font-size:15px;
font-weight:900;
margin-top:5px;
}

/* SECTION */

.section{
background:#F9FAFB;
padding:14px;
border-radius:18px;
margin-bottom:14px;
}

.sectionTitle{
font-size:14px;
font-weight:900;
margin-bottom:12px;
}

/* TRACK */

.track{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.trackBox{
background:#fff;
padding:12px;
border-radius:14px;
}

.trackBox span{
font-size:10px;
color:#6B7280;
}

.trackBox h5{
font-size:13px;
font-weight:900;
margin-top:5px;
}

/* BUTTONS */

.btnGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:14px;
}

.btn{
height:46px;
border:none;
border-radius:16px;
font-size:12px;
font-weight:900;
cursor:pointer;
}

.callBtn{
background:#22C55E;
color:#fff;
}

.viewBtn{
background:#2563EB;
color:#fff;
}

.assignBtn{
background:#7C3AED;
color:#fff;
}

.updateBtn{
background:#F59E0B;
color:#fff;
}

.lockedBtn{
background:#9CA3AF;
color:#fff;
cursor:not-allowed;
}

/* =====================================================
MODAL
===================================================== */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:999999;
}

.modalBox{
width:900px;
max-height:90vh;
overflow:auto;
background:#fff;
padding:28px;
border-radius:34px;
}

.modalHead{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.modalHead h2{
font-size:34px;
font-weight:900;
}

.closeBtn{
width:52px;
height:52px;
border:none;
border-radius:16px;
background:#EF4444;
color:#fff;
font-size:18px;
cursor:pointer;
}

/* ITEMS */

.item{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

/* =====================================================
FORM GRID
===================================================== */

.formGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
margin-top:20px;
}

.assignSaveBtn{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:#2563EB;
color:#fff;
font-size:15px;
font-weight:900;
cursor:pointer;
margin-top:20px;
}

/* =====================================================
RESPONSIVE
===================================================== */

@media(max-width:1700px){

.orderGrid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<!-- =====================================================
SIDEBAR
===================================================== -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html" class="active">
<i class="fa-solid fa-basket-shopping"></i>
Orders
</a>

<a href="services.html">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="users.html">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="partners.html">
<i class="fa-solid fa-store"></i>
Partners
</a>

<a href="riders.html">
<i class="fa-solid fa-motorcycle"></i>
Riders
</a>

<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Payments
</a>

<a href="settlements.html">
<i class="fa-solid fa-money-bill-transfer"></i>
Settlements
</a>

</div>

</div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<!-- TOP -->

<div class="topBar">

<h1>
Orders Management
</h1>

<div class="filters">

<input
type="text"
placeholder="Search Customer..."
class="filterBox"
id="searchInput"
/>

<select
class="filterBox"
id="stateFilter">

<option value="All">
All States
</option>

</select>

<select
class="filterBox"
id="cityFilter">

<option value="All">
All Cities
</option>

</select>

<select
class="filterBox"
id="statusFilter">

<option value="All">
All Status
</option>

<option value="Pending">
Pending
</option>

<option value="Pickup">
Pickup
</option>

<option value="Ironing">
Ironing
</option>

<option value="Out For Delivery">
Out For Delivery
</option>

<option value="Delivered">
Delivered
</option>

<option value="Cancelled">
Cancelled
</option>

</select>

</div>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Orders
</span>

<h2 id="totalOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Pending Orders
</span>

<h2 id="pendingOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Running Orders
</span>

<h2 id="runningOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Delivered Orders
</span>

<h2 id="deliveredOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Total Revenue
</span>

<h2 id="totalRevenue">
₹0
</h2>

</div>

</div>

<!-- =====================================================
ORDER GRID
===================================================== -->

<div
class="orderGrid"
id="orderGrid">

</div>

</div>

<!-- =====================================================
FULL SUMMARY MODAL
===================================================== -->

<div
class="modal"
id="summaryModal">

<div class="modalBox">

<div class="modalHead">

<h2>
Full Order Summary
</h2>

<button
class="closeBtn"
onclick="closeSummary()">

✕

</button>

</div>

<div id="summaryContent">

</div>

</div>

</div>

<!-- =====================================================
ASSIGN MODAL
===================================================== -->

<div
class="modal"
id="assignModal">

<div class="modalBox">

<div class="modalHead">

<h2>
Assign Order
</h2>

<button
class="closeBtn"
onclick="closeAssignModal()">

✕

</button>

</div>

<div class="formGrid">

<select
class="filterBox"
id="partnerSelect">

<option value="">
Select Partner
</option>

</select>

<select
class="filterBox"
id="riderSelect">

<option value="">
Select Rider
</option>

</select>

<select
class="filterBox"
id="statusSelect">

<option value="Pickup">
Pickup
</option>

<option value="Ironing">
Ironing
</option>

<option value="Out For Delivery">
Out For Delivery
</option>

</select>

</div>

<button
class="assignSaveBtn"
onclick="saveAssignment()">

Assign Order

</button>

</div>

</div>

<script type="module"
src="./js/orders.js">
</script>

</body>
</html>
