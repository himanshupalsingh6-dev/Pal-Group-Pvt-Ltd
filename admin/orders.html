<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Orders</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
overflow:auto;
}

.logo{
font-size:30px;
font-weight:bold;
padding:25px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:25px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* STATS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
color:#666;
}

.card h1{
margin:0;
font-size:38px;
}

/* FILTER */

.filterBox{
background:#fff;
padding:20px;
border-radius:22px;
margin-bottom:20px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.filterGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
width:100%;
box-sizing:border-box;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.blue{
background:#2563eb;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

/* STATUS */

.pending{
color:#d97706;
font-weight:bold;
}

.processing{
color:#2563eb;
font-weight:bold;
}

.completed{
color:#16a34a;
font-weight:bold;
}

.cancelled{
color:#dc2626;
font-weight:bold;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
overflow:auto;
}

.modalContent{
background:#fff;
margin:30px auto;
padding:25px;
width:90%;
max-width:850px;
border-radius:25px;
}

.detailGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.detailCard{
background:#f7f7f7;
padding:18px;
border-radius:15px;
}

.timeline{
margin-top:20px;
}

.timelineItem{
background:#f7f7f7;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.closeBtn{
float:right;
font-size:22px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button class="activeBtn">📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>📦 Advanced Orders Management</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Orders</h2>
<h1 id="totalOrders">0</h1>
</div>

<div class="card">
<h2>Pending</h2>
<h1 id="pendingOrders">0</h1>
</div>

<div class="card">
<h2>Processing</h2>
<h1 id="processingOrders">0</h1>
</div>

<div class="card">
<h2>Completed</h2>
<h1 id="completedOrders">0</h1>
</div>

<div class="card">
<h2>Total Revenue</h2>
<h1 id="totalRevenue">₹0</h1>
</div>

</div>

<!-- FILTER -->

<div class="filterBox">

<div class="filterGrid">

<input
id="searchInput"
type="text"
placeholder="Search customer/order..."
>

<select id="statusFilter">
<option value="all">All Status</option>
<option value="Pending">Pending</option>
<option value="Processing">Processing</option>
<option value="Completed">Completed</option>
<option value="Cancelled">Cancelled</option>
</select>

</div>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>📦 Live Orders</h2>

<table>

<thead>

<tr>
<th>Order ID</th>
<th>Customer</th>
<th>Phone</th>
<th>Total</th>
<th>Status</th>
<th>Partner</th>
<th>Rider</th>
<th>Action</th>
</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="orderModal">

<div class="modalContent">

<span class="closeBtn" onclick="closeModal()">
✖
</span>

<h1>📦 Order Full Details</h1>

<div class="detailGrid" id="orderDetails">

</div>

<h2>🕒 Order Timeline</h2>

<div class="timeline" id="timeline">

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
onSnapshot,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalOrders = document.getElementById("totalOrders");
const pendingOrders = document.getElementById("pendingOrders");
const processingOrders = document.getElementById("processingOrders");
const completedOrders = document.getElementById("completedOrders");
const totalRevenue = document.getElementById("totalRevenue");

const ordersTable = document.getElementById("ordersTable");

const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");

let allOrders = [];

onSnapshot(collection(db,"orders"),(snapshot)=>{

let pending = 0;
let processing = 0;
let completed = 0;
let revenue = 0;

allOrders = [];

snapshot.forEach((docSnap)=>{

const o = docSnap.data();

allOrders.push({
id:docSnap.id,
...o
});

revenue += Number(o.total || 0);

if(o.status === "Pending") pending++;
if(o.status === "Processing") processing++;
if(o.status === "Completed") completed++;

});

totalOrders.innerHTML = snapshot.size;
pendingOrders.innerHTML = pending;
processingOrders.innerHTML = processing;
completedOrders.innerHTML = completed;
totalRevenue.innerHTML = "₹" + revenue;

renderOrders();

});

function renderOrders(){

let keyword = searchInput.value.toLowerCase();
let status = statusFilter.value;

let html = "";

let filtered = allOrders.filter((o)=>{

let matchSearch =
(o.name || "")
.toLowerCase()
.includes(keyword)
||
(o.phone || "")
.includes(keyword)
||
(o.id || "")
.includes(keyword);

let matchStatus =
status === "all"
? true
: o.status === status;

return matchSearch && matchStatus;

});

filtered.reverse().forEach((o)=>{

html += `

<tr>

<td>${o.id}</td>

<td>${o.name || "-"}</td>

<td>${o.phone || "-"}</td>

<td>₹${o.total || 0}</td>

<td class="${(o.status || '').toLowerCase()}">
${o.status || "-"}
</td>

<td>${o.partnerName || "-"}</td>

<td>${o.riderName || "-"}</td>

<td>

<button
class="btn blue"
onclick='openOrder(${JSON.stringify(o)})'
>
View
</button>

<button
class="btn green"
onclick="completeOrder('${o.id}')"
>
Complete
</button>

</td>

</tr>

`;

});

ordersTable.innerHTML = html;

}

searchInput.addEventListener("input",renderOrders);
statusFilter.addEventListener("change",renderOrders);

window.completeOrder =
async function(id){

await updateDoc(
doc(db,"orders",id),
{
status:"Completed",
completedAt:Date.now()
}
);

alert("Order Completed ✅");

}

/* MODAL */

window.openOrder = function(order){

const modal =
document.getElementById("orderModal");

const orderDetails =
document.getElementById("orderDetails");

const timeline =
document.getElementById("timeline");

modal.style.display = "block";

orderDetails.innerHTML = `

<div class="detailCard">
<b>Order ID</b><br>
${order.id || "-"}
</div>

<div class="detailCard">
<b>Customer</b><br>
${order.name || "-"}
</div>

<div class="detailCard">
<b>Phone</b><br>
${order.phone || "-"}
</div>

<div class="detailCard">
<b>Address</b><br>
${order.address || "-"}
</div>

<div class="detailCard">
<b>Total Amount</b><br>
₹${order.total || 0}
</div>

<div class="detailCard">
<b>Payment Method</b><br>
${order.paymentMethod || "COD"}
</div>

<div class="detailCard">
<b>Partner</b><br>
${order.partnerName || "-"}
</div>

<div class="detailCard">
<b>Rider</b><br>
${order.riderName || "-"}
</div>

<div class="detailCard">
<b>Status</b><br>
${order.status || "-"}
</div>

<div class="detailCard">
<b>Items</b><br>
${JSON.stringify(order.items || [])}
</div>

`;

let placed = order.createdAt
? new Date(order.createdAt).toLocaleString()
: "-";

let processing = order.processingAt
? new Date(order.processingAt).toLocaleString()
: "-";

let completed = order.completedAt
? new Date(order.completedAt).toLocaleString()
: "-";

let delivery = order.deliveryAt
? new Date(order.deliveryAt).toLocaleString()
: "-";

timeline.innerHTML = `

<div class="timelineItem">
📦 Order Placed<br>
${placed}
</div>

<div class="timelineItem">
🧺 Processing Started<br>
${processing}
</div>

<div class="timelineItem">
🚚 Out For Delivery<br>
${delivery}
</div>

<div class="timelineItem">
✅ Order Completed<br>
${completed}
</div>

`;

}

window.closeModal = function(){

document.getElementById("orderModal").style.display = "none";

}

</script>

</body>
</html>
```
