<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Orders
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
rel="stylesheet"
href="./css/global.css"/>

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}
/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
height:calc(100vh - 82px);
overflow:auto;
padding:24px;
}

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

/* =====================================================
FILTERS
===================================================== */

.filterBar{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
gap:16px;
margin-bottom:24px;
flex-wrap:wrap;
}

.leftFilters{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.searchBox{
width:340px;
height:52px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

.selectBox{
height:52px;
padding:0 16px;
border-radius:14px;
border:1px solid #E5E7EB;
background:#fff;
font-size:14px;
font-weight:600;
outline:none;
min-width:170px;
}

/* =====================================================
ORDER GRID
===================================================== */

.ordersGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

/* =====================================================
CARD
===================================================== */

.orderCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:20px;
}

/* =====================================================
TOP
===================================================== */

.cardTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.customer{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:52px;
height:52px;
border-radius:16px;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-weight:800;
font-size:18px;
}

.customer h3{
font-size:16px;
font-weight:800;
}

.customer p{
font-size:12px;
color:#6B7280;
margin-top:4px;
}

/* =====================================================
STATUS
===================================================== */

.status{
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:800;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

.preparing{
background:#EDE9FE;
color:#7C3AED;
}

.delivery{
background:#DBEAFE;
color:#1D4ED8;
}

.delivered{
background:#DCFCE7;
color:#166534;
}

/* =====================================================
INFO
===================================================== */

.infoGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:18px;
}

.infoBox{
background:#F9FAFB;
padding:14px;
border-radius:16px;
}

.infoBox span{
font-size:11px;
color:#6B7280;
}

.infoBox h4{
font-size:16px;
font-weight:900;
margin-top:6px;
}

/* =====================================================
ITEMS
===================================================== */

.itemsBox{
background:#F9FAFB;
padding:16px;
border-radius:18px;
margin-bottom:18px;
}

.itemsBox h4{
font-size:14px;
font-weight:900;
margin-bottom:12px;
}

.item{
display:flex;
justify-content:space-between;
font-size:13px;
padding:8px 0;
border-bottom:1px solid #E5E7EB;
}

.item:last-child{
border:none;
}

/* =====================================================
ASSIGN
===================================================== */

.assignBox{
background:#F9FAFB;
padding:16px;
border-radius:18px;
margin-bottom:18px;
}

.assignBox h4{
font-size:14px;
font-weight:900;
margin-bottom:14px;
}

.assignGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.assignCard{
background:#fff;
padding:14px;
border-radius:14px;
}

.assignCard span{
font-size:11px;
color:#6B7280;
}

.assignCard h5{
font-size:14px;
font-weight:800;
margin-top:5px;
}

/* =====================================================
ORDER STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:22px;
padding:22px;
}

.statCard span{
font-size:13px;
color:#6B7280;
font-weight:700;
}

.statCard h2{
font-size:34px;
font-weight:900;
margin-top:10px;
}
/* =====================================================
BUTTONS
===================================================== */

.btnGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.btn{
height:46px;
border:none;
border-radius:14px;
font-size:13px;
font-weight:800;
cursor:pointer;
}

.viewBtn{
background:#111827;
color:#fff;
}

.assignBtn{
background:#2563EB;
color:#fff;
}

.statusBtn{
background:#7C3AED;
color:#fff;
}

/* =====================================================
RESPONSIVE
===================================================== */

@media(max-width:1700px){

.ordersGrid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>
<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<div class="pageHeader">

<h1>
Orders
</h1>

</div>

<!-- =====================================================
FILTERS
===================================================== -->

<div class="filterBar">

<div class="leftFilters">

<input
type="text"
placeholder="Search Customer / Order"
class="searchBox"
id="searchInput"
/>

<select
class="selectBox"
id="cityFilter">

<option value="All">

</option>

</select>

<select
class="selectBox"
id="statusFilter">

<option value="All">

</option>

<option value="Pending">
Pending
</option>

<option value="Preparing">
Preparing
</option>

<option value="Out For Delivery">
Out For Delivery
</option>

<option value="Delivered">
Delivered
</option>

</select>

</div>

</div>

<!-- =========================================================
ADD THIS INSIDE orders.html
FILTER BAR KE NICHE
========================================================= -->

<!-- =====================================================
ORDER STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Orders
</span>

<h2 id="totalOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Pending
</span>

<h2 id="pendingOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Preparing
</span>

<h2 id="preparingOrders">
0
</h2>

</div>

<div class="statCard">

<span>
On The Way
</span>

<h2 id="deliveryOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Delivered
</span>

<h2 id="deliveredOrders">
0
</h2>

</div>

<div class="statCard">

<span>
Revenue
</span>

<h2 id="totalRevenue">
₹0
</h2>

</div>

</div>
<!-- =====================================================
ORDERS GRID
===================================================== -->

<div
class="ordersGrid"
id="ordersGrid">

</div>

</div>

<script type="module"
src="./js/orders.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>

</body>
</html>
