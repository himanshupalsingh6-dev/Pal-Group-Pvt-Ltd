<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Orders</title>

<link rel="stylesheet" href="./css/style.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#07142b;
color:#fff;
padding-top:20px;
position:fixed;
height:100%;
}

.logo{
font-size:30px;
font-weight:bold;
padding-left:25px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
background:none;
border:none;
color:#fff;
padding:16px 25px;
text-align:left;
font-size:16px;
cursor:pointer;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:30px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:10px 18px;
border-radius:12px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* CARDS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
}

.card h1{
margin:0;
font-size:35px;
}

/* SEARCH */

.searchBar{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.searchBar input,
.searchBar select{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

/* TABLE */

.tableCard{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:14px;
text-align:left;
}

td{
padding:14px;
border-bottom:1px solid #eee;
}

/* STATUS */

.status{
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
}

.pending{
background:#ffe08a;
}

.processing{
background:#93c5fd;
}

.completed{
background:#86efac;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.blue{
background:#3b82f6;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button class="activeBtn">📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

<a href="./analytics.html">
<button>📈 Analytics</button>
</a>

<a href="./help.html">
<button>🛠 Help</button>
</a>

<a href="./staff.html">
<button>👨‍💼 Staff</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>📦 Live Orders Management</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Orders</h2>
<h1 id="totalOrders">0</h1>
</div>

<div class="card">
<h2>Pending</h2>
<h1 id="pendingOrders">0</h1>
</div>

<div class="card">
<h2>Processing</h2>
<h1 id="processingOrders">0</h1>
</div>

<div class="card">
<h2>Completed</h2>
<h1 id="completedOrders">0</h1>
</div>

<div class="card">
<h2>Total Revenue</h2>
<h1 id="totalRevenue">₹0</h1>
</div>

</div>

<!-- FILTER -->

<div class="searchBar">

<input
type="text"
id="searchInput"
placeholder="Search customer"
/>

<select id="statusFilter">

<option value="">All Status</option>
<option value="Pending">Pending</option>
<option value="Processing">Processing</option>
<option value="Completed">Completed</option>

</select>

</div>

<!-- TABLE -->

<div class="tableCard">

<table>

<thead>

<tr>

<th>Customer</th>
<th>Phone</th>
<th>Total</th>
<th>Status</th>
<th>Partner</th>
<th>Rider</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db } from "./firebase.js";

import {
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* ELEMENTS */

const totalOrders = document.getElementById("totalOrders");
const pendingOrders = document.getElementById("pendingOrders");
const processingOrders = document.getElementById("processingOrders");
const completedOrders = document.getElementById("completedOrders");
const totalRevenue = document.getElementById("totalRevenue");

const ordersTable = document.getElementById("ordersTable");

const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");

let allOrders = [];

/* LIVE FIREBASE */

onSnapshot(collection(db,"orders"),(snapshot)=>{

let revenue = 0;

let pending = 0;
let processing = 0;
let completed = 0;

allOrders = [];

snapshot.forEach((docSnap)=>{

const order = docSnap.data();

allOrders.push({
id:docSnap.id,
...order
});

revenue += Number(order.total || 0);

if(order.status === "Pending"){
pending++;
}

if(order.status === "Processing"){
processing++;
}

if(order.status === "Completed"){
completed++;
}

});

totalOrders.innerHTML = snapshot.size;
pendingOrders.innerHTML = pending;
processingOrders.innerHTML = processing;
completedOrders.innerHTML = completed;
totalRevenue.innerHTML = "₹" + revenue;

renderOrders();

});

/* RENDER */

function renderOrders(){

let search = searchInput.value.toLowerCase();
let filter = statusFilter.value;

let html = "";

allOrders.forEach((o)=>{

const customer = (o.name || "").toLowerCase();

const status = o.status || "Pending";

if(
customer.includes(search) &&
(filter === "" || status === filter)
){

html += `

<tr>

<td>${o.name || "-"}</td>

<td>${o.phone || "-"}</td>

<td>₹${o.total || 0}</td>

<td>

<span class="status ${status.toLowerCase()}">
${status}
</span>

</td>

<td>${o.partnerName || "-"}</td>

<td>${o.riderName || "-"}</td>

<td>

<button
class="btn blue"
onclick="updateStatus('${o.id}','Processing')"
>
Process
</button>

<button
class="btn green"
onclick="updateStatus('${o.id}','Completed')"
>
Complete
</button>

<button
class="btn red"
onclick="deleteOrder('${o.id}')"
>
Delete
</button>

</td>

</tr>

`;

}

});

ordersTable.innerHTML = html;

}

/* SEARCH */

searchInput.addEventListener("input",renderOrders);

statusFilter.addEventListener("change",renderOrders);

/* UPDATE STATUS */

window.updateStatus = async function(id,status){

await updateDoc(doc(db,"orders",id),{
status:status
});

alert("Order Updated ✅");

};

/* DELETE */

window.deleteOrder = async function(id){

const confirmDelete = confirm("Delete Order ?");

if(confirmDelete){

await deleteDoc(doc(db,"orders",id));

alert("Order Deleted ❌");

}

};

</script>

</body>
</html>
