<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuickPress Orders</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F5F7FB;
padding-bottom:120px;
}

/* TOPBAR */

.topbar{
position:sticky;
top:0;
background:#fff;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
box-shadow:0 4px 18px rgba(0,0,0,0.04);
}

.topbar h2{
font-size:30px;
font-weight:900;
}

.searchBox{
width:280px;
height:52px;
border:none;
outline:none;
background:#F3F4F6;
border-radius:18px;
padding:0 18px;
font-size:15px;
}

/* MAIN */

.main{
padding:18px;
max-width:1400px;
margin:auto;
}

/* FILTERS */

.filters{
display:flex;
gap:12px;
overflow:auto;
margin-bottom:20px;
}

.filterBtn{
padding:12px 18px;
border:none;
border-radius:16px;
background:#fff;
font-weight:700;
white-space:nowrap;
box-shadow:0 4px 14px rgba(0,0,0,0.05);
cursor:pointer;
}

.filterBtn.active{
background:#111827;
color:#fff;
}

/* ORDERS */

.ordersGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

.orderCard{
background:#fff;
border-radius:28px;
padding:22px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.orderTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.orderUser{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:56px;
height:56px;
border-radius:18px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
}

.userInfo h3{
font-size:18px;
margin-bottom:4px;
}

.userInfo p{
font-size:13px;
color:#6B7280;
}

.status{
padding:10px 14px;
border-radius:14px;
font-size:12px;
font-weight:800;
background:#DCFCE7;
color:#166534;
}

.orderDetails{
margin-bottom:18px;
}

.detailRow{
display:flex;
justify-content:space-between;
margin-bottom:12px;
font-size:14px;
}

.detailRow span:last-child{
font-weight:700;
}

/* SELECTS */

.selectBox{
width:100%;
height:54px;
border:none;
outline:none;
background:#F3F4F6;
border-radius:18px;
padding:0 16px;
font-size:14px;
margin-bottom:14px;
}

/* BUTTONS */

.btnGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.actionBtn{
height:52px;
border:none;
border-radius:18px;
font-weight:800;
font-size:14px;
cursor:pointer;
}

.acceptBtn{
background:#111827;
color:#fff;
}

.rejectBtn{
background:#FEE2E2;
color:#DC2626;
}

.updateBtn{
width:100%;
height:56px;
border:none;
border-radius:20px;
background:#FFD400;
font-size:15px;
font-weight:900;
margin-top:14px;
}

/* MOBILE */

@media(max-width:900px){

.ordersGrid{
grid-template-columns:1fr;
}

}

@media(max-width:768px){

.topbar{
flex-direction:column;
align-items:flex-start;
gap:14px;
}

.searchBox{
width:100%;
}

.topbar h2{
font-size:24px;
}

.orderCard{
padding:18px;
border-radius:24px;
}

}

</style>
</head>
<body>

<!-- TOPBAR -->

<div class="topbar">

<h2>
Orders
</h2>

<input
type="text"
placeholder="Search orders..."
class="searchBox"
id="searchInput"
/>

</div>

<!-- MAIN -->

<div class="main">

<!-- FILTERS -->

<div class="filters">

<button class="filterBtn active">
All
</button>

<button class="filterBtn">
Pending
</button>

<button class="filterBtn">
Pickup
</button>

<button class="filterBtn">
Ironing
</button>

<button class="filterBtn">
Delivery
</button>

<button class="filterBtn">
Completed
</button>

</div>

<!-- ORDERS -->

<div class="ordersGrid"
id="ordersGrid">

<!-- DYNAMIC -->

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs,
doc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* LOAD ORDERS */

async function loadOrders(){

const ordersGrid =
document.getElementById(
"ordersGrid"
);

const ordersSnap =

await getDocs(
collection(db,"orders")
);

const partnersSnap =

await getDocs(
collection(db,"partners")
);

const ridersSnap =

await getDocs(
collection(db,"riders")
);

let partnerOptions = "";

partnersSnap.forEach((doc)=>{

const partner =
doc.data();

partnerOptions += `

<option value="${partner.name}">
${partner.name}
</option>

`;

});

let riderOptions = "";

ridersSnap.forEach((doc)=>{

const rider =
doc.data();

riderOptions += `

<option value="${rider.name}">
${rider.name}
</option>

`;

});

let html = "";

ordersSnap.forEach((docSnap)=>{

const order =
docSnap.data();

html += `

<div class="orderCard">

<div class="orderTop">

<div class="orderUser">

<div class="avatar">
${order.name
? order.name.charAt(0)
: "U"}
</div>

<div class="userInfo">

<h3>
${order.name || "User"}
</h3>

<p>
${order.phone || ""}
</p>

</div>

</div>

<div class="status">
${order.status || "Placed"}
</div>

</div>

<div class="orderDetails">

<div class="detailRow">
<span>Order Total</span>
<span>
₹${order.total || 0}
</span>
</div>

<div class="detailRow">
<span>Pickup Time</span>
<span>
${order.pickupTime || "N/A"}
</span>
</div>

<div class="detailRow">
<span>Address</span>
<span>
${order.address || ""}
</span>
</div>

</div>

<!-- PARTNER -->

<select
class="selectBox"
id="partner-${docSnap.id}">

<option>
Assign Partner
</option>

${partnerOptions}

</select>

<!-- RIDER -->

<select
class="selectBox"
id="rider-${docSnap.id}">

<option>
Assign Rider
</option>

${riderOptions}

</select>

<!-- STATUS -->

<select
class="selectBox"
id="status-${docSnap.id}">

<option value="Order Placed">
Order Placed
</option>

<option value="Pickup Assigned">
Pickup Assigned
</option>

<option value="Picked Up">
Picked Up
</option>

<option value="Ironing Started">
Ironing Started
</option>

<option value="Ironing Complete">
Ironing Complete
</option>

<option value="Out For Delivery">
Out For Delivery
</option>

<option value="Delivered">
Delivered
</option>

<option value="Cancelled">
Cancelled
</option>

</select>

<div class="btnGrid">

<button
class="actionBtn acceptBtn"
onclick="acceptOrder('${docSnap.id}')">

Accept

</button>

<button
class="actionBtn rejectBtn"
onclick="rejectOrder('${docSnap.id}')">

Reject

</button>

</div>

<button
class="updateBtn"
onclick="updateOrder('${docSnap.id}')">

Update Order

</button>

</div>

`;

});

ordersGrid.innerHTML = html;

}

loadOrders();

/* UPDATE */

window.updateOrder =
async function(orderId){

const partner =

document.getElementById(
`partner-${orderId}`
).value;

const rider =

document.getElementById(
`rider-${orderId}`
).value;

const status =

document.getElementById(
`status-${orderId}`
).value;

await updateDoc(

doc(db,"orders",orderId),

{

partnerName:partner,
riderName:rider,
status:status

}

);

alert(
"Order Updated"
);

loadOrders();

};

/* ACCEPT */

window.acceptOrder =
async function(orderId){

await updateDoc(

doc(db,"orders",orderId),

{

status:"Accepted"

}

);

alert(
"Order Accepted"
);

loadOrders();

};

/* REJECT */

window.rejectOrder =
async function(orderId){

await updateDoc(

doc(db,"orders",orderId),

{

status:"Rejected"

}

);

alert(
"Order Rejected"
);

loadOrders();

};

</script>

</body>
</html>
