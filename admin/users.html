<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Users</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:30px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:17px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:12px;
}

.card h1{
margin:0;
font-size:42px;
}

/* SEARCH */

.searchBox{
background:#fff;
padding:20px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.searchGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#3b82f6;
color:#fff;
}

.green{
background:#22c55e;
color:#fff;
}

/* STATUS */

.status{
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
}

.active{
background:#86efac;
}

.blocked{
background:#fecaca;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button class="activeBtn">
👥 Users
</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

<a href="./analytics.html">
<button>📈 Analytics</button>
</a>

<a href="./help.html">
<button>🛠 Help</button>
</a>

<a href="./staff.html">
<button>👨‍💼 Staff</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>👥 Users Management</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Users</h2>
<h1 id="totalUsers">0</h1>
</div>

<div class="card">
<h2>Active Users</h2>
<h1 id="activeUsers">0</h1>
</div>

<div class="card">
<h2>Total Orders</h2>
<h1 id="totalOrders">0</h1>
</div>

<div class="card">
<h2>Total Spending</h2>
<h1 id="totalSpending">₹0</h1>
</div>

</div>

<!-- SEARCH -->

<div class="searchBox">

<div class="searchGrid">

<input
type="text"
id="searchInput"
placeholder="Search user..."
>

<select id="statusFilter">

<option value="all">
All Status
</option>

<option value="active">
Active
</option>

<option value="blocked">
Blocked
</option>

</select>

</div>

</div>

<!-- USERS TABLE -->

<div class="tableCard">

<h2>Users List</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Orders</th>
<th>Spent</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="usersTable">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {

collection,
onSnapshot,
doc,
updateDoc,
deleteDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalUsers =
document.getElementById("totalUsers");

const activeUsers =
document.getElementById("activeUsers");

const totalOrders =
document.getElementById("totalOrders");

const totalSpending =
document.getElementById("totalSpending");

const usersTable =
document.getElementById("usersTable");

const searchInput =
document.getElementById("searchInput");

const statusFilter =
document.getElementById("statusFilter");

let allUsers = [];

onSnapshot(collection(db,"users"),(snapshot)=>{

let active = 0;
let orders = 0;
let spending = 0;

allUsers = [];

snapshot.forEach((docSnap)=>{

const user = docSnap.data();

allUsers.push({
id:docSnap.id,
...user
});

if(user.status !== "blocked"){
active++;
}

orders += Number(user.totalOrders || 0);

spending += Number(user.totalSpent || 0);

});

totalUsers.innerHTML = snapshot.size;

activeUsers.innerHTML = active;

totalOrders.innerHTML = orders;

totalSpending.innerHTML = "₹" + spending;

renderUsers();

});

function renderUsers(){

let keyword =
searchInput.value.toLowerCase();

let status =
statusFilter.value;

let html = "";

let filtered = allUsers.filter((u)=>{

let matchSearch =
(u.name || "")
.toLowerCase()
.includes(keyword);

let matchStatus =
status === "all"
? true
: u.status === status;

return matchSearch && matchStatus;

});

filtered.forEach((u)=>{

html += `

<tr>

<td>${u.name || "-"}</td>

<td>${u.phone || "-"}</td>

<td>${u.email || "-"}</td>

<td>${u.totalOrders || 0}</td>

<td>₹${u.totalSpent || 0}</td>

<td>

<span class="status ${u.status || "active"}">
${u.status || "active"}
</span>

</td>

<td>

<button
class="btn blue"
onclick="toggleStatus('${u.id}','${u.status || "active"}')"
>
Toggle
</button>

<button
class="btn red"
onclick="deleteUser('${u.id}')"
>
Delete
</button>

</td>

</tr>

`;

});

usersTable.innerHTML = html;

}

searchInput.addEventListener("input",renderUsers);

statusFilter.addEventListener("change",renderUsers);

window.toggleStatus = async function(id,status){

let newStatus =
status === "blocked"
? "active"
: "blocked";

await updateDoc(doc(db,"users",id),{
status:newStatus
});

}

window.deleteUser = async function(id){

let confirmDelete =
confirm("Delete User ?");

if(confirmDelete){

await deleteDoc(doc(db,"users",id));

}

}

</script>

</body>
</html>
