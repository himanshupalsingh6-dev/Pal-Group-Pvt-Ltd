<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Users
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F4F7FC;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:#081028;
position:fixed;
left:0;
top:0;
padding:20px;
overflow:auto;
}

.logo{
font-size:24px;
font-weight:900;
color:#FFD400;
margin-bottom:30px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
height:54px;
display:flex;
align-items:center;
gap:14px;
padding:0 18px;
border-radius:16px;
text-decoration:none;
font-size:15px;
font-weight:700;
color:#fff;
}

.menu a.active{
background:#111C44;
}

/* MAIN */

.main{
margin-left:240px;
width:calc(100% - 240px);
padding:24px;
}

/* TOP */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
flex-wrap:wrap;
gap:14px;
}

.topBar h1{
font-size:38px;
font-weight:900;
}

/* FILTERS */

.filters{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.filterBox{
height:52px;
padding:0 18px;
border:none;
outline:none;
border-radius:16px;
background:#fff;
font-size:14px;
font-weight:700;
min-width:180px;
}

/* STATS */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
padding:24px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.statCard span{
font-size:13px;
color:#6B7280;
font-weight:700;
}

.statCard h2{
font-size:34px;
font-weight:900;
margin-top:10px;
}

/* USERS */

.usersGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

/* CARD */

.userCard{
background:#fff;
border-radius:28px;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.userTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.userInfo{
display:flex;
align-items:center;
gap:12px;
}

.userLogo{
width:56px;
height:56px;
border-radius:18px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:900;
}

.userInfo h3{
font-size:22px;
font-weight:900;
}

.userInfo p{
font-size:12px;
color:#6B7280;
margin-top:4px;
}

.cityTag{
padding:8px 14px;
border-radius:20px;
background:#DCFCE7;
color:#166534;
font-size:12px;
font-weight:800;
}

/* MINI */

.miniGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:16px;
}

.miniCard{
background:#F9FAFB;
padding:12px;
border-radius:16px;
}

.miniCard span{
font-size:11px;
color:#6B7280;
}

.miniCard h4{
font-size:16px;
font-weight:900;
margin-top:6px;
}

/* DETAILS */

.detailGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:16px;
}

.detailCard{
background:#F9FAFB;
padding:12px;
border-radius:14px;
}

.detailCard span{
font-size:11px;
color:#6B7280;
}

.detailCard h4{
font-size:14px;
font-weight:800;
margin-top:6px;
}

/* BUTTONS */

.actionGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.actionBtn{
height:52px;
border:none;
border-radius:16px;
background:#081028;
color:#fff;
font-size:14px;
font-weight:800;
cursor:pointer;
}

.viewBtn{
background:#FFD400;
color:#000;
}

/* POPUP */

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
}

.popupContent{
background:#fff;
width:100%;
max-width:900px;
border-radius:30px;
padding:24px;
max-height:90vh;
overflow:auto;
}

.popupHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.popupHeader h2{
font-size:30px;
font-weight:900;
}

.closeBtn{
width:44px;
height:44px;
border-radius:14px;
background:#081028;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

/* GRAPH */

.graphCard{
background:#fff;
padding:24px;
border-radius:28px;
margin-top:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.graphCard h2{
font-size:26px;
font-weight:900;
margin-bottom:20px;
}

/* MOBILE */

@media(max-width:1200px){

.usersGrid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:900px){

.sidebar{
display:none;
}

.main{
margin-left:0;
width:100%;
padding:16px;
}

.statsGrid{
grid-template-columns:repeat(2,1fr);
}

.usersGrid{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html">
<i class="fa-solid fa-basket-shopping"></i>
Orders
</a>

<a href="services.html">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="users.html"
class="active">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="delivery.html">
<i class="fa-solid fa-truck"></i>
Delivery
</a>

<a href="partners.html">
<i class="fa-solid fa-store"></i>
Partners
</a>

<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Payments
</a>

<a href="analytics.html">
<i class="fa-solid fa-chart-pie"></i>
Analytics
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOP -->

<div class="topBar">

<h1>
Users
</h1>

<div class="filters">

<input
type="text"
placeholder="Search User..."
class="filterBox"
id="searchInput"
/>

<select
id="cityFilter"
class="filterBox">

<option value="All">
All Cities
</option>

<option>
Kasganj
</option>

<option>
Noida
</option>

<option>
Delhi
</option>

<option>
Mumbai
</option>

<option>
Aligarh
</option>

</select>

</div>

</div>

<!-- STATS -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Users
</span>

<h2 id="totalUsers">
0
</h2>

</div>

<div class="statCard">

<span>
Today's Users
</span>

<h2 id="todayUsers">
0
</h2>

</div>

<div class="statCard">

<span>
Total Spend
</span>

<h2 id="totalSpend">
₹0
</h2>

</div>

<div class="statCard">

<span>
Active Cities
</span>

<h2 id="activeCities">
0
</h2>

</div>

</div>

<!-- USERS -->

<div class="usersGrid"
id="usersGrid">

</div>

<!-- GRAPH -->

<div class="graphCard">

<h2>
📈 User Growth Graph
</h2>

<canvas id="growthChart">

</canvas>

</div>

</div>

<!-- POPUP -->

<div class="popup"
id="popup">

<div class="popupContent">

<div class="popupHeader">

<h2>
User Full Details
</h2>

<div class="closeBtn"
onclick="closePopup()">

✕

</div>

</div>

<div id="popupData">

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* GLOBAL */

let users = [];

/* ELEMENTS */

const usersGrid =
document.getElementById(
"usersGrid"
);

const cityFilter =
document.getElementById(
"cityFilter"
);

const searchInput =
document.getElementById(
"searchInput"
);

/* LOAD */

async function loadUsers(){

const snap =
await getDocs(
collection(db,"users")
);

users = [];

snap.forEach((doc)=>{

users.push({

id:doc.id,

...doc.data()

});

});

renderUsers();

createGraph();

}

loadUsers();

/* RENDER */

function renderUsers(){

let html = "";

let totalSpend = 0;

const cities = new Set();

const search =
searchInput.value
.toLowerCase();

users.forEach((user)=>{

/* FILTER */

if(

cityFilter.value !== "All"

&&

user.city !== cityFilter.value

){

return;

}

/* SEARCH */

if(

!(user.name || "")
.toLowerCase()
.includes(search)

){

return;

}

/* STATS */

totalSpend +=
Number(user.totalSpend || 0);

cities.add(user.city);

/* CARD */

html += `

<div class="userCard">

<div class="userTop">

<div class="userInfo">

<div class="userLogo">

${user.name?.charAt(0) || "U"}

</div>

<div>

<h3>
${user.name || "User"}
</h3>

<p>
${user.mobile || "No Mobile"}
</p>

</div>

</div>

<div class="cityTag">

${user.city || "Kasganj"}

</div>

</div>

<div class="miniGrid">

<div class="miniCard">

<span>
Orders
</span>

<h4>
${user.totalOrders || 0}
</h4>

</div>

<div class="miniCard">

<span>
Spend
</span>

<h4>
₹${user.totalSpend || 0}
</h4>

</div>

<div class="miniCard">

<span>
Today
</span>

<h4>
₹${user.todaySpend || 0}
</h4>

</div>

</div>

<div class="detailGrid">

<div class="detailCard">

<span>
Email
</span>

<h4>
${user.email || "N/A"}
</h4>

</div>

<div class="detailCard">

<span>
Gender
</span>

<h4>
${user.gender || "N/A"}
</h4>

</div>

<div class="detailCard">

<span>
State
</span>

<h4>
${user.state || "N/A"}
</h4>

</div>

<div class="detailCard">

<span>
Member Since
</span>

<h4>
${user.memberSince || "N/A"}
</h4>

</div>

</div>

<div class="actionGrid">

<button
class="actionBtn">

📞 Call

</button>

<button
class="actionBtn viewBtn"
onclick='openPopup(${JSON.stringify(user)})'>

View

</button>

</div>

</div>

`;

});

/* EMPTY */

if(html === ""){

html =

`

<div style="
padding:40px;
font-size:18px;
font-weight:800;
">

No Users Found

</div>

`;

}

usersGrid.innerHTML =
html;

/* STATS */

document.getElementById(
"totalUsers"
).innerHTML =
users.length;

document.getElementById(
"todayUsers"
).innerHTML =
Math.floor(users.length / 2);

document.getElementById(
"totalSpend"
).innerHTML =
`₹${totalSpend}`;

document.getElementById(
"activeCities"
).innerHTML =
cities.size;

}

/* FILTER */

cityFilter.addEventListener(
"change",
renderUsers
);

searchInput.addEventListener(
"keyup",
renderUsers
);

/* POPUP */

window.openPopup =
function(user){

document.getElementById(
"popup"
).style.display =
"flex";

document.getElementById(
"popupData"
).innerHTML =

`

<div class="detailGrid">

<div class="detailCard">
<span>Name</span>
<h4>${user.name || 'N/A'}</h4>
</div>

<div class="detailCard">
<span>Mobile</span>
<h4>${user.mobile || 'N/A'}</h4>
</div>

<div class="detailCard">
<span>Email</span>
<h4>${user.email || 'N/A'}</h4>
</div>

<div class="detailCard">
<span>City</span>
<h4>${user.city || 'N/A'}</h4>
</div>

<div class="detailCard">
<span>State</span>
<h4>${user.state || 'N/A'}</h4>
</div>

<div class="detailCard">
<span>Total Orders</span>
<h4>${user.totalOrders || 0}</h4>
</div>

<div class="detailCard">
<span>Total Spend</span>
<h4>₹${user.totalSpend || 0}</h4>
</div>

<div class="detailCard">
<span>Today Spend</span>
<h4>₹${user.todaySpend || 0}</h4>
</div>

<div class="detailCard">
<span>Gender</span>
<h4>${user.gender || 'N/A'}</h4>
</div>

<div class="detailCard">
<span>DOB</span>
<h4>${user.dob || 'N/A'}</h4>
</div>

<div class="detailCard">
<span>Emergency Contact</span>
<h4>${user.emergency || 'N/A'}</h4>
</div>

<div class="detailCard">
<span>Member Since</span>
<h4>${user.memberSince || 'N/A'}</h4>
</div>

<div class="detailCard">
<span>Wallet</span>
<h4>₹${user.wallet || 0}</h4>
</div>

<div class="detailCard">
<span>Coupons</span>
<h4>${user.coupons || 0}</h4>
</div>

</div>

`;

};

window.closePopup =
function(){

document.getElementById(
"popup"
).style.display =
"none";

};

/* GRAPH */

function createGraph(){

const ctx =
document.getElementById(
'growthChart'
);

new Chart(ctx, {

type:'line',

data:{

labels:[
'Jan',
'Feb',
'Mar',
'Apr',
'May',
'Jun',
'Jul'
],

datasets:[{

label:'Users Growth',

data:[
12,
19,
30,
45,
60,
80,
100
],

borderWidth:4,

tension:0.4

}]

},

options:{

responsive:true

}

});

}

</script>

</body>
</html>
