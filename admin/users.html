<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuickPress Users</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#07142b;
position:fixed;
height:100%;
overflow:auto;
color:#fff;
}

.logo{
font-size:30px;
font-weight:bold;
padding:25px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:25px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* CARDS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
color:#666;
}

.card h1{
margin:0;
font-size:38px;
}

/* FILTER */

.filterCard{
background:#fff;
padding:25px;
border-radius:22px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.filterGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
width:100%;
box-sizing:border-box;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#2563eb;
color:#fff;
}

/* STATUS */

.active{
color:#16a34a;
font-weight:bold;
}

.blocked{
color:#dc2626;
font-weight:bold;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
overflow:auto;
}

.modalContent{
background:#fff;
margin:30px auto;
padding:25px;
width:90%;
max-width:950px;
border-radius:25px;
}

.closeBtn{
float:right;
font-size:25px;
cursor:pointer;
}

.detailGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:25px;
}

.detailCard{
background:#f7f7f7;
padding:18px;
border-radius:15px;
}

.orderCard{
background:#fff;
padding:18px;
border-radius:15px;
margin-top:15px;
border:1px solid #eee;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button class="activeBtn">
👥 Users
</button>
</a>

<a href="./wallet.html">
<button>💰 Wallet</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
👥 Advanced Users Management
</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Users</h2>
<h1 id="totalUsers">0</h1>
</div>

<div class="card">
<h2>Active Users</h2>
<h1 id="activeUsers">0</h1>
</div>

<div class="card">
<h2>Total Orders</h2>
<h1 id="totalOrders">0</h1>
</div>

<div class="card">
<h2>Total Revenue</h2>
<h1 id="totalRevenue">₹0</h1>
</div>

</div>

<!-- FILTER -->

<div class="filterCard">

<div class="filterGrid">

<input
type="text"
id="searchInput"
placeholder="Search user..."
>

<select id="statusFilter">

<option value="all">
All Status
</option>

<option value="active">
Active
</option>

<option value="blocked">
Blocked
</option>

</select>

</div>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>
All Users
</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Orders</th>
<th>Spent</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="usersTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="userModal">

<div class="modalContent">

<span
class="closeBtn"
onclick="closeUserModal()"
>
✖
</span>

<h1>
👤 User Full Details
</h1>

<div
class="detailGrid"
id="userDetails"
>

</div>

<h2>
📦 User Orders
</h2>

<div id="userOrders">

</div>

</div>

</div>

<script type="module">

import {

initializeApp

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBBaslH5QsahoyESYpo1nVtlYIUYfVJ2d4",

authDomain:
"quickpress-offical.firebaseapp.com",

projectId:
"quickpress-offical",

storageBucket:
"quickpress-offical.firebasestorage.app",

messagingSenderId:
"939286557961",

appId:
"1:939286557961:web:ddac64f197e14877718fd8"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* ELEMENTS */

const totalUsers =
document.getElementById("totalUsers");

const activeUsers =
document.getElementById("activeUsers");

const totalOrders =
document.getElementById("totalOrders");

const totalRevenue =
document.getElementById("totalRevenue");

const usersTable =
document.getElementById("usersTable");

const searchInput =
document.getElementById("searchInput");

const statusFilter =
document.getElementById("statusFilter");

let allUsers = [];
let allOrders = [];

/* ORDERS */

onSnapshot(
collection(db,"orders"),
(snapshot)=>{

allOrders = [];

snapshot.forEach((docSnap)=>{

allOrders.push(docSnap.data());

});

});

/* USERS */

onSnapshot(
collection(db,"users"),
(snapshot)=>{

let active = 0;
let orders = 0;
let revenue = 0;

allUsers = [];

snapshot.forEach((docSnap)=>{

const u = docSnap.data();

allUsers.push({
id:docSnap.id,
...u
});

if(u.status !== "blocked"){
active++;
}

orders +=
Number(u.totalOrders || 0);

revenue +=
Number(u.totalSpent || 0);

});

totalUsers.innerHTML =
snapshot.size;

activeUsers.innerHTML =
active;

totalOrders.innerHTML =
orders;

totalRevenue.innerHTML =
"₹" + revenue;

renderUsers();

});

/* RENDER */

function renderUsers(){

let keyword =
searchInput.value.toLowerCase();

let status =
statusFilter.value;

let html = "";

let filtered = allUsers.filter((u)=>{

let matchSearch =

(u.name || "")
.toLowerCase()
.includes(keyword)

||

(u.phone || "")
.includes(keyword)

||

(u.email || "")
.toLowerCase()
.includes(keyword);

let matchStatus =

status === "all"
? true
: u.status === status;

return matchSearch && matchStatus;

});

filtered.forEach((u)=>{

html += `

<tr>

<td>${u.name || "-"}</td>

<td>${u.phone || "-"}</td>

<td>${u.email || "-"}</td>

<td>${u.totalOrders || 0}</td>

<td>₹${u.totalSpent || 0}</td>

<td class="${u.status || 'active'}">
${u.status || "active"}
</td>

<td>

<button
class="btn blue"
onclick='viewUser(${JSON.stringify(u)})'
>
View
</button>

<button
class="btn green"
onclick="
toggleStatus(
'${u.id}',
'${u.status || "active"}'
)
"
>
Toggle
</button>

<button
class="btn red"
onclick="
deleteUser(
'${u.id}'
)
"
>
Delete
</button>

</td>

</tr>

`;

});

usersTable.innerHTML = html;

}

searchInput.addEventListener(
"input",
renderUsers
);

statusFilter.addEventListener(
"change",
renderUsers
);

/* VIEW */

window.viewUser =
function(u){

const modal =
document.getElementById(
"userModal"
);

const details =
document.getElementById(
"userDetails"
);

const userOrders =
document.getElementById(
"userOrders"
);

modal.style.display =
"block";

let date =
new Date(
u.createdAt || Date.now()
).toLocaleString();

details.innerHTML = `

<div class="detailCard">
<b>Name</b><br>
${u.name || "-"}
</div>

<div class="detailCard">
<b>Phone</b><br>
${u.phone || "-"}
</div>

<div class="detailCard">
<b>Email</b><br>
${u.email || "-"}
</div>

<div class="detailCard">
<b>Address</b><br>
${u.address || "-"}
</div>

<div class="detailCard">
<b>Total Orders</b><br>
${u.totalOrders || 0}
</div>

<div class="detailCard">
<b>Total Spent</b><br>
₹${u.totalSpent || 0}
</div>

<div class="detailCard">
<b>Status</b><br>
${u.status || "active"}
</div>

<div class="detailCard">
<b>Created</b><br>
${date}
</div>

`;

let html = "";

allOrders.forEach((o)=>{

if(o.userId === u.id){

html += `

<div class="orderCard">

<b>Order ID:</b>
${o.orderId || "-"}

<br><br>

<b>Total:</b>
₹${o.total || 0}

<br><br>

<b>Status:</b>
${o.status || "-"}

<br><br>

<b>Address:</b>
${o.address || "-"}

</div>

`;

}

});

userOrders.innerHTML = html;

}

/* CLOSE */

window.closeUserModal =
function(){

document.getElementById(
"userModal"
).style.display = "none";

}

/* DELETE */

window.deleteUser =
async function(id){

let confirmDelete =
confirm("Delete User ?");

if(confirmDelete){

await deleteDoc(
doc(db,"users",id)
);

}

}

/* STATUS */

window.toggleStatus =
async function(id,status){

let newStatus =

status === "blocked"
? "active"
: "blocked";

await updateDoc(
doc(db,"users",id),
{
status:newStatus
}
);

}

</script>

</body>
</html>
