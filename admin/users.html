<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Users
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}

/* =====================================================
TOPBAR
===================================================== */

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:82px;
background:#fff;
border-bottom:1px solid #E5E7EB;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
z-index:999;
}

.logo{
font-size:32px;
font-weight:900;
}

.topRight{
display:flex;
align-items:center;
gap:16px;
}

.topBtn{
width:48px;
height:48px;
border-radius:14px;
border:1px solid #E5E7EB;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
font-size:18px;
cursor:pointer;
position:relative;
}

.badge{
position:absolute;
top:-5px;
right:-5px;
width:20px;
height:20px;
border-radius:50%;
background:#EF4444;
color:#fff;
font-size:11px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
}

.profile{
height:48px;
padding:0 14px;
border-radius:14px;
border:1px solid #E5E7EB;
display:flex;
align-items:center;
gap:12px;
background:#fff;
}

.profile img{
width:34px;
height:34px;
border-radius:50%;
}

/* =====================================================
SIDEBAR
===================================================== */

.sidebar{
position:fixed;
top:82px;
left:0;
bottom:0;
width:240px;
background:#fff;
border-right:1px solid #E5E7EB;
padding:18px 10px;
overflow:auto;
}

.sidebarMenu{
display:flex;
flex-direction:column;
gap:6px;
}

.sidebarMenu a{
height:52px;
padding:0 16px;
display:flex;
align-items:center;
gap:14px;
border-radius:14px;
text-decoration:none;
font-size:15px;
font-weight:600;
color:#374151;
}

.sidebarMenu a.active{
background:#111827;
color:#fff;
}

/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
height:calc(100vh - 82px);
overflow:auto;
padding:24px;
}

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:22px;
padding:22px;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:34px;
font-weight:900;
margin-top:10px;
}

/* =====================================================
FILTER
===================================================== */

.filterBar{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:18px;
display:flex;
gap:14px;
margin-bottom:24px;
}

.searchBox{
width:320px;
height:52px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

.selectBox{
height:52px;
padding:0 16px;
border-radius:14px;
border:1px solid #E5E7EB;
font-size:14px;
font-weight:600;
background:#fff;
}

/* =====================================================
USERS GRID
===================================================== */

.usersGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

/* =====================================================
USER CARD
===================================================== */

.userCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:22px;
}

.userTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.userInfo{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:58px;
height:58px;
border-radius:18px;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
}

.userInfo h3{
font-size:18px;
font-weight:900;
}

.userInfo p{
font-size:12px;
color:#6B7280;
margin-top:4px;
}

/* =====================================================
STATUS
===================================================== */

.status{
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:800;
}

.active{
background:#DCFCE7;
color:#166534;
}

/* =====================================================
INFO
===================================================== */

.infoGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:18px;
}

.infoBox{
background:#F9FAFB;
padding:14px;
border-radius:16px;
}

.infoBox span{
font-size:11px;
color:#6B7280;
}

.infoBox h4{
font-size:15px;
font-weight:900;
margin-top:5px;
}

/* =====================================================
BUTTONS
===================================================== */

.btnGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.btn{
height:46px;
border:none;
border-radius:14px;
font-size:13px;
font-weight:800;
cursor:pointer;
}

.viewBtn{
background:#111827;
color:#fff;
}

.callBtn{
background:#16A34A;
color:#fff;
}

.deleteBtn{
background:#EF4444;
color:#fff;
}

</style>

</head>

<body>

<!-- =====================================================
TOPBAR
===================================================== -->

<div class="topbar">

<div class="logo">
QuickPress
</div>

<div class="topRight">

<div class="topBtn">

<i class="fa-regular fa-bell"></i>

<div class="badge">
0
</div>

</div>

<div class="topBtn">

<i class="fa-solid fa-gear"></i>

</div>

<div class="profile">

<img src="https://i.pravatar.cc/150?img=12">

<div>

<b>
Admin
</b>

</div>

</div>

</div>

</div>

<!-- =====================================================
SIDEBAR
===================================================== -->

<div class="sidebar">

<div class="sidebarMenu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html">
<i class="fa-solid fa-box"></i>
Orders
</a>

<a href="services.html">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="users.html" class="active">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="partners.html">
<i class="fa-solid fa-store"></i>
Partners
</a>

<a href="riders.html">
<i class="fa-solid fa-motorcycle"></i>
Riders
</a>

<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Finance
</a>

</div>

</div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<div class="pageHeader">

<h1>
Users
</h1>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Users
</span>

<h2 id="totalUsers">
0
</h2>

</div>

<div class="statCard">

<span>
Active Users
</span>

<h2 id="activeUsers">
0
</h2>

</div>

<div class="statCard">

<span>
Today Users
</span>

<h2 id="todayUsers">
0
</h2>

</div>

<div class="statCard">

<span>
Total Spend
</span>

<h2 id="totalSpend">
₹0
</h2>

</div>

</div>

<!-- =====================================================
FILTER
===================================================== -->

<div class="filterBar">

<input
type="text"
placeholder="Search User"
class="searchBox"
id="searchInput"
/>

<select
class="selectBox"
id="cityFilter">

<option value="All">
All Cities
</option>

</select>

</div>

<!-- =====================================================
GRID
===================================================== -->

<div
class="usersGrid"
id="usersGrid">

</div>

</div>

<script type="module"
src="./js/users.js">
</script>

</body>
</html>
