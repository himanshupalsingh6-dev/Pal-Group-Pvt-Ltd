<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuickPress Wallet</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#07142b;
position:fixed;
height:100%;
overflow:auto;
color:#fff;
}

.logo{
font-size:30px;
font-weight:bold;
padding:25px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:25px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* CARDS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:10px;
color:#666;
}

.card h1{
margin:0;
font-size:38px;
}

/* FILTER */

.filterCard{
background:#fff;
padding:25px;
border-radius:22px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.filterGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
width:100%;
box-sizing:border-box;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#2563eb;
color:#fff;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
overflow:auto;
}

.modalContent{
background:#fff;
margin:30px auto;
padding:25px;
width:90%;
max-width:800px;
border-radius:25px;
}

.closeBtn{
float:right;
font-size:25px;
cursor:pointer;
}

.detailGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:25px;
}

.detailCard{
background:#f7f7f7;
padding:18px;
border-radius:15px;
}

.transactionCard{
background:#fff;
padding:18px;
border-radius:15px;
margin-top:15px;
border:1px solid #eee;
}

.credit{
color:#16a34a;
font-weight:bold;
}

.debit{
color:#dc2626;
font-weight:bold;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button class="activeBtn">
💰 Wallet
</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
💰 Advanced Wallet Management
</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Wallet Users</h2>
<h1 id="totalWalletUsers">0</h1>
</div>

<div class="card">
<h2>Total Wallet Balance</h2>
<h1 id="totalWalletBalance">₹0</h1>
</div>

<div class="card">
<h2>Total Credits</h2>
<h1 id="totalCredits">₹0</h1>
</div>

<div class="card">
<h2>Total Debits</h2>
<h1 id="totalDebits">₹0</h1>
</div>

</div>

<!-- FILTER -->

<div class="filterCard">

<div class="filterGrid">

<input
type="text"
id="searchInput"
placeholder="Search wallet..."
>

<select id="roleFilter">

<option value="all">
All Roles
</option>

<option value="user">
Users
</option>

<option value="partner">
Partners
</option>

<option value="rider">
Riders
</option>

</select>

</div>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>
All Wallet Accounts
</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Role</th>
<th>Phone</th>
<th>Wallet</th>
<th>Credits</th>
<th>Debits</th>
<th>Action</th>

</tr>

</thead>

<tbody id="walletTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="walletModal">

<div class="modalContent">

<span
class="closeBtn"
onclick="closeWalletModal()"
>
✖
</span>

<h1>
💰 Wallet Full Details
</h1>

<div
class="detailGrid"
id="walletDetails"
>

</div>

<br><br>

<h2>
➕ Add / Deduct Funds
</h2>

<div class="filterGrid">

<input
type="number"
id="fundAmount"
placeholder="Amount"
>

<select id="fundType">

<option value="credit">
Add Fund
</option>

<option value="debit">
Deduct Fund
</option>

</select>

</div>

<br>

<button
class="btn green"
onclick="updateWallet()"
>
Update Wallet
</button>

<h2>
📜 Transactions
</h2>

<div id="transactionsList">

</div>

</div>

</div>

<script type="module">

import {

initializeApp

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
addDoc,
increment

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyBBaslH5QsahoyESYpo1nVtlYIUYfVJ2d4",

authDomain:
"quickpress-offical.firebaseapp.com",

projectId:
"quickpress-offical",

storageBucket:
"quickpress-offical.firebasestorage.app",

messagingSenderId:
"939286557961",

appId:
"1:939286557961:web:ddac64f197e14877718fd8"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* ELEMENTS */

const totalWalletUsers =
document.getElementById("totalWalletUsers");

const totalWalletBalance =
document.getElementById("totalWalletBalance");

const totalCredits =
document.getElementById("totalCredits");

const totalDebits =
document.getElementById("totalDebits");

const walletTable =
document.getElementById("walletTable");

const searchInput =
document.getElementById("searchInput");

const roleFilter =
document.getElementById("roleFilter");

let allWallets = [];
let currentWallet = null;

/* LOAD */

onSnapshot(
collection(db,"wallets"),
(snapshot)=>{

let balance = 0;
let credits = 0;
let debits = 0;

allWallets = [];

snapshot.forEach((docSnap)=>{

const w = docSnap.data();

allWallets.push({
id:docSnap.id,
...w
});

balance +=
Number(w.balance || 0);

credits +=
Number(w.totalCredits || 0);

debits +=
Number(w.totalDebits || 0);

});

totalWalletUsers.innerHTML =
snapshot.size;

totalWalletBalance.innerHTML =
"₹" + balance;

totalCredits.innerHTML =
"₹" + credits;

totalDebits.innerHTML =
"₹" + debits;

renderWallets();

});

/* RENDER */

function renderWallets(){

let keyword =
searchInput.value.toLowerCase();

let role =
roleFilter.value;

let html = "";

let filtered = allWallets.filter((w)=>{

let matchSearch =

(w.name || "")
.toLowerCase()
.includes(keyword)

||

(w.phone || "")
.includes(keyword);

let matchRole =

role === "all"
? true
: w.role === role;

return matchSearch && matchRole;

});

filtered.forEach((w)=>{

html += `

<tr>

<td>${w.name || "-"}</td>

<td>${w.role || "-"}</td>

<td>${w.phone || "-"}</td>

<td>₹${w.balance || 0}</td>

<td class="credit">
₹${w.totalCredits || 0}
</td>

<td class="debit">
₹${w.totalDebits || 0}
</td>

<td>

<button
class="btn blue"
onclick='viewWallet(${JSON.stringify(w)})'
>
Manage
</button>

</td>

</tr>

`;

});

walletTable.innerHTML = html;

}

searchInput.addEventListener(
"input",
renderWallets
);

roleFilter.addEventListener(
"change",
renderWallets
);

/* VIEW */

window.viewWallet =
function(w){

currentWallet = w;

document.getElementById(
"walletModal"
).style.display = "block";

document.getElementById(
"walletDetails"
).innerHTML = `

<div class="detailCard">
<b>Name</b><br>
${w.name || "-"}
</div>

<div class="detailCard">
<b>Role</b><br>
${w.role || "-"}
</div>

<div class="detailCard">
<b>Phone</b><br>
${w.phone || "-"}
</div>

<div class="detailCard">
<b>Email</b><br>
${w.email || "-"}
</div>

<div class="detailCard">
<b>Wallet Balance</b><br>
₹${w.balance || 0}
</div>

<div class="detailCard">
<b>Total Credits</b><br>
₹${w.totalCredits || 0}
</div>

<div class="detailCard">
<b>Total Debits</b><br>
₹${w.totalDebits || 0}
</div>

`;

loadTransactions(w.id);

}

/* TRANSACTIONS */

function loadTransactions(uid){

onSnapshot(
collection(db,"walletTransactions"),
(snapshot)=>{

let html = "";

snapshot.forEach((docSnap)=>{

const t = docSnap.data();

if(t.uid !== uid){
return;
}

let date =
new Date(
t.createdAt || Date.now()
).toLocaleString();

html += `

<div class="transactionCard">

<b class="${t.type}">
${t.type}
</b>

<br><br>

₹${t.amount || 0}

<br><br>

${t.note || "-"}

<br><br>

${date}

</div>

`;

});

document.getElementById(
"transactionsList"
).innerHTML = html;

});

}

/* UPDATE WALLET */

window.updateWallet =
async function(){

let amount =
Number(
document.getElementById(
"fundAmount"
).value
);

let type =
document.getElementById(
"fundType"
).value;

if(!amount){
alert("Enter amount");
return;
}

let updateAmount =

type === "credit"
? amount
: -amount;

await updateDoc(
doc(db,"wallets",currentWallet.id),
{

balance:increment(updateAmount),

totalCredits:
type === "credit"
? increment(amount)
: increment(0),

totalDebits:
type === "debit"
? increment(amount)
: increment(0)

}
);

await addDoc(
collection(db,"walletTransactions"),
{

uid:currentWallet.id,

name:currentWallet.name,

role:currentWallet.role,

amount:amount,

type:type,

note:
type === "credit"
? "Admin Added Fund"
: "Admin Deducted Fund",

createdAt:Date.now()

}
);

alert("Wallet Updated ✅");

}

/* CLOSE */

window.closeWalletModal =
function(){

document.getElementById(
"walletModal"
).style.display = "none";

}

</script>

</body>
</html>
