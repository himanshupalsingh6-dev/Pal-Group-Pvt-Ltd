<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickPress Wallet</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#07142b;
position:fixed;
height:100%;
color:#fff;
padding-top:20px;
}

.logo{
font-size:30px;
font-weight:bold;
padding-left:22px;
margin-bottom:30px;
color:#FFD400;
}

.sidebar a{
text-decoration:none;
}

.sidebar button{
width:100%;
border:none;
background:none;
color:#fff;
padding:18px 25px;
font-size:17px;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#FFD400;
color:#000;
}

.activeBtn{
background:#FFD400 !important;
color:#000 !important;
}

/* MAIN */

.main{
margin-left:220px;
padding:28px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.adminBox{
background:#fff;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:18px;
margin-bottom:12px;
}

.card h1{
margin:0;
font-size:42px;
}

/* FILTER */

.filterBox{
background:#fff;
padding:20px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.filterGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

/* TABLE */

.tableCard{
background:#fff;
padding:25px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD400;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

/* BUTTON */

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.green{
background:#22c55e;
color:#fff;
}

.red{
background:#ef4444;
color:#fff;
}

.blue{
background:#3b82f6;
color:#fff;
}

/* STATUS */

.credit{
color:#16a34a;
font-weight:bold;
}

.debit{
color:#dc2626;
font-weight:bold;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<a href="./index.html">
<button>📊 Dashboard</button>
</a>

<a href="./orders.html">
<button>📦 Orders</button>
</a>

<a href="./partners.html">
<button>👨‍🏭 Partners</button>
</a>

<a href="./riders.html">
<button>🚚 Riders</button>
</a>

<a href="./users.html">
<button>👥 Users</button>
</a>

<a href="./wallet.html">
<button class="activeBtn">
💰 Wallet
</button>
</a>

<a href="./withdraw.html">
<button>💳 Withdraw</button>
</a>

<a href="./analytics.html">
<button>📈 Analytics</button>
</a>

<a href="./help.html">
<button>🛠 Help</button>
</a>

<a href="./staff.html">
<button>👨‍💼 Staff</button>
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>💰 Wallet Management</h1>

<div class="adminBox">
👤 Admin
</div>

</div>

<!-- STATS -->

<div class="grid">

<div class="card">
<h2>Total Wallet Balance</h2>
<h1 id="totalBalance">₹0</h1>
</div>

<div class="card">
<h2>Total Credits</h2>
<h1 id="totalCredits">₹0</h1>
</div>

<div class="card">
<h2>Total Debits</h2>
<h1 id="totalDebits">₹0</h1>
</div>

<div class="card">
<h2>Total Transactions</h2>
<h1 id="totalTransactions">0</h1>
</div>

</div>

<!-- FILTER -->

<div class="filterBox">

<div class="filterGrid">

<input
type="text"
id="searchInput"
placeholder="Search name / phone..."
>

<select id="typeFilter">

<option value="all">
All Types
</option>

<option value="credit">
Credit
</option>

<option value="debit">
Debit
</option>

</select>

</div>

</div>

<!-- TABLE -->

<div class="tableCard">

<h2>Wallet Transactions</h2>

<table>

<thead>

<tr>

<th>User</th>
<th>Phone</th>
<th>Role</th>
<th>Amount</th>
<th>Type</th>
<th>Date</th>

</tr>

</thead>

<tbody id="walletTable">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {

collection,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const totalBalance =
document.getElementById("totalBalance");

const totalCredits =
document.getElementById("totalCredits");

const totalDebits =
document.getElementById("totalDebits");

const totalTransactions =
document.getElementById("totalTransactions");

const walletTable =
document.getElementById("walletTable");

const searchInput =
document.getElementById("searchInput");

const typeFilter =
document.getElementById("typeFilter");

let allTransactions = [];

onSnapshot(collection(db,"walletTransactions"),(snapshot)=>{

let balance = 0;
let credits = 0;
let debits = 0;

allTransactions = [];

snapshot.forEach((docSnap)=>{

const t = docSnap.data();

allTransactions.push(t);

if(t.type === "credit"){
credits += Number(t.amount || 0);
balance += Number(t.amount || 0);
}

if(t.type === "debit"){
debits += Number(t.amount || 0);
balance -= Number(t.amount || 0);
}

});

totalBalance.innerHTML =
"₹" + balance;

totalCredits.innerHTML =
"₹" + credits;

totalDebits.innerHTML =
"₹" + debits;

totalTransactions.innerHTML =
snapshot.size;

renderWallet();

});

function renderWallet(){

let keyword =
searchInput.value.toLowerCase();

let type =
typeFilter.value;

let html = "";

let filtered = allTransactions.filter((t)=>{

let matchSearch =
(t.name || "")
.toLowerCase()
.includes(keyword)

||

(t.phone || "")
.toLowerCase()
.includes(keyword);

let matchType =
type === "all"
? true
: t.type === type;

return matchSearch && matchType;

});

filtered.reverse().forEach((t)=>{

let date =
new Date(t.createdAt || Date.now())
.toLocaleString();

html += `

<tr>

<td>${t.name || "-"}</td>

<td>${t.phone || "-"}</td>

<td>${t.role || "-"}</td>

<td>₹${t.amount || 0}</td>

<td class="${t.type}">
${t.type}
</td>

<td>${date}</td>

</tr>

`;

});

walletTable.innerHTML = html;

}

searchInput.addEventListener(
"input",
renderWallet
);

typeFilter.addEventListener(
"change",
renderWallet
);

</script>

</body>
</html>
