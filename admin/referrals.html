<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
Referral System
</title>

<link rel="stylesheet"
href="./css/global.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:52px;
font-weight:900;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border-radius:28px;
border:1px solid #E5E7EB;
padding:24px;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
display:block;
margin-bottom:8px;
}

.statCard h2{
font-size:38px;
font-weight:900;
}

/* =====================================================
TABLE
===================================================== */

.tableWrap{
background:#fff;
border-radius:28px;
border:1px solid #E5E7EB;
overflow:hidden;
}

.tableHead{
height:62px;
display:grid;
grid-template-columns:
1fr
180px
180px
180px
180px
160px;
align-items:center;
padding:0 20px;
font-size:14px;
font-weight:900;
border-bottom:1px solid #E5E7EB;
}

.referralRow{
min-height:84px;
display:grid;
grid-template-columns:
1fr
180px
180px
180px
180px
160px;
align-items:center;
padding:0 20px;
border-bottom:1px solid #F3F4F6;
font-size:14px;
}

/* =====================================================
BADGES
===================================================== */

.badge{
padding:10px 14px;
border-radius:999px;
font-size:12px;
font-weight:900;
width:max-content;
}

.active{
background:#DCFCE7;
color:#166534;
}

.pending{
background:#FEF3C7;
color:#92400E;
}

/* =====================================================
BUTTON
===================================================== */

.actionBtn{
height:42px;
padding:0 16px;
border:none;
border-radius:12px;
background:#111827;
color:#fff;
font-size:12px;
font-weight:800;
cursor:pointer;
}

</style>

</head>

<body>

<div id="topbar"></div>

<div id="sidebar"></div>

<div class="main">

<!-- =====================================================
HEADER
===================================================== -->

<div class="pageHeader">

<h1>
Referral System
</h1>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Referrals
</span>

<h2 id="totalReferrals">
0
</h2>

</div>

<div class="statCard">

<span>
Referral Earnings
</span>

<h2 id="referralEarnings">
₹0
</h2>

</div>

<div class="statCard">

<span>
Pending Rewards
</span>

<h2 id="pendingRewards">
0
</h2>

</div>

<div class="statCard">

<span>
Active Referrals
</span>

<h2 id="activeReferrals">
0
</h2>

</div>

</div>

<!-- =====================================================
TABLE
===================================================== -->

<div class="tableWrap">

<div class="tableHead">

<div>
User
</div>

<div>
Referral Code
</div>

<div>
Invites
</div>

<div>
Reward
</div>

<div>
Status
</div>

<div>
Action
</div>

</div>

<div id="referralContainer">

</div>

</div>

</div>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>

<script type="module"
src="./js/referrals.js">
</script>

</body>
</html>
