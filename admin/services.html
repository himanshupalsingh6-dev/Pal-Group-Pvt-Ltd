<!-- =========================================================
FILE : admin/services.html
QUICKPRESS ENTERPRISE SERVICES PANEL
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
QuickPress Services
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="./css/global.css"/>

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#F5F7FB;
overflow:hidden;
color:#111827;
}

/* =====================================================
MAIN
===================================================== */

.main{
margin-left:240px;
margin-top:82px;
height:calc(100vh - 82px);
overflow:auto;
padding:24px;
}

/* =====================================================
HEADER
===================================================== */

.pageHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.pageHeader h1{
font-size:42px;
font-weight:900;
}

.addBtn{
height:52px;
padding:0 22px;
border:none;
border-radius:14px;
background:#111827;
color:#fff;
font-size:14px;
font-weight:700;
cursor:pointer;
}

/* =====================================================
STATS
===================================================== */

.statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:24px;
}

.statCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:22px;
padding:22px;
}

.statCard span{
font-size:13px;
font-weight:700;
color:#6B7280;
}

.statCard h2{
font-size:34px;
font-weight:900;
margin-top:10px;
}

/* =====================================================
FILTER
===================================================== */

.filterBar{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:18px;
display:flex;
gap:14px;
margin-bottom:24px;
}

.searchBox{
width:320px;
height:52px;
border-radius:14px;
border:1px solid #E5E7EB;
padding:0 18px;
font-size:14px;
outline:none;
}

/* =====================================================
SERVICES GRID
===================================================== */

.servicesGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

/* =====================================================
SERVICE CARD
===================================================== */

.serviceCard{
background:#fff;
border:1px solid #E5E7EB;
border-radius:24px;
padding:22px;
}

.serviceTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.serviceIcon{
width:64px;
height:64px;
border-radius:18px;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

.status{
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:800;
}

.active{
background:#DCFCE7;
color:#166534;
}

.inactive{
background:#FEE2E2;
color:#991B1B;
}

.serviceCard h3{
font-size:22px;
font-weight:900;
margin-bottom:10px;
}

.serviceCard p{
font-size:14px;
color:#6B7280;
line-height:1.6;
margin-bottom:18px;
}

.priceGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:18px;
}

.priceBox{
background:#F9FAFB;
padding:14px;
border-radius:16px;
}

.priceBox span{
font-size:11px;
color:#6B7280;
}

.priceBox h4{
font-size:20px;
font-weight:900;
margin-top:5px;
}

/* =====================================================
BUTTONS
===================================================== */

.btnGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.btn{
height:46px;
border:none;
border-radius:14px;
font-size:13px;
font-weight:800;
cursor:pointer;
}

.editBtn{
background:#111827;
color:#fff;
}

.deleteBtn{
background:#EF4444;
color:#fff;
}

.toggleBtn{
background:#2563EB;
color:#fff;
}

</style>

</head>

<body>
  
<div id="topbar"></div>

<div id="sidebar"></div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="main">

<div class="pageHeader">

<h1>
Services
</h1>

<button
class="addBtn"
onclick="addService()">

+ Add Service

</button>

</div>

<!-- =====================================================
STATS
===================================================== -->

<div class="statsGrid">

<div class="statCard">

<span>
Total Services
</span>

<h2 id="totalServices">
0
</h2>

</div>

<div class="statCard">

<span>
Active Services
</span>

<h2 id="activeServices">
0
</h2>

</div>

<div class="statCard">

<span>
Inactive Services
</span>

<h2 id="inactiveServices">
0
</h2>

</div>

<div class="statCard">

<span>
Total Revenue
</span>

<h2 id="serviceRevenue">
₹0
</h2>

</div>

</div>

<!-- =====================================================
FILTER
===================================================== -->

<div class="filterBar">

<input
type="text"
placeholder="Search Service"
class="searchBox"
id="searchInput"
/>

</div>

<!-- =====================================================
GRID
===================================================== -->

<div
class="servicesGrid"
id="servicesGrid">

</div>

</div>

<script type="module"
src="./js/services.js">
</script>

<script type="module"
src="./components/topbar.js">
</script>

<script type="module"
src="./components/sidebar.js">
</script>

</body>
</html>
