<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F4F7FB;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#0F172A;
position:fixed;
left:0;
top:0;
height:100%;
padding:24px 18px;
overflow:auto;
z-index:999;
}

.logo{
font-size:32px;
font-weight:900;
color:#FFD400;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
text-decoration:none;
color:#CBD5E1;
padding:16px;
border-radius:18px;
display:flex;
align-items:center;
gap:14px;
font-size:15px;
font-weight:700;
transition:0.3s;
}

.menu a:hover,
.menu a.active{
background:linear-gradient(
135deg,
#FFD400,
#FFB800
);
color:#111827;
}

/* MAIN */

.main{
margin-left:260px;
padding:24px;
}

/* TOP */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:26px;
gap:18px;
}

.topbar h1{
font-size:36px;
font-weight:900;
}

/* FORM */

.formCard{
background:#fff;
padding:24px;
border-radius:30px;
margin-bottom:26px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.formGrid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:16px;
}

.input{
width:100%;
height:58px;
border:none;
outline:none;
background:#F3F4F6;
border-radius:18px;
padding:0 18px;
font-size:15px;
}

.textarea{
width:100%;
height:120px;
border:none;
outline:none;
background:#F3F4F6;
border-radius:18px;
padding:18px;
font-size:15px;
resize:none;
grid-column:1/4;
}

.submitBtn{
width:100%;
height:60px;
border:none;
border-radius:20px;
background:linear-gradient(
135deg,
#FFD400,
#FFB800
);
font-size:16px;
font-weight:900;
cursor:pointer;
margin-top:18px;
}

/* CATEGORY STATS */

.categoryGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:26px;
}

.categoryCard{
background:#fff;
padding:24px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.categoryCard h3{
font-size:18px;
margin-bottom:12px;
}

.categoryCard p{
font-size:34px;
font-weight:900;
}

/* SERVICES */

.servicesGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.serviceCard{
background:#fff;
padding:22px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
position:relative;
overflow:hidden;
}

.serviceCard::before{
content:"";
position:absolute;
width:150px;
height:150px;
background:rgba(255,212,0,0.15);
border-radius:50%;
top:-60px;
right:-60px;
}

.serviceTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.serviceName{
font-size:22px;
font-weight:900;
}

.categoryTag{
padding:10px 14px;
border-radius:14px;
background:#111827;
color:#fff;
font-size:11px;
font-weight:800;
}

.description{
font-size:14px;
line-height:1.6;
color:#6B7280;
margin-bottom:18px;
}

/* CITY RATES */

.cityRates{
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:18px;
}

.rateItem{
display:flex;
justify-content:space-between;
background:#F9FAFB;
padding:12px 14px;
border-radius:14px;
font-size:14px;
font-weight:700;
}

/* BUTTONS */

.btnGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.editBtn{
height:52px;
border:none;
border-radius:16px;
background:#111827;
color:#fff;
font-weight:800;
cursor:pointer;
}

.deleteBtn{
height:52px;
border:none;
border-radius:16px;
background:#FEE2E2;
color:#DC2626;
font-weight:800;
cursor:pointer;
}

/* MOBILE */

.mobileMenuBtn{
display:none;
}

@media(max-width:1200px){

.servicesGrid{
grid-template-columns:1fr 1fr;
}

.categoryGrid{
grid-template-columns:1fr 1fr;

@media(max-width:768px){

.main{

.formGrid{

.textarea{

.servicesGrid{
grid-template-columns:1fr;

.categoryGrid{

/* LOAD */

async function loadServices(){

const servicesGrid =
document.getElementById(
"servicesGrid"
);

const snap =
await getDocs(
collection(db,"services")
);

let html = "";

let iron = 0;
let wash = 0;
let dry = 0;
let premium = 0;

snap.forEach((docSnap)=>{

const service =
docSnap.data();

if(
service.category==="Ironing"
){

iron++;

}

if(
service.category==="Washing"
){

wash++;

}

if(
service.category==="Dry Cleaning"
){

dry++;

}

if(
service.category==="Premium"
){

premium++;

}

html += `

<div class="serviceCard">

<div class="serviceTop">

<div class="serviceName">
${service.name || ""}
</div>

<div class="categoryTag">
${service.category || ""}
</div>

</div>

<div class="description">
${service.description || ""}
</div>

<div class="cityRates">

<div class="rateItem">

<span>
${service.city || ""}
</span>

<span>
₹${service.price || 0}
</span>

</div>

</div>

<div class="btnGrid">

<button
class="editBtn"
onclick="editService(
'${docSnap.id}',
'${service.name}',
'${service.price}'
)">

Edit

</button>

<button
class="deleteBtn"
onclick="deleteService('${docSnap.id}')">

Delete

</button>

</div>

</div>

`;

});

servicesGrid.innerHTML =
html;

document.getElementById(
"ironCount"
).innerHTML =
iron;

document.getElementById(
"washCount"
).innerHTML =
wash;

document.getElementById(
"dryCount"
).innerHTML =
dry;

document.getElementById(
"premiumCount"
).innerHTML =
premium;

}

loadServices();

/* ADD */

window.addService =
async function(){

const name =
document.getElementById(
"serviceName"
).value;

const category =
document.getElementById(
"category"
).value;

const state =
document.getElementById(
"state"
).value;

const city =
document.getElementById(
"city"
).value;

const price =
document.getElementById(
"price"
).value;

const image =
document.getElementById(
"image"
).value;

const description =
document.getElementById(
"description"
).value;

if(
!name ||
!price
){

alert(
"Fill Required Fields"
);

return;

}

await addDoc(

collection(db,"services"),

{

name:name,
category:category,
state:state,
city:city,
price:Number(price),
image:image,
description:description

}

);

alert(
"Service Added"
);

location.reload();

};

/* DELETE */

window.deleteService =
async function(id){

await deleteDoc(
doc(db,"services",id)
);

alert(
"Service Deleted"
);

loadServices();

};

/* EDIT */

window.editService =
async function(id,name,price){

const newName =
prompt(
"Edit Service Name",
name
);

const newPrice =
prompt(
"Edit Price",
price
);

if(
!newName ||
!newPrice
){

return;

}

await updateDoc(

doc(db,"services",id),

{

name:newName,
price:Number(newPrice)

}

);

alert(
"Service Updated"
);

loadServices();

};
