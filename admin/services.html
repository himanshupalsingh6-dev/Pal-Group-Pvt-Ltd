<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuickPress Services</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F5F7FB;
}

/* SIDEBAR */

.sidebar{
width:270px;
background:#111827;
color:#fff;
padding:24px 18px;
position:fixed;
left:0;
top:0;
height:100%;
overflow:auto;
z-index:999;
}

.logo{
font-size:30px;
font-weight:900;
margin-bottom:40px;
color:#FFD400;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
text-decoration:none;
color:#D1D5DB;
padding:16px;
border-radius:18px;
display:flex;
align-items:center;
gap:14px;
font-size:15px;
font-weight:600;
transition:0.3s;
}

.menu a:hover,
.menu a.active{
background:#1F2937;
color:#fff;
}

/* MAIN */

.main{
margin-left:270px;
padding:24px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.topbar h1{
font-size:34px;
font-weight:900;
}

.addBtn{
height:56px;
padding:0 24px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:15px;
font-weight:800;
cursor:pointer;
}

/* FORM */

.formCard{
background:#fff;
padding:24px;
border-radius:28px;
box-shadow:0 8px 24px rgba(0,0,0,0.05);
margin-bottom:24px;
}

.formGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.input{
width:100%;
height:56px;
border:none;
outline:none;
background:#F3F4F6;
border-radius:18px;
padding:0 18px;
font-size:15px;
}

textarea.input{
height:120px;
padding-top:18px;
resize:none;
}

.submitBtn{
width:100%;
height:58px;
border:none;
border-radius:20px;
background:#FFD400;
font-size:16px;
font-weight:900;
margin-top:18px;
cursor:pointer;
}

/* SERVICES */

.servicesGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.serviceCard{
background:#fff;
padding:22px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
position:relative;
overflow:hidden;
}

.serviceCard::after{
content:'';
position:absolute;
right:-30px;
top:-30px;
width:120px;
height:120px;
background:rgba(255,212,0,0.15);
border-radius:50%;
}

.serviceIcon{
width:70px;
height:70px;
border-radius:22px;
background:#F3F4F6;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
margin-bottom:18px;
}

.serviceCard h3{
font-size:20px;
margin-bottom:8px;
}

.serviceCard p{
font-size:14px;
color:#6B7280;
margin-bottom:14px;
}

.price{
font-size:24px;
font-weight:900;
margin-bottom:18px;
}

.cardBtns{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.editBtn{
height:48px;
border:none;
border-radius:16px;
background:#111827;
color:#fff;
font-weight:800;
}

.deleteBtn{
height:48px;
border:none;
border-radius:16px;
background:#FEE2E2;
color:#DC2626;
font-weight:800;
}

/* MOBILE */

.mobileMenuBtn{
display:none;
}

@media(max-width:1100px){

.servicesGrid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:768px){

.sidebar{
left:-100%;
transition:0.3s;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
padding:16px;
padding-top:80px;
}

.mobileMenuBtn{
display:flex;
position:fixed;
top:18px;
left:18px;
width:52px;
height:52px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:22px;
align-items:center;
justify-content:center;
z-index:1000;
}

.formGrid{
grid-template-columns:1fr;
}

.servicesGrid{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
align-items:flex-start;
gap:14px;
}

.topbar h1{
font-size:26px;
}

}

</style>
</head>
<body>

<!-- MOBILE BUTTON -->

<button class="mobileMenuBtn"
onclick="toggleSidebar()">

<i class="fa-solid fa-bars"></i>

</button>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
QuickPress
</div>

<div class="menu">

<a href="index.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="orders.html">
<i class="fa-solid fa-basket-shopping"></i>
Orders
</a>

<a href="services.html" class="active">
<i class="fa-solid fa-shirt"></i>
Services
</a>

<a href="users.html">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="delivery.html">
<i class="fa-solid fa-truck"></i>
Delivery
</a>

<a href="partners.html">
<i class="fa-solid fa-handshake"></i>
Partners
</a>

<a href="riders.html">
<i class="fa-solid fa-motorcycle"></i>
Riders
</a>

<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Payments
</a>

<a href="analytics.html">
<i class="fa-solid fa-chart-pie"></i>
Analytics
</a>

<a href="offers.html">
<i class="fa-solid fa-tags"></i>
Offers
</a>

<a href="notifications.html">
<i class="fa-solid fa-bell"></i>
Notifications
</a>

<a href="settings.html">
<i class="fa-solid fa-gear"></i>
Settings
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<h1>
Services
</h1>

<button class="addBtn">
Add New Service
</button>

</div>

<!-- FORM -->

<div class="formCard">

<div class="formGrid">

<input
type="text"
placeholder="Service Name"
class="input"
id="serviceName"
/>

<input
type="text"
placeholder="Price"
class="input"
id="servicePrice"
/>

<input
type="text"
placeholder="Category"
class="input"
id="serviceCategory"
/>

<input
type="text"
placeholder="Icon Emoji"
class="input"
id="serviceIcon"
/>

<input
type="text"
placeholder="City"
class="input"
id="serviceCity"
/>

<select
class="input"
id="serviceStatus">

<option>
Active
</option>

<option>
Disabled
</option>

</select>

</div>

<textarea
placeholder="Service Description"
class="input"
id="serviceDesc"></textarea>

<button
class="submitBtn"
onclick="addService()">

Add Service

</button>

</div>

<!-- SERVICES -->

<div class="servicesGrid"
id="servicesGrid">

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
addDoc,
getDocs,
deleteDoc,
doc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* LOAD */

async function loadServices(){

const servicesGrid =
document.getElementById(
"servicesGrid"
);

const snap =

await getDocs(
collection(db,"services")
);

let html = "";

snap.forEach((docSnap)=>{

const service =
docSnap.data();

html += `

<div class="serviceCard">

<div class="serviceIcon">
${service.icon || "👕"}
</div>

<h3>
${service.name}
</h3>

<p>
${service.description || ""}
</p>

<div class="price">
₹${service.price || 0}
</div>

<p>
${service.city || ""}
</p>

<div class="cardBtns">

<button
class="editBtn">

Edit

</button>

<button
class="deleteBtn"
onclick="deleteService('${docSnap.id}')">

Delete

</button>

</div>

</div>

`;

});

servicesGrid.innerHTML = html;

}

loadServices();

/* ADD */

window.addService =
async function(){

const name =
document.getElementById(
"serviceName"
).value;

const price =
document.getElementById(
"servicePrice"
).value;

const category =
document.getElementById(
"serviceCategory"
).value;

const icon =
document.getElementById(
"serviceIcon"
).value;

const city =
document.getElementById(
"serviceCity"
).value;

const status =
document.getElementById(
"serviceStatus"
).value;

const description =
document.getElementById(
"serviceDesc"
).value;

if(
!name ||
!price
){

alert(
"Fill Required Fields"
);

return;

}

await addDoc(

collection(db,"services"),

{

name:name,
price:Number(price),
category:category,
icon:icon,
city:city,
status:status,
description:description

}

);

alert(
"Service Added"
);

location.reload();

};

/* DELETE */

window.deleteService =
async function(id){

await deleteDoc(
doc(db,"services",id)
);

alert(
"Service Deleted"
);

loadServices();

};

/* SIDEBAR */

window.toggleSidebar =
function(){

document
.querySelector(".sidebar")
.classList.toggle("active");

};

</script>

</body>
</html>
