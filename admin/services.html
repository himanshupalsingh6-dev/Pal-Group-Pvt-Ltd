<html lang="en">

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Services
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F4F7FB;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#0F172A;
position:fixed;
left:0;
top:0;
height:100%;
padding:24px 18px;
overflow:auto;
z-index:999;
}

.logo{
font-size:32px;
font-weight:900;
color:#FFD400;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
text-decoration:none;
color:#CBD5E1;
padding:16px;
border-radius:18px;
display:flex;
align-items:center;
gap:14px;
font-size:15px;
font-weight:700;
transition:0.3s;
}

.menu a:hover,
.menu a.active{
background:linear-gradient(
135deg,
#FFD400,
#FFB800
);
color:#111827;
}

/* MAIN */

.main{
margin-left:260px;
padding:24px;
}

/* TOP */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
gap:16px;
}

.topbar h1{
font-size:36px;
font-weight:900;
}

/* SEARCH */

.searchGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
margin-bottom:24px;
}

.input{
width:100%;
height:58px;
border:none;
outline:none;
background:#fff;
border-radius:18px;
padding:0 18px;
font-size:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.textarea{
width:100%;
height:120px;
border:none;
outline:none;
background:#fff;
border-radius:18px;
padding:18px;
font-size:15px;
resize:none;
grid-column:1/3;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* FORM */

.formCard{
background:#fff;
padding:24px;
border-radius:30px;
margin-bottom:26px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.formGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.priceGrid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:16px;
margin-top:18px;
}

.submitBtn{
width:100%;
height:60px;
border:none;
border-radius:20px;
background:linear-gradient(
135deg,
#FFD400,
#FFB800
);
font-size:16px;
font-weight:900;
cursor:pointer;
margin-top:18px;
}

/* SERVICES */

.servicesGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.serviceCard{
background:#fff;
padding:22px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
position:relative;
overflow:hidden;
}

.serviceCard::before{
content:"";
position:absolute;
width:140px;
height:140px;
background:rgba(255,212,0,0.15);
border-radius:50%;
top:-50px;
right:-50px;
}

.serviceTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.serviceName{
font-size:22px;
font-weight:900;
}

.category{
padding:10px 14px;
border-radius:14px;
background:#111827;
color:#fff;
font-size:11px;
font-weight:800;
}

.desc{
font-size:14px;
line-height:1.6;
color:#6B7280;
margin-bottom:18px;
}

/* PRICES */

.cityPriceBox{
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:18px;
}

.cityPrice{
display:flex;
justify-content:space-between;
padding:12px 14px;
border-radius:14px;
background:#F9FAFB;
font-size:14px;
font-weight:700;
}

/* BUTTONS */

.btnGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.editBtn{
height:52px;
border:none;
border-radius:16px;
background:#111827;
color:#fff;
font-weight:800;
cursor:pointer;
}

.deleteBtn{
height:52px;
border:none;
border-radius:16px;
background:#FEE2E2;
color:#DC2626;
font-weight:800;
cursor:pointer;
}

/* MOBILE */

.mobileMenuBtn{
display:none;
}

@media(max-width:1200px){

.servicesGrid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:768px){

.sidebar{
left:-100%;
transition:0.3s;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
padding:16px;
padding-top:80px;
}

.mobileMenuBtn{
display:flex;
position:fixed;
top:18px;
left:18px;
width:52px;
height:52px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:22px;
align-items:center;
justify-content:center;
z-index:9999;
}

.formGrid,
.searchGrid,
.priceGrid{
grid-template-columns:1fr;
}

.textarea{
grid-column:1/2;
}

.servicesGrid{
grid-template-columns:1fr;
}

}

</head>

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let allServices = [];

/* LOAD */

async function loadServices(){

const servicesGrid =
document.getElementById(
"servicesGrid"
);

const snap =
await getDocs(
collection(db,"services")
);

allServices = [];

let html = "";

snap.forEach((docSnap)=>{

const service =
docSnap.data();

allServices.push({

id:docSnap.id,
...service

});

html += createCard(
docSnap.id,
service
);

});

servicesGrid.innerHTML =
html;

}

loadServices();

/* CARD */

function createCard(id,service){

return `

<div class="serviceCard">

<div class="serviceTop">

<div class="serviceName">
${service.name || ""}
</div>

<div class="category">
${service.category || ""}
</div>

</div>

<div class="desc">
${service.description || ""}
</div>

<div class="cityPriceBox">

<div class="cityPrice">
<span>Noida</span>
<span>
₹${service.prices?.Noida || 0}
</span>
</div>

<div class="cityPrice">
<span>Kasganj</span>
<span>
₹${service.prices?.Kasganj || 0}
</span>
</div>

<div class="cityPrice">
<span>Aligarh</span>
<span>
₹${service.prices?.Aligarh || 0}
</span>
</div>

<div class="cityPrice">
<span>Badaun</span>
<span>
₹${service.prices?.Badaun || 0}
</span>
</div>

<div class="cityPrice">
<span>Delhi</span>
<span>
₹${service.prices?.Delhi || 0}
</span>
</div>

<div class="cityPrice">
<span>Mumbai</span>
<span>
₹${service.prices?.Mumbai || 0}
</span>
</div>

</div>

<div class="btnGrid">

<button
class="editBtn"
onclick="editService('${id}')">

Edit

</button>

<button
class="deleteBtn"
onclick="deleteService('${id}')">

Delete

</button>
<!-- =========================
DELETE BUTTON
FORM CARD KE NICHE ADD KARO
========================= -->

class="submitBtn"
style="
background:#DC2626;
color:#fff;
margin-top:14px;
"

AUTO ADD CATEGORY SERVICES
DELETE BUTTON KE NICHE ADD KARO
========================= -->

<button
class="submitBtn"
style="
background:#111827;
color:#fff;
margin-top:14px;
"
onclick="addDefaultServices()">

Auto Add Category Wise Services

</button>

</div>

</div>

`;

}

/* ADD */

window.addService =
async function(){

const name =
document.getElementById(
"serviceName"
).value;

const category =
document.getElementById(
"category"
).value;

const description =
document.getElementById(
"description"
).value;

await addDoc(

collection(db,"services"),

{

name:name,

category:category,

description:description,

prices:{

Noida:Number(
document.getElementById(
"noidaPrice"
).value || 0
),

Kasganj:Number(
document.getElementById(
"kasganjPrice"
).value || 0
),

Aligarh:Number(
document.getElementById(
"aligarhPrice"
).value || 0
),

Badaun:Number(
document.getElementById(
"badaunPrice"
).value || 0
),

Delhi:Number(
document.getElementById(
"delhiPrice"
).value || 0
),

Mumbai:Number(
document.getElementById(
"mumbaiPrice"
).value || 0
)

}

}

);

alert(
"Service Added"
);

location.reload();

};

/* DELETE */

window.deleteService =
async function(id){

await deleteDoc(
doc(db,"services",id)
);

alert(
"Deleted"
);

loadServices();

};

/* EDIT */

window.editService =
async function(id){

const newName =
prompt(
"New Service Name"
);

if(!newName)return;

await updateDoc(

doc(db,"services",id),

{

name:newName

}

);

alert(
"Updated"
);

loadServices();

};

/* SEARCH */

window.searchServices =
function(){

const search =
document.getElementById(
"searchInput"
).value.toLowerCase();

const city =
document.getElementById(
"citySearch"
).value;

const servicesGrid =
document.getElementById(
"servicesGrid"
);

let html = "";

allServices.forEach((service)=>{

const name =
service.name
.toLowerCase();

if(
!name.includes(search)
){

return;

}

if(
city !== "All"
){

const cityPrice =
service.prices?.[city];

if(
cityPrice === undefined
){

return;

}

}

html += createCard(
service.id,
service
);

});

servicesGrid.innerHTML =
html;

};

/* SIDEBAR */

window.toggleSidebar =
function(){

document
.querySelector(".sidebar")
.classList.toggle("active");

};
/* =========================
DELETE ALL OLD SERVICES
SERVICES PAGE SCRIPT ME ADD KARO
========================= */

window.deleteAllServices =
async function(){

const confirmDelete =
confirm(
"Delete All Old Services?"
);

if(!confirmDelete)return;

const snap =
await getDocs(
collection(db,"services")
);

for(const item of snap.docs){

await deleteDoc(
doc(db,"services",item.id)
);

}

alert(
"All Old Services Deleted"
);

location.reload();

};
