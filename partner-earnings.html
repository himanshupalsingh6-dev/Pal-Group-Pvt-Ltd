<script type="module">
import { db } from "./js/firebase.js";

import {
  collection,
  query,
  where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const partnerId = localStorage.getItem("partnerId");

onSnapshot(
  query(collection(db,"orders"),
    where("partnerId","==",partnerId),
    where("status","==","Ready")
  ),
  snap=>{
    let total=0;
    snap.forEach(d=> total += d.data().grandTotal||0);

    totalEarning.innerText=total;
    todayEarning.innerText=total;
    monthEarning.innerText=total;
  }
);
</script>
