<script type="module">
import { db } from "./js/firebase.js";

import {
  collection,
  query,
  where,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const deliveryId = localStorage.getItem("deliveryId");
const deliveryName = localStorage.getItem("deliveryName");

document.getElementById("deliveryName").innerText = deliveryName || "Rider";

function renderEmpty(div,text){
  div.innerHTML = `<div class="empty">${text}</div>`;
}

/* NEW */
onSnapshot(
  query(collection(db,"orders"),where("deliveryId","==",deliveryId),where("status","==","Ready")),
  snap=>{
    newOrders.innerHTML="";
    newCount.innerText=snap.size;

    if(snap.empty) return renderEmpty(newOrders,"No new pickups");

    snap.forEach(d=>{
      const o=d.data();
      newOrders.innerHTML+=`
      <div class="card">
        <div>Order #${d.id}</div>
        <div>₹${o.grandTotal}</div>
        <button onclick="pickOrder('${d.id}')">Pick</button>
      </div>`;
    });
  }
);

/* PICKED */
onSnapshot(
  query(collection(db,"orders"),where("deliveryId","==",deliveryId),where("status","==","Picked")),
  snap=>{
    processOrders.innerHTML="";
    processCount.innerText=snap.size;

    snap.forEach(d=>{
      processOrders.innerHTML+=`
      <div class="card">
        Order #${d.id}
        <button onclick="done('${d.id}')">Delivered</button>
      </div>`;
    });
  }
);

/* DONE */
onSnapshot(
  query(collection(db,"orders"),where("deliveryId","==",deliveryId),where("status","==","Delivered")),
  snap=>{
    completedOrders.innerHTML="";
    doneCount.innerText=snap.size;
  }
);

window.pickOrder = async id=>{
  await updateDoc(doc(db,"orders",id),{status:"Picked"});
};

window.done = async id=>{
  await updateDoc(doc(db,"orders",id),{status:"Delivered"});
};
</script>
