<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{--yellow:#FFD400;--bg:#f6f7f9}
body{margin:0;font-family:Segoe UI;background:var(--bg)}
*{transition:0.25s ease}

/* NAV */
.nav{
  position:sticky;
  top:0;
  background:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.cart{background:var(--yellow);padding:6px 12px;border-radius:20px}

/* HERO */
.hero{padding:20px}
.hero h1{font-size:28px}
.hero p{color:#555}

/* PREMIUM BUTTON */
.order-btn{
  width:100%;
  padding:15px;
  background:linear-gradient(45deg,#FFD400,#ffb300);
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
  position:relative;
  overflow:hidden;
}
.order-btn:hover{
  transform:scale(1.03);
  box-shadow:0 12px 25px rgba(0,0,0,.3);
}
.order-btn:active{transform:scale(0.95)}

/* ripple */
.order-btn span{
  position:absolute;
  background:rgba(255,255,255,0.5);
  border-radius:50%;
  transform:scale(0);
  animation:ripple 0.6s linear;
}
@keyframes ripple{
  to{transform:scale(4);opacity:0}
}

/* SECTION */
.section{padding:18px}
.services{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{
  background:#fff;
  padding:16px;
  border-radius:14px;
  text-align:center;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

/* BOTTOM NAV */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px;
  box-shadow:0 -2px 10px rgba(0,0,0,.1);
}
.bottom div{text-align:center;font-size:12px}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  ⚡ QuickPress
  <div class="cart">🛒 <span id="cartCount">0</span></div>
</div>

<!-- HERO -->
<div class="hero section">
  <h1>Fast Laundry <span style="background:#FFD400">At Home</span></h1>
  <p>Doorstep ironing & cleaning</p>

  <!-- 🔥 UPDATED BUTTON -->
  <button class="order-btn" onclick="goServices(event)">
    🚀 Order Now
  </button>
</div>

<!-- SERVICES -->
<div class="section">
  <h2>Services</h2>
  <div class="services">
    <div class="card" onclick="selectService('ironing')">🧺 Ironing</div>
    <div class="card" onclick="selectService('washing')">🧽 Washing</div>
    <div class="card" onclick="selectService('dry')">🧼 Dry Clean</div>
    <div class="card">🚚 Delivery</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom">
  <div onclick="go('index.html')">🏠<br>Home</div>
  <div onclick="goServices()">🛒<br>Services</div>
  <div onclick="go('account.html')">👤<br>Account</div>
  <div onclick="go('myorders.html')">📦<br>Orders</div>
</div>

<script>

/* NAVIGATION */
function go(p){location.href=p}

/* 🔥 MAIN LINK FUNCTION */
function goServices(e){

  // ripple effect
  if(e){
    let circle=document.createElement("span");
    circle.style.width="20px";
    circle.style.height="20px";
    circle.style.left=e.offsetX+"px";
    circle.style.top=e.offsetY+"px";
    e.target.appendChild(circle);
    setTimeout(()=>circle.remove(),600);
  }

  // optional default service
  localStorage.setItem("service","ironing");

  // redirect
  location.href="products.html";
}

/* SERVICE CLICK */
function selectService(s){
  localStorage.setItem("service",s);
  location.href="products.html";
}

/* CART */
let cart = JSON.parse(localStorage.getItem("cart")||"[]");
let count=0;
cart.forEach(i=>count+=i.qty||1);
document.getElementById("cartCount").innerText=count;

</script>

</body>
</html>
