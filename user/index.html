<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>QuickPress</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =====================================================
RESET
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#FFFFFF;
color:#111827;
padding-bottom:110px;
overflow-x:hidden;
}

/* =====================================================
TOPBAR
===================================================== */

.topbar{
padding:16px;
background:#fff;
position:sticky;
top:0;
z-index:999;
}

.topRow{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:12px;
}

.locationWrap{
display:flex;
gap:12px;
flex:1;
}

.locationIcon{
width:48px;
height:48px;
border-radius:16px;
background:#E8F8EC;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:#16A34A;
}

.locationText h2{
font-size:28px;
font-weight:900;
display:flex;
align-items:center;
gap:8px;
}

.locationText p{
font-size:14px;
font-weight:600;
color:#6B7280;
margin-top:4px;
max-width:180px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

/* =====================================================
TOP ACTIONS
===================================================== */

.topActions{
display:flex;
gap:10px;
align-items:center;
}

.quickPlus{
min-width:92px;
height:58px;
border-radius:999px;
background:linear-gradient(
135deg,
#FFE58F,
#FFD400
);
border:2px solid #C69214;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 6px 20px rgba(255,212,0,0.3);
}

.quickPlus h4{
font-size:13px;
font-weight:900;
color:#7A4A00;
}

.quickPlus span{
font-size:18px;
font-weight:900;
color:#7A4A00;
}

.actionBtn{
width:52px;
height:52px;
border-radius:50%;
background:#fff;
border:1px solid #ECECEC;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
position:relative;
box-shadow:0 4px 14px rgba(0,0,0,0.04);
}

.profileBtn{
width:52px;
height:52px;
border-radius:50%;
background:#DBEAFE;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
color:#2563EB;
}

.badge{
position:absolute;
right:-2px;
top:-2px;
width:20px;
height:20px;
border-radius:50%;
background:#22C55E;
color:#fff;
font-size:10px;
font-weight:900;
display:flex;
align-items:center;
justify-content:center;
}

/* =====================================================
SEARCH
===================================================== */

.searchSection{
padding:10px 16px 0;
display:flex;
gap:12px;
align-items:center;
}

.searchBar{
flex:1;
height:72px;
border-radius:28px;
border:2px solid #ECECEC;
display:flex;
align-items:center;
padding:0 18px;
background:#fff;
box-shadow:0 6px 18px rgba(0,0,0,0.04);
}

.searchIcon{
font-size:30px;
color:#16A34A;
margin-right:14px;
}

.searchBar input{
flex:1;
border:none;
outline:none;
font-size:20px;
font-weight:700;
color:#6B7280;
}

.micBtn{
width:54px;
height:54px;
border-left:2px solid #ECECEC;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:#16A34A;
}

.quickMode{
width:74px;
text-align:center;
}

.quickMode h3{
font-size:14px;
font-weight:900;
line-height:1.1;
margin-bottom:8px;
}

.switch{
width:64px;
height:34px;
background:#16A34A;
border-radius:999px;
margin:auto;
position:relative;
}

.switch::after{
content:"";
position:absolute;
right:2px;
top:2px;
width:30px;
height:30px;
border-radius:50%;
background:#fff;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* =====================================================
BANNER
===================================================== */

.banner{
margin:18px 16px;
background:linear-gradient(
135deg,
#FFD400,
#FFE96A
);
border-radius:34px;
padding:24px;
position:relative;
overflow:hidden;
}

.banner::after{
content:"";
position:absolute;
right:-60px;
top:-60px;
width:220px;
height:220px;
border-radius:50%;
background:rgba(255,255,255,0.22);
}

.pickupBadge{
display:inline-flex;
align-items:center;
gap:8px;
padding:12px 16px;
border-radius:999px;
background:rgba(255,255,255,0.7);
font-size:13px;
font-weight:900;
margin-bottom:18px;
}

.banner h1{
font-size:44px;
line-height:1.05;
font-weight:900;
margin-bottom:14px;
}

.banner p{
font-size:15px;
line-height:1.7;
max-width:300px;
margin-bottom:20px;
}

.bannerBtns{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.primaryBtn{
height:54px;
padding:0 22px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:14px;
font-weight:900;
}

.secondaryBtn{
height:54px;
padding:0 22px;
border:none;
border-radius:18px;
background:#fff;
color:#111827;
font-size:14px;
font-weight:900;
}

/* =====================================================
SECTION TITLE
===================================================== */

.sectionTitle{
font-size:30px;
font-weight:900;
padding:8px 16px 18px;
}

/* =====================================================
SERVICES
===================================================== */

.serviceGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:0 16px;
}

.serviceCard{
background:#fff;
border:1px solid #ECECEC;
border-radius:28px;
padding:16px;
position:relative;
box-shadow:0 8px 22px rgba(0,0,0,0.04);
}

.favoriteBtn{
position:absolute;
right:14px;
top:14px;
width:34px;
height:34px;
border-radius:12px;
background:#fff;
border:1px solid #ECECEC;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

.serviceImage{
width:62px;
height:62px;
border-radius:20px;
background:#FAFAFA;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
margin-bottom:16px;
}

.serviceCard h3{
font-size:20px;
font-weight:900;
margin-bottom:8px;
}

.serviceCard p{
font-size:13px;
line-height:1.5;
color:#6B7280;
margin-bottom:16px;
}

.serviceBottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.price{
font-size:24px;
font-weight:900;
color:#16A34A;
}

.addBtn{
width:74px;
height:46px;
border:none;
border-radius:16px;
background:#FFD400;
font-size:13px;
font-weight:900;
}

/* =====================================================
BOTTOM NAV
===================================================== */

.bottomNav{
position:fixed;
left:0;
right:0;
bottom:0;
height:86px;
background:#fff;
border-top:1px solid #ECECEC;
display:flex;
justify-content:space-around;
align-items:center;
z-index:999;
}

.navItem{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
font-size:12px;
font-weight:800;
text-decoration:none;
color:#6B7280;
}

.navItem i{
font-size:22px;
}

.activeNav{
color:#FFD400;
}

/* =====================================================
RESPONSIVE
===================================================== */

@media(max-width:420px){

.serviceGrid{
grid-template-columns:1fr;
}

.locationText h2{
font-size:24px;
}

.searchBar input{
font-size:16px;
}

.banner h1{
font-size:36px;
}

.quickMode{
display:none;
}

}

</style>

</head>

<body>

<!-- =====================================================
TOPBAR
===================================================== -->

<div class="topbar">

<div class="topRow">

<div class="locationWrap">

<div class="locationIcon">
<i class="fa-solid fa-location-dot"></i>
</div>

<div class="locationText">

<h2>
Home
<i class="fa-solid fa-angle-down"></i>
</h2>

<p id="realLocation">
Finding your location...
</p>

</div>

</div>

<div class="topActions">

<div class="quickPlus"
onclick="openQuickPlus()">
<h4>QUICK+</h4>
<span>₹1</span>
</div>

<div class="actionBtn"
onclick="openWallet()">
<i class="fa-solid fa-wallet"></i>
<div class="badge">2</div>
</div>

<div class="profileBtn"
onclick="openProfile()"
id="profileBtn">
H
</div>

</div>

</div>

<div class="searchSection">

<div class="searchBar">

<i class="fa-solid fa-magnifying-glass searchIcon"></i>

<input
id="searchInput"
placeholder='Search "shirt wash"'>

<div class="micBtn">
<i class="fa-solid fa-microphone"></i>
</div>

</div>

<div class="quickMode">
<h3>QUICK</h3>
<div class="switch"></div>
</div>

</div>

</div>

<!-- =====================================================
BANNER
===================================================== -->

<div class="banner">

<div class="pickupBadge">
⚡ Pickup in 10 mins
</div>

<h1>
Laundry
<br>
Made Easy ✨
</h1>

<p>
Fast washing, ironing and premium doorstep laundry experience.
</p>

<div class="bannerBtns">

<button class="primaryBtn">
⚡ Fast Order
</button>

<button class="secondaryBtn">
📅 Schedule Pickup
</button>

</div>

</div>

<!-- =====================================================
SERVICES
===================================================== -->

<div class="sectionTitle">
Trending Services
</div>

<div class="serviceGrid" id="serviceGrid">
</div>

<!-- =====================================================
BOTTOM NAV
===================================================== -->

<div class="bottomNav">

<a href="#" class="navItem activeNav">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="#" class="navItem">
<i class="fa-solid fa-shirt"></i>
<span>Services</span>
</a>

<a href="cart.html" class="navItem">
<i class="fa-solid fa-cart-shopping"></i>
<span>Cart</span>
</a>

<a href="#" class="navItem">
<i class="fa-solid fa-tags"></i>
<span>Offers</span>
</a>

<a href="#" class="navItem">
<i class="fa-regular fa-user"></i>
<span>Profile</span>
</a>

</div>

<script type="module">

import { db }
from "/Pal-Group-Pvt-Ltd/firebase.js";

import {
collection,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* =====================================================
PROFILE NAME
===================================================== */

const userName =
localStorage.getItem("quickpress_user_name") || "H";

const profileBtn =
document.getElementById("profileBtn");

profileBtn.innerHTML =
userName.charAt(0).toUpperCase();

/* =====================================================
REAL LOCATION
===================================================== */

const realLocation =
document.getElementById("realLocation");

navigator.geolocation.getCurrentPosition(
(position)=>{

const lat = position.coords.latitude;
const lon = position.coords.longitude;

realLocation.innerHTML =
`Lat ${lat.toFixed(2)}, Lon ${lon.toFixed(2)}`;

},
()=>{

realLocation.innerHTML =
"Kasganj Uttar Pradesh";

}
);

/* =====================================================
SERVICES
===================================================== */

const serviceGrid =
document.getElementById("serviceGrid");

onSnapshot(
collection(db,"services"),
(snapshot)=>{

serviceGrid.innerHTML = "";

snapshot.forEach((docSnap)=>{

const service = docSnap.data();

serviceGrid.innerHTML += `

<div class="serviceCard">

<div class="favoriteBtn">❤️</div>

<div class="serviceImage">
${service.icon || "🧺"}
</div>

<h3>
${service.name || "Laundry"}
</h3>

<p>
${service.description || "Premium service"}
</p>

<div class="serviceBottom">

<div class="price">
₹${service.price || 0}
</div>

<button
class="addBtn"
onclick="addToCart('${service.name}')">
ADD
</button>

</div>

</div>

`;

});

}
);

/* =====================================================
BUTTONS
===================================================== */

window.openWallet = ()=>{
window.location.href = "wallet.html";
};

window.openProfile = ()=>{
window.location.href = "profile.html";
};

window.openQuickPlus = ()=>{
alert("Quick+ Membership Coming Soon 🚀");
};

window.addToCart = (name)=>{
alert(name + " Added To Cart");
};

</script>

</body>
</html>
