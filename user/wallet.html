ADD MONEY
========================================= */

0 6px 18px rgba(0,0,0,0.05);

}

.payBtn{

margin-top:20px;

width:100%;

height:60px;

border:none;

border-radius:24px;

background:#16A34A;

color:#fff;

font-size:16px;

font-weight:900;

cursor:pointer;

}

/* =========================================
PAYMENT METHODS
========================================= */

.paymentCard{

margin-top:22px;

background:#fff;

border-radius:28px;

padding:20px;

box-shadow:
0 6px 18px rgba(0,0,0,0.05);

}

.paymentItem{

height:70px;

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:1px solid #F3F4F6;

}

.paymentItem:last-child{

border-bottom:none;

}

.paymentLeft{

display:flex;

align-items:center;

gap:14px;

}

.paymentIcon{

width:50px;
height:50px;

border-radius:18px;

background:#F3F4F6;

display:flex;

align-items:center;
justify-content:center;

font-size:18px;

}

.paymentInfo h3{

font-size:15px;

font-weight:800;

}

.paymentInfo p{

margin-top:4px;

font-size:12px;

color:#6B7280;

}

/* =========================================
TRANSACTION
========================================= */

.transactionWrap{

padding:0 16px 20px;

}

.transactionCard{

background:#fff;

border-radius:28px;

padding:20px;

box-shadow:
0 6px 18px rgba(0,0,0,0.05);

}

.transactionItem{

display:flex;

justify-content:space-between;

align-items:center;

padding:14px 0;

border-bottom:1px solid #F3F4F6;

}

.transactionItem:last-child{

border-bottom:none;

}

.transactionLeft{

display:flex;

align-items:center;

gap:14px;

}

.transactionIcon{

width:52px;
height:52px;

border-radius:18px;

background:#DCFCE7;

display:flex;

align-items:center;
justify-content:center;

}

.transactionInfo h3{

}

.transactionInfo p{

}

/* =========================================
BOTTOM NAV
========================================= */

0 -6px 20px rgba(0,0,0,0.08);

}

}

<body>

">

</div>

<div class="paymentCard">

</div>

<div class="paymentLeft">

</div>

<div class="paymentInfo">

<h3>

</h3>

<p>

</div>

</div>

</div>

</div>

<!-- =========================================
SCRIPT
========================================= -->

<script type="module">

/* =========================================
IMPORT
========================================= */

import { auth, db }

from "../firebase.js";

import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {

doc,
getDoc,
updateDoc,
collection,
addDoc,
query,
where,
getDocs,
orderBy,
serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* =========================================
ELEMENTS
========================================= */

const walletAmount =
document.getElementById(
"walletAmount"
);

const customAmount =
document.getElementById(
"customAmount"
);

const payBtn =
document.getElementById(
"payBtn"
);

const transactionCard =
document.getElementById(
"transactionCard"
);

let currentUser = null;

let currentBalance = 0;

/* =========================================
AUTH
========================================= */

onAuthStateChanged(
auth,
async(user)=>{

if(user){

currentUser = user;

/* ========================================= */

loadWallet();

/* ========================================= */

loadTransactions();

}else{

window.location.href =
"login.html";

}

}
);

/* =========================================
LOAD WALLET
========================================= */

async function loadWallet(){

const userRef =
doc(
db,
"users",
currentUser.uid
);

const userSnap =
await getDoc(
userRef
);

if(userSnap.exists()){

const data =
userSnap.data();

currentBalance =
data.wallet || 0;

walletAmount.innerHTML =
`₹${currentBalance}`;

}

}

/* =========================================
LOAD TRANSACTIONS
========================================= */

async function loadTransactions(){

transactionCard.innerHTML =
"";

/* ========================================= */

const q =
query(

collection(db,"transactions"),

where("userId","==",currentUser.uid)

);

/* ========================================= */

const snapshot =
await getDocs(q);

/* ========================================= */

if(snapshot.empty){

transactionCard.innerHTML = `

<div style="
padding:40px 20px;
text-align:center;
font-weight:700;
color:#6B7280;
">

No Transactions Found

</div>

`;

return;

}

/* ========================================= */

snapshot.forEach(doc=>{

const data =
doc.data();

/* ========================================= */

transactionCard.innerHTML += `

<div class="transactionItem">

<div class="transactionLeft">

<div class="transactionIcon">
₹
</div>

<div class="transactionInfo">

<h3>
Wallet Topup
</h3>

<p>
${new Date().toLocaleDateString()}
</p>

</div>

</div>

<div class="transactionAmount">
+₹${data.amount}
</div>

</div>

`;

});

}

/* =========================================
QUICK AMOUNT
========================================= */

document.querySelectorAll(
".amountBtn"
)

.forEach(btn=>{

btn.addEventListener(
"click",
()=>{

customAmount.value =
btn.innerText.replace(
"₹",
""
);

}
);

});

/* =========================================
ADD MONEY
========================================= */

payBtn.addEventListener(
"click",
async()=>{

const amount =
parseInt(
customAmount.value
);

/* ========================================= */

if(!amount){

alert(
"Enter valid amount"
);

return;

}

/* ========================================= */

payBtn.innerHTML =
"Processing...";

/* =========================================
UPDATE WALLET
========================================= */

const newBalance =
currentBalance + amount;

/* ========================================= */

await updateDoc(

doc(
db,
"users",
currentUser.uid
),

{

wallet:newBalance

}

);

/* =========================================
SAVE TRANSACTION
========================================= */

await addDoc(

collection(db,"transactions"),

{

userId:
currentUser.uid,

amount:amount,

type:"credit",

createdAt:
serverTimestamp()

}

);

/* ========================================= */

walletAmount.innerHTML =
`₹${newBalance}`;

currentBalance =
newBalance;

/* ========================================= */

customAmount.value =
"";

/* ========================================= */

payBtn.innerHTML =
"Add Money Securely";

/* ========================================= */

alert(
"Money Added Successfully 🚀"
);

/* ========================================= */

loadTransactions();

}
);

/* =========================================
NAVIGATION
========================================= */

window.goPage =
function(page){

window.location.href =
page;

}

</script>
