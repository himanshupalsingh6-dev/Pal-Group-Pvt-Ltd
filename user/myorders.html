<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#F4F7FB;color:#111827;padding-bottom:100px}
.topbar{padding:18px;background:#fff;display:flex;align-items:center;gap:14px;border-bottom:1px solid #E5E7EB;position:sticky;top:0}
.backBtn{width:48px;height:48px;border:none;border-radius:16px;background:#FFD400;font-size:20px;font-weight:900}
.topbar h2{font-size:28px;font-weight:900}
.main{padding:18px;max-width:700px;margin:auto}
.orderCard{background:#fff;border-radius:28px;padding:20px;margin-bottom:18px;box-shadow:0 8px 24px rgba(0,0,0,0.05)}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.left{display:flex;align-items:center;gap:14px}
.icon{width:64px;height:64px;border-radius:20px;background:#F4F7FB;display:flex;align-items:center;justify-content:center;font-size:30px}
.info h3{font-size:22px;margin-bottom:6px}
.info p{font-size:14px;color:#6B7280}
.status{padding:10px 16px;border-radius:14px;background:#DCFCE7;color:#166534;font-size:12px;font-weight:900}
.bottom{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid #EEF2F7}
.price{font-size:28px;font-weight:900}
.trackBtn{width:140px;height:50px;border:none;border-radius:18px;background:#111827;color:#fff;font-weight:900}
.empty{text-align:center;padding:80px 20px;color:#6B7280}
.empty i{font-size:70px;margin-bottom:18px;color:#D1D5DB}
</style>
</head>
<body>
<div class="topbar">
<button class="backBtn" onclick="history.back()">←</button>
<h2>My Orders</h2>
</div>
<div class="main" id="ordersContainer">
<div class="empty">
<i class="fa-solid fa-basket-shopping"></i>
<h2>No Orders Yet</h2>
<p>Your laundry orders will appear here.</p>
</div>
</div>
<script type="module">
import { db } from '../firebase.js';
import { collection,query,where,getDocs } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
const phone=localStorage.getItem('userPhone');
async function loadOrders(){
const q=query(collection(db,'orders'),where('userPhone','==',phone));
const snap=await getDocs(q);
let html='';
snap.forEach((doc)=>{
const order=doc.data();
html+=`
<div class="orderCard">
<div class="top">
<div class="left">
<div class="icon">🧺</div>
<div class="info">
<h3>${order.category||'Laundry Order'}</h3>
<p>Order ID: ${doc.id}</p>
<p>${order.status||'Order Placed'}</p>
</div>
</div>
<div class="status">${order.status||'Active'}</div>
</div>
<div class="bottom">
<div class="price">₹${order.total||0}</div>
<button class="trackBtn" onclick="trackOrder('${doc.id}')">Track Order</button>
</div>
</div>
`;
});
document.getElementById('ordersContainer').innerHTML=html||document.getElementById('ordersContainer').innerHTML;
}
loadOrders();
window.trackOrder=function(id){
localStorage.setItem('trackingOrderId',id);
window.location.href='tracking.html';
}
</script>
</body>
</html>
