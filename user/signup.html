<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Signup
</title>

<!-- =====================================================
FONTS
===================================================== -->

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<!-- =====================================================
ICONS
===================================================== -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =====================================================
RESET
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{

background:
linear-gradient(
180deg,
#FFD633 0%,
#FFE98A 35%,
#F6F7FB 35%
);

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:20px;

overflow-x:hidden;

}

/* =====================================================
CARD
===================================================== */

.signupCard{

width:100%;

max-width:430px;

background:#fff;

border-radius:38px;

padding:34px 24px;

box-shadow:
0 20px 50px rgba(0,0,0,0.08);

position:relative;

overflow:hidden;

}

/* =====================================================
TOP CIRCLE
===================================================== */

.signupCard::before{

content:"";

position:absolute;

right:-80px;
top:-80px;

width:220px;
height:220px;

border-radius:50%;

background:
rgba(255,214,51,0.16);

}

/* =====================================================
LOGO
===================================================== */

.logo{

width:88px;
height:88px;

border-radius:28px;

background:
linear-gradient(
135deg,
#111827,
#1F2937
);

display:flex;

align-items:center;
justify-content:center;

margin:auto;

font-size:36px;

font-weight:900;

color:#FFD633;

position:relative;

z-index:2;

}

/* =====================================================
TITLE
===================================================== */

.title{

margin-top:24px;

text-align:center;

font-size:36px;

font-weight:900;

line-height:1.1;

position:relative;

z-index:2;

}

.subtitle{

margin-top:12px;

text-align:center;

font-size:14px;

line-height:1.7;

color:#6B7280;

position:relative;

z-index:2;

}

/* =====================================================
FORM
===================================================== */

.formGroup{

margin-top:22px;

position:relative;

z-index:2;

}

.label{

margin-bottom:10px;

font-size:13px;

font-weight:800;

color:#111827;

}

.inputBox{

height:60px;

background:#F3F4F6;

border-radius:20px;

display:flex;

align-items:center;

padding:0 18px;

transition:0.3s;

}

.inputBox:focus-within{

background:#fff;

box-shadow:
0 0 0 3px rgba(22,163,74,0.12);

}

.inputBox i{

font-size:18px;

color:#16A34A;

}

.inputBox input{

flex:1;

height:100%;

border:none;

outline:none;

padding:0 14px;

background:none;

font-size:15px;

font-weight:700;

color:#111827;

}

.inputBox input::placeholder{

color:#9CA3AF;

}

/* =====================================================
BUTTON
===================================================== */

.signupBtn{

width:100%;

height:60px;

margin-top:30px;

border:none;

border-radius:22px;

background:#16A34A;

color:#fff;

font-size:16px;

font-weight:900;

cursor:pointer;

transition:0.3s;

position:relative;

z-index:2;

}

.signupBtn:active{

transform:scale(0.98);

}

/* =====================================================
TERMS
===================================================== */

.terms{

margin-top:18px;

text-align:center;

font-size:12px;

line-height:1.7;

color:#6B7280;

position:relative;

z-index:2;

}

.terms span{

font-weight:800;

color:#111827;

}

/* =====================================================
BOTTOM
===================================================== */

.bottomText{

margin-top:26px;

text-align:center;

font-size:14px;

font-weight:700;

color:#6B7280;

position:relative;

z-index:2;

}

.bottomText a{

color:#16A34A;

text-decoration:none;

font-weight:900;

}

/* =====================================================
DESKTOP
===================================================== */

@media(min-width:900px){

.signupCard{

padding:42px 34px;

}

}

</style>

</head>

<body>

<!-- =====================================================
SIGNUP CARD
===================================================== -->

<div class="signupCard">

<!-- =====================================================
LOGO
===================================================== -->

<div class="logo">
Q
</div>

<!-- =====================================================
TITLE
===================================================== -->

<div class="title">
Create Account
</div>

<div class="subtitle">
Join QuickPress and enjoy premium
laundry pickup & express delivery.
</div>

<!-- =====================================================
FORM
===================================================== -->

<form id="signupForm">

<!-- NAME -->

<div class="formGroup">

<div class="label">
Full Name
</div>

<div class="inputBox">

<i class="fa-solid fa-user"></i>

<input
type="text"
id="name"
placeholder="Enter full name"
required>

</div>

</div>

<!-- PHONE -->

<div class="formGroup">

<div class="label">
Mobile Number
</div>

<div class="inputBox">

<i class="fa-solid fa-phone"></i>

<input
type="tel"
id="phone"
placeholder="+91 9876543210"
required>

</div>

</div>

<!-- CITY -->

<div class="formGroup">

<div class="label">
City
</div>

<div class="inputBox">

<i class="fa-solid fa-location-dot"></i>

<input
type="text"
id="city"
placeholder="Enter your city"
required>

</div>

</div>

<!-- PASSWORD -->

<div class="formGroup">

<div class="label">
Password
</div>

<div class="inputBox">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Create password"
required>

</div>

</div>

<!-- BUTTON -->

<button
class="signupBtn"
id="signupBtn">

Create Account

</button>

</form>

<!-- TERMS -->

<div class="terms">
By continuing, you agree to QuickPress
<span>Terms & Conditions</span>
</div>

<!-- LOGIN -->

<div class="bottomText">
Already have account?
<a href="login.html">
Login
</a>
</div>

</div>

<!-- =====================================================
SCRIPT
===================================================== -->

<script
type="module"
src="signup.js">
</script>

</body>
</html>
