<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Signup
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =====================================================
RESET
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

/* =====================================================
BODY
===================================================== */

body{
background:#FFD000;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* =====================================================
CARD
===================================================== */

.signupCard{
width:100%;
max-width:460px;
background:#fff;
border-radius:34px;
padding:34px 28px;
box-shadow:
0 20px 60px rgba(0,0,0,0.15);
}

/* =====================================================
LOGO
===================================================== */

.logo{
text-align:center;
margin-bottom:28px;
}

.logo h1{
font-size:42px;
font-weight:900;
color:#111;
margin-bottom:8px;
}

.logo p{
font-size:14px;
font-weight:600;
color:#666;
}

/* =====================================================
INPUTS
===================================================== */

.inputGroup{
margin-bottom:18px;
}

.inputGroup label{
display:block;
font-size:13px;
font-weight:800;
margin-bottom:10px;
color:#111;
}

.inputWrap{
position:relative;
}

.inputWrap i{
position:absolute;
left:18px;
top:50%;
transform:translateY(-50%);
font-size:16px;
color:#666;
}

.inputField{
width:100%;
height:58px;
border:none;
border-radius:18px;
padding:0 18px 0 50px;
font-size:15px;
background:#F5F5F5;
outline:none;
font-weight:600;
}

/* =====================================================
BUTTON
===================================================== */

.signupBtn{
width:100%;
height:60px;
border:none;
border-radius:20px;
background:#111;
color:#FFD000;
font-size:16px;
font-weight:900;
cursor:pointer;
margin-top:12px;
}

/* =====================================================
BOTTOM
===================================================== */

.bottomText{
text-align:center;
margin-top:22px;
font-size:14px;
font-weight:600;
color:#666;
}

.bottomText a{
color:#111;
font-weight:900;
text-decoration:none;
}

/* =====================================================
STATUS
===================================================== */

.statusBox{
margin-top:18px;
text-align:center;
font-size:14px;
font-weight:700;
}

.success{
color:#16A34A;
}

.error{
color:#DC2626;
}

</style>

</head>

<body>

<!-- =====================================================
CARD
===================================================== -->

<div class="signupCard">

<!-- LOGO -->

<div class="logo">

<h1>
QuickPress
</h1>

<p>
Login or Signup
</p>

</div>

<!-- NAME -->

<div class="inputGroup">

<label>
Full Name
</label>

<div class="inputWrap">

<i class="fa-solid fa-user"></i>

<input
class="inputField"
type="text"
id="name"
placeholder="Enter full name">

</div>

</div>

<!-- MOBILE -->

<div class="inputGroup">

<label>
Mobile Number
</label>

<div class="inputWrap">

<i class="fa-solid fa-phone"></i>

<input
class="inputField"
type="number"
id="mobile"
placeholder="Enter mobile number">

</div>

</div>

<!-- EMAIL -->

<div class="inputGroup">

<label>
Email Address
</label>

<div class="inputWrap">

<i class="fa-solid fa-envelope"></i>

<input
class="inputField"
type="email"
id="email"
placeholder="Enter email address">

</div>

</div>

<!-- PASSWORD -->

<div class="inputGroup">

<label>
Password
</label>

<div class="inputWrap">

<i class="fa-solid fa-lock"></i>

<input
class="inputField"
type="password"
id="password"
placeholder="Create password">

</div>

</div>

<!-- CITY -->

<div class="inputGroup">

<label>
City
</label>

<div class="inputWrap">

<i class="fa-solid fa-location-dot"></i>

<input
class="inputField"
type="text"
id="city"
placeholder="Enter city">

</div>

</div>

<!-- ADDRESS -->

<div class="inputGroup">

<label>
Address
</label>

<div class="inputWrap">

<i class="fa-solid fa-house"></i>

<input
class="inputField"
type="text"
id="address"
placeholder="Enter address">

</div>

</div>

<!-- BUTTON -->

<button
class="signupBtn"
onclick="signupUser()">

Create Account

</button>

<!-- STATUS -->

<div
class="statusBox"
id="statusBox">
</div>

<!-- LOGIN -->

<div class="bottomText">

By continuing, you agree to QuickPress Terms & Privacy Policy

</div>

</div>

<!-- =====================================================
FIREBASE SCRIPT
===================================================== -->

<script type="module">

import { db }
from "/Pal-Group-Pvt-Ltd/firebase.js";

import {
collection,
addDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const name =
document.getElementById("name");

const mobile =
document.getElementById("mobile");

const email =
document.getElementById("email");

const password =
document.getElementById("password");

const city =
document.getElementById("city");

const address =
document.getElementById("address");

const statusBox =
document.getElementById("statusBox");

window.signupUser = async()=>{

const userName =
name.value.trim();

const userMobile =
mobile.value.trim();

const userEmail =
email.value.trim();

const userPassword =
password.value.trim();

const userCity =
city.value.trim();

const userAddress =
address.value.trim();

/* ========================================= */

if(
!userName
||
!userMobile
||
!userEmail
||
!userPassword
||
!userCity
||
!userAddress
){

statusBox.innerHTML =
"Fill all fields";

statusBox.className =
"statusBox error";

return;

}

/* ========================================= */

if(userPassword.length < 6){

statusBox.innerHTML =
"Password must be at least 6 characters";

statusBox.className =
"statusBox error";

return;

}

/* ========================================= */

try{

await addDoc(
collection(db,"users"),
{
name:userName,
mobile:userMobile,
email:userEmail,
password:userPassword,
city:userCity,
address:userAddress,
wallet:0,
status:"Active",
createdAt:serverTimestamp()
}
);

/* ========================================= */

statusBox.innerHTML =
"Account created successfully";

statusBox.className =
"statusBox success";

/* ========================================= */

localStorage.setItem(
"quickpress_user",
"true"
);

localStorage.setItem(
"quickpress_user_name",
userName
);

localStorage.setItem(
"quickpress_user_mobile",
userMobile
);

localStorage.setItem(
"quickpress_user_city",
userCity
);

/* ========================================= */

setTimeout(()=>{

window.location.href =
"index.html";

},1500);

}

catch(error){

statusBox.innerHTML =
error.message;

statusBox.className =
"statusBox error";

}

};

</script>

</body>
</html>
