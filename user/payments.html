<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#F4F7FB;color:#111827;padding-bottom:100px}
.topbar{padding:18px;background:#fff;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;border-bottom:1px solid #E5E7EB}
.topbar h2{font-size:28px;font-weight:900}
.helpBtn{width:110px;height:50px;border-radius:50px;border:2px solid #E5E7EB;background:#fff;font-weight:700}
.main{padding:18px;max-width:700px;margin:auto}
.sectionTitle{font-size:14px;font-weight:900;color:#1D4ED8;margin:22px 0 14px}
.card{background:#fff;border-radius:28px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.05);margin-bottom:20px}
.paymentItem{padding:22px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #EEF2F7}
.paymentItem:last-child{border-bottom:none}
.left{display:flex;align-items:center;gap:16px}
.icon{width:56px;height:56px;border-radius:18px;background:#F4F7FB;display:flex;align-items:center;justify-content:center;font-size:24px}
.text h3{font-size:22px;margin-bottom:4px}
.text p{font-size:14px;color:#6B7280}
.linkBtn{font-weight:900;color:#1D4ED8}
.cashback{background:#F9FAFB;padding:14px;border-radius:16px;margin-top:14px;font-size:13px;color:#4B5563}
.walletBalance{font-size:18px;font-weight:900;color:#22C55E}
</style>
</head>
<body>
<div class="topbar">
<h2>Payments</h2>
<button class="helpBtn"><i class="fa-regular fa-circle-question"></i> Help</button>
</div>
<div class="main">
<div class="sectionTitle">WALLETS</div>
<div class="card">
<div class="paymentItem">
<div class="left">
<div class="icon">💰</div>
<div class="text">
<h3>QuickPress Wallet</h3>
<p>Balance: <span id="walletBalance">₹0</span></p>
</div>
</div>
</div>
<div class="paymentItem">
<div class="left">
<div class="icon">🅿️</div>
<div class="text">
<h3>Amazon Pay</h3>
<div class="cashback">Cashback up to ₹25 on laundry orders.</div>
</div>
</div>
<div class="linkBtn">LINK</div>
</div>
</div>
<div class="sectionTitle">PAY LATER</div>
<div class="card">
<div class="paymentItem">
<div class="left">
<div class="icon">📱</div>
<div class="text">
<h3>Pay at Pickup</h3>
<p>Pay after pickup completed</p>
</div>
</div>
</div>
</div>
<div class="sectionTitle">OTHERS</div>
<div class="card">
<div class="paymentItem">
<div class="left">
<div class="icon">💵</div>
<div class="text">
<h3>Cash</h3>
<p>Cash on delivery available</p>
</div>
</div>
</div>
<div class="paymentItem" onclick="window.location.href='profile.html'">
<div class="left">
<div class="icon">📒</div>
<div class="text">
<h3>Show Passbook</h3>
<p>Wallet transactions</p>
</div>
</div>
<i class="fa-solid fa-chevron-right"></i>
</div>
</div>
</div>
<script type="module">
import { db } from '../firebase.js';
import { doc,getDoc } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
const phone=localStorage.getItem('userPhone');
async function loadWallet(){
const snap=await getDoc(doc(db,'users',phone));
if(snap.exists()){
document.getElementById('walletBalance').innerHTML='₹'+(snap.data().wallet||0);
}
}
loadWallet();
</script>
</body>
</html>
