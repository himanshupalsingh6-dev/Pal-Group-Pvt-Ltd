/* =========================================
RESET
========================================= */

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;

}

body{

background:#F5F7FB;
padding-bottom:110px;
overflow-x:hidden;

}

/* =========================================
HEADER
========================================= */

.profileHero{

background:
linear-gradient(
135deg,
#FFD633,
#FFE98A
);

padding:22px 18px 38px;

border-bottom-left-radius:36px;
border-bottom-right-radius:36px;

position:relative;

overflow:hidden;

}

.profileHero::before{

content:"";

position:absolute;

right:-60px;
top:-60px;

width:220px;
height:220px;

border-radius:50%;

background:
rgba(255,255,255,0.18);

}

.topBar{

display:flex;

justify-content:space-between;

align-items:center;

position:relative;

z-index:2;

}

.pageTitle{

font-size:32px;

font-weight:900;

color:#111827;

}

/* =========================================
PROFILE CARD
========================================= */

.profileCard{

margin-top:28px;

background:#fff;

border-radius:32px;

padding:22px;

display:flex;

align-items:center;

gap:18px;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

position:relative;

z-index:2;

}

.profileImg{

width:88px;
height:88px;

border-radius:28px;

object-fit:cover;

}

.profileInfo{

flex:1;

}

.profileName{

font-size:24px;

font-weight:900;

color:#111827;

}

.profileEmail{

margin-top:6px;

font-size:14px;

font-weight:700;

color:#6B7280;

}

.quickBadge{

margin-top:14px;

display:inline-flex;

align-items:center;

gap:8px;

height:36px;

padding:0 16px;

border-radius:999px;

background:#DCFCE7;

font-size:12px;

font-weight:900;

color:#16A34A;

}

/* =========================================
WALLET
========================================= */

.walletCard{

margin:20px 16px;

background:
linear-gradient(
135deg,
#111827,
#1F2937
);

border-radius:30px;

padding:24px;

color:#fff;

position:relative;

overflow:hidden;

}

.walletCard::before{

content:"";

position:absolute;

right:-50px;
top:-50px;

width:180px;
height:180px;

border-radius:50%;

background:
rgba(255,255,255,0.06);

}

.walletTitle{

font-size:14px;

font-weight:700;

opacity:0.8;

position:relative;

z-index:2;

}

.walletAmount{

margin-top:10px;

font-size:42px;

font-weight:900;

position:relative;

z-index:2;

}

.addMoneyBtn{

margin-top:22px;

height:54px;

padding:0 22px;

border:none;

border-radius:20px;

background:#FFD633;

font-size:15px;

font-weight:900;

color:#111827;

cursor:pointer;

position:relative;

z-index:2;

}

/* =========================================
MENU
========================================= */

.menuWrap{

padding:0 16px;

}

.menuCard{

background:#fff;

border-radius:28px;

overflow:hidden;

box-shadow:
0 6px 18px rgba(0,0,0,0.05);

}

.menuItem{

height:78px;

padding:0 18px;

display:flex;

align-items:center;

justify-content:space-between;

border-bottom:1px solid #F3F4F6;

cursor:pointer;

}

.menuItem:last-child{

border-bottom:none;

}

.menuLeft{

display:flex;

align-items:center;

gap:14px;

}

.menuIcon{

width:50px;
height:50px;

border-radius:18px;

background:#F3F4F6;

display:flex;

align-items:center;
justify-content:center;

font-size:18px;

color:#111827;

}

.menuText h3{

font-size:15px;

font-weight:800;

color:#111827;

}

.menuText p{

margin-top:4px;

font-size:12px;

color:#6B7280;

}

/* =========================================
LOGOUT
========================================= */

.logoutBtn{

margin:24px 16px;

width:calc(100% - 32px);

height:58px;

border:none;

border-radius:24px;

background:#DC2626;

color:#fff;

font-size:16px;

font-weight:900;

cursor:pointer;

}

/* =========================================
BOTTOM NAV
========================================= */

.bottomNav{

position:fixed;

left:0;
right:0;
bottom:0;

height:76px;

background:#fff;

display:flex;

justify-content:space-around;

align-items:center;

box-shadow:
0 -6px 20px rgba(0,0,0,0.08);

z-index:999;

}

.navItem{

flex:1;

height:100%;

border:none;

background:none;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:4px;

font-size:11px;

font-weight:700;

color:#6B7280;

}

.navItem i{

font-size:20px;

}

</style>

<!-- =========================================
SCRIPT
========================================= -->

<script type="module">

/* =========================================
IMPORT
========================================= */

import { auth, db }

from "../firebase.js";

import {

onAuthStateChanged,
signOut

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {

doc,
getDoc,
updateDoc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* =========================================
ELEMENTS
========================================= */

const profileName =
document.getElementById(
"profileName"
);

const profileEmail =
document.getElementById(
"profileEmail"
);

const walletAmount =
document.getElementById(
"walletAmount"
);

const logoutBtn =
document.getElementById(
"logoutBtn"
);

/* =========================================
AUTH CHECK
========================================= */

onAuthStateChanged(
auth,
async(user)=>{

if(user){

/* =========================================
SHOW USER
========================================= */

profileEmail.innerHTML =
user.email;

/* ========================================= */

const userRef =
doc(
db,
"users",
user.uid
);

const userSnap =
await getDoc(
userRef
);

/* ========================================= */

if(userSnap.exists()){

const data =
userSnap.data();

/* ========================================= */

profileName.innerHTML =
data.name || "QuickPress User";

walletAmount.innerHTML =
`₹${data.wallet || 0}`;

/* ========================================= */

}

/* ========================================= */

}else{

window.location.href =
"login.html";

}

}
);

/* =========================================
LOGOUT
========================================= */

logoutBtn.addEventListener(
"click",
()=>{

signOut(auth)
.then(()=>{

window.location.href =
"login.html";

});

}
);

/* =========================================
PAGE NAVIGATION
========================================= */

window.goPage =
function(page){

window.location.href =
page;

}

</script>
