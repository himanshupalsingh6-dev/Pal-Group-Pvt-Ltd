<!-- profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>QuickPress Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f3f4f7;
padding:18px;
color:#111;
}

.container{
max-width:500px;
margin:auto;
}

/* TOP */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.back{
width:45px;
height:45px;
background:#fff;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
cursor:pointer;
}

.logo{
font-size:24px;
font-weight:700;
}

/* CARD */

.profile-card{
background:#fff;
border-radius:30px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
margin-bottom:18px;
}

.profile-top{
padding:24px;
display:flex;
gap:18px;
align-items:center;
}

.avatar{
width:85px;
height:85px;
border-radius:50%;
background:linear-gradient(135deg,#d8e3ff,#eef3ff);
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:700;
color:#3478ff;
}

.user-info h2{
font-size:34px;
margin-bottom:5px;
}

.user-info p{
font-size:15px;
color:#666;
margin-bottom:10px;
}

.edit-btn{
color:#ff4f6d;
font-weight:600;
cursor:pointer;
}

.gold-card{
background:#0f0f16;
padding:22px;
display:flex;
justify-content:space-between;
align-items:center;
color:#fff;
}

.gold-left{
display:flex;
gap:15px;
align-items:center;
}

.gold-icon{
width:52px;
height:52px;
border-radius:50%;
background:linear-gradient(135deg,#ffd777,#a9792c);
display:flex;
align-items:center;
justify-content:center;
color:#000;
font-size:20px;
}

/* QUICK */

.quick-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:20px;
}

.quick-box{
background:#fff;
border-radius:22px;
padding:18px;
display:flex;
gap:15px;
align-items:center;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

.quick-icon{
width:50px;
height:50px;
border-radius:50%;
background:#f3f4f7;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#777;
}

.quick-box h4{
font-size:17px;
margin-bottom:3px;
}

.quick-box p{
font-size:15px;
font-weight:600;
color:#00a05b;
}

/* SECTION */

.section{
background:#fff;
border-radius:26px;
overflow:hidden;
margin-bottom:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

.section-title{
padding:20px;
font-size:25px;
font-weight:700;
position:relative;
}

.section-title::before{
content:'';
position:absolute;
left:0;
top:22px;
width:5px;
height:32px;
background:#ff4f6d;
border-radius:20px;
}

.menu-item{
display:flex;
align-items:center;
justify-content:space-between;
padding:22px 20px;
border-top:1px solid #eee;
cursor:pointer;
}

.menu-left{
display:flex;
align-items:center;
gap:18px;
}

.menu-left i{
width:25px;
font-size:22px;
color:#888;
}

.menu-left span{
font-size:20px;
}

.menu-right{
display:flex;
align-items:center;
gap:15px;
color:#999;
font-size:18px;
}

.toggle{
width:50px;
height:28px;
background:#ddd;
border-radius:30px;
position:relative;
transition:0.3s;
cursor:pointer;
}

.toggle::before{
content:'';
position:absolute;
width:22px;
height:22px;
border-radius:50%;
background:#fff;
top:3px;
left:3px;
transition:0.3s;
}

.toggle.active{
background:#00c46a;
}

.toggle.active::before{
left:25px;
}

/* POPUP */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
opacity:0;
pointer-events:none;
transition:0.3s;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

.popup{
position:fixed;
left:0;
bottom:-100%;
width:100%;
background:#fff;
padding:25px;
border-radius:30px 30px 0 0;
transition:0.4s;
z-index:1000;
}

.popup.active{
bottom:0;
}

.popup h2{
margin-bottom:18px;
}

.popup input{
width:100%;
padding:16px;
border:none;
background:#f3f4f7;
border-radius:15px;
margin-bottom:15px;
font-size:16px;
}

.save-btn{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:#111;
color:#fff;
font-size:18px;
font-weight:600;
cursor:pointer;
}

/* DARK */

.dark{
background:#111;
color:#fff;
}

.dark .section,
.dark .profile-card,
.dark .quick-box,
.dark .popup{
background:#1b1b1b;
color:#fff;
}

.dark .menu-item{
border-color:#2d2d2d;
}

.dark .quick-icon{
background:#2a2a2a;
}

.dark input{
background:#2d2d2d;
color:#fff;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<div class="back">
<i class="fa-solid fa-arrow-left"></i>
</div>

<div class="logo">
QuickPress
</div>
</div>

<!-- PROFILE -->

<div class="profile-card">

<div class="profile-top">

<div class="avatar" id="avatar">
H
</div>

<div class="user-info">

<h2 id="name">
Loading...
</h2>

<p id="email">
Loading...
</p>

<div class="edit-btn" onclick="openPopup()">
Edit Profile
<i class="fa-solid fa-angle-right"></i>
</div>

</div>

</div>

<div class="gold-card">

<div class="gold-left">

<div class="gold-icon">
<i class="fa-solid fa-crown"></i>
</div>

<div>
<h3>Join QuickPress Gold</h3>
<p style="font-size:13px;color:#aaa;">
Premium laundry membership
</p>
</div>

</div>

<i class="fa-solid fa-angle-right"></i>

</div>

</div>

<!-- QUICK -->

<div class="quick-grid">

<div class="quick-box">

<div class="quick-icon">
<i class="fa-solid fa-wallet"></i>
</div>

<div>
<h4>Quick Money</h4>
<p id="wallet">
₹0
</p>
</div>

</div>

<div class="quick-box">

<div class="quick-icon">
<i class="fa-solid fa-ticket"></i>
</div>

<div>
<h4>Your Coupons</h4>
<p id="coupon">
0 Active
</p>
</div>

</div>

</div>

<!-- PREFERENCES -->

<div class="section">

<div class="section-title">
Your Preferences
</div>

<div class="menu-item">

<div class="menu-left">
<i class="fa-regular fa-star"></i>
<span>Personalised Ratings</span>
</div>

<div class="toggle" id="toggle"></div>

</div>

<div class="menu-item" onclick="toggleTheme()">

<div class="menu-left">
<i class="fa-regular fa-moon"></i>
<span>Appearance</span>
</div>

<div class="menu-right">
<span id="themeText">
Light
</span>
<i class="fa-solid fa-angle-right"></i>
</div>

</div>

<div class="menu-item" onclick="window.location.href='payments.html'">

<div class="menu-left">
<i class="fa-regular fa-credit-card"></i>
<span>Payment Methods</span>
</div>

<div class="menu-right">
<i class="fa-solid fa-angle-right"></i>
</div>

</div>

</div>

<!-- DELIVERY -->

<div class="section">

<div class="section-title">
Food Delivery
</div>

<div class="menu-item" onclick="window.location.href='myorders.html'">

<div class="menu-left">
<i class="fa-solid fa-bag-shopping"></i>
<span>Your Orders</span>
</div>

<div class="menu-right">
<span id="orders">
0
</span>
<i class="fa-solid fa-angle-right"></i>
</div>

</div>

<div class="menu-item">

<div class="menu-left">
<i class="fa-regular fa-address-book"></i>
<span>Address Book</span>
</div>

<div class="menu-right">
<i class="fa-solid fa-angle-right"></i>
</div>

</div>

<div class="menu-item">

<div class="menu-left">
<i class="fa-regular fa-bookmark"></i>
<span>Your Collections</span>
</div>

<div class="menu-right">
<i class="fa-solid fa-angle-right"></i>
</div>

</div>

<div class="menu-item" onclick="logout()">

<div class="menu-left">
<i class="fa-solid fa-right-from-bracket"></i>
<span>Logout</span>
</div>

<div class="menu-right">
<i class="fa-solid fa-angle-right"></i>
</div>

</div>

</div>

</div>

<!-- POPUP -->

<div class="overlay" id="overlay"></div>

<div class="popup" id="popup">

<h2>Edit Profile</h2>

<input type="text" id="editName" placeholder="Enter Name">

<input type="email" id="editEmail" placeholder="Enter Email">

<button class="save-btn" onclick="saveProfile()">
Save Changes
</button>

</div>

<!-- MODULE SCRIPT -->

<script type="module">

import { db, auth } from './firebase.js';

import {
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
onAuthStateChanged,
signOut,
updateEmail
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

/* =========================
AUTH
========================= */

let currentUser = null;

onAuthStateChanged(auth, async(user)=>{

if(user){

currentUser = user;

document.getElementById("email").innerText =
user.email;

const userRef = doc(db,"users",user.uid);

const snap = await getDoc(userRef);

if(snap.exists()){

const data = snap.data();

document.getElementById("name").innerText =
data.name || "User";

document.getElementById("wallet").innerText =
"₹" + (data.wallet || 0);

document.getElementById("coupon").innerText =
(data.coupons || 0) + " Active";

document.getElementById("orders").innerText =
data.orders || 0;

document.getElementById("avatar").innerText =
(data.name || "U").charAt(0).toUpperCase();

}

}else{

window.location.href = "login.html";

}

});

/* =========================
POPUP
========================= */

window.openPopup = function(){

popup.classList.add("active");
overlay.classList.add("active");

editName.value = name.innerText;
editEmail.value = email.innerText;

}

overlay.onclick = ()=>{

popup.classList.remove("active");
overlay.classList.remove("active");

}

/* =========================
SAVE PROFILE
========================= */

window.saveProfile = async function(){

try{

await updateEmail(currentUser,editEmail.value);

await updateDoc(
doc(db,"users",currentUser.uid),
{
name:editName.value
}
);

name.innerText = editName.value;
email.innerText = editEmail.value;

avatar.innerText =
editName.value.charAt(0).toUpperCase();

alert("Profile Updated");

popup.classList.remove("active");
overlay.classList.remove("active");

}catch(error){

alert(error.message);

}

}

/* =========================
TOGGLE
========================= */

toggle.onclick = ()=>{

toggle.classList.toggle("active");

localStorage.setItem(
"ratings",
toggle.classList.contains("active")
);

}

if(localStorage.getItem("ratings")==="true"){

toggle.classList.add("active");

}

/* =========================
THEME
========================= */

window.toggleTheme = function(){

document.body.classList.toggle("dark");

const dark =
document.body.classList.contains("dark");

themeText.innerText =
dark ? "Dark" : "Light";

localStorage.setItem("theme",dark);

}

if(localStorage.getItem("theme")==="true"){

document.body.classList.add("dark");

themeText.innerText = "Dark";

}

/* =========================
LOGOUT
========================= */

window.logout = async function(){

await signOut(auth);

window.location.href = "login.html";

}

</script>

</body>
</html>
