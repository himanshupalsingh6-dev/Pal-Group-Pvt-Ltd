<style>

/* =========================
LIVE POPUP
========================= */

.liveOrderPopup{

position:fixed;
left:50%;
bottom:90px;
transform:translateX(-50%);
width:94%;
max-width:430px;
background:#111827;
color:#fff;
padding:18px;
border-radius:30px;
z-index:9999;

box-shadow:
0 24px 50px rgba(0,0,0,0.28);

animation:
popupSlide 0.4s ease;

cursor:pointer;
overflow:hidden;

}

/* =========================
ANIMATION
========================= */

@keyframes popupSlide{

from{

opacity:0;

transform:
translateX(-50%)
translateY(100px);

}

to{

opacity:1;

transform:
translateX(-50%)
translateY(0);

}

}

@keyframes bikeMove{

0%{
transform:translateX(0);
}

50%{
transform:translateX(8px);
}

100%{
transform:translateX(0);
}

}

/* =========================
TOP
========================= */

.popupTop{
display:flex;
justify-content:space-between;
align-items:center;
gap:14px;
margin-bottom:16px;
}

.popupLeft{
display:flex;
align-items:center;
gap:14px;
}

.bikeBox{
width:60px;
height:60px;
border-radius:20px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.bikeEmoji{
font-size:30px;
animation:
bikeMove 1s infinite;
}

.popupLeft h3{
font-size:16px;
font-weight:900;
margin-bottom:4px;
}

.popupLeft p{
font-size:12px;
opacity:0.8;
}

/* =========================
CIRCLE
========================= */

.circleProgress{
width:62px;
height:62px;
border-radius:50%;
background:#FFD400;
color:#111827;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
font-weight:900;
}

/* =========================
PROGRESS BAR
========================= */

.progressBar{
width:100%;
height:10px;
border-radius:40px;
background:
rgba(255,255,255,0.12);
overflow:hidden;
margin-bottom:18px;
}

.progressFill{
width:25%;
height:100%;
background:#FFD400;
border-radius:40px;
transition:0.5s;
}

/* =========================
STEPS
========================= */

.stepContainer{
display:flex;
justify-content:space-between;
gap:8px;
margin-bottom:18px;
}

.step{
flex:1;
text-align:center;
opacity:0.4;
transition:0.3s;
}

.stepDot{
width:14px;
height:14px;
border-radius:50%;
background:#6B7280;
margin:auto;
margin-bottom:8px;
transition:0.3s;
}

.step span{
font-size:10px;
font-weight:700;
}

.activeStep{
opacity:1;
}

.activeStep .stepDot{
background:#22C55E;
}

/* =========================
BOTTOM
========================= */

.popupBottom{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
}

.etaBox{
font-size:12px;
font-weight:700;
opacity:0.9;
}

.trackBtn{
padding:12px 16px;
border-radius:14px;
background:#FFD400;
color:#111827;
font-size:12px;
font-weight:900;
}

/* =========================
MOBILE
========================= */

@media screen and (max-width:768px){

.liveOrderPopup{

bottom:82px;
padding:16px;
border-radius:24px;

}

.popupLeft h3{
font-size:14px;
}

</style>

<script>

/* =========================================
REAL ORDER POPUP SYSTEM
========================================= */

/* =========================
GET ORDER
========================= */

const activeOrder =

JSON.parse(
localStorage.getItem(
"lastOrder"
)
);

/* =========================
SHOW POPUP
========================= */

if(activeOrder){

document.getElementById(
"liveOrderPopup"
).style.display =
"block";

}

/* =========================
DEFAULT STATUS
========================= */

let progress = 25;

let eta = 25;

let statusText =
"Pickup Partner Assigned";

/* =========================
AUTO UPDATE
========================= */

setInterval(()=>{

if(progress < 100){

progress += 25;

eta -= 5;

/* STATUS */

if(progress === 50){

statusText =
"Clothes Picked Up";

document.getElementById(
"step3"
).classList.add(
"activeStep"
);

}

if(progress === 75){

statusText =
"Laundry Cleaning Started";

}

if(progress === 100){

statusText =
"Out For Delivery";

document.getElementById(
"step4"
).classList.add(
"activeStep"
);

/* COMPLETE */

setTimeout(()=>{

document.getElementById(
"liveOrderPopup"
).style.display =
"none";

/* CLEAR ORDER */

localStorage.removeItem(
"lastOrder"
);

},8000);

}

/* UPDATE UI */

document.getElementById(
"progressFill"
).style.width =
progress + "%";

document.getElementById(
"circleProgress"
).innerHTML =
progress + "%";

document.getElementById(
"popupStatusText"
).innerHTML =
statusText;

document.getElementById(
"etaText"
).innerHTML =
eta + " mins";

}

},7000);

/* =========================
OPEN TRACKING
========================= */

function openTracking(){

window.location.href =
"tracking.html";

}

</script>
