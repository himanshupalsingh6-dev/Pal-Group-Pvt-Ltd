<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Services - QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --yellow:#FFD400;
  --bg:#f6f7f9;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
}

/* 🔥 HEADER (GLASS) */
.header{
  position:sticky;
  top:0;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.8);
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.cart{
  background:var(--yellow);
  padding:6px 12px;
  border-radius:20px;
  font-weight:bold;
}

/* 🔥 CATEGORY SCROLL */
.tabs{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:12px;
}

.tab{
  padding:8px 16px;
  background:#fff;
  border-radius:20px;
  white-space:nowrap;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.active{
  background:var(--yellow);
  font-weight:bold;
  transform:scale(1.05);
}

/* 🔥 PRODUCT CARDS */
.list{
  padding:12px;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  transform:translateY(0);
}

.item:hover{
  transform:translateY(-4px);
}

/* LEFT */
.name{
  font-size:16px;
  font-weight:600;
}

.price{
  color:#666;
  font-size:14px;
}

/* 🔥 QTY CONTROLS */
.qty{
  display:flex;
  align-items:center;
  gap:8px;
}

.btn{
  width:30px;
  height:30px;
  border:none;
  border-radius:8px;
  background:var(--yellow);
  font-weight:bold;
  cursor:pointer;
}

.btn:active{
  transform:scale(0.9);
}

/* 🔥 BOTTOM BAR */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 -5px 20px rgba(0,0,0,.1);
}

.checkout{
  background:linear-gradient(45deg,#FFD400,#ffb300);
  padding:12px 20px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* EMPTY */
.empty{
  text-align:center;
  margin-top:40px;
  color:#999;
}
</style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <div onclick="goBack()">← Services</div>
  <div class="cart">🛒 <span id="count">0</span></div>
</div>

<!-- 🔥 TABS -->
<div class="tabs" id="tabs"></div>

<!-- 🔥 LIST -->
<div class="list" id="list"></div>

<!-- 🔥 BOTTOM -->
<div class="bottom">
  <div>
    <b id="items">0 items</b><br>
    ₹<span id="total">0</span>
  </div>
  <button class="checkout" onclick="goCheckout()">Checkout</button>
</div>

<script>

/* DATA */
const services = {
  ironing:[
    {name:"Shirt",price:10},
    {name:"Pant",price:15},
    {name:"Saree",price:20}
  ],
  dry:[
    {name:"Coat",price:80},
    {name:"Blazer",price:100},
    {name:"Blanket",price:120}
  ],
  washing:[
    {name:"Clothes (1kg)",price:50},
    {name:"Bedsheet",price:40}
  ],
  steam:[
    {name:"Silk Dress",price:60},
    {name:"Party Wear",price:70}
  ],
  express:[
    {name:"Same Day Service",price:50}
  ]
};

let current = localStorage.getItem("service") || "ironing";
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

/* LOAD TABS */
function loadTabs(){
  let html="";
  for(let key in services){
    html+=`<div class="tab ${key==current?'active':''}" onclick="changeTab('${key}')">${key}</div>`;
  }
  tabs.innerHTML=html;
}

/* CHANGE TAB */
function changeTab(tab){
  current=tab;
  loadTabs();
  loadItems();
}

/* LOAD ITEMS */
function loadItems(){
  let data=services[current];
  let html="";

  if(data.length===0){
    list.innerHTML=`<div class="empty">No items</div>`;
    return;
  }

  data.forEach(item=>{
    let found = cart.find(c=>c.name==item.name);
    let qty = found ? found.qty : 0;

    html+=`
    <div class="item">
      <div>
        <div class="name">${item.name}</div>
        <div class="price">₹${item.price}</div>
      </div>
      <div class="qty">
        <button class="btn" onclick="update('${item.name}',${item.price},-1)">-</button>
        <span>${qty}</span>
        <button class="btn" onclick="update('${item.name}',${item.price},1)">+</button>
      </div>
    </div>
    `;
  });

  list.innerHTML=html;
}

/* UPDATE CART */
function update(name,price,delta){

  let item = cart.find(c=>c.name==name);

  if(item){
    item.qty+=delta;
    if(item.qty<=0){
      cart = cart.filter(c=>c.name!=name);
    }
  }else if(delta>0){
    cart.push({name,price,qty:1});
  }

  localStorage.setItem("cart",JSON.stringify(cart));

  loadItems();
  updateTotal();
}

/* TOTAL */
function updateTotal(){
  let total=0,items=0;

  cart.forEach(i=>{
    total+=i.price*i.qty;
    items+=i.qty;
  });

  totalEl.innerText=total;
  itemsEl.innerText=items+" items";
  count.innerText=items;
}

/* NAV */
function goBack(){location.href="index.html"}
function goCheckout(){
  if(cart.length==0){
    alert("Add items first");
    return;
  }
  location.href="checkout.html";
}

/* INIT */
loadTabs();
loadItems();
updateTotal();

</script>

</body>
</html>
