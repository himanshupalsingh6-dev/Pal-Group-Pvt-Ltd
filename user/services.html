<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Services
</title>

<!-- =========================================================
GOOGLE FONT
========================================================= -->

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet">

<!-- =========================================================
FONT AWESOME
========================================================= -->

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- =========================================================
CSS
========================================================= -->

<link
rel="stylesheet"
href="services.css">

</head>

<body>

<!-- =========================================================
HEADER
========================================================= -->

<header class="servicesHeader">

<div class="headerTop">

<div>

<h1 class="pageTitle">
Services
</h1>

<div
class="locationText"
id="locationText">

📍 Detecting live location...

</div>

</div>

<div class="headerButtons">

<button class="cartBtn">

<i class="fa-solid fa-cart-shopping"></i>

<span id="cartCount">
0
</span>

</button>

<button
class="profileBtn"
onclick="window.location.href='profile.html'">

H

</button>

</div>

</div>

<!-- SEARCH -->

<div class="searchBox">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder='Search "shirt wash"'>

</div>

</header>

<!-- =========================================================
CATEGORY FILTER
========================================================= -->

<section class="categorySection">

<div class="categoryScroll">

<button
class="categoryBtn active"
data-category="all">

All

</button>

<button
class="categoryBtn"
data-category="iron">

Iron

</button>

<button
class="categoryBtn"
data-category="wash">

Wash

</button>

<button
class="categoryBtn"
data-category="steam">

Steam

</button>

<button
class="categoryBtn"
data-category="shoes">

Shoes

</button>

<button
class="categoryBtn"
data-category="blanket">

Blanket

</button>

<button
class="categoryBtn"
data-category="premium">

Premium

</button>

</div>

</section>

<!-- =========================================================
SERVICES GRID
========================================================= -->

<section class="servicesSection">

<div
class="servicesGrid"
id="servicesGrid">

<!-- FIREBASE DATA -->

</div>

</section>

<!-- =========================================================
POPUP CART
========================================================= -->

<div
class="popupCart"
id="popupCart">

<div class="popupContent">

<div class="popupTop">

<h3>
Your Cart
</h3>

<button
class="closePopup"
id="closePopup">

×

</button>

</div>

<div
class="cartItems"
id="cartItems">

No items added

</div>

<button class="checkoutBtn">
Proceed To Checkout
</button>

</div>

</div>

<!-- =========================================================
TOAST
========================================================= -->

<div
class="toast"
id="toast">

Added To Cart

</div>

<!-- =========================================================
BOTTOM NAVBAR
========================================================= -->

<nav class="bottomNav">

<button
class="navItem"
onclick="window.location.href='index.html'">

<i class="fa-solid fa-house"></i>
<span>Home</span>

</button>

<button
class="navItem"
onclick="window.location.href='orders.html'">

<i class="fa-solid fa-bag-shopping"></i>
<span>Orders</span>

</button>

<button
class="navItem active">

<i class="fa-solid fa-table-cells-large"></i>
<span>Services</span>

</button>

<button
class="navItem"
onclick="window.location.href='wallet.html'">

<i class="fa-solid fa-wallet"></i>
<span>Wallet</span>

</button>

<button
class="navItem"
onclick="window.location.href='profile.html'">

<i class="fa-regular fa-user"></i>
<span>Profile</span>

</button>

</nav>

<!-- =========================================================
JS
========================================================= -->

<script
type="module"
src="services.js">

</script>

</body>

</html>
