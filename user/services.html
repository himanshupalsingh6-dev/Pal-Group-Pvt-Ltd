<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Services
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F7F8FC;
padding-bottom:100px;
}

/* TOP */

.topHeader{
padding:18px;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 20px rgba(0,0,0,0.04);
position:sticky;
top:0;
z-index:999;
}

.leftTop{
display:flex;
align-items:center;
gap:12px;
}

.backBtn{
width:42px;
height:42px;
border-radius:14px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:900;
cursor:pointer;
}

.titleBox h2{
font-size:30px;
font-weight:900;
}

.titleBox p{
font-size:13px;
color:#6B7280;
}

.rightTop{
display:flex;
align-items:center;
gap:12px;
}

.iconBtn{
width:44px;
height:44px;
border-radius:14px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 20px rgba(0,0,0,0.06);
position:relative;
cursor:pointer;
}

.cartCount{
position:absolute;
top:-4px;
right:-4px;
width:20px;
height:20px;
border-radius:50%;
background:#22C55E;
color:#fff;
font-size:11px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
}

/* SEARCH */

.searchBox{
padding:18px;
}

.searchInput{
width:100%;
height:58px;
border:none;
outline:none;
padding:0 20px;
border-radius:18px;
background:#fff;
font-size:15px;
box-shadow:0 6px 25px rgba(0,0,0,0.05);
}

/* CITY */

.cityBar{
padding:0 18px 18px;
display:flex;
gap:12px;
overflow:auto;
}

.cityBtn{
padding:14px 20px;
background:#fff;
border-radius:16px;
font-size:14px;
font-weight:700;
white-space:nowrap;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.04);
}

.cityBtn.active{
background:#FFD400;
}

/* CATEGORY */

.categoryBar{
padding:0 18px 18px;
display:flex;
gap:12px;
overflow:auto;
}

.categoryBtn{
padding:14px 22px;
background:#fff;
border-radius:16px;
font-size:14px;
font-weight:700;
white-space:nowrap;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.04);
}

.categoryBtn.active{
background:#111827;
color:#fff;
}

/* SERVICES */

.servicesGrid{
padding:0 18px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

.serviceCard{
background:#fff;
border-radius:28px;
padding:18px;
position:relative;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.serviceCard::before{
content:"";
position:absolute;
width:140px;
height:140px;
background:rgba(255,212,0,0.15);
border-radius:50%;
top:-50px;
right:-50px;
}

.topRow{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.serviceImage{
width:54px;
height:54px;
border-radius:18px;
background:#F3F4F6;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
}

.favBtn{
width:38px;
height:38px;
border:none;
border-radius:12px;
background:#fff;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
cursor:pointer;
}

.serviceName{
font-size:22px;
font-weight:900;
margin-bottom:6px;
}

.serviceDesc{
font-size:13px;
color:#6B7280;
line-height:1.5;
margin-bottom:14px;
}

.locationTag{
display:inline-block;
padding:8px 12px;
border-radius:12px;
background:#F3F4F6;
font-size:12px;
font-weight:700;
margin-bottom:16px;
}

.bottomRow{
display:flex;
justify-content:space-between;
align-items:center;
}

.servicePrice{
font-size:28px;
font-weight:900;
color:#22C55E;
}

.addBtn{
height:44px;
padding:0 20px;
border:none;
border-radius:14px;
background:#FFD400;
font-size:14px;
font-weight:900;
cursor:pointer;
}

/* BOTTOM NAV */

.bottomNav{
position:fixed;
left:0;
bottom:0;
width:100%;
height:78px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,0.05);
z-index:999;
}

.navItem{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
font-size:12px;
font-weight:700;
color:#6B7280;
text-decoration:none;
}

.navItem.active{
color:#FFD400;
}

.navItem i{
font-size:20px;
}

/* MOBILE */

@media(max-width:768px){

.servicesGrid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:500px){

.servicesGrid{
grid-template-columns:1fr;
}

.titleBox h2{
font-size:24px;
}

}

</style>
</head>
<body>

<!-- TOP -->

<div class="topHeader">

<div class="leftTop">

<div class="backBtn"
onclick="history.back()">

←

</div>

<div class="titleBox">

<h2>
Services
</h2>

<p>
Premium laundry collection
</p>

</div>

</div>

<div class="rightTop">

<div class="iconBtn">

❤️

</div>

<div class="iconBtn"
onclick="location.href='cart.html'">

🛒

<div class="cartCount"
id="cartCount">

0

</div>

</div>

</div>

</div>

<!-- SEARCH -->

<div class="searchBox">

<input
type="text"
placeholder="Search services..."
class="searchInput"
id="searchInput"
/>

</div>

<!-- CITY -->

<div class="cityBar">

<div
class="cityBtn active"
data-city="Kasganj">

Kasganj

</div>

<div
class="cityBtn"
data-city="Noida">

Noida

</div>

<div
class="cityBtn"
data-city="Aligarh">

Aligarh

</div>

<div
class="cityBtn"
data-city="Badaun">

Badaun

</div>

<div
class="cityBtn"
data-city="Delhi">

Delhi

</div>

<div
class="cityBtn"
data-city="Mumbai">

Mumbai

</div>

</div>

<!-- CATEGORY -->

<div class="categoryBar">

<div
class="categoryBtn active"
data-category="All">

All

</div>

<div
class="categoryBtn"
data-category="Ironing">

Ironing

</div>

<div
class="categoryBtn"
data-category="Washing">

Washing

</div>

<div
class="categoryBtn"
data-category="Dry Cleaning">

Dry Cleaning

</div>

<div
class="categoryBtn"
data-category="Premium">

Premium

</div>

<div
class="categoryBtn"
data-category="Shoe & Bag">

Shoe & Bag

</div>

<div
class="categoryBtn"
data-category="Home Cleaning">

Home Cleaning

</div>

</div>

<!-- SERVICES -->

<div class="servicesGrid"
id="servicesGrid">

</div>

<!-- BOTTOM NAV -->

<div class="bottomNav">

<a href="index.html"
class="navItem">

<i class="fa-solid fa-house"></i>

Home

</a>

<a href="services.html"
class="navItem active">

<i class="fa-solid fa-shirt"></i>

Services

</a>

<a href="cart.html"
class="navItem">

<i class="fa-solid fa-cart-shopping"></i>

Cart

</a>

<a href="offers.html"
class="navItem">

<i class="fa-solid fa-tags"></i>

Offers

</a>

<a href="profile.html"
class="navItem">

<i class="fa-regular fa-user"></i>

Profile

</a>

</div>

<!-- FIREBASE -->

<script type="module">

import { db }

from

"/Pal-Group-Pvt-Ltd/firebase.js";

import {

collection,
getDocs

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* GLOBAL */

let allServices = [];

let currentCategory = "All";

let userCity =
localStorage.getItem(
"userCity"
) || "Kasganj";

/* ELEMENTS */

const servicesGrid =
document.getElementById(
"servicesGrid"
);

const searchInput =
document.getElementById(
"searchInput"
);

/* LOAD */

async function loadServices(){

servicesGrid.innerHTML =

`

<div style="
padding:30px;
font-size:18px;
font-weight:700;
">

Loading Services...

</div>

`;

try{

const snap =
await getDocs(
collection(db,"services")
);

allServices = [];

snap.forEach((doc)=>{

allServices.push({

id:doc.id,

...doc.data()

});

});

renderServices();

}catch(error){

console.log(error);

servicesGrid.innerHTML =

`

<div style="
padding:30px;
font-size:18px;
font-weight:700;
color:red;
">

Failed To Load Services

</div>

`;

}

}

loadServices();

/* RENDER */

function renderServices(){

let html = "";

const search =
searchInput.value
.toLowerCase();

allServices.forEach((service)=>{

/* CATEGORY */

if(

currentCategory !== "All"

&&

service.category !== currentCategory

){

return;

}

/* SEARCH */

if(

!service.name
.toLowerCase()
.includes(search)

){

return;

}

/* PRICE */

let finalPrice = 0;

/* NEW LOCATION SYSTEM */

if(service.prices){

finalPrice =

service.prices[userCity]

?? 0;

}

/* OLD SUPPORT */

if(finalPrice === 0){

finalPrice =
service.price || 0;

}

/* HIDE */

if(finalPrice <= 0){

return;

}

/* CARD */

html += `

<div class="serviceCard">

<div class="topRow">

<div class="serviceImage">

${service.name.charAt(0)}

</div>

<button class="favBtn">

❤️

</button>

</div>

<h3 class="serviceName">

${service.name}

</h3>

<p class="serviceDesc">

${service.description
|| "Premium laundry care"}

</p>

<div class="locationTag">

📍 ${userCity}

</div>

<div class="bottomRow">

<div class="servicePrice">

₹${finalPrice}

</div>

<button
class="addBtn"
onclick="addToCart(
'${service.id}'
)">

ADD

</button>

</div>

</div>

`;

});

/* EMPTY */

if(html === ""){

html =

`

<div style="
padding:30px;
font-size:18px;
font-weight:700;
">

No Services Found

</div>

`;

}

servicesGrid.innerHTML =
html;

}

/* SEARCH */

searchInput.addEventListener(

"keyup",

()=>{

renderServices();

}

);

/* CATEGORY */

document
.querySelectorAll(
".categoryBtn"
)
.forEach((btn)=>{

btn.addEventListener(

"click",

()=>{

document
.querySelectorAll(
".categoryBtn"
)
.forEach((b)=>{

b.classList.remove(
"active"
);

});

btn.classList.add(
"active"
);

currentCategory =
btn.dataset.category;

renderServices();

}

);

});

/* CITY */

document
.querySelectorAll(
".cityBtn"
)
.forEach((btn)=>{

btn.addEventListener(

"click",

()=>{

document
.querySelectorAll(
".cityBtn"
)
.forEach((b)=>{

b.classList.remove(
"active"
);

});

btn.classList.add(
"active"
);

userCity =
btn.dataset.city;

localStorage.setItem(
"userCity",
userCity
);

renderServices();

}

);

});

/* CART */

window.addToCart =
function(id){

const service =
allServices.find(
item=>item.id===id
);

if(!service)return;

/* PRICE */

let finalPrice = 0;

if(service.prices){

finalPrice =

service.prices[userCity]

?? 0;

}

if(finalPrice === 0){

finalPrice =
service.price || 0;

}

/* CART */

let cart =
JSON.parse(
localStorage.getItem(
"cart"
)
) || [];

/* PUSH */

cart.push({

id:service.id,

name:service.name,

description:service.description,

price:finalPrice,

city:userCity,

qty:1

});

/* SAVE */

localStorage.setItem(

"cart",

JSON.stringify(cart)

);

/* COUNT */

document.getElementById(
"cartCount"
).innerHTML =
cart.length;

alert(
"Added To Cart"
);

};

/* CART COUNT */

const cart =
JSON.parse(
localStorage.getItem(
"cart"
)
) || [];

document.getElementById(
"cartCount"
).innerHTML =
cart.length;

</script>

</body>
</html>
