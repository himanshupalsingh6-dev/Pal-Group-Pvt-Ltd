<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPress Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --yellow:#FFD400;
  --bg:#f6f7f9;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
}

/* 🔥 HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
  font-weight:bold;
  font-size:20px;
  color:#000;
}

.search{
  flex:1;
  margin:0 10px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.cart{
  background:var(--yellow);
  padding:8px 12px;
  border-radius:20px;
}

/* 🔥 LAYOUT */
.main{
  display:flex;
}

/* 🔥 CATEGORY SIDEBAR */
.sidebar{
  width:90px;
  background:#fff;
  height:calc(100vh - 60px);
  overflow:auto;
  border-right:1px solid #eee;
}

.cat{
  padding:12px;
  text-align:center;
  cursor:pointer;
  font-size:12px;
}

.active{
  background:#f0f0f0;
  font-weight:bold;
}

/* 🔥 PRODUCT GRID */
.content{
  flex:1;
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:#fff;
  padding:10px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.title{
  font-size:14px;
  font-weight:600;
}

.price{
  font-size:13px;
  color:#666;
}

/* 🔥 ADD BUTTON */
.add{
  margin-top:6px;
  padding:6px;
  text-align:center;
  background:var(--yellow);
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.qty{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
}

.btn{
  background:var(--yellow);
  border:none;
  padding:5px 10px;
  border-radius:5px;
}
</style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <div class="logo">⚡ QuickPress</div>

  <div class="search">
    <input placeholder="Search services...">
  </div>

  <div class="cart">🛒 <span id="count">0</span></div>
</div>

<div class="main">

  <!-- 🔥 CATEGORY -->
  <div class="sidebar" id="cats"></div>

  <!-- 🔥 PRODUCTS -->
  <div class="content">
    <div class="grid" id="products"></div>
  </div>

</div>

<script type="module">

/* 🔥 FIREBASE IMPORT */
import { db } from "./firebase.js";
import {
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* 🔥 STATE */
let allProducts = [];
let current = "ironing";
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

/* 🔥 CATEGORY LIST */
const categories = ["ironing","dry","washing","steam","express"];

/* LOAD CATEGORY */
function loadCategories(){
  let html="";
  categories.forEach(c=>{
    html+=`
    <div class="cat ${c==current?'active':''}" onclick="changeCat('${c}')">
      ${c}
    </div>`;
  });
  cats.innerHTML=html;
}

/* CHANGE CATEGORY */
window.changeCat=function(cat){
  current=cat;
  loadCategories();
  loadProducts();
};

/* 🔥 LOAD PRODUCTS FROM FIREBASE */
onSnapshot(collection(db,"services"), snap=>{
  allProducts=[];
  snap.forEach(d=>{
    allProducts.push(d.data());
  });
  loadProducts();
});

/* SHOW PRODUCTS */
function loadProducts(){

  let list = allProducts.filter(p=>p.category==current);

  let html="";

  list.forEach(p=>{
    let found = cart.find(c=>c.name==p.name);
    let qty = found ? found.qty : 0;

    html+=`
    <div class="card">
      <div class="title">${p.name}</div>
      <div class="price">₹${p.price}</div>

      ${
        qty==0
        ? `<div class="add" onclick="add('${p.name}',${p.price})">ADD</div>`
        : `<div class="qty">
            <button class="btn" onclick="add('${p.name}',${p.price},-1)">-</button>
            <span>${qty}</span>
            <button class="btn" onclick="add('${p.name}',${p.price},1)">+</button>
          </div>`
      }
    </div>`;
  });

  products.innerHTML=html;
}

/* CART UPDATE */
window.add=function(name,price,delta=1){

  let item = cart.find(c=>c.name==name);

  if(item){
    item.qty+=delta;
    if(item.qty<=0){
      cart = cart.filter(c=>c.name!=name);
    }
  }else{
    cart.push({name,price,qty:1});
  }

  localStorage.setItem("cart",JSON.stringify(cart));
  updateCart();
  loadProducts();
};

/* CART COUNT */
function updateCart(){
  let count=0;
  cart.forEach(i=>count+=i.qty);
  document.getElementById("count").innerText=count;
}

/* INIT */
loadCategories();
updateCart();

</script>

</body>
</html>
