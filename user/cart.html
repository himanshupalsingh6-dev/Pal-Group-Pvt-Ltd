<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Cart
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =====================================================
RESET
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#F6F7FB;
padding-bottom:120px;
overflow-x:hidden;
color:#111827;
}

/* =====================================================
HEADER
===================================================== */

.cartHeader{

background:
linear-gradient(
135deg,
#FFD633 0%,
#FFE98A 100%
);

padding:18px 16px 26px;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

position:sticky;

top:0;

z-index:999;

}

.topBar{

display:flex;

align-items:center;

justify-content:space-between;

}

.backBtn{

width:46px;
height:46px;

border:none;

border-radius:16px;

background:#fff;

font-size:18px;

box-shadow:
0 6px 18px rgba(0,0,0,0.06);

cursor:pointer;

}

.cartTitle{

font-size:28px;

font-weight:900;

}

.cartSub{

margin-top:6px;

font-size:13px;

font-weight:700;

color:#374151;

}

/* =====================================================
CART ITEMS
===================================================== */

.cartContainer{

padding:18px 16px;

}

.cartItem{

background:#fff;

border-radius:24px;

padding:16px;

display:flex;

align-items:center;

justify-content:space-between;

margin-bottom:14px;

box-shadow:
0 4px 14px rgba(0,0,0,0.05);

}

.itemLeft{

display:flex;

align-items:center;

gap:14px;

}

.itemImage{

width:74px;
height:74px;

border-radius:20px;

background:#F3F4F6;

display:flex;

align-items:center;
justify-content:center;

font-size:40px;

}

.itemInfo h3{

font-size:16px;

font-weight:800;

margin-bottom:4px;

}

.itemInfo p{

font-size:13px;

color:#6B7280;

}

.itemPrice{

margin-top:8px;

font-size:20px;

font-weight:900;

}

.itemActions{

display:flex;

flex-direction:column;

align-items:center;

gap:12px;

}

.qtyBox{

display:flex;

align-items:center;

gap:10px;

background:#F3F4F6;

padding:6px 10px;

border-radius:14px;

}

.qtyBtn{

width:28px;
height:28px;

border:none;

border-radius:10px;

background:#fff;

font-size:16px;

font-weight:900;

cursor:pointer;

}

.deleteBtn{

width:36px;
height:36px;

border:none;

border-radius:12px;

background:#FFE4E6;

color:#DC2626;

font-size:16px;

cursor:pointer;

}

/* =====================================================
EMPTY CART
===================================================== */

.emptyCart{

padding:80px 20px;

text-align:center;

}

.emptyCartIcon{

font-size:80px;

margin-bottom:18px;

}

.emptyCart h2{

font-size:26px;

font-weight:900;

}

.emptyCart p{

margin-top:10px;

font-size:14px;

line-height:1.7;

color:#6B7280;

}

.shopBtn{

margin-top:22px;

height:52px;

padding:0 24px;

border:none;

border-radius:18px;

background:#16A34A;

color:#fff;

font-size:15px;

font-weight:900;

cursor:pointer;

}

/* =====================================================
BILL SECTION
===================================================== */

.billSection{

position:fixed;

left:0;
right:0;
bottom:0;

background:#fff;

padding:18px 16px calc(18px + env(safe-area-inset-bottom));

border-top-left-radius:28px;
border-top-right-radius:28px;

box-shadow:
0 -8px 30px rgba(0,0,0,0.08);

z-index:999;

}

.billRow{

display:flex;

justify-content:space-between;

margin-bottom:12px;

font-size:14px;

font-weight:700;

}

.totalRow{

display:flex;

justify-content:space-between;

margin-top:14px;

padding-top:14px;

border-top:1px solid #F3F4F6;

font-size:22px;

font-weight:900;

}

.checkoutBtn{

width:100%;

height:54px;

margin-top:18px;

border:none;

border-radius:18px;

background:#16A34A;

color:#fff;

font-size:16px;

font-weight:900;

cursor:pointer;

}

/* =====================================================
DESKTOP
===================================================== */

@media(min-width:900px){

.cartContainer{

max-width:900px;

margin:auto;

}

.billSection{

left:50%;

transform:translateX(-50%);

width:450px;

bottom:20px;

border-radius:28px;

}

}

</style>

</head>

<body>

<!-- =====================================================
HEADER
===================================================== -->

<div class="cartHeader">

<div class="topBar">

<button
class="backBtn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div>

<div class="cartTitle">
Your Cart
</div>

<div class="cartSub">
QuickPress Premium Checkout
</div>

</div>

<div style="width:46px;"></div>

</div>

</div>

<!-- =====================================================
CART ITEMS
===================================================== -->

<div
class="cartContainer"
id="cartContainer">

</div>

<!-- =====================================================
BILL
===================================================== -->

<div
class="billSection"
id="billSection">

<div class="billRow">

<span>Item Total</span>

<span id="itemTotal">
₹0
</span>

</div>

<div class="billRow">

<span>Delivery Fee</span>

<span>
₹29
</span>

</div>

<div class="billRow">

<span>Platform Fee</span>

<span>
₹5
</span>

</div>

<div class="totalRow">

<span>Total</span>

<span id="grandTotal">
₹0
</span>

</div>

<button
class="checkoutBtn"
id="checkoutBtn">

Proceed Checkout

</button>

</div>

<script>

/* =====================================================
DEMO CART DATA
===================================================== */

let cart = [

{
emoji:"👔",
name:"Shirt Iron",
desc:"Premium steam ironing",
price:29,
qty:1
},

{
emoji:"👟",
name:"Sneaker Clean",
desc:"Deep sneaker wash",
price:199,
qty:1
}

];

/* =====================================================
ELEMENTS
===================================================== */

const cartContainer =
document.getElementById(
"cartContainer"
);

const itemTotal =
document.getElementById(
"itemTotal"
);

const grandTotal =
document.getElementById(
"grandTotal"
);

const billSection =
document.getElementById(
"billSection"
);

/* =====================================================
RENDER CART
===================================================== */

function renderCart(){

cartContainer.innerHTML = "";

let total = 0;

/* ========================================= */

if(cart.length === 0){

billSection.style.display =
"none";

cartContainer.innerHTML = `

<div class="emptyCart">

<div class="emptyCartIcon">
🛒
</div>

<h2>
Cart is Empty
</h2>

<p>
Looks like you haven't added any services yet.
</p>

<button
class="shopBtn"
onclick="window.location.href='services.html'">

Browse Services

</button>

</div>

`;

return;

}

/* ========================================= */

billSection.style.display =
"block";

/* ========================================= */

cart.forEach((item,index)=>{

total += item.price * item.qty;

/* ========================================= */

cartContainer.innerHTML += `

<div class="cartItem">

<div class="itemLeft">

<div class="itemImage">
${item.emoji}
</div>

<div class="itemInfo">

<h3>
${item.name}
</h3>

<p>
${item.desc}
</p>

<div class="itemPrice">
₹${item.price}
</div>

</div>

</div>

<div class="itemActions">

<div class="qtyBox">

<button
class="qtyBtn"
onclick="decreaseQty(${index})">

-

</button>

<span>
${item.qty}
</span>

<button
class="qtyBtn"
onclick="increaseQty(${index})">

+

</button>

</div>

<button
class="deleteBtn"
onclick="removeItem(${index})">

<i class="fa-solid fa-trash"></i>

</button>

</div>

</div>

`;

});

/* ========================================= */

itemTotal.innerText =
`₹${total}`;

grandTotal.innerText =
`₹${total + 29 + 5}`;

}

/* =====================================================
INCREASE
===================================================== */

function increaseQty(index){

cart[index].qty++;

renderCart();

}

/* =====================================================
DECREASE
===================================================== */

function decreaseQty(index){

if(cart[index].qty > 1){

cart[index].qty--;

}else{

cart.splice(index,1);

}

renderCart();

}

/* =====================================================
REMOVE
===================================================== */

function removeItem(index){

cart.splice(index,1);

renderCart();

}

/* =====================================================
CHECKOUT
===================================================== */

document.getElementById(
"checkoutBtn"
)

.addEventListener(
"click",
()=>{

alert(
"Proceeding to Checkout 🚀"
);

window.location.href =
"checkout.html";

}
);

/* =====================================================
START
===================================================== */

renderCart();

</script>

</body>
</html>
