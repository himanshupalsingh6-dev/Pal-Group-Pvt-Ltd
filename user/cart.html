<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
QuickPress Cart
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
"Poppins",
sans-serif;
}

body{
background:#F8FAFC;
color:#111827;
overflow-x:hidden;
}

/* =========================
TOPBAR
========================= */

.topbar{
position:sticky;
top:0;
z-index:999;
padding:16px;
background:
rgba(255,255,255,0.95);
backdrop-filter:blur(18px);
border-bottom:
1px solid #EEF2F7;
}

.topRow{
display:flex;
align-items:center;
gap:12px;
}

.backBtn{
width:46px;
height:46px;
border:none;
border-radius:16px;
background:#FFD400;
font-size:18px;
font-weight:900;
cursor:pointer;
box-shadow:
0 6px 14px rgba(255,212,0,0.25);
}

.pageText h2{
font-size:22px;
font-weight:900;
margin-bottom:4px;
}

.pageText p{
font-size:12px;
color:#6B7280;
}

/* =========================
MAIN
========================= */

.main{
width:100%;
max-width:1200px;
margin:auto;
padding:18px;
padding-bottom:220px;
}

/* =========================
EMPTY
========================= */

.emptyCart{
padding:70px 20px;
text-align:center;
display:none;
}

.emptyIcon{
width:110px;
height:110px;
border-radius:34px;
background:#FFF7CC;
display:flex;
align-items:center;
justify-content:center;
font-size:52px;
margin:auto;
margin-bottom:24px;
}

.emptyCart h2{
font-size:28px;
margin-bottom:10px;
font-weight:900;
}

.emptyCart p{
font-size:14px;
line-height:1.8;
color:#6B7280;
max-width:400px;
margin:auto;
margin-bottom:24px;
}

.shopBtn{
height:54px;
padding:0 24px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:14px;
font-weight:900;
cursor:pointer;
}

/* =========================
GRID
========================= */

.cartGrid{
display:flex;
flex-direction:column;
gap:16px;
}

/* =========================
CARD
========================= */

.cartCard{
background:#fff;
padding:18px;
border-radius:26px;
box-shadow:
0 8px 24px rgba(15,23,42,0.05);
border:1px solid #EEF2F7;
}

.cardTop{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:14px;
}

.leftCard{
display:flex;
gap:14px;
flex:1;
}

.productIcon{
width:70px;
height:70px;
border-radius:22px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
box-shadow:
0 6px 16px rgba(0,0,0,0.06);
flex-shrink:0;
}

.productInfo{
flex:1;
}

.categoryTag{
display:inline-block;
padding:6px 12px;
border-radius:12px;
font-size:11px;
font-weight:700;
margin-bottom:8px;
}

.productInfo h2{
font-size:17px;
margin-bottom:6px;
font-weight:800;
}

.productInfo p{
font-size:12px;
line-height:1.6;
color:#6B7280;
margin-bottom:10px;
}

.price{
font-size:19px;
font-weight:900;
color:#22C55E;
}

.deleteBtn{
width:40px;
height:40px;
border:none;
border-radius:14px;
background:#FEE2E2;
color:#EF4444;
font-size:15px;
cursor:pointer;
flex-shrink:0;
}

/* =========================
BOTTOM ROW
========================= */

.bottomRow{
margin-top:16px;
display:flex;
justify-content:space-between;
align-items:center;
gap:14px;
}

.qtyBox{
display:flex;
align-items:center;
gap:10px;
background:#F8FAFC;
padding:6px;
border-radius:16px;
}

.qtyBtn{
width:34px;
height:34px;
border:none;
border-radius:12px;
background:#fff;
font-size:15px;
font-weight:900;
cursor:pointer;
box-shadow:
0 2px 6px rgba(0,0,0,0.05);
}

.qtyText{
min-width:26px;
text-align:center;
font-size:15px;
font-weight:800;
}

.itemTotal{
font-size:18px;
font-weight:900;
}

/* =========================
BILL
========================= */

.billWrapper{
position:fixed;
bottom:70px;
left:0;
width:100%;
padding:14px;
z-index:998;
transition:0.3s;
}

.billBox{
width:100%;
max-width:1200px;
margin:auto;
background:#fff;
border-radius:28px;
padding:20px;
box-shadow:
0 -6px 30px rgba(15,23,42,0.08);
border:1px solid #EEF2F7;
}

.billRow{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.billRow h4{
font-size:13px;
color:#6B7280;
}

.billRow h3{
font-size:15px;
font-weight:800;
}

.totalRow{
padding-top:16px;
border-top:
1px dashed #CBD5E1;
margin-top:8px;
}

.totalRow h2{
font-size:24px;
font-weight:900;
}

.checkoutBtn{
width:100%;
height:56px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:15px;
font-weight:900;
cursor:pointer;
margin-top:18px;
}

/* =========================
BOTTOM NAV
========================= */

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #EEF2F7;
z-index:1000;
}

.bottomNav a{
text-decoration:none;
color:#6B7280;
font-size:0;
}

.bottomNav i{
font-size:22px;
}

.activeNav{
color:#FFD400 !important;
}

/* =========================
DESKTOP
========================= */

@media screen and (min-width:768px){

.bottomNav a{
font-size:12px;
}

.bottomNav i{
display:block;
margin-bottom:4px;
}

}

/* =========================
MOBILE
========================= */

@media screen and (max-width:768px){

.main{
padding:14px;
padding-bottom:220px;
}

.cartCard{
padding:16px;
border-radius:22px;
}

.productIcon{
width:60px;
height:60px;
font-size:28px;
border-radius:18px;
}

.productInfo h2{
font-size:15px;
}

.productInfo p{
font-size:11px;
}

.price{
font-size:17px;
}

.billWrapper{
padding:10px;
bottom:68px;
}

.billBox{
padding:18px;
border-radius:24px;
}

.totalRow h2{
font-size:22px;
}

.bottomNav a{
font-size:0;
}

}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="topRow">

<button
class="backBtn"
onclick="history.back()"
>

←

</button>

<div class="pageText">

<h2>
My Cart
</h2>

<p id="cartItemCount">
0 Items
</p>

</div>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- EMPTY -->

<div
class="emptyCart"
id="emptyCart"
>

<div class="emptyIcon">
🛒
</div>

<h2>
Your Cart Is Empty
</h2>

<p>

Looks like you haven't added
any laundry services yet.

</p>

<button
class="shopBtn"
onclick="
window.location.href='services.html'
"
>

Browse Services

</button>

</div>

<!-- CART -->

<div
class="cartGrid"
id="cartGrid"
>

</div>

</div>

<!-- BILL -->

<div
class="billWrapper"
id="billWrapper"
>

<div class="billBox">

<div class="billRow totalRow">

<h2>
Total
</h2>

<h2 id="total">
₹0
</h2>

</div>

<button
class="checkoutBtn"
onclick="
goCheckout()
"
>

Proceed To Checkout →

</button>

</div>

</div>

<!-- NAV -->

<div class="bottomNav">

<a href="index.html">

<i class="fa-solid fa-house"></i>

Home

</a>

<a href="services.html">

<i class="fa-solid fa-shirt"></i>

Services

</a>

<a
href="cart.html"
class="activeNav"
>

<i class="fa-solid fa-cart-shopping"></i>

Cart

</a>

<a href="offers.html">

<i class="fa-solid fa-tags"></i>

Offers

</a>

<a href="profile.html">

<i class="fa-regular fa-user"></i>

Profile

</a>

</div>

<script>

/* =========================
LOCAL CART
========================= */

let cart =

JSON.parse(
localStorage.getItem("cart")
) || [];

/* =========================
ELEMENTS
========================= */

const cartGrid =
document.getElementById(
"cartGrid"
);

const emptyCart =
document.getElementById(
"emptyCart"
);

const billWrapper =
document.getElementById(
"billWrapper"
);

/* =========================
RENDER CART
========================= */

function renderCart(){

if(cart.length === 0){

cartGrid.style.display =
"none";

billWrapper.style.display =
"none";

emptyCart.style.display =
"block";

document.getElementById(
"cartItemCount"
).innerHTML =
"0 Items";

return;

}

emptyCart.style.display =
"none";

cartGrid.style.display =
"flex";

billWrapper.style.display =
"block";

let html = "";

let subtotal = 0;

cart.forEach((item,index)=>{

const qty =
item.qty || 1;

const price =
parseInt(
String(item.price)
.replace("₹","")
) || 0;

subtotal += price * qty;

/* CATEGORY */

const category =
item.category || "Laundry";

/* CATEGORY STYLE */

let bg =
"#E0F2FE";

let color =
"#0369A1";

if(category === "Ironing"){

bg = "#FEF3C7";
color = "#92400E";

}

if(category === "Washing"){

bg = "#DCFCE7";
color = "#166534";

}

if(category === "Dry Clean"){

bg = "#F3E8FF";
color = "#6B21A8";

}

html += `

<div class="cartCard">

<div class="cardTop">

<div class="leftCard">

<div class="productIcon">
${item.icon || "👕"}
</div>

<div class="productInfo">

<div
class="categoryTag"
style="
background:${bg};
color:${color};
"
>

${category}

</div>

<h2>
${item.name}
</h2>

<p>
Premium laundry service
</p>

<div class="price">
₹${price}
</div>

</div>

</div>

<button
class="deleteBtn"
onclick="
removeItem(${index})
"
>

🗑️

</button>

</div>

<div class="bottomRow">

<div class="qtyBox">

<button
class="qtyBtn"
onclick="
changeQty(${index},-1)
"
>

−

</button>

<div class="qtyText">
${qty}
</div>

<button
class="qtyBtn"
onclick="
changeQty(${index},1)
"
>

+

</button>

</div>

<div class="itemTotal">

₹${price * qty}

</div>

</div>

</div>

`;

});

cartGrid.innerHTML = html;

document.getElementById(
"total"
).innerHTML =
`₹${subtotal}`;

document.getElementById(
"cartItemCount"
).innerHTML =
`${cart.length} Items`;

}

/* =========================
REMOVE
========================= */

function removeItem(index){

cart.splice(index,1);

saveCart();

}

/* =========================
CHANGE QTY
========================= */

function changeQty(index,change){

if(!cart[index].qty){

cart[index].qty = 1;

}

cart[index].qty += change;

if(cart[index].qty <= 0){

cart[index].qty = 1;

}

saveCart();

}

/* =========================
SAVE
========================= */

function saveCart(){

localStorage.setItem(

"cart",

JSON.stringify(cart)

);

renderCart();

}

/* =========================
CHECKOUT
========================= */

function goCheckout(){

window.location.href =
"checkout.html";

}

/* =========================
SCROLL HIDE BILL
========================= */

let lastScroll = 0;

window.addEventListener(
"scroll",
function(){

const currentScroll =
window.pageYOffset;

if(currentScroll > lastScroll){

billWrapper.style.transform =
"translateY(200px)";

}

else{

billWrapper.style.transform =
"translateY(0px)";

}

lastScroll = currentScroll;

});

/* =========================
INIT
========================= */

renderCart();

</script>

</body>

</html>
