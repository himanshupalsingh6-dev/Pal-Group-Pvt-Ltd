<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
QuickPress Login
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
"Poppins",
sans-serif;
}

body{
background:#F8FAFC;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
overflow-x:hidden;
}

/* =========================
CONTAINER
========================= */

.loginContainer{
width:100%;
max-width:440px;
}

/* =========================
LOGO
========================= */

.logoBox{
text-align:center;
margin-bottom:24px;
}

.logoIcon{
width:110px;
height:110px;
border-radius:34px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:54px;
margin:auto;
margin-bottom:18px;
box-shadow:
0 12px 30px rgba(255,212,0,0.35);
}

.logoBox h1{
font-size:34px;
font-weight:900;
margin-bottom:10px;
}

.logoBox p{
font-size:14px;
line-height:1.8;
color:#6B7280;
}

/* =========================
CARD
========================= */

.loginCard{
background:#fff;
padding:28px;
border-radius:34px;
box-shadow:
0 12px 40px rgba(15,23,42,0.06);
border:1px solid #EEF2F7;
}

/* =========================
TAB
========================= */

.tabBox{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:24px;
}

.tabBtn{
height:52px;
border:none;
border-radius:18px;
background:#F8FAFC;
font-size:14px;
font-weight:800;
cursor:pointer;
transition:0.3s;
}

.activeTab{
background:#FFD400;
}

/* =========================
INPUT
========================= */

.inputGroup{
margin-bottom:18px;
}

.inputGroup label{
display:block;
font-size:13px;
font-weight:700;
margin-bottom:8px;
}

.inputBox{
position:relative;
}

.inputBox i{
position:absolute;
left:18px;
top:50%;
transform:translateY(-50%);
font-size:16px;
color:#9CA3AF;
}

.inputBox input,
.inputBox select{
width:100%;
height:58px;
border:none;
outline:none;
background:#F8FAFC;
border-radius:18px;
padding:0 18px 0 50px;
font-size:14px;
}

/* =========================
OTP
========================= */

.otpInfo{
background:#FFF7CC;
padding:14px;
border-radius:16px;
font-size:13px;
font-weight:700;
margin-bottom:18px;
text-align:center;
}

/* =========================
BUTTON
========================= */

.submitBtn{
width:100%;
height:58px;
border:none;
border-radius:20px;
background:#111827;
color:#fff;
font-size:15px;
font-weight:900;
cursor:pointer;
margin-top:6px;
}

/* =========================
SOCIAL
========================= */

.orText{
text-align:center;
margin:22px 0;
font-size:13px;
color:#6B7280;
font-weight:700;
}

.socialBtn{
width:100%;
height:56px;
border:none;
border-radius:18px;
background:#fff;
border:1px solid #E5E7EB;
font-size:14px;
font-weight:800;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin-bottom:12px;
}

/* =========================
POPUP
========================= */

.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:#fff;
padding:14px 22px;
border-radius:16px;
font-size:13px;
font-weight:700;
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:9999;
}

.showPopup{
opacity:1;
top:80px;
}

/* =========================
RESPONSIVE
========================= */

@media screen and (max-width:768px){

.loginCard{
padding:24px;
border-radius:28px;
}

.logoIcon{
width:95px;
height:95px;
font-size:46px;
}

.logoBox h1{
font-size:30px;
}

}

</style>

</head>

<body>

<!-- POPUP -->

<div
class="popup"
id="popup"
>

Success

</div>

<!-- MAIN -->

<div class="loginContainer">

<!-- LOGO -->

<div class="logoBox">

<div class="logoIcon">
🧺
</div>

<h1>
QuickPress
</h1>

<p>

Fast premium laundry service
with real-time pickup & delivery.

</p>

</div>

<!-- CARD -->

<div class="loginCard">

<!-- TABS -->

<div class="tabBox">

<button
class="tabBtn activeTab"
id="loginTab"
onclick="
showLogin()
"
>

Login

</button>

<button
class="tabBtn"
id="signupTab"
onclick="
showSignup()
"
>

Signup

</button>

</div>

<!-- LOGIN -->

<div id="loginForm">

<div class="inputGroup">

<label>
Mobile Number
</label>

<div class="inputBox">

<i class="fa-solid fa-phone"></i>

<input
type="tel"
id="loginPhone"
placeholder="Enter mobile number"
/>

</div>

</div>

<div class="inputGroup">

<label>
OTP
</label>

<div class="inputBox">

<i class="fa-solid fa-key"></i>

<input
type="number"
id="loginOtp"
placeholder="Enter OTP"
/>

</div>

</div>

<div class="otpInfo">

TEMP OTP : 4502

</div>

<button
class="submitBtn"
onclick="
login()
"
>

Login Now

</button>

<div class="orText">

OR CONTINUE WITH

</div>

<button
class="socialBtn"
onclick="
googleLogin()
"
>

<img
src="https://cdn-icons-png.flaticon.com/512/281/281764.png"
width="22"
/>

Continue With Google

</button>

</div>

<!-- SIGNUP -->

<div
id="signupForm"
style="display:none;"
>

<div class="inputGroup">

<label>
Full Name
</label>

<div class="inputBox">

<i class="fa-regular fa-user"></i>

<input
type="text"
id="signupName"
placeholder="Enter full name"
/>

</div>

</div>

<div class="inputGroup">

<label>
Email Address
</label>

<div class="inputBox">

<i class="fa-regular fa-envelope"></i>

<input
type="email"
id="signupEmail"
placeholder="Enter email"
/>

</div>

</div>

<div class="inputGroup">

<label>
Mobile Number
</label>

<div class="inputBox">

<i class="fa-solid fa-phone"></i>

<input
type="tel"
id="signupPhone"
placeholder="Enter mobile number"
/>

</div>

</div>

<div class="inputGroup">

<label>
City
</label>

<div class="inputBox">

<i class="fa-solid fa-location-dot"></i>

<select id="signupCity">

<option>
Meerut
</option>

<option>
Delhi
</option>

<option>
Noida
</option>

<option>
Ghaziabad
</option>

</select>

</div>

</div>

<div class="inputGroup">

<label>
Password
</label>

<div class="inputBox">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="signupPassword"
placeholder="Create password"
/>

</div>

</div>

<button
class="submitBtn"
onclick="
signup()
"
>

Create Account

</button>

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

/* =========================
IMPORTS
========================= */

import {

auth,
db

}

from "../firebase.js";

import {

GoogleAuthProvider,
signInWithPopup

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {

doc,
setDoc,
getDoc

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* =========================
AUTO LOGIN
========================= */

if(
localStorage.getItem(
"isLoggedIn"
) === "true"
){

window.location.href =
"../index.html";

}

/* =========================
POPUP
========================= */

function showPopup(text){

const popup =

document.getElementById(
"popup"
);

popup.innerHTML = text;

popup.classList.add(
"showPopup"
);

setTimeout(()=>{

popup.classList.remove(
"showPopup"
);

},2000);

}

/* =========================
TAB SWITCH
========================= */

window.showLogin =
function(){

document.getElementById(
"loginForm"
).style.display =
"block";

document.getElementById(
"signupForm"
).style.display =
"none";

document.getElementById(
"loginTab"
).classList.add(
"activeTab"
);

document.getElementById(
"signupTab"
).classList.remove(
"activeTab"
);

};

window.showSignup =
function(){

document.getElementById(
"loginForm"
).style.display =
"none";

document.getElementById(
"signupForm"
).style.display =
"block";

document.getElementById(
"signupTab"
).classList.add(
"activeTab"
);

document.getElementById(
"loginTab"
).classList.remove(
"activeTab"
);

};

/* =========================
SIGNUP
========================= */

window.signup =
async function(){

const name =
document.getElementById(
"signupName"
).value;

const email =
document.getElementById(
"signupEmail"
).value;

const phone =
document.getElementById(
"signupPhone"
).value;

const city =
document.getElementById(
"signupCity"
).value;

const password =
document.getElementById(
"signupPassword"
).value;

if(
!name ||
!email ||
!phone ||
!city ||
!password
){

showPopup(
"Fill all details"
);

return;

}

/* USER DATA */

const userData = {

name,
email,
phone,
city,
password,
wallet:0,
createdAt:
new Date()

};

/* SAVE FIREBASE */

await setDoc(

doc(db,"users",phone),

userData

);

/* LOCAL LOGIN */

localStorage.setItem(
"isLoggedIn",
"true"
);

localStorage.setItem(
"userPhone",
phone
);

localStorage.setItem(

"userProfile",

JSON.stringify(userData)

);

showPopup(
"Account Created"
);

setTimeout(()=>{

window.location.href =
"../user/index.html";

},1500);

};

/* =========================
LOGIN
========================= */

window.login =
async function(){

const phone =
document.getElementById(
"loginPhone"
).value;

const otp =
document.getElementById(
"loginOtp"
).value;

/* TEMP OTP */

if(otp !== "4502"){

showPopup(
"Invalid OTP"
);

return;

}

/* GET USER */

const userRef =

doc(db,"users",phone);

const userSnap =

await getDoc(userRef);

if(!userSnap.exists()){

showPopup(
"Account Not Found"
);

return;

}

const userData =
userSnap.data();

/* LOGIN */

localStorage.setItem(
"isLoggedIn",
"true"
);

localStorage.setItem(
"userPhone",
phone
);

localStorage.setItem(

"userProfile",

JSON.stringify(userData)

);

showPopup(
"Login Successful"
);

setTimeout(()=>{

window.location.href =
"../user/index.html";

},1500);

};

/* =========================
GOOGLE LOGIN
========================= */

window.googleLogin =
async function(){

try{

const provider =

new GoogleAuthProvider();

const result =

await signInWithPopup(
auth,
provider
);

const user = result.user;

/* USER DATA */

const userData = {

name:user.displayName,
email:user.email,
phone:user.phoneNumber || "",
city:"Meerut",
wallet:0,
createdAt:
new Date()

};

/* SAVE */

await setDoc(

doc(db,"users",user.uid),

userData

);

/* LOGIN */

localStorage.setItem(
"isLoggedIn",
"true"
);

localStorage.setItem(

"userProfile",

JSON.stringify(userData)

);

showPopup(
"Google Login Success"
);

setTimeout(()=>{

window.location.href =
"../user/index.html";

},1500);

}

catch(error){

showPopup(
"Google Login Failed"
);

}

};

</script>

</body>

</html>
