<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
QuickPress Login
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
"Poppins",
sans-serif;
}

body{
background:#F8FAFC;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
overflow-x:hidden;
}

/* =========================
LOGIN CONTAINER
========================= */

.loginContainer{
width:100%;
max-width:430px;
}

/* =========================
LOGO
========================= */

.logoBox{
text-align:center;
margin-bottom:24px;
}

.logoIcon{
width:110px;
height:110px;
border-radius:34px;
background:#FFD400;
display:flex;
align-items:center;
justify-content:center;
font-size:52px;
margin:auto;
margin-bottom:18px;
box-shadow:
0 10px 30px rgba(255,212,0,0.35);
}

.logoBox h1{
font-size:34px;
font-weight:900;
margin-bottom:10px;
color:#111827;
}

.logoBox p{
font-size:14px;
line-height:1.8;
color:#6B7280;
}

/* =========================
CARD
========================= */

.loginCard{
background:#fff;
border-radius:32px;
padding:28px;
box-shadow:
0 10px 40px rgba(15,23,42,0.06);
border:1px solid #EEF2F7;
}

/* =========================
TABS
========================= */

.tabBox{
display:grid;
grid-template-columns:1fr 1fr;
background:#F8FAFC;
padding:6px;
border-radius:18px;
margin-bottom:24px;
}

.tabBtn{
height:48px;
border:none;
border-radius:14px;
background:transparent;
font-size:14px;
font-weight:800;
cursor:pointer;
transition:0.3s;
}

.activeTab{
background:#FFD400;
color:#111827;
}

/* =========================
FORM
========================= */

.inputGroup{
margin-bottom:18px;
}

.inputGroup label{
display:block;
font-size:13px;
font-weight:700;
margin-bottom:8px;
}

.inputBox{
position:relative;
}

.inputBox i{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
color:#9CA3AF;
font-size:16px;
}

.inputBox input{
width:100%;
height:58px;
border:none;
outline:none;
background:#F8FAFC;
border-radius:18px;
padding:0 18px 0 48px;
font-size:14px;
}

.forgotBox{
display:flex;
justify-content:flex-end;
margin-bottom:22px;
}

.forgotBox a{
text-decoration:none;
font-size:13px;
font-weight:700;
color:#111827;
}

/* =========================
BUTTON
========================= */

.submitBtn{
width:100%;
height:58px;
border:none;
border-radius:20px;
background:#111827;
color:#fff;
font-size:15px;
font-weight:900;
cursor:pointer;
transition:0.3s;
}

.submitBtn:hover{
transform:translateY(-2px);
}

/* =========================
BOTTOM TEXT
========================= */

.bottomText{
text-align:center;
margin-top:22px;
font-size:13px;
color:#6B7280;
}

.bottomText span{
color:#111827;
font-weight:800;
cursor:pointer;
}

/* =========================
SUCCESS POPUP
========================= */

.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:#fff;
padding:14px 22px;
border-radius:16px;
font-size:13px;
font-weight:700;
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:9999;
}

.showPopup{
opacity:1;
top:80px;
}

/* =========================
RESPONSIVE
========================= */

@media screen and (max-width:768px){

.loginCard{
padding:24px;
border-radius:28px;
}

.logoIcon{
width:95px;
height:95px;
font-size:46px;
}

.logoBox h1{
font-size:30px;
}

}

</style>

</head>

<body>

<!-- POPUP -->

<div
class="popup"
id="popup"
>

Success

</div>

<!-- LOGIN -->

<div class="loginContainer">

<!-- LOGO -->

<div class="logoBox">

<div class="logoIcon">
🧺
</div>

<h1>
QuickPress
</h1>

<p>

Premium laundry service
with fast pickup & delivery.

</p>

</div>

<!-- CARD -->

<div class="loginCard">

<!-- TABS -->

<div class="tabBox">

<button
class="tabBtn activeTab"
id="loginTab"
onclick="
showLogin()
"
>

Login

</button>

<button
class="tabBtn"
id="signupTab"
onclick="
showSignup()
"
>

Signup

</button>

</div>

<!-- LOGIN FORM -->

<div id="loginForm">

<div class="inputGroup">

<label>
Email Address
</label>

<div class="inputBox">

<i class="fa-regular fa-envelope"></i>

<input
type="email"
id="loginEmail"
placeholder="Enter your email"
/>

</div>

</div>

<div class="inputGroup">

<label>
Password
</label>

<div class="inputBox">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="loginPassword"
placeholder="Enter password"
/>

</div>

</div>

<div class="forgotBox">

<a href="#">
Forgot Password?
</a>

</div>

<button
class="submitBtn"
onclick="
login()
"
>

Login Now

</button>

</div>

<!-- SIGNUP FORM -->

<div
id="signupForm"
style="display:none;"
>

<div class="inputGroup">

<label>
Full Name
</label>

<div class="inputBox">

<i class="fa-regular fa-user"></i>

<input
type="text"
id="signupName"
placeholder="Enter your name"
/>

</div>

</div>

<div class="inputGroup">

<label>
Email Address
</label>

<div class="inputBox">

<i class="fa-regular fa-envelope"></i>

<input
type="email"
id="signupEmail"
placeholder="Enter your email"
/>

</div>

</div>

<div class="inputGroup">

<label>
Password
</label>

<div class="inputBox">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="signupPassword"
placeholder="Create password"
/>

</div>

</div>

<button
class="submitBtn"
onclick="
signup()
"
>

Create Account

</button>

</div>

<div class="bottomText">

Premium Laundry Experience

</div>

</div>

</div>

<script>

/* =========================
AUTO REDIRECT
========================= */

if(
localStorage.getItem(
"isLoggedIn"
) === "true"
){

window.location.href =
"index.html";

}

/* =========================
POPUP
========================= */

function showPopup(text){

const popup =
document.getElementById(
"popup"
);

popup.innerHTML = text;

popup.classList.add(
"showPopup"
);

setTimeout(()=>{

popup.classList.remove(
"showPopup"
);

},2000);

}

/* =========================
TAB SWITCH
========================= */

function showLogin(){

document.getElementById(
"loginForm"
).style.display =
"block";

document.getElementById(
"signupForm"
).style.display =
"none";

document.getElementById(
"loginTab"
).classList.add(
"activeTab"
);

document.getElementById(
"signupTab"
).classList.remove(
"activeTab"
);

}

function showSignup(){

document.getElementById(
"loginForm"
).style.display =
"none";

document.getElementById(
"signupForm"
).style.display =
"block";

document.getElementById(
"signupTab"
).classList.add(
"activeTab"
);

document.getElementById(
"loginTab"
).classList.remove(
"activeTab"
);

}

/* =========================
SIGNUP
========================= */

function signup(){

const name =
document.getElementById(
"signupName"
).value;

const email =
document.getElementById(
"signupEmail"
).value;

const password =
document.getElementById(
"signupPassword"
).value;

if(
!name ||
!email ||
!password
){

showPopup(
"Fill all details"
);

return;

}

/* SAVE USER */

const user = {

name,
email,
password,
address:""

};

localStorage.setItem(

"userProfile",

JSON.stringify(user)

);

/* LOGIN */

localStorage.setItem(
"isLoggedIn",
"true"
);

showPopup(
"Account Created"
);

setTimeout(()=>{

window.location.href =
"user/index.html";

},1200);

}

/* =========================
LOGIN
========================= */

function login(){

const email =
document.getElementById(
"loginEmail"
).value;

const password =
document.getElementById(
"loginPassword"
).value;

const savedUser =

JSON.parse(
localStorage.getItem(
"userProfile"
)
);

/* CHECK */

if(!savedUser){

showPopup(
"No account found"
);

return;

}

if(
email === savedUser.email &&
password === savedUser.password
){

localStorage.setItem(
"isLoggedIn",
"true"
);

showPopup(
"Login Successful"
);

setTimeout(()=>{

window.location.href =
"user/index.html";

},1200);

}

else{

showPopup(
"Invalid credentials"
);

}

}

</script>

</body>

</html>
