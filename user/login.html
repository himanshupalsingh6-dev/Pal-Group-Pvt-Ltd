<!-- =====================================================
LOGIN.HTML
PREMIUM QUICKPRESS LOGIN
===================================================== -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
QuickPress Login
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =====================================================
RESET
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:
linear-gradient(
180deg,
#FFD633 0%,
#FFE98A 35%,
#F6F7FB 35%
);

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:20px;

overflow:hidden;

}

/* =====================================================
LOGIN CARD
===================================================== */

.loginCard{

width:100%;

max-width:420px;

background:#fff;

border-radius:36px;

padding:32px 24px;

box-shadow:
0 20px 40px rgba(0,0,0,0.08);

position:relative;

overflow:hidden;

}

/* =====================================================
TOP
===================================================== */

.logo{

width:82px;
height:82px;

border-radius:26px;

background:
linear-gradient(
135deg,
#111827,
#1F2937
);

display:flex;

align-items:center;
justify-content:center;

margin:auto;

font-size:34px;

color:#FFD633;

font-weight:900;

}

.title{

margin-top:22px;

text-align:center;

font-size:34px;

font-weight:900;

line-height:1.1;

}

.subtitle{

margin-top:12px;

text-align:center;

font-size:14px;

line-height:1.7;

color:#6B7280;

}

/* =====================================================
FORM
===================================================== */

.formGroup{

margin-top:22px;

}

.label{

margin-bottom:10px;

font-size:13px;

font-weight:800;

}

.inputBox{

height:58px;

background:#F3F4F6;

border-radius:18px;

display:flex;

align-items:center;

padding:0 18px;

}

.inputBox i{

font-size:18px;

color:#16A34A;

}

.inputBox input{

flex:1;

height:100%;

border:none;

outline:none;

padding:0 14px;

background:none;

font-size:15px;

font-weight:700;

}

/* =====================================================
BUTTON
===================================================== */

.loginBtn{

width:100%;

height:58px;

margin-top:28px;

border:none;

border-radius:20px;

background:#16A34A;

color:#fff;

font-size:16px;

font-weight:900;

cursor:pointer;

transition:0.3s;

}

.loginBtn:active{

transform:scale(0.98);

}

/* =====================================================
OTP
===================================================== */

.otpText{

margin-top:16px;

text-align:center;

font-size:13px;

font-weight:700;

color:#6B7280;

}

/* =====================================================
BOTTOM
===================================================== */

.bottomText{

margin-top:26px;

text-align:center;

font-size:14px;

font-weight:700;

color:#6B7280;

}

.bottomText a{

color:#16A34A;

text-decoration:none;

font-weight:900;

}

/* =====================================================
DESKTOP
===================================================== */

@media(min-width:900px){

.loginCard{

padding:40px 34px;

}

}

</style>

</head>

<body>

<div class="loginCard">

<!-- LOGO -->

<div class="logo">
Q
</div>

<!-- TITLE -->

<div class="title">
Welcome Back
</div>

<div class="subtitle">
Login into your QuickPress account
for premium laundry experience.
</div>

<!-- FORM -->

<form id="loginForm">

<div class="formGroup">

<div class="label">
Mobile Number
</div>

<div class="inputBox">

<i class="fa-solid fa-phone"></i>

<input
type="tel"
id="phone"
placeholder="+91 9876543210"
required>

</div>

</div>

<div class="formGroup">

<div class="label">
Password / OTP
</div>

<div class="inputBox">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Enter Password or OTP"
required>

</div>

</div>

<button
class="loginBtn"
id="loginBtn">

Login Now

</button>

</form>

<div class="otpText">
Demo OTP : 4502
</div>

<div class="bottomText">
Don't have account?
<a href="signup.html">
Create Account
</a>
</div>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
