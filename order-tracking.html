<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Order – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --yellow:#FFD400;
  --green:#2ecc71;
  --bg:#f6f7f9;
}
body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
}

/* HEADER */
.header{
  padding:18px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff7a00,#ffae00);
  color:#fff;
}

/* CONTAINER */
.container{padding:16px}

/* CARD */
.card{
  background:#fff;
  padding:16px;
  border-radius:18px;
  margin-bottom:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

/* MAP */
.map{
  width:100%;
  height:220px;
  border-radius:14px;
  margin-top:10px;
}

/* DELIVERY BOY */
.dp{
  display:flex;
  align-items:center;
  gap:12px;
}
.dp img{
  width:50px;
  height:50px;
  border-radius:50%;
}
.dp .name{
  font-weight:bold;
}

/* STATUS */
.step{
  display:flex;
  align-items:center;
  margin-bottom:10px;
}
.circle{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#ccc;
  margin-right:10px;
}
.active{background:var(--green)}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  margin-top:10px;
}
.whatsapp{background:#25D366;color:#fff}
.home{background:#ff8c00;color:#fff}
</style>
</head>

<body>

<div class="header">📍 Track Your Order</div>

<div class="container">

<!-- ORDER -->
<div class="card">
  <b>Order ID:</b> <span id="orderId"></span><br>
  <b>Total:</b> ₹<span id="total"></span>
</div>

<!-- DELIVERY BOY -->
<div class="card">
  <div class="dp">
    <img src="https://i.pravatar.cc/100" alt="boy">
    <div>
      <div class="name">Rahul Kumar</div>
      <div>📞 9876543210</div>
    </div>
  </div>
</div>

<!-- MAP -->
<div class="card">
  <b>Live Location</b>
  <iframe id="map" class="map"></iframe>
</div>

<!-- STATUS -->
<div class="card">
  <div class="step"><div class="circle active"></div> Order Placed</div>
  <div class="step"><div class="circle active"></div> Pickup Assigned</div>
  <div class="step"><div class="circle active"></div> Processing</div>
  <div class="step"><div class="circle" id="out"></div> Out for Delivery</div>
  <div class="step"><div class="circle" id="done"></div> Delivered</div>
</div>

<!-- ACTION -->
<div class="card">
  <button class="btn whatsapp" onclick="whatsapp()">📲 Contact on WhatsApp</button>
  <button class="btn home" onclick="goHome()">🏠 Go to Home</button>
</div>

</div>

<script>

/* LOAD ORDER */
const order = JSON.parse(localStorage.getItem("lastOrder")||"{}");

/* SET DATA */
document.getElementById("orderId").innerText =
  order.time ? "QP"+order.time : "N/A";

document.getElementById("total").innerText =
  order.total || "0";

/* MAP LOCATION (CUSTOMER LOCATION) */
if(order.location){
  document.getElementById("map").src =
    `https://maps.google.com/maps?q=${order.location}&z=14&output=embed`;
}

/* FAKE LIVE MOVEMENT */
let lat = 28.61; // example
let lng = 77.20;

setInterval(()=>{
  lat += 0.001;
  lng += 0.001;

  document.getElementById("map").src =
    `https://maps.google.com/maps?q=${lat},${lng}&z=14&output=embed`;
},3000);

/* STATUS ANIMATION */
setTimeout(()=>{ out.classList.add("active"); },4000);
setTimeout(()=>{ done.classList.add("active"); },8000);

/* WHATSAPP */
function whatsapp(){
  window.open("https://wa.me/919876543210");
}

/* HOME */
function goHome(){
  location.href="index.html";
}

</script>

</body>
</html>
