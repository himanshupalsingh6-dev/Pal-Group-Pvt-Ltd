<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Order – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --yellow:#FFD400;
  --green:#2ecc71;
  --bg:#f6f7f9;
}
body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
}

/* HEADER */
.header{
  padding:18px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff7a00,#ffae00);
  color:#fff;
}

/* CONTAINER */
.container{padding:16px}

/* CARD */
.card{
  background:#fff;
  padding:16px;
  border-radius:18px;
  margin-bottom:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

/* STATUS */
.step{
  display:flex;
  align-items:center;
  margin-bottom:12px;
}

.circle{
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ccc;
  margin-right:10px;
}

.active{
  background:var(--green);
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  margin-top:10px;
}

.whatsapp{
  background:#25D366;
  color:#fff;
}

.home{
  background:#ff8c00;
  color:#fff;
}
</style>
</head>

<body>

<div class="header">📍 Track Your Order</div>

<div class="container">

<!-- ORDER INFO -->
<div class="card">
  <div><b>Order ID:</b> <span id="orderId"></span></div>
  <div><b>Total:</b> ₹<span id="total"></span></div>
</div>

<!-- STATUS -->
<div class="card">
  <div class="step"><div class="circle active"></div> Order Placed</div>
  <div class="step"><div class="circle active"></div> Pickup Assigned</div>
  <div class="step"><div class="circle" id="step3"></div> Processing</div>
  <div class="step"><div class="circle" id="step4"></div> Out for Delivery</div>
  <div class="step"><div class="circle" id="step5"></div> Delivered</div>
</div>

<!-- ACTION -->
<div class="card">
  <button class="btn whatsapp" onclick="whatsapp()">📲 Contact on WhatsApp</button>
  <button class="btn home" onclick="goHome()">🏠 Go to Home</button>
</div>

</div>

<script>

/* LOAD ORDER */
const order = JSON.parse(localStorage.getItem("lastOrder") || "{}");

/* SET DATA */
document.getElementById("orderId").innerText =
  order.time ? "QP" + order.time : "N/A";

document.getElementById("total").innerText =
  order.total || "0";

/* AUTO STATUS ANIMATION */
setTimeout(()=>{ document.getElementById("step3").classList.add("active"); },2000);
setTimeout(()=>{ document.getElementById("step4").classList.add("active"); },4000);
setTimeout(()=>{ document.getElementById("step5").classList.add("active"); },6000);

/* WHATSAPP */
function whatsapp(){
  const msg = `My Order ID: QP${order.time}`;
  window.open(`https://wa.me/9997874502?text=${encodeURIComponent(msg)}`);
}

/* HOME */
function goHome(){
  location.href="index.html";
}

</script>

</body>
</html>
