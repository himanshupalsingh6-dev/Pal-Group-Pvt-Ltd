<!DOCTYPE html>
<html>
<head>
  <title>Track Order – QuickPress</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{margin:0;font-family:Segoe UI;background:#f4f4f4}
    .header{background:linear-gradient(135deg,#ff9800,#ff6f00);color:white;padding:18px;font-size:18px;font-weight:bold}
    .container{padding:12px}
    .card{background:white;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
    .order-id{font-weight:bold;color:#ff9800;margin-bottom:8px}
    .timeline{margin-top:10px}
    .step{display:flex;align-items:center;margin-bottom:10px}
    .dot{width:12px;height:12px;border-radius:50%;background:#ccc;margin-right:10px}
    .done{background:#2ecc71}
    .label{font-size:14px;color:#333}
    .small{font-size:12px;color:#777}

    .profile{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:10px;
    }
    .profile img{
      width:40px;
      height:40px;
      border-radius:50%;
      object-fit:cover;
    }

    .btn{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .whatsapp{background:#25D366;color:white}
    .home{background:#ff9800;color:white}
  </style>
</head>
<body>

<div class="header">📍 Track Your Order</div>

<div class="container">
  <div class="card">
    <div class="order-id">Order ID: <span id="oid">-</span></div>
    <div><b>Total:</b> ₹<span id="total">0</span></div>

    <div class="timeline" id="timelineBox"></div>

    <!-- Partner -->
    <div id="partnerBox"></div>

    <!-- Delivery -->
    <div id="deliveryBox"></div>

    <!-- Buttons -->
    <button class="btn whatsapp" onclick="contactWhatsApp()">📲 Contact on WhatsApp</button>
    <button class="btn home" onclick="goHome()">🏠 Go to Home</button>
  </div>
</div>

<script type="module">
import { db } from "./js/firebase.js";
import {
  doc,
  getDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const orderId = localStorage.getItem("lastOrderId");

const oidEl = document.getElementById("oid");
const totalEl = document.getElementById("total");
const timelineBox = document.getElementById("timelineBox");
const partnerBox = document.getElementById("partnerBox");
const deliveryBox = document.getElementById("deliveryBox");

oidEl.innerText = orderId;

let currentPhone = "";

/* STEP UI */
function step(label, active){
  return `
    <div class="step">
      <div class="dot ${active?'done':''}"></div>
      <div>
        <div class="label">${label}</div>
        <div class="small">${active ? "Completed" : "Pending"}</div>
      </div>
    </div>
  `;
}

/* TRACK */
onSnapshot(doc(db,"orders",orderId), async (snap)=>{
  if(!snap.exists()) return;

  const o = snap.data();
  const s = o.status || "Placed";

  totalEl.innerText = o.grandTotal || 0;

  timelineBox.innerHTML = `
    ${step("Order Placed", true)}
    ${step("Partner Assigned", s==="Assigned"||s==="Accepted"||s==="Ready"||s==="Picked"||s==="Delivered")}
    ${step("Ready", s==="Ready"||s==="Picked"||s==="Delivered")}
    ${step("Picked", s==="Picked"||s==="Delivered")}
    ${step("Delivered", s==="Delivered")}
  `;

  /* PARTNER */
  if(o.partnerId){
    const p = await getDoc(doc(db,"partners",o.partnerId));
    if(p.exists()){
      const data = p.data();
      partnerBox.innerHTML = `
        <h4>🧺 Partner</h4>
        <div class="profile">
          <img src="${data.photo || 'https://via.placeholder.com/40'}">
          <div>
            <b>${data.name}</b><br>
            ${data.phone || ""}
          </div>
        </div>
      `;
      currentPhone = data.phone;
    }
  }

  /* DELIVERY */
  if(o.deliveryId){
    const d = await getDoc(doc(db,"delivery",o.deliveryId));
    if(d.exists()){
      const data = d.data();
      deliveryBox.innerHTML = `
        <h4>🚚 Delivery Boy</h4>
        <div class="profile">
          <img src="${data.photo || 'https://via.placeholder.com/40'}">
          <div>
            <b>${data.name}</b><br>
            ${data.phone || ""}
          </div>
        </div>
      `;
      currentPhone = data.phone;
    }
  }

});

/* WHATSAPP */
window.contactWhatsApp = ()=>{
  if(!currentPhone){
    alert("Contact not available yet");
    return;
  }
  window.open(`https://wa.me/${currentPhone}`,"_blank");
};

/* HOME */
window.goHome = ()=>{
  location.href = "index.html";
};
</script>

</body>
</html>
