<script type="module">
import { db } from "./js/firebase.js";

import {
  collection,
  getDocs,
  query,
  where,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let deliveryId=null;

window.login = async ()=>{
  const phone = phoneInput.value;

  const snap = await getDocs(query(
    collection(db,"delivery"),
    where("phone","==",phone)
  ));

  if(snap.empty){
    alert("Not found");
    return;
  }

  deliveryId=snap.docs[0].id;

  loginBox.style.display="none";
  ordersBox.style.display="block";

  loadOrders();
};

async function loadOrders(){
  const snap = await getDocs(collection(db,"orders"));

  ordersList.innerHTML="";

  snap.forEach(d=>{
    const o=d.data();
    if(o.status!=="Accepted") return;

    ordersList.innerHTML+=`
      <div class="order">
        ${d.id}
        <button onclick="deliver('${d.id}')">Done</button>
      </div>`;
  });
}

window.deliver = async id=>{
  await updateDoc(doc(db,"orders",id),{status:"Delivered"});
  loadOrders();
};
</script>
