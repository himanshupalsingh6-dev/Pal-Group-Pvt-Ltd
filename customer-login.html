<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f6f7f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:350px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  margin-top:12px;
  background:#FFD400;
  border:none;
  border-radius:12px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>⚡ QuickPress</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script type="module">

/* 🔥 IMPORTS */
import { auth, db } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* 🔥 LOGIN FUNCTION */
window.login = async function(){

  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  if(!email || !password){
    alert("Fill all fields");
    return;
  }

  try{

    const userCred = await signInWithEmailAndPassword(auth,email,password);

    /* 🔥 USERS COLLECTION SAVE */
    await setDoc(doc(db,"users",userCred.user.uid),{
      email:userCred.user.email,
      status:"active",
      createdAt:new Date()
    });

    /* SAVE LOCAL */
    localStorage.setItem("userId", userCred.user.uid);

    alert("Login success");

    /* 🔥 ROLE BASED (OPTIONAL) */
    if(email.includes("admin")){
      location.href="admin.html";
    }else{
      location.href="index.html";
    }

  }catch(err){
    alert(err.message);
  }
};

</script>

</body>
</html>
