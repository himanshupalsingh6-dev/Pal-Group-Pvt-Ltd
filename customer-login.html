<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f6f7f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:350px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  margin-top:12px;
  background:#FFD400;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.link{
  margin-top:10px;
  color:blue;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>⚡ QuickPress</h2>

<input id="name" placeholder="Name" style="display:none">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()" id="loginBtn">Login</button>
<button onclick="signup()" id="signupBtn" style="display:none">Sign Up</button>

<div class="link" onclick="toggle()">Create Account</div>
</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { 
signInWithEmailAndPassword,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* TOGGLE */
window.toggle = function(){

let isSignup = name.style.display === "none";

name.style.display = isSignup ? "block" : "none";

loginBtn.style.display = isSignup ? "none" : "block";
signupBtn.style.display = isSignup ? "block" : "none";

};

/* LOGIN */
window.login = async function(){

const emailVal=email.value;
const passwordVal=password.value;

try{

const userCred = await signInWithEmailAndPassword(auth,emailVal,passwordVal);
const uid = userCred.user.uid;

const snap = await getDoc(doc(db,"users",uid));
const user = snap.data();

/* SAVE */
localStorage.setItem("userId", uid);
localStorage.setItem("role", user.role);
localStorage.setItem("name", user.name);

/* REDIRECT */
if(user.role==="admin") location.href="admin/index.html";
else if(user.role==="partner") location.href="partner/index.html";
else if(user.role==="rider") location.href="rider/index.html";
else location.href="index.html";

}catch(err){
alert(err.message);
}

};

/* SIGNUP (ONLY CUSTOMER) */
window.signup = async function(){

const nameVal=name.value;
const emailVal=email.value;
const passwordVal=password.value;

try{

const userCred = await createUserWithEmailAndPassword(auth,emailVal,passwordVal);
const uid = userCred.user.uid;

/* SAVE USER */
await setDoc(doc(db,"users",uid),{
name:nameVal,
email:emailVal,
role:"customer"   // 🔥 FIXED ROLE
});

alert("Account Created ✅");

/* AUTO LOGIN */
localStorage.setItem("userId", uid);
localStorage.setItem("role", "customer");
localStorage.setItem("name", nameVal);

location.href="index.html";

}catch(err){
alert(err.message);
}

};

</script>

</body>
</html>
