<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – QuickPress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f6f7f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:350px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  margin-top:12px;
  background:#FFD400;
  border:none;
  border-radius:12px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>⚡ QuickPress</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script type="module">

/* 🔥 IMPORTS */
import { auth, db } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* 🔥 LOGIN FUNCTION */
window.login = async function(){

  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  if(!email || !password){
    alert("Fill all fields");
    return;
  }

  try{

    const userCred = await signInWithEmailAndPassword(auth,email,password);
    const uid = userCred.user.uid;

    /* 🔥 GET USER DATA FROM FIRESTORE */
    const snap = await getDoc(doc(db,"users",uid));

    if(!snap.exists()){
      alert("User data not found in database");
      return;
    }

    const user = snap.data();

    /* 🔥 SAVE LOCAL */
    localStorage.setItem("userId", uid);
    localStorage.setItem("role", user.role);
    localStorage.setItem("name", user.name);

    alert("Login success ✅");

    /* 🔥 ROLE BASED REDIRECT */
    if(user.role === "admin"){
      location.href = "admin/index.html";
    }
    else if(user.role === "partner"){
      location.href = "partner/index.html";
    }
    else if(user.role === "rider"){
      location.href = "rider/index.html";
    }
    else{
      location.href = "index.html"; // customer
    }

  }catch(err){
    alert(err.message);
  }
};

</script>
